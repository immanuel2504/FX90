    put:
      tags:
      - Control
      summary: Updates the reader's operating mode
      description: 'The `PUT /cloud/mode` REST endpoint configures the reader''s operating mode using the same `operatingMode.v1` payload shape supported by the MQTT `set_mode` command.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Operating Mode Configuration |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 Series |

        | REST Endpoint | `PUT /cloud/mode` |

        | Request Schema | `operatingMode.v1` |

        | Related Endpoints | `GET /cloud/mode`, `PUT /cloud/start`, `PUT /cloud/stop`, `GET /cloud/config` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |


        ## 3. Before You Begin


        Changing mode while inventory is active can disrupt reads. Stop inventory first with `PUT /cloud/stop` if the reader is currently running.


        | What You Need | Details |

        |---|---|

        | Mode type | One of `SIMPLE`, `INVENTORY`, `PORTAL`, `CONVEYOR`, `CUSTOM`, or `DIRECTIONALITY`. |

        | Antennas or beams | Antenna ports or ATR beam settings used for inventory. |

        | RF settings | Transmit power, environment profile, query settings, select operations, and optional access operations. |

        | Mode-specific settings | Inventory interval, portal trigger settings, or directionality zone/beam configuration, depending on `type`. |

        | Reporting settings | Metadata, report filter, RSSI filter, and optional radio start/stop conditions. |


        ## 4. Schema Alignment


        The request schema is aligned with MQTT `set_mode`. Any mode configuration supported by MQTT should be accepted by REST with the same field name, nested object shape, enum values, and description.

        '
      operationId: setMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Operating mode configuration payload.
              properties:
                type:
                  type: string
                  description: Operating mode type.
                  enum:
                  - SIMPLE
                  - INVENTORY
                  - PORTAL
                  - CONVEYOR
                  - CUSTOM
                environment:
                  type: string
                  description: Reader RF environment profile.
                  enum:
                  - LOW_INTERFERENCE
                  - HIGH_INTERFERENCE
                  - VERY_HIGH_INTERFERENCE
                  - AUTO_DETECT
                  - DEMO
                antennaStopCondition:
                  type: object
                  description: Stop condition applied to antenna inventory cycles.
                  properties:
                    type:
                      type: string
                      description: Type of stop condition.
                      enum:
                      - DURATION
                      - INVENTORY_COUNT
                      - GPI
                      - SINGLE_INVENTORY_LIMITED_DURATION
                    value:
                      type: number
                      description: Value for the selected stop condition type.
                  required:
                  - type
                  - value
                antennas:
                  type: array
                  description: Antenna ports to be used for inventory.
                  items:
                    type: number
                component:
                  type: string
                  description: Legacy wrapper field retained for backward compatibility.
                delayBetweenAntennaCycles:
                  type: object
                  description: Delay configuration between consecutive antenna cycles.
                  properties:
                    duration:
                      type: number
                      description: Delay in milliseconds.
                    type:
                      type: string
                      description: Condition under which delay is applied.
                      enum:
                      - DISABLED
                      - NO_TAGS
                      - NO_UNIQUE_TAGS
                  required:
                  - type
                  - duration
                linkProfile:
                  type: number
                  description: Link profile identifier.
                payload:
                  type: string
                  description: Legacy wrapper field retained for backward compatibility.
                query:
                  type: object
                  description: EPC Gen2 query parameters used during inventory.
                  properties:
                    sel:
                      type: string
                      description: Sel field (EPC Gen2).
                      enum:
                      - ALL
                      - SL
                      - NOT_SL
                    session:
                      type: string
                      description: Session field (EPC Gen2).
                      enum:
                      - S0
                      - S1
                      - S2
                      - S3
                    tagPopulation:
                      type: number
                      description: Expected number of tags.
                    target:
                      type: string
                      description: Target field (EPC Gen2).
                      enum:
                      - A
                      - B
                      - AB
                inventoryProtocol:
                  type: object
                  description: Inventory protocol settings for tag interrogation.
                  properties:
                    mode:
                      type: string
                      description: Inventory protocol mode.
                      enum:
                      - GEN2X
                      - GEN2
                      - HYBRID
                  required:
                  - mode
                reportFilter:
                  type: object
                  description: Controls how frequently and at what scope tag reports are emitted.
                  properties:
                    duration:
                      type: number
                      description: Report filter duration in seconds.
                    type:
                      type: string
                      description: Report filter scope.
                      enum:
                      - RADIO_WIDE
                      - PER_ANTENNA
                  required:
                  - duration
                  - type
                tagMetaData:
                  type: array
                  description: Tag metadata fields included in reports.
                  items:
                    type: string
                    enum:
                    - RSSI
                    - PHASE
                    - SEEN_COUNT
                    - ANTENNA
                    - CHANNEL
                    - PC
                    - XPC
                    - CRC
                    - EPC
                    - TID
                    - USER
                    - MAC
                    - HOSTNAME
                transmitPower:
                  type: array
                  description: Desired transmit power values in dBm.
                  items:
                    type: number
              required:
              - type
            examples:
              set_mode:
                value:
                  antennaStopCondition:
                    type: DURATION
                    value: 400
                  antennas:
