  /cloud/apps:
    get:
      tags:
      - userapp
      summary: List user applications
      description: '## 1. Description


        The `GET /cloud/apps` REST endpoint retrieves the list of user applications installed on the reader.


        This endpoint returns:


        - An array of installed user apps, each with name, autostart flag, running status, and metadata


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/apps` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/apps` to:


        - Confirm which user apps are installed before issuing start, stop, or uninstall requests

        - Check whether a user app is currently running

        - Verify autostart configuration per installed app

        - Audit deployed applications across a fleet of readers


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `name` | Is the expected app present? | Confirms successful installation before attempting to start or configure the app. |

        | `running` | Is the app currently running? | Required before sending a stop request; also confirms a successful start. |

        | `autostart` | Is autostart enabled? | Determines whether the app will resume automatically after a reboot. |

        '
      operationId: getUserapps
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: Installed user applications on the reader (excluding internal system app entries).
                minItems: 0
                uniqueItems: true
                default: []
                items:
                  type: object
                  properties:
                    appname:
                      type: string
                      description: Installed user application name.
                    runningStatus:
                      type: boolean
                      description: Whether the application is currently running.
                      default: false
                    autostart:
                      type: boolean
                      description: Whether the application is configured to start automatically on boot.
                      default: false
                    metadata:
                      type: string
                      description: Additional application metadata returned by the platform (for example, APP_TYPE classification).
                  required:
                  - appname
                  - runningStatus
                  - autostart
                  - metadata
              example:
              - appname: mylogger
                runningStatus: true
                autostart: false
                metadata: 'APP_TYPE: DA'
              - appname: sample
                runningStatus: false
                autostart: true
                metadata: 'APP_TYPE: NORMAL'
      security:
      - bearerAuth: []
  /cloud/setdataToRG:
    put:
      tags:
      - userapp
      summary: Set Data to RG
      description: '## 1. Description


        The `PUT /cloud/setdataToRG` REST endpoint triggers the reader gateway to process and deliver any buffered tag data.


        This is a **trigger-only** call — you do not upload tag data in the request. The reader flushes data that is already buffered on the device. No request body is required.


        ## 2. Before You Begin


        Confirm that the reader gateway is configured and active before calling this endpoint. If no data is buffered or the gateway is not configured, the call may succeed but have no effect.


        | What You Need | Details |

        |---|---|

        | Reader gateway | Valid endpoint settings (see `GET /cloud/config`) |

        | Buffered data | Tag events waiting for delivery |


        ## 3. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/setdataToRG` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Request body | None |

        '
      operationId: setDataToRG
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Empty payload only. Any fields are rejected by cloud agent.
              additionalProperties: false
              maxProperties: 0
            examples:
              set_dataToRG:
                value: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
