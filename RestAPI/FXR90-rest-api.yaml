  /cloud/certificates:
    get:
      tags:
      - Certificate
      summary: List Installed Certificate
      description: '## 1. Description


        The `GET /cloud/certificates` REST endpoint retrieves the list of certificates installed on the reader.


        This endpoint returns:


        - An array of installed certificates, each with name, type, serial number, and validity dates


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/certificates` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/certificates` to:


        - Audit which certificates are installed and their current validity windows

        - Confirm a certificate was successfully installed or removed

        - Retrieve serial numbers for certificate rotation audits

        - Check expiry dates before a scheduled certificate renewal


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `name` | Is the expected certificate present? | Confirms the correct certificate is installed for TLS or authentication. |

        | `type` | What type of certificate is it? | Differentiates device, CA, and client certificates used for different purposes. |

        | `notValidAfter` | When does it expire? | Expired certificates will cause TLS handshake failures and connectivity loss. |

        | `serialNumber` | Does the serial match the expected certificate? | Verifies the exact certificate instance, useful for rotation audits. |

        '
      operationId: getCertificates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getCertificatesResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Certificate
      summary: Install Certificate
      description: 'The `PUT /cloud/certificates` REST endpoint is used to install or update a certificate on the reader by downloading a PFX file from a URL.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/certificates` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |


        ## 3. Usage Notes


        This REST endpoint corresponds to the `set_updateCertificate` MQTT command where applicable. REST and MQTT use the same certificate install payload fields: `name`, `type`, `url`, `authenticationType`, `authenticationOptions`, and `pfxPassword`.


        Allowed `type` values are `client`, `server`, and `app`. Allowed `authenticationType` values are `NONE` and `BASIC`.

        '
      operationId: setUpdateCertificate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setUpdatecertificateRequest'
            examples:
              set_updateCertificate:
                value:
                  authenticationOptions:
                    password: zebra
                    username: zebra
                  authenticationType: BASIC
                  name: reader
                  pfxPassword: abcd12345
                  type: client
                  url: https://10.117.229.15/reader.pfx
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
