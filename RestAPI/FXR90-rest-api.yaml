  /cloud/networkInterfaces:
    get:
      tags:
      - Network
      summary: Retrieves network interfaces
      description: '## 1. Description


        The `GET /cloud/networkInterfaces` REST endpoint retrieves the list of network interfaces available on the reader.


        This endpoint returns:


        - The list of network interface names available on this reader (e.g., `eth0`, `mlan0`, `wan0`, `bnep0`, `uap0`)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/networkInterfaces` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/networkInterfaces` to:


        - Identify which network interfaces are present before configuring them via `PUT /cloud/network`

        - Confirm Ethernet, Wi-Fi, Bluetooth, or cellular interface availability on this reader model

        - Use returned interface names as valid keys in subsequent network configuration calls


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | Interface list | Are all expected interfaces present? | Only interfaces listed here can be configured in `PUT /cloud/network`. |

        | `wan0` presence | Is the cellular interface listed? | Confirms whether the reader hardware supports cellular connectivity. |

        '
      operationId: getNetworkinterfaces
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Network interface names currently available on the reader.
                properties:
                  availableNetworkInterfaces:
                    type: array
                    description: List of network interface identifiers reported by the reader.
                    minItems: 0
                    uniqueItems: true
                    default: []
                    items:
                      type: string
                required:
                - availableNetworkInterfaces
              examples:
                application/json:
                  value:
                    availableNetworkInterfaces:
                    - eth0
                    - mlan0
                    - bnep0
                    - wan0
      security:
      - bearerAuth: []
  /cloud/readPoints:
    get:
      tags:
      - Network
      summary: Gets the read points on the reader
      description: '## 1. Description


        The `GET /cloud/readPoints` REST endpoint retrieves the read points available on the reader.


        This endpoint returns:


        - The list of read-point identifiers available on this reader


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/readPoints` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/readPoints` to:


        - Identify available read-point identifiers before configuring cable loss compensation

        - Map physical read points before configuring inventory mode settings

        - Verify read-point availability before referencing them in antenna configuration


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | Read-point list | How many read points are returned? | Determines how many antenna ports are physically available for use. |

        | Read-point IDs | Do the returned IDs match expected port numbering? | Read-point identifiers must match exactly when used in `PUT /cloud/cableLossCompensation` or `PUT /cloud/mode`. |

        '
      operationId: getReadpoints
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example:
              - '1'
              - '2'
              - '3'
              - '4'
              - '5'
              - '6'
      security:
      - bearerAuth: []
  /cloud/readerLocation:
    get:
      tags:
      - Network
      summary: Gets the GPS coordinates (lat/long)
      description: '## 1. Description


        The `GET /cloud/readerLocation` REST endpoint retrieves the reader''s last reported GPS coordinates.


        This endpoint returns:


        - Latitude and longitude values

        - Altitude (where available)


        No request body is required. The returned values represent the most recent location data known to the reader.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/readerLocation` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/readerLocation` to:


        - Record reader location for asset tracking or fleet management

        - Confirm GPS availability on a deployed reader

        - Feed location data into site, inventory, or logistics systems


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `latitude` | Is a valid latitude value returned? | A null or zero value may indicate the reader does not have a GPS fix yet. |

        | `longitude` | Is a valid longitude value returned? | Combined with latitude, this identifies the reader''s physical position. |

        | `satellitesUsed` | How many satellites produced the fix? | A low satellite count indicates a weak fix and less reliable coordinates. |

        '
      operationId: getGpsCoordinates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  lastReportedTime:
                    type: string
                  latitude:
                    type: string
                  longitude:
                    type: string
                  satellitesUsed:
                    type: integer
      security:
      - bearerAuth: []
  /cloud/eSimConfig:
    get:
      tags:
      - Network
      summary: Gets the eSIM configuration
      description: '## 1. Description


        The `GET /cloud/eSimConfig` REST endpoint retrieves eSIM identity and profile information from the reader.


        This endpoint returns:


        - The reader EID (eSIM identifier) and IMEI

        - Installed eSIM profile names, nicknames, and activation states


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/eSimConfig` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/eSimConfig` to:


        - Audit cellular or eSIM provisioning status on the reader

        - Check the EID and IMEI values for SIM registration or support cases

        - Review installed eSIM profiles before enabling or switching a profile


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `eid` | Is the EID correct for this SIM profile? | The EID uniquely identifies the eSIM hardware and is required for carrier provisioning. |

        | `imei` | Is the IMEI registered with the carrier? | An unregistered IMEI cannot establish a cellular data connection. |

        | Profile names | Which profiles are installed and which is active? | Only one profile can be active at a time; confirms the correct carrier profile is enabled. |

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  eid:
                    type: string
                  imei:
                    type: string
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          description: Whether this profile is currently active.
                        iccid:
                          type: string
                          description: Integrated Circuit Card Identifier for the profile.
                        profileNickName:
                          type: string
                          description: Human-readable nickname assigned to this eSIM profile.
                        provider:
                          type: string
                          description: Name of the mobile network provider.
      security:
      - bearerAuth: []
    put:
      tags:
      - Network
      summary: Sets the eSIM configuration
      description: 'The `PUT /cloud/eSimConfig` REST endpoint sets the eSIM configuration.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/eSimConfig` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: setEsimConfig
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                operation:
                  type: string
                  description: eSIM profile operation to perform.
                  enum:
                  - enable
                  - disable
                profileNickName:
                  type: string
                  description: Nickname of the eSIM profile to apply the operation to.
            examples:
              set_eSimConfig:
                value:
                  operation: enable
                  profileNickName: gnd1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
  /cloud/os:
    put:
      tags:
      - Firmware
      summary: Updates OS software on device
      description: 'The `PUT /cloud/os` REST endpoint updates OS software on the device.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/os` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: setOs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - url
              - authenticationType
              properties:
                authenticationType:
                  type: string
                  description: Authentication method to use when downloading the OS image.
                  enum:
                  - NONE
                  - BASIC
                options:
                  type: object
                  description: Credentials object used when `authenticationType` is `BASIC`.
                  required:
                  - username
                  - password
                  properties:
                    username:
                      type: string
                      description: Username for BASIC authentication.
                    password:
                      type: string
                      description: Password for BASIC authentication.
                url:
                  type: string
                  description: URL to the OS image or update bundle.
                verifyPeer:
                  type: boolean
                  description: Verify the server TLS peer certificate. Defaults to true when omitted.
                verifyHost:
                  type: boolean
                  description: Verify the server hostname in the TLS certificate. Defaults to true when omitted.
                CACertificateFileLocation:
                  type: string
                  description: Path on the device to a CA certificate file to trust for TLS.
                CACertificateFileContent:
                  type: string
                  description: PEM-encoded CA certificate content; written to a temporary file when provided.
                publicKeyFileLocation:
                  type: string
                  description: Path to a public key / certificate file to use for client TLS authentication.
                publicKeyFileContent:
                  type: string
                  description: PEM-encoded public key / certificate content.
                privateKeyFileLocation:
                  type: string
                  description: Path to a private key file to use for client TLS authentication.
                privateKeyFileContent:
                  type: string
                  description: PEM-encoded private key content.
                installedCertificateType:
                  type: string
                  description: Use an installed certificate by specifying its type.
                installedCertificateName:
                  type: string
                  description: Name of an installed certificate to use.
                headers:
                  type: object
                  description: Optional HTTP headers to include in the download request (e.g. Authorization).
                  additionalProperties:
                    type: string
                retry:
                  type: object
                  description: Retry configuration for the download operation.
                  properties:
                    count:
                      type: integer
                    delayInSec:
                      type: integer
            examples:
              set_os:
                value:
                  url: https://10.117.229.9:9093/BUILDS/FXR90_2.0.10.tar.bz2
                  authenticationType: NONE
                  options:
                    username: test
                    password: test
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
