                          txPower: -59
                      altBeacon:
                        enabled: true
                        filters:
                        - mfgId: 0118
                          beaconId: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                          major: 4
                          minor: 4
                          refRssi: -100
                      eddystone:
                        enabled: true
                        filters:
                        - frameType: URL
                          txPower: -59
                          url: https://www.zebra.com
                        - frameType: UID
                          txPower: -18
                          namespace: 0102030405060708090A
                          instance: '000000000001'
                        - frameType: EID
                          txPower: -18
