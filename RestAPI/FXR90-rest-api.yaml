  /cloud/readerCapabilities:
    get:
      tags:
      - System
      summary: Retrieves the Reader Capabilities
      description: '## 1. Description


        The `GET /cloud/readerCapabilities` REST endpoint retrieves the hardware and protocol capabilities of the reader.


        This endpoint returns:


        - The number of GPI and GPO pins available

        - Supported RFID protocols

        - Supported endpoint types for tag data delivery

        - Supported API versions


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/readerCapabilities` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/readerCapabilities` to:


        - Determine how many GPI and GPO pins are available before designing a trigger-based workflow

        - Confirm which RFID protocols the reader supports before configuring inventory

        - Verify API version support before using newer API features

        - Audit hardware capabilities across a mixed fleet


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `numGPIs` | How many GPI pins are available? | Sets the upper limit for GPI-based trigger inputs. |

        | `numGPOs` | How many GPO pins are available? | Sets the upper limit for GPO-driven outputs in workflows. |

        | `protocols` | Which RFID protocols are supported? | Determines which tag types can be read - e.g., GS1 Gen2, ISO 18000-63. |

        | `apiSupported.versions` | Which API versions are supported? | Ensures compatibility between management software and the reader firmware. |

        '
      operationId: getReadercapabilities
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  capabilities:
                    type: object
                    properties:
                      antennas:
                        type: array
                        description: Antenna inventory reported by the reader. Each item includes the antenna port number and whether it is external or internal.
                        items:
                          type: object
                          properties:
                            port:
                              type: integer
                              description: Antenna port number.
                            type:
                              type: string
                              description: Antenna mounting type.
                              enum:
                              - external
                              - internal
                          required:
                          - port
                          - type
                      apiSupported:
                        type: object
                        properties:
                          versions:
                            type: array
                            items:
                              type: object
                              properties:
                                documentation:
                                  type: string
                                version:
                                  type: string
                      appLEDColors:
                        type: array
                        items:
                          type: string
                      asyncManagementEventsSupported:
                        type: boolean
                      beepersSupported:
                        type: boolean
                      clockSupport:
                        type: boolean
                      daAppPackageFormat:
                        type: array
                        items:
                          type: string
                      daAppsSupported:
                        type: boolean
                      daLanguageBindings:
                        type: array
                        items:
                          type: string
                      directionalitySupported:
                        type: boolean
                      endpointTypesSupported:
                        type: array
                        items:
                          type: object
                          properties:
                            SSLSupported:
                              type: boolean
                            authenticationTypesSupported:
                              type: array
                              items:
                                type: string
                            batchingSupported:
                              type: boolean
                            dataOnly:
                              type: boolean
                            retentionSupported:
                              type: boolean
                            type:
                              type: string
                      externalSerialPort:
                        type: array
                        items:
                          type: string
                          enum:
                          - USER
                          - DEBUG
                          - NONE
                        description: External serial port modes supported by the reader.
                      keypadSupport:
                        type: array
                        items:
                          type: string
                      llrpSupported:
                        type: boolean
                      maxAppLEDs:
                        type: number
                      maxDataEndpoints:
                        type: number
                      maxNumOperationsInAccessSequence:
                        type: number
                      maxNumPreFilters:
                        type: number
                      messageFormatsSupported:
                        type: array
                        items:
                          type: string
                      networkInterfaces:
                        type: array
                        description: Network interfaces supported by the reader.
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              description: Interface type.
                              enum:
                              - ETHERNET
                              - WIFI
                              - BLUETOOTH
                              - WAN
                            internal:
                              type: boolean
                              description: Indicates whether the interface is internal to the reader.
                            ipStack:
                              type: array
                              description: IP stacks supported by the interface.
                              items:
                                type: string
                                enum:
                                - IPv4
                                - IPv6
                            ipAssignment:
                              type: array
                              description: IP assignment modes supported by the interface.
                              items:
                                type: string
                                enum:
                                - STATIC
                                - DHCP
                            802.1x:
                              type: boolean
                              description: Indicates whether IEEE 802.1x authentication is supported.
                            supportedSim:
                              type: array
                              description: SIM types supported by WAN interfaces.
                              items:
                                type: string
                                enum:
                                - Physical SIM
                                - Embedded SIM
                            NetworkType:
                              type: array
                              description: WAN radio types supported by WAN interfaces.
                              items:
                                type: string
                                enum:
                                - AUTO
                                - LTE
                                - NR5G
                          required:
                          - type
                          - internal
                          - ipStack
                          - ipAssignment
                          - 802.1x
                      numGPIs:
                        type: number
                      numGPOs:
                        type: number
                      restAPISupported:
                        type: boolean
                      rssiFilterSupported:
                        type: boolean
                      supportedDisplayType:
                        type: array
                        items:
                          type: string
                          enum:
                          - NONE
                          - LCD
                          - HDMI
                      supportedPowerSource:
                        type: array
                        items:
                          type: string
                          enum:
                          - DC
                          - POE
                          - POE+
                          - POWERBRICK
                          - BATTERY
                        description: Power sources supported by the reader model.
                      supportedTagDataFormat:
                        type: array
                        items:
                          type: string
                      tagLocationingSupported:
                        type: boolean
                      triggers:
                        type: array
                        items:
                          type: string
              example:
                capabilities:
                  antennas:
                  - port: 1
                    type: external
                  - port: 2
                    type: external
                  - port: 3
                    type: external
                  - port: 4
                    type: external
                  apiSupported:
                    versions:
                    - documentation: https://zebradevs.github.io/rfid-ziotc-docs/index.html
                      version: v1
                  appLEDColors:
                  - RED
                  - GREEN
                  - AMBER
                  asyncManagementEventsSupported: true
                  beepersSupported: false
                  clockSupport: true
                  daAppPackageFormat:
                  - DEBIAN
                  daAppsSupported: true
                  daLanguageBindings:
                  - PYTHON
                  - NODEJS
                  directionalitySupported: false
                  endpointTypesSupported:
                  - SSLSupported: true
                    authenticationTypesSupported:
                    - MTLS
                    batchingSupported: true
                    dataOnly: false
                    retentionSupported: true
                    type: MQTT
                  - SSLSupported: true
                    authenticationTypesSupported:
                    - MTLS
                    batchingSupported: true
                    dataOnly: false
                    retentionSupported: true
                    type: MQTT_WS
                  - SSLSupported: true
                    authenticationTypesSupported:
                    - MTLS
                    batchingSupported: true
                    dataOnly: true
                    retentionSupported: true
                    type: TCPIP
                  - SSLSupported: false
                    authenticationTypesSupported:
                    - TLS
                    batchingSupported: true
                    dataOnly: true
                    retentionSupported: true
                    type: WEBSOCKET
                  - SSLSupported: true
                    authenticationTypesSupported:
                    - MTLS
                    batchingSupported: true
                    dataOnly: false
                    retentionSupported: true
                    type: AWS_IOT_CORE
                  - SSLSupported: true
                    authenticationTypesSupported:
                    - TLS
                    batchingSupported: true
                    dataOnly: false
                    retentionSupported: true
                    type: AZURE_IOT_HUB
                  - SSLSupported: true
                    authenticationTypesSupported:
                    - BASIC
                    - DIGEST
                    - NTLM
                    - TLS
                    - ONLY
                    - DIGEST_IE
                    - NTLM_WB
                    - ANY
                    - ANYSAFE
                    batchingSupported: true
                    dataOnly: true
                    retentionSupported: true
                    type: HTTP
                  externalSerialPort:
                  - USER
                  - DEBUG
                  keypadSupport:
                  - NONE
                  llrpSupported: true
                  maxAppLEDs: 1
                  maxDataEndpoints: 2
                  maxNumOperationsInAccessSequence: 32
                  maxNumPreFilters: 32
                  messageFormatsSupported:
                  - JSON
                  networkInterfaces:
                  - type: ETHERNET
                    internal: true
                    ipStack:
                    - IPv4
                    - IPv6
                    ipAssignment:
                    - STATIC
                    - DHCP
                    802.1x: true
                  - type: WIFI
                    internal: false
                    ipStack:
                    - IPv4
                    - IPv6
                    ipAssignment:
                    - STATIC
                    - DHCP
                    802.1x: true
                  - type: BLUETOOTH
                    internal: false
                    ipStack:
                    - IPv4
                    ipAssignment:
                    - DHCP
                    802.1x: false
                  numGPIs: 4
                  numGPOs: 4
                  restAPISupported: true
                  rssiFilterSupported: true
                  supportedDisplayType:
                  - NONE
                  supportedPowerSource:
                  - POWERBRICK
                  - POE
                  - POE+
                  supportedTagDataFormat:
                  - GS1
                  - HEX
                  tagLocationingSupported: false
                  triggers:
                  - GPI
      security:
      - bearerAuth: []
  /cloud/cableLossCompensation:
    get:
      tags:
      - System
      summary: Retrieves the cableLossCompensation
      description: '## 1. Description


        The `GET /cloud/cableLossCompensation` REST endpoint retrieves the cable loss compensation values currently configured for each read point on the reader.


        This endpoint returns:


        - The cable length and the attenuation value (in dBm) configured per read point


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/cableLossCompensation` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/cableLossCompensation` to:


        - Review cable loss settings before tuning transmit power for a deployment

        - Confirm compensation values match physical cable lengths at each antenna port

        - Verify the effect of a prior `PUT /cloud/cableLossCompensation` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `cableLength` | Does the configured length match the physical cable run? | An incorrect cable length will produce inaccurate loss compensation and reduce read range. |

        | `cableLossPerHundredFt` (per read point) | Is the attenuation value consistent with the cable spec? | Mismatched values result in too little or too much transmit power after compensation is applied. |

        '
      operationId: getCablelosscompensation
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Cable loss compensation settings keyed by read point number.
                minProperties: 1
                maxProperties: 8
                additionalProperties: false
                patternProperties:
                  ^[1-8]$:
                    type: object
                    description: Cable loss compensation settings for a single antenna port.
                    required:
                    - cableLength
                    - cableLossPerHundredFt
                    properties:
                      cableLength:
                        type: number
                        minimum: 0
                        description: Length of the cable connected to this antenna port, in feet.
                      cableLossPerHundredFt:
                        type: number
                        minimum: 0
                        description: Cable signal loss per 100 feet, in dB.
              example:
                '1':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '2':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '3':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '4':
                  cableLength: 10
                  cableLossPerHundredFt: 10
      security:
      - bearerAuth: []
    put:
      tags:
      - System
      summary: Sets the cableLossCompensation
      description: 'The `PUT /cloud/cableLossCompensation` REST endpoint sets cable loss compensation.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/cableLossCompensation` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: setCablelosscompensation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              oneOf:
              - description: Adjust cable loss compensation for all available read points.
                title: All
                type: object
                required:
                - cableLength
                - cableLossPerHundredFt
                properties:
                  cableLength:
                    type: number
                    description: Cable length applied to all read points, in feet.
                    minimum: 0
                  cableLossPerHundredFt:
                    type: number
                    description: Cable loss applied to all read points per 100 feet, in dB.
                    minimum: 0
              - description: Adjust cable loss compensation per read point using numeric read-point keys.
                title: Each
                type: object
                minProperties: 1
                maxProperties: 8
                additionalProperties: false
                patternProperties:
                  ^[1-8]$:
                    type: object
                    description: Cable loss compensation settings for a single antenna port.
                    required:
                    - cableLength
                    - cableLossPerHundredFt
                    properties:
                      cableLength:
                        type: number
                        description: Length of the cable connected to this antenna port, in feet.
                        minimum: 0
                      cableLossPerHundredFt:
                        type: number
                        description: Cable signal loss for this antenna port per 100 feet, in dB.
                        minimum: 0
            examples:
              set_cableLossCompensation:
                value:
                  '1':
                    cableLength: 90
                    cableLossPerHundredFt: 18
                  '2':
                    cableLength: 18
                    cableLossPerHundredFt: 19
                  '3':
                    cableLength: 10
                    cableLossPerHundredFt: 11
                  '4':
                    cableLength: 10
                    cableLossPerHundredFt: 70
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
        '400':
          description: Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                  message:
                    type: string
        '500':
          description: Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                  message:
                    type: string
      security:
      - bearerAuth: []
  /cloud/reboot:
    put:
      tags:
      - System
      summary: Restarts reader
      description: '## 1. Description


        The `PUT /cloud/reboot` REST endpoint restarts the reader.


        All in-progress operations stop and the reader briefly disconnects until boot completes. No request body is required.


        ## 2. Before You Begin


        Plan for downtime — the reader will disconnect until it finishes booting. In-flight inventory and active connections will be interrupted.


        | What You Need | Details |

        |---|---|

        | Downtime window | Allow 1–3 minutes for reboot and reconnect |

        | Authentication | Bearer token in the `Authorization` header |


        ## 3. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/reboot` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Request body | None |

        '
      operationId: reboot
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
  /cloud/preSelection:
    get:
      tags:
      - Control
      summary: Returns whether the rxSawFilter is enabled or disabled
      description: '## 1. Description


        The `GET /cloud/preSelection` REST endpoint retrieves the current rxSawFilter pre-selection state from the reader.


        This endpoint returns:


        - Whether the rxSawFilter (receive SAW filter pre-selection) is enabled or disabled


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/preSelection` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/preSelection` to:


        - Check whether rxSawFilter is enabled or disabled before starting inventory

        - Verify RF pre-selection state in deployments where receiver filtering is important

        - Confirm the effect of a prior `PUT /cloud/preSelection` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `preSelection` | Is the filter enabled or disabled? | Enabling the SAW filter improves receiver selectivity in noisy RF environments but may reduce sensitivity in clean environments. |

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  preSelection:
                    type: string
                    description: Current state of the rxSawFilter.
                    enum:
                    - enabled
                    - disabled
      security:
      - bearerAuth: []
    put:
      tags:
      - Control
      summary: Enables or disables the rxSawFilter
      description: 'The `PUT /cloud/preSelection` REST endpoint enables or disables the rxSawFilter.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/preSelection` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                preSelection:
                  type: boolean
                  description: Set to true to enable the rxSawFilter, false to disable.
            examples:
              set_preSelection:
                value:
                  preSelection: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
