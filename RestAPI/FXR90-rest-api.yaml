                    Status: connected
                    accesspoint:
                      autoConn: false
                      essid: GLaDOS
                      status: connected
                      security:
                        securityType: WPA2Personal
                    isEnabled: true
                    macAddress: 48:A4:93:BF:A9:50
                  bnep0:
                    Status: active
