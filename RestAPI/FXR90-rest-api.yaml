                description: Returns an empty string on success.
      security:
      - bearerAuth: []
  /cloud/start:
    put:
      tags:
      - Control
      summary: Start RFID Inventory or BLE scan
      description: 'The `PUT /cloud/start` REST endpoint starts RFID inventory, BLE scanning, or both on the FXR90 reader.


        By default, an empty request body starts RFID inventory only. Use the `scanType` field to explicitly start BLE, RFID, or both together. Optional flags allow you to apply a previously saved Impinj Gen2X configuration or control whether the start state persists across reboots.


        ### Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Scan Control - Start |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 Series |

        | Related Endpoints | `PUT /cloud/stop`, `PUT /cloud/ble-config`, `PUT /cloud/impinjGen2X`, `PUT /cloud/mode` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Supported Scan Types | `rfid`, `ble`, or both combined |


        ---


        ## 2. Before You Begin


        Make sure the relevant scanners are configured before sending this request.


        | What You Need | Details |

        |---|---|

        | Authentication | Obtain a valid bearer token and include it in the `Authorization` header of every request. |

        | Network reachability | The reader''s HTTPS endpoint must be reachable from your client. |

        | RFID configuration | Operating mode must be configured via `PUT /cloud/mode` (or default) before starting RFID inventory. |

        | BLE configuration | If starting BLE, the BLE scanner must be configured via `PUT /cloud/ble-config` with `ble.enable: true`. |

        | Gen2X configuration | If using `applyImpinjGen2X: true`, the Gen2X configuration must be saved via `PUT /cloud/impinjGen2X` beforehand. |


        ---


        ## 3. What Happens After Start


        Once the `PUT /cloud/start` request succeeds, the reader transitions from **Idle** to **Running**. Two important behaviors govern the running session.


        ### Scan Type


        The `scanType` field determines which scanners run and where the data is published.


        | Scan Type | Behavior |

        |---|---|

        | `rfid` (default) | Starts RFID inventory only. Tag read events stream on the reader''s RFID data topic. |

        | `ble` | Starts BLE scanning only. BLE advertisement events stream on the reader''s BLE data topic. |

        | `["ble", "rfid"]` | Starts both scanners in a single session. RFID and BLE events stream independently on their respective data topics. |


        ### Persistence Across Reboots


        The `doNotPersistState` field controls whether the reader resumes scanning automatically after a reboot or reconnect.


        | `doNotPersistState` | Behavior on Reboot or Reconnect |

        |---|---|

        | `false` (default) | The reader **remembers the running state** and automatically resumes scanning. |

        | `true` | The running state is **not saved**. The reader stays Idle until `PUT /cloud/start` is called again. |


        > Tip: Use `doNotPersistState: true` for one-time or debugging sessions where automatic resume after reboot is not desired.


        ---

        '
      operationId: startInventory
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scanType:
                  type: array
                  description: Which scan types to start. Omit for RFID-only (default).
                  items:
                    type: string
                    enum:
                    - ble
                    - rfid
                  minItems: 1
                  uniqueItems: true
                doNotPersistState:
                  type: boolean
                  description: Controls whether the started inventory state is persisted across reboot. If `true`, the state is not persisted and auto-start is not enabled after reboot. If `false`, the state is persisted across reboot, enabling auto-start.
                applyImpinjGen2X:
                  type: boolean
                  description: 'When true, applies the previously configured Impinj Gen2X features (FastID, TagProtect, TagFocus, TagQuieting) on start. Cannot be used with `scanType: ["ble"]`.'
            examples:
              start_Inventory:
                value: {}
              start_Inventory with AutoStart:
                value:
                  doNotPersistState: false
              start_Inventory with ImpinjGen2X:
                value:
                  applyImpinjGen2X: true
              start_BLE_only:
                value:
                  scanType:
                  - ble
              start_RFID_only:
                value:
                  scanType:
                  - rfid
              start_BLE_and_RFID:
                value:
                  scanType:
                  - ble
                  - rfid
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/stop:
    put:
      tags:
      - Control
      summary: Stop RFID Inventory or BLE scan
      description: 'The `PUT /cloud/stop` REST endpoint and the `stop` MQTT command stop RFID inventory, BLE scanning, or both.


        By default, an empty request stops RFID inventory only. Use `scanType` to explicitly stop BLE, RFID, or both.


        ## 1. Operation Details


        | Property | Value |

        |---|---|

        | Pattern Name | Scan Control - Stop |

        | Supported Protocols | REST (HTTP/HTTPS), MQTT |

        | Applies To | FXR90 |

        | Related Operations | `startInventory`, `getStatus` |

        | REST Endpoint | `PUT /cloud/stop` |


        ## 2. Stop Behavior


        | Payload | Result |

        |---|---|

        | `{}` | Stops RFID inventory only. |

        | `{ "scanType": ["rfid"] }` | Stops RFID inventory explicitly. |

        | `{ "scanType": ["ble"] }` | Stops BLE scanning only. RFID inventory continues. |

        | `{ "scanType": ["ble", "rfid"] }` | Stops BLE scanning and RFID inventory together. |


        ## 3. When to Use This Endpoint


        Use this endpoint when changing operating modes, applying configuration updates, or stopping scans before maintenance. Use `GET /cloud/status` to confirm the resulting radio and BLE activity state.

        '
      operationId: stopInventory
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scanType:
                  type: array
                  description: Which scan types to stop. Omit for RFID-only (default).
                  items:
                    type: string
                    enum:
                    - ble
                    - rfid
                  minItems: 1
                  uniqueItems: true
            examples:
              stop_RFID_default:
                value: {}
              stop_RFID_explicit:
                value:
                  scanType:
                  - rfid
              stop_BLE_only:
                value:
                  scanType:
                  - ble
              stop_BLE_and_RFID:
                value:
                  scanType:
                  - ble
                  - rfid
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/version:
    get:
      tags:
      - System
      summary: Retrieves reader component version information
      description: '## 1. Description


        The `GET /cloud/version` REST endpoint retrieves detailed hardware and software component version information from the reader''s software stack.


        This endpoint returns:


        - Reader application, radio firmware, and cloud agent versions

        - Radio control application version

        - Reader model and serial number

        - Available OS upgrade paths and rollback firmware details


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/version` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/version` to:


        - Confirm installed firmware versions before or after a system update

        - Verify the exact reader model when applying model-specific configuration

        - Capture the serial number for asset tracking or support cases

        - Audit available OS upgrade paths or rollback capabilities across a fleet


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `readerApplication` | Current reader software version | Determines which features and API operations are available. |

        | `radioFirmware` | Firmware running on the radio module | Affects RF behavior, read performance, and hardware compatibility. |

        | `model` | Reader model identifier | Drives physical capabilities and model-specific configuration options. |

        | `serialNumber` | Unique reader serial number | Identifies the device for support cases and asset records. |

        | `availableOsUpgrades` | Is the object empty or populated? | A populated object means a downloaded OS upgrade is ready to install. |

        '
      operationId: getVersion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  availableOsUpgrades:
                    type: object
                    description: Placeholder object for available OS upgrades on the reader.
                  cloudAgentApplication:
                    type: string
                    description: Version of the cloud agent application.
                  model:
                    type: string
                    description: Reader model identifier returned by the device.
                    enum:
                    - FXR90
                    - FX7500
                    - FX9600
                    - ATR7000
                    - FXR60
                  radioControlApplication:
                    type: string
                    description: Version of the radio control application.
                  radioFirmware:
                    type: string
                    description: Version of the radio firmware.
                  readerApplication:
                    type: string
                    description: Version of the main reader application.
                  revertBackFirmware:
                    type: object
                    description: Versions available for reverting the reader firmware.
                  serialNumber:
                    type: string
                    description: Reader serial number.
              example:
                availableOsUpgrades: {}
                cloudAgentApplication: 0.6.2.25
                model: FXR90
                radioControlApplication: 0.2.58.6
                radioFirmware: 2.1.57.0
                readerApplication: 2.0.7-5
                revertBackFirmware: {}
                serialNumber: 233575230D0028
      security:
      - bearerAuth: []
  /cloud/status:
    get:
      tags:
      - System
      summary: Retrieves reader operational statistics
      description: "## 1. Description\n\nThe `GET /cloud/status` REST endpoint retrieves operational statistics and health information from the reader at the moment of the request.\n\nThis endpoint returns:\n\n- Uptime and current system time\n- Radio connection and activity state\n- Reader temperature\n- CPU and RAM usage\n- Flash storage usage by partition\n- Antenna port connection states\n- NTP synchronization status\n- Cloud interface connection status\n- BLE scanner runtime status (scan state, scan start time, and beacon counts by protocol)\n\nThe `ble` section is present only when BLE is supported and its status is available. No request body is required.\n\n## 2. Endpoint Details\n\n| Property | Value |\n|---|---|\n| REST Endpoint | `GET /cloud/status` |\n| Communication Type | Client to Device (HTTP request/response) |\n| Applies To | FXR90 |\n| Authentication | Bearer token (`Authorization: Bearer <token>`) |\n\n## 3. When to Use This Endpoint\n\nUse `GET /cloud/status` to:\n\n- Confirm the reader is powered, healthy, and reachable over REST\n- Verify the radio is connected before starting inventory\n- Monitor reader temperature, CPU, and RAM usage\n- Synchronize against the reader's current system time\n- Confirm BLE scanning is active and review beacon counts by protocol\n\nKey fields to check in the response:\n\n| Field | What to Check | Why It Matters |\n|---|---|---|\n| `uptime` | How long has the reader been running? | Long uptimes confirm stability; short uptimes indicate an unexpected restart. |\n| `radioConnection` | Is the value `connected`? | Inventory cannot run if the radio is disconnected. |\n| `temperature` | Is the value within safe operating range? | Excessive temperature can cause throttling or hardware faults. |\n| `antennas` | Are expected ports `connected`? | A `disconnected` antenna port means tags on that port will not be read. |\n| `ble.scanState` | Is the value `running`? | Confirms whether the BLE scanner is currently active (`running`) or `stopped`. |\n| `ble.scanStartTime` | When did the current scan start? | ISO 8601 timestamp marking when BLE scanning last started. |\n| `ble.beaconCounts` | Are advertisements being seen? | Per-protocol counts (`iBeacon`, `altBeacon`, `eddystone`, `generic`, `total`) confirm beacons are being detected in the current scan window. |\n\n## 4. BLE Status Fields\n\nWhen BLE is supported and active, the response includes a `ble` object:\n\n| Field | Type | Description |\n|---|---|---|\n| `ble.scanState` | string | Current BLE scanner state — `running` or `stopped`. |\n| `ble.scanStartTime` | string (date-time) | ISO 8601 timestamp of when the BLE scan was last started. |\n| `ble.beaconCounts.total` | integer | Total BLE advertisements observed in the current scan window. |\n| `ble.beaconCounts.iBeacon` | integer | Number of iBeacon advertisements observed. |\n| `ble.beaconCounts.altBeacon` | integer | Number of AltBeacon advertisements observed. |\n| `ble.beaconCounts.eddystone` | integer | Number of Eddystone advertisements observed. |\n| `ble.beaconCounts.generic` | integer | Number of generic BLE advertisements observed. |\n\nExample `ble` section:\n\n```json\n\"ble\": {\n  \"scanState\": \"running\",\n  \"scanStartTime\": \"2026-05-21T13:46:16.955Z\",\n  \"beaconCounts\": {\n    \"total\": 108,\n    \"iBeacon\": 75,\n    \"altBeacon\": 33,\n    \"eddystone\": 0,\n    \"generic\": 0\n  }\n}\n```\n"
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  antennas:
                    type: object
                    description: Per-antenna connection status reported by the reader.
                    properties:
                      1:
                        type: string
                        description: Antenna 1 connection state.
                        enum:
                        - connected
                        - disconnected
                      2:
                        type: string
                        description: Antenna 2 connection state.
                        enum:
                        - connected
                        - disconnected
                      3:
                        type: string
                        description: Antenna 3 connection state.
                        enum:
                        - connected
                        - disconnected
                      4:
                        type: string
                        description: Antenna 4 connection state.
                        enum:
                        - connected
                        - disconnected
                      5:
                        type: string
                        description: Antenna 5 connection state.
