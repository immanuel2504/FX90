    getCableLossCompensation:
      title: getCableLossCompensation
      description: Gets the Reader Cable Loss Compensation. Includes Cable Length and Cable Loss per Hundred Feet
      type: object
      minProperties: 1
      maxProperties: 8
      additionalProperties: false
      patternProperties:
        ^[1-8]$:
          type: object
          minProperties: 2
          additionalProperties: false
          description: Returns cable loss compensation per read point labeled 1,2,3... up to the maximum supported read points.
          required:
          - cableLength
          - cableLossPerHundredFt
          properties:
            cableLength:
              type: number
              minimum: 0
              description: Cable length for the read point, in feet.
            cableLossPerHundredFt:
              type: number
              minimum: 0
              description: Cable loss per hundred feet for the read point, in dB.
    setCableLossCompensationOneOf0:
      type: object
      description: Adjust cable loss compensation for all available read points
      required:
      - cableLength
      - cableLossPerHundredFt
      title: All
      properties:
        cableLength:
          type: number
          description: Cable length applied to all read points, in feet.
          minimum: 0
        cableLossPerHundredFt:
          type: number
          description: Cable loss applied to all read points per 100 feet, in dB.
          minimum: 0
    setCableLossCompensationOneOf1:
      type: object
      description: Adjust cable loss compensation for each read point. Can have as many keys as number of allowed read points on device.
      title: Each
    setCableLossCompensation:
      title: setCableLossCompensation
      description: Sets the Reader Cable Loss Compensation. Includes Cable Length and Cable Loss per Hundred Feet
      oneOf:
