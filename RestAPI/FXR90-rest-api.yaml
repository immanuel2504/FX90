                                    properties:
                                      authentication:
                                        type: string
                                        description: EAP authentication method (TLS, TTLS, PEAP).
                                      innerAuthentication:
                                        type: string
                                        description: Inner EAP authentication method (for TTLS/PEAP with TLS or MSCHAPv2).
                                      username:
                                        type: string
                                        description: Username for TTLS/PEAP with MSCHAPv2.
                                      password:
                                        type: string
                                        description: Password for TTLS/PEAP with MSCHAPv2.
                                      certificate:
                                        type: string
                                        description: Client certificate name for TLS-based methods.
                          Status:
                            type: string
                            description: Connection status of the WiFi station interface.
                          isEnabled:
                            type: boolean
                            description: Whether the WiFi station interface is enabled.
                          macAddress:
                            type: string
                            description: MAC address of the WiFi interface.
                      bnep0:
                        type: object
                        description: Bluetooth PAN interface.
                        properties:
                          ipAddress:
                            type: string
                            description: IP address assigned to the Bluetooth PAN interface.
                          subnetMask:
                            type: string
                            description: Subnet mask for the Bluetooth PAN interface.
                          dhcpStartAddress:
                            type: string
                            description: Start of the DHCP address range served to connected Bluetooth clients.
                          dhcpEndAddress:
                            type: string
                            description: End of the DHCP address range served to connected Bluetooth clients.
                          deviceDiscoverableName:
                            type: string
                            description: Bluetooth device name broadcast during discovery.
                          isDiscoverable:
                            type: boolean
                            description: Whether the device is visible to other Bluetooth devices.
                          isPairable:
                            type: boolean
                            description: Whether the device accepts new Bluetooth pairing requests.
                          passKey:
                            type: string
                            description: PIN/passkey required for Bluetooth pairing (when usePassKey is true).
                          usePassKey:
                            type: boolean
                            description: Whether a passkey is required for Bluetooth pairing.
                          Status:
                            type: string
                            description: Current status of the Bluetooth PAN interface (e.g. active, inactive).
                          isEnabled:
                            type: boolean
                            description: Whether the Bluetooth PAN interface is enabled.
                          macAddress:
                            type: string
                            description: MAC address of the Bluetooth interface.
                      wan0:
                        type: object
                        description: WAN / cellular interface.
                        properties:
                          activeSim:
                            type: string
                            description: The active SIM slot.
                            enum:
                            - psim
                            - esim
                          psim:
                            type: object
                            description: Physical SIM configuration and status.
                            properties:
                              apn:
                                type: string
                                description: Access Point Name.
                              preferredNetworkType:
                                type: string
                              enableIPv6:
                                type: boolean
                              enablePin:
                                type: boolean
                              enableRoaming:
                                type: boolean
                              currentDataClass:
                                type: string
                              highestAvailableDataClass:
                                type: string
                              currentServiceProvider:
                                type: string
                              registerState:
                                type: string
                              packetServiceState:
                                type: string
                              internetAccess:
                                type: boolean
                              simState:
                                type: string
                              signalBar:
                                type: number
                              rssi:
                                type: string
                              rsrp:
                                type: string
                              rsrq:
                                type: string
                              snr:
                                type: string
                          esim:
                            type: object
                            description: Embedded SIM configuration and status (same structure as psim).
                            properties:
                              apn:
                                type: string
                              preferredNetworkType:
                                type: string
                              enableIPv6:
                                type: boolean
                              enablePin:
                                type: boolean
                              enableRoaming:
                                type: boolean
                              currentDataClass:
                                type: string
                              highestAvailableDataClass:
                                type: string
                              currentServiceProvider:
                                type: string
                              registerState:
                                type: string
                              packetServiceState:
                                type: string
                              internetAccess:
                                type: boolean
                              simState:
                                type: string
                              signalBar:
                                type: number
                              rssi:
                                type: string
                              rsrp:
                                type: string
                              rsrq:
                                type: string
                              snr:
                                type: string
                          Status:
                            type: string
                          isEnabled:
                            type: boolean
                          macAddress:
                            type: string
                      uap0:
                        type: object
                        description: WiFi Hotspot (Access Point) interface.
                        properties:
                          ssid:
                            type: string
                            description: Hotspot SSID name.
                          ssidPassword:
                            type: string
                            description: Hotspot password.
                          isHidden:
                            type: boolean
                            description: Whether the SSID is hidden from broadcast.
                          securityType:
                            type: string
                            description: Security protocol used by the hotspot.
                            enum:
                            - WPA2Personal
                            - WPA3Personal
                          Clients:
                            type: array
                            description: List of devices currently connected to the hotspot.
                            items:
                              type: object
                              properties:
                                hostName:
                                  type: string
                                IP:
                                  type: string
                                MAC:
                                  type: string
                          Status:
                            type: string
                          isEnabled:
                            type: boolean
                          macAddress:
                            type: string
              example:
                hostName: FXR90C5F1AB
                networkInterface:
                  eth0:
                    IPV4:
                      dhcp: true
                      dnsAddress: 10.233.1.200
                      domainName: zlab.com
                      gatewayAddress: 10.233.45.2
                      ipAddress: 10.233.45.235
                      subnetMask: 255.255.255.0
                    IPV6:
                      dhcp: true
                      dnsAddress: fd6c:10:233:1::201
                      domainName: zlab.com
                      gatewayAddress: fe80::f6ee:31ff:fe0c:5a1f
