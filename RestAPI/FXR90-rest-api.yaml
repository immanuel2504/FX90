          - AB
    select.v1:
      title: select
      type: object
      properties:
        target:
          type: string
          enum:
          - SL
          - S0
          - S1
          - S2
          - S3
          description: Target Field (see EPC Gen2 Spec)
        action:
          type: string
          enum:
          - ASSERTSL_DEASSERTSL
          - ASSERTSL_NOTHING
          - NOTHING_DEASSERTSL
          - NEGATESL_NOTHING
          - DEASSERTSL_ASSERTSL
          - DEASSERTSL_NOTHING
          - NOTHING_ASSERTSL
          - NOTHING_NEGATESL
          - INVA_INVB
          - INVA_NOTHING
          - NOTHING_INVB
          - FLIPAB_NOTHING
          - INVB_INVA
          - INVB_NOTHING
          - NOTHING_INVA
          - NOTHING_FLIPAB
          description: Action Field (see EPC Gen2 Spec)
        membank:
          type: string
          enum:
          - EPC
          - TID
          - USER
          - RES
          description: Membank Field (see EPC Gen2 Spec)
        pointer:
          type: integer
          description: Pointer Field (see EPC Gen2 Spec)
        length:
          type: integer
          description: Length Field (see EPC Gen2 Spec)
        mask:
          type: string
          description: 'Mask Field (see EPC Gen2 Spec). The value must be a hex string (only values 0-9 and a-f) and must have an even number of characters. '
        truncate:
          type: integer
          default: 0
          description: Truncate Field (see EPC Gen2 Spec) If absent, truncation is disabled. If non-zero, the value indicates the number of bits to expect in the tag response.
      required:
      - target
      - action
      - membank
      - pointer
      - length
      - mask
    impinjTagQuietingBasic.v1:
      title: impinjTagQuietingBasic
      type: object
      description: Basic TagQuieting configuration for quieting or unquieting specific tags identified by EPC.
      properties:
        action:
          type: string
          description: quiet silences the specified tags for the current inventory round; unquiet restores previously quieted tags.
          enum:
          - quiet
          - unquiet
        tagIDs:
          type: array
          description: Non-empty list of hexadecimal EPC strings identifying the tags to quiet or unquiet.
          minItems: 1
          items:
            type: string
            pattern: ^[0-9A-Fa-f]+$
      required:
      - action
      - tagIDs
    impinjTagQuietingAdvanced.v1PreSelectItemMask:
      type: object
      description: Memory mask for tag selection.
      required:
      - bank
      - pointer
      - length
      - value
      properties:
        bank:
          type: string
          description: Memory bank to match against.
          enum:
          - EPC
          - TID
          - USER
          - RESERVED
        pointer:
          type: integer
          description: Bit offset in memory bank.
          minimum: 0
          maximum: 65535
        length:
          type: integer
          description: Number of bits to match.
          minimum: 1
          maximum: 255
        value:
          type: string
          description: Hex string value to match (even length, valid hex characters).
          pattern: ^[0-9A-Fa-f]+$
    impinjTagQuietingAdvanced.v1PreSelectItem:
      type: object
      required:
      - target
      - action
      - mask
      properties:
        target:
          type: string
          description: Session or flag to target.
          enum:
          - S0
          - S1
          - S2
          - S3
          - SL
        action:
          type: string
          description: Action to perform on the target session or flag.
          enum:
          - ASSERTSL_NOTHING
          - DEASSERTSL_NOTHING
          - ASSERTSL_ASSERTSL
          - ASSERTSL_DEASSERTSL
          - DEASSERTSL_ASSERTSL
          - DEASSERTSL_DEASSERTSL
          - NEGSL_NOTHING
          - NOTHING_ASSERTSL
          - NOTHING_DEASSERTSL
          - NOTHING_NEGSL
          - INVA_NOTHING
          - INVB_NOTHING
          - INVA_INVB
          - INVB_INVA
          - INVA_INVA
          - INVB_INVB
          - NOTHING_INVA
          - NOTHING_INVB
        mask:
          $ref: '#/components/schemas/impinjTagQuietingAdvanced.v1PreSelectItemMask'
    impinjTagQuietingAdvanced.v1:
      title: impinjTagQuietingAdvanced
      type: object
      description: Advanced TagQuieting configuration using Impinj Gen2X proprietary features.
      properties:
        preSelect:
          type: array
          description: Optional array of SELECT operations to position tags into specific session states before applying state-aware SELECT. Maximum 31 items allowed.
          maxItems: 31
          items:
            $ref: '#/components/schemas/impinjTagQuietingAdvanced.v1PreSelectItem'
        tagQuietMasks:
          type: array
          description: Session-state combinations to check in TID memory. Minimum 1, maximum 3 items. No duplicate session prefixes allowed (e.g., S0A and S0B together).
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum:
            - S0A
            - S0B
            - S2A
            - S2B
            - S3A
            - S3B
            - SL_ASSERT
            - SL_DEASSERT
          allOf:
          - not:
              allOf:
              - contains:
                  const: S0A
              - contains:
                  const: S0B
          - not:
              allOf:
              - contains:
                  const: S2A
              - contains:
                  const: S2B
          - not:
              allOf:
              - contains:
                  const: S3A
              - contains:
                  const: S3B
          - not:
              allOf:
              - contains:
                  const: SL_ASSERT
              - contains:
                  const: SL_DEASSERT
        target:
          type: string
          description: Which flag to manipulate based on state check.
          enum:
          - SL
          - S0
          - S1
          - S2
          - S3
        stateAwareAction:
          type: string
          description: Action to perform on target flag when tags match the tagQuietMasks pattern.
          enum:
          - ASSERTSL
          - DEASSERTSL
          - ASSERTSL_DEASSERTSL
          - DEASSERTSL_ASSERTSL
          - NEGSL
          - NOT_DEASSERTSL
          - NOT_ASSERTSL
          - NOT_NEGSL
          - INV_A
          - INV_B
          - INV_A_NOT_INV_B
          - INV_B_NOT_INV_A
          - INV_A2BB2A
          - NOT_INV_B
          - NOT_INV_A
          - NOT_INV_A2BB2A
      required:
      - tagQuietMasks
      - target
      - stateAwareAction
    impinjTagQuieting.v1:
      title: impinjTagQuieting
      type: object
      description: Impinj TagQuieting configuration. Exactly one of basic or advanced must be provided.
      oneOf:
      - required:
        - basic
      - required:
        - advanced
      properties:
        basic:
          $ref: '#/components/schemas/impinjTagQuietingBasic.v1'
        advanced:
          $ref: '#/components/schemas/impinjTagQuietingAdvanced.v1'
      additionalProperties: false
    access_cmd_read.v1Config:
      type: object
      required:
      - membank
      - wordPointer
      - wordCounter
      properties:
        membank:
          type: string
          enum:
          - EPC
          - TID
          - USER
          - RESERVED
          description: Membank Field (see EPC Gen2 Spec)
        wordPointer:
          type: integer
          description: WordPtr Field (see EPC Gen2 Spec)
        wordCounter:
          type: integer
          description: WordPtr Field (see EPC Gen2 Spec)
    access_cmd_read.v1:
      title: read
      type: object
      properties:
        config:
          $ref: '#/components/schemas/access_cmd_read.v1Config'
        type:
          type: string
          enum:
          - READ
      required:
      - type
    access_cmd_write.v1Config:
      type: object
      required:
      - membank
      - wordPointer
      - data
      properties:
        membank:
          type: string
          enum:
          - EPC
          - TID
          - USER
          - RESERVED
          description: Membank Field (see EPC Gen2 Spec)
        wordPointer:
          type: integer
          description: WordPtr Field (see EPC Gen2 Spec)
        data:
          type: string
          description: Data Field (see EPC Gen2 Spec) Hex string indicating the word(s) to be written. Unlike the Gen2 Spec, the length of the data field can be more than a single 16 bit word. However, the length of the string must be a multiple of 16 bit words
        blockSize:
          type: integer
          description: Block size - if set to non-zero value, the reader will use the BlockWrite command set write the data (and not the simple Write command). The value indicates the number of 16-bit words to use for each block
    access_cmd_write.v1:
      title: write
      type: object
      properties:
        type:
          type: string
          enum:
          - WRITE
        config:
          $ref: '#/components/schemas/access_cmd_write.v1Config'
      required:
      - type
      - config
    access_cmd_access.v1Config:
      type: object
      required:
      - password
      properties:
        password:
          type: string
          description: 'Password Field (see EPC Gen2 Spec)

            Must be a hex string with 8 hex characters. '
    access_cmd_access.v1:
      title: access
      type: object
      properties:
        type:
          type: string
          enum:
          - ACCESS
        config:
          $ref: '#/components/schemas/access_cmd_access.v1Config'
    access_cmd_lock.v1Config:
      type: object
      required:
      - actions
      properties:
        actions:
          type: array
          description: Payload Field (see EPC Gen2 Spec)
          items:
            type: string
            enum:
            - PERMALOCK_USER_BANK
            - WRITE_LOCK_USER_BANK
            - WRITE_UNLOCK_USER_BANK
            - WRITE_LOCK_TID_BANK
            - WRITE_UNLOCK_TID_BANK
            - PERMALOCK_EPC_BANK
            - WRITE_LOCK_EPC_BANK
            - PERMALOCK_ACCESS_PASSWORD
            - READ_WRITE_LOCK_ACCESS_PASSWORD
            - READ_WRITE_UNLOCK_ACCESS_PASSWORD
            - PERMALOCK_KILL_PASSWORD
            - READ_WRITE_LOCK_KILL_PASSWORD
            - READ_WRITE_UNLOCK_KILL_PASSWORD
    access_cmd_lock.v1:
      title: lock
      type: object
      properties:
        type:
          type: string
          enum:
          - LOCK
        config:
          $ref: '#/components/schemas/access_cmd_lock.v1Config'
      required:
      - config
    access_cmd_kill.v1:
      title: kill
      type: object
      properties:
        type:
          type: string
