              set_mode_default_FXR90:
                value:
                  antennaStopCondition:
                    type: DURATION
                    value: 100
                  antennas:
                  - 1
                  component: RC
                  delayBetweenAntennaCycles:
                    duration: 0
                    type: DISABLED
                  linkProfile: 3
                  payload: status
                  query:
                    sel: ALL
                    session: S1
                    tagPopulation: 256
