          minimum: 0
          exclusiveMaximum: true
          maximum: 360
        readerHeight:
          type: number
          description: Height of reader (in feet)
          default: 15
          minimum: 10
          maximum: 20
        tagHeight:
          type: number
          description: Height of tag (in feet)
          default: 3
