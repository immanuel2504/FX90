                                            description: MQTT Quality of Service level (0 = at most once, 1 = at least once).
                                          reconnectDelay:
                                            type: number
                                            description: Initial delay in seconds before attempting to reconnect after disconnect.
                                          reconnectDelayMax:
                                            type: number
                                            description: Maximum delay in seconds between reconnect attempts (exponential backoff cap).
                                      enableSecurity:
                                        type: boolean
                                        description: When true, TLS/SSL is used for the connection.
                                      endpoint:
