  /cloud/cableLossCompensation:
    get:
      tags:
      - System
      summary: Get Cable Loss Compensation
      description: '## 1. Description


        The `GET /cloud/cableLossCompensation` REST endpoint retrieves the cable loss compensation values currently configured for each read point on the reader.


        This endpoint returns:


        - The cable length and the attenuation value (in dBm) configured per read point


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/cableLossCompensation` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/cableLossCompensation` to:


        - Review cable loss settings before tuning transmit power for a deployment

        - Confirm compensation values match physical cable lengths at each antenna port

        - Verify the effect of a prior `PUT /cloud/cableLossCompensation` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `cableLength` | Does the configured length match the physical cable run? | An incorrect cable length will produce inaccurate loss compensation and reduce read range. |

        | `cableLoss` (per read point) | Is the attenuation value consistent with the cable spec? | Mismatched values result in too little or too much transmit power after compensation is applied. |

        '
      operationId: getCableLossCompensation
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getCablelosscompensationResponse'
              example:
                '1':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '2':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '3':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '4':
                  cableLength: 10
                  cableLossPerHundredFt: 10
      security:
      - bearerAuth: []
    put:
      tags:
      - System
      summary: Set Cable Loss Compensation
      description: 'The `PUT /cloud/cableLossCompensation` REST endpoint sets cable loss compensation.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/cableLossCompensation` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: setCableLossCompensation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setCablelosscompensationRequest'
            examples:
              set_cableLossCompensation:
                value:
                  '1':
                    cableLength: 90
                    cableLossPerHundredFt: 18
                  '2':
                    cableLength: 18
                    cableLossPerHundredFt: 19
                  '3':
                    cableLength: 10
                    cableLossPerHundredFt: 11
                  '4':
                    cableLength: 10
                    cableLossPerHundredFt: 70
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setCablelosscompensationResponse'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setCablelosscompensationResponseschema_400'
        '500':
