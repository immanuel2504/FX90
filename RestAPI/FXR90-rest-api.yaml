  /cloud/wifiNetworks:
    get:
      tags:
      - Network
      summary: Retrieves available Wi-Fi networks
      description: '## 1. Description


        The `GET /cloud/wifiNetworks` REST endpoint triggers a Wi-Fi scan and returns all visible Wi-Fi networks in the reader''s vicinity.


        This endpoint returns:


        - The ESSID (network name) of each visible access point

        - Signal strength of each network as a percentage

        - Supported security protocols and capabilities (WPA2, WPA3, 802.1X)

        - Any existing saved Wi-Fi profiles on the reader, including auto-connect settings


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/wifiNetworks` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/wifiNetworks` to:


        - Perform a remote site survey to evaluate Wi-Fi coverage at the reader''s location

        - Confirm the target network is broadcasting before pushing a new Wi-Fi configuration

        - Identify the security type required by local access points

        - Check which saved profiles are configured for auto-connect


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `essid` | Is the target network visible? | If the network is not listed, the reader cannot connect regardless of configuration. |

        | `signal` | What is the signal strength percentage? | Low signal causes unstable connectivity and increased retransmissions. |

        | `security.type` | What security type is required? | The network configuration must match the access point''s security requirements. |

        | `autoConnect` | Is a saved profile set to auto-connect? | Confirms whether the reader will reconnect to this network automatically after a restart. |

        '
      operationId: getAvailablewifinetworks
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Available Wi-Fi networks discovered by the reader.
                properties:
                  availableWifiNetworks:
                    type: array
                    description: List of detected Wi-Fi access points.
                    items:
                      type: object
                      properties:
                        capabilities:
                          type: array
                          description: Security capabilities advertised by the access point.
                          items:
                            type: string
                        configuration:
                          type: object
                          description: Reader-side connection settings associated with the access point.
                          properties:
                            autoConnect:
                              type: boolean
                              description: Whether the reader is configured to auto-connect to this network.
                            security:
                              type: object
                              description: Optional security metadata for the access point.
                              properties:
                                type:
                                  type: string
                                  description: Security mode name reported for the access point.
                                details:
                                  type: object
                                  description: Optional security details for enterprise authentication.
                                  properties:
                                    auth:
                                      type: string
                                      description: Authentication method.
                                    innerAuth:
                                      type: string
                                      description: Inner authentication method.
                                    username:
                                      type: string
                                      description: Username configured for enterprise authentication.
                                    password:
                                      type: string
                                      description: Password configured for enterprise authentication.
                                    cert:
                                      type: string
                                      description: Certificate configured for enterprise authentication.
                          required:
                          - autoConnect
                        essid:
                          type: string
                          description: SSID broadcast name of the Wi-Fi network.
                        signalStrength:
                          type: string
                          description: Signal strength reported for the Wi-Fi network.
                      required:
                      - capabilities
                      - configuration
                      - essid
                      - signalStrength
                required:
                - availableWifiNetworks
              example:
                availableWifiNetworks:
                - capabilities:
                  - WPA2
                  - WPA3
                  configuration:
                    autoConnect: false
                  essid: GLaDOS
                  signalStrength: 100%
                - capabilities:
                  - WPA2
