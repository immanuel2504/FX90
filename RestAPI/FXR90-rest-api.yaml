  /cloud/ntpServer:
    get:
      tags:
      - Date&Time
      summary: Retrieve the NTP server
      description: '## 1. Description


        The `GET /cloud/ntpServer` REST endpoint retrieves the NTP server address currently configured on the reader.


        This endpoint returns:


        - The NTP server hostname or IP address the reader is using for time synchronization


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/ntpServer` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/ntpServer` to:


        - Confirm the reader is using the correct NTP server for time synchronization

        - Troubleshoot timestamp accuracy issues that may be caused by an unreachable or misconfigured NTP server

        - Verify the effect of a prior NTP server update


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `server` | Does it point to the correct NTP server? | An unreachable or wrong NTP server leads to clock drift, which affects log timestamps and time-based trigger logic. |

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    type: string
                    description: Configured primary NTP server address.
      security:
      - bearerAuth: []
    put:
      tags:
      - Date&Time
      summary: Set NTP server
      description: 'The `PUT /cloud/ntpServer` REST endpoint is used to set NTP server.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/ntpServer` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: updateNtpServer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                description: Use 'server' as the primary NTP server key (current convention)
                properties:
                  server:
                    type: string
                    description: Primary NTP server address
                  server2:
                    type: string
                    description: Optional secondary NTP server address
                required:
                - server
              - type: object
                description: Use 'server1' as the primary NTP server key (legacy convention)
                properties:
                  server1:
                    type: string
                    description: Primary NTP server address
                  server2:
                    type: string
                    description: Optional secondary NTP server address
                required:
                - server1
            examples:
              set_ntpServer:
                value:
                  server: time1.google.com
                  server2: time2.google.com
              set_ntpServer_legacy:
                value:
                  server1: time1.google.com
                  server2: time2.google.com
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
  /cloud/certificates:
    get:
      tags:
      - Certificate
      summary: Retrieve installed certificate details
      description: '## 1. Description


        The `GET /cloud/certificates` REST endpoint retrieves the list of certificates installed on the reader.


        This endpoint returns:


        - An array of installed certificates, each with name, type, serial number, and validity dates


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/certificates` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/certificates` to:


        - Audit which certificates are installed and their current validity windows

        - Confirm a certificate was successfully installed or removed

        - Retrieve serial numbers for certificate rotation audits

        - Check expiry dates before a scheduled certificate renewal


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `name` | Is the expected certificate present? | Confirms the correct certificate is installed for TLS or authentication. |

        | `type` | What type of certificate is it? | Differentiates device, CA, and client certificates used for different purposes. |

        | `validityEnd` | When does it expire? | Expired certificates will cause TLS handshake failures and connectivity loss. |

        | `serialNumber` | Does the serial match the expected certificate? | Verifies the exact certificate instance, useful for rotation audits. |

        '
      operationId: getCertificates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: Installed certificate details returned by the reader.
                items:
                  type: object
                  properties:
                    installTime:
                      type: string
                      description: Certificate installation timestamp on the reader.
                    issuerName:
                      type: string
                      description: Certificate issuer distinguished name.
                    name:
                      type: string
                      description: Certificate name as stored on the reader.
                    publickey:
                      type: string
                      description: PEM-formatted public key for the certificate.
                    serial:
                      type: string
                      description: Certificate serial number.
                    subjectName:
                      type: string
                      description: Certificate subject distinguished name.
                    type:
                      type: string
                      description: Certificate type.
                      enum:
                      - server
                      - client
                      - app
                    validityEnd:
                      type: string
                      description: Certificate validity end date/time.
                    validityStart:
                      type: string
                      description: Certificate validity start date/time.
                  required:
                  - installTime
                  - issuerName
                  - name
                  - publickey
                  - serial
                  - subjectName
                  - type
                  - validityEnd
                  - validityStart
      security:
      - bearerAuth: []
    put:
      tags:
      - Certificate
      summary: Install certificate
      description: 'The `PUT /cloud/certificates` REST endpoint is used to install or update a certificate on the reader by downloading a PFX file from a URL.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/certificates` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |


        ## 3. Usage Notes


        This REST endpoint corresponds to the `set_updateCertificate` MQTT command where applicable. REST and MQTT use the same certificate install payload fields: `name`, `type`, `url`, `authenticationType`, `options`, and `pfxPassword`.


        Allowed `type` values are `client`, `server`, and `app`. Allowed `authenticationType` values are `NONE` and `BASIC`.

        '
      operationId: setUpdatecertificate
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - url
              - type
              - name
              properties:
                authenticationType:
                  type: string
                  enum:
                  - NONE
                  - BASIC
                  description: Authentication method for fetching the certificate file.
                options:
                  type: object
                  description: Credentials object used when `authenticationType` is `BASIC`.
                  required:
                  - username
                  - password
                  properties:
                    username:
                      type: string
                    password:
                      type: string
                name:
                  type: string
                  description: Logical name for the certificate to be installed on the device.
                pfxPassword:
                  type: string
                  description: Password for the PFX file, if applicable.
                type:
                  type: string
                  description: 'Certificate type. Valid values: server, client, app.'
                  enum:
                  - server
                  - client
                  - app
                url:
                  type: string
                  description: URL to download the certificate file from.
                verifyPeer:
                  type: boolean
                  description: Verify the server TLS peer certificate.
                verifyHost:
                  type: boolean
                  description: Verify the server hostname in the TLS certificate.
                CACertificateFileLocation:
                  type: string
                  description: Path to a CA certificate file on the device.
                CACertificateFileContent:
                  type: string
                  description: PEM-encoded CA certificate content.
                publicKeyFileLocation:
                  type: string
                publicKeyFileContent:
                  type: string
                privateKeyFileLocation:
                  type: string
                privateKeyFileContent:
                  type: string
                installedCertificateType:
                  type: string
                installedCertificateName:
                  type: string
                headers:
                  type: object
                  additionalProperties:
                    type: string
                retry:
                  type: object
                  properties:
                    count:
                      type: integer
                    delayInSec:
                      type: integer
            examples:
              set_updateCertificate:
                value:
                  options:
                    password: zebra
                    username: zebra
                  authenticationType: BASIC
                  name: reader
                  pfxPassword: abcd12345
                  type: client
                  url: https://10.117.229.15/reader.pfx
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
