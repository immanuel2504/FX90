                                description: Username for TTLS/PEAP with MSCHAPv2.
                              password:
                                type: string
                                description: Password for TTLS/PEAP with MSCHAPv2.
                              certificate:
                                type: string
                                description: Client certificate name used for TLS-based authentication.
                          Status:
                            type: string
                            description: Connection status.
                          isEnabled:
                            type: boolean
                            description: Whether the interface is enabled.
                          macAddress:
                            type: string
                            description: MAC address of the interface.
                      mlan0:
                        type: object
