      summary: Pass-through command
      description: 'The `PUT /cloud/pass-through` REST endpoint is used to pass-through command.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/pass-through` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: setPassthru
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  type: string
                  description: Target reader component to send the pass-through command to.
                  enum:
                  - RC
                payload:
                  type: string
                  description: 'Pass-through payload. Valid values include: mode, status.'
            examples:
              set_passthru:
                value:
                  component: RC
                  payload: mode
              status:
                value:
                  component: RC
                  payload: status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: The raw response string returned by the target component.
      security:
      - bearerAuth: []
  /cloud/cloudConfig:
    put:
      tags:
      - System
      summary: Import cloud endpoint configuration
      description: 'The `PUT /cloud/cloudConfig` REST endpoint and the `set_importCloudConfig` MQTT command import cloud endpoint configuration onto the reader. Use this operation to define how tag data, command responses, and management events are delivered.


        This operation configures:

        - Data event endpoints under `endpointConfig.data.event`

        - Control command-response endpoints under `endpointConfig.control.commandResponse`

        - Management event endpoints under `endpointConfig.management.event`

        - Management command-response endpoints under `endpointConfig.management.commandResponse`


        ## 1. Operation Details


        | Property | Value |

        |---|---|

        | Pattern Name | Cloud Endpoint Configuration Import |

        | Supported Protocols | REST (HTTP/HTTPS), MQTT |

        | Communication Type | Synchronous (REST), Bidirectional (MQTT) |

        | Applies To | FXR90 |

        | Related Operations | config, certificates |

        | REST Endpoint | `PUT /cloud/cloudConfig` |


        ## 2. Before You Begin


        Gather the endpoint details before sending the request. An incorrect hostname, port, topic, or certificate reference will prevent the reader from connecting to the cloud backend.


        | What You Need | Details |

        |---|---|

        | Endpoint channels | `data.event`, `control.commandResponse`, `management.event`, `management.commandResponse`. |

        | Connection type | `mqtt`, `httpPost`, `tcpip-server`, `WEBSOCKET`, `mqtt-AZURE`, `mqtt-AWS`, or another supported endpoint type. |

        | Host, port, and topics | MQTT endpoints require `hostName`, `port`, `protocol`, `publishTopic`, and command-response `subscribeTopic`. |

        | Certificates and auth | TLS certificate references or inline PEM paths, plus optional `basicAuthentication` credentials. |


        ## 3. Connection Types


        | Type | Description |

        |---|---|

        | `mqtt` | Standard MQTT broker connection. |

        | `httpPost` | HTTP POST delivery for data events. |

        | `tcpip-server` | TCP/IP server socket endpoint. |

        | `WEBSOCKET` | WebSocket endpoint connection. |

        | `mqtt-AZURE` | Azure IoT Hub MQTT connection. |

        | `mqtt-AWS` | AWS IoT Core MQTT connection. |

        | `keyboard-emulation` | Keyboard emulation output. |

        '
      operationId: setImportcloudconfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - endpointConfig
              properties:
                endpointConfig:
                  type: object
                  description: Cloud endpoint configuration to import. Selectively merges the provided sub-sections (control.commandResponse, management.commandResponse, management.event, data.event) into the reader's existing configuration. Only the sections provided are updated; omitted sections are left unchanged.
                  properties:
                    control:
                      type: object
                      description: Control plane endpoint configuration. Replaces the existing control.commandResponse configuration when provided.
                      properties:
                        commandResponse:
                          type: object
                          description: Control plane command and response MQTT connection configuration.
                          properties:
                            connections:
                              type: array
                              description: List of control plane cloud connections for command/response.
                              items:
                                type: object
                                properties:
                                  description:
                                    type: string
                                    description: Human-readable description of this connection.
                                  name:
                                    type: string
                                    description: Unique name identifier for this connection.
                                  options:
                                    type: object
                                    description: Connection-specific options.
                                    properties:
                                      additional:
                                        type: object
                                        description: Additional MQTT connection parameters.
                                        properties:
                                          cleanSession:
                                            type: boolean
                                            description: If true, broker discards previous session state on connect (MQTT clean session flag).
                                          clientId:
                                            type: string
                                            description: MQTT client identifier used when connecting to the broker.
                                          debug:
                                            type: boolean
                                            description: Enable verbose MQTT debug logging.
                                          keepAlive:
                                            type: number
                                            description: MQTT keep-alive interval in seconds. The reader sends a PINGREQ if no message is sent within this interval.
                                          qos:
                                            type: number
                                            description: MQTT Quality of Service level (0 = at most once, 1 = at least once).
                                          reconnectDelay:
                                            type: number
                                            description: Initial delay in seconds before attempting to reconnect after disconnect.
                                          reconnectDelayMax:
                                            type: number
                                            description: Maximum delay in seconds between reconnect attempts (exponential backoff cap).
                                      enableSecurity:
                                        type: boolean
                                        description: When true, TLS/SSL is used for the connection.
                                      endpoint:
                                        type: object
                                        description: Remote broker or server endpoint details.
                                        properties:
                                          hostName:
                                            type: string
                                            description: Hostname or IP address of the MQTT broker or cloud endpoint.
                                          port:
                                            type: number
                                            description: TCP port number of the MQTT broker or cloud endpoint.
                                          protocol:
                                            type: string
                                            description: 'Transport protocol. Common values: tcp, ssl, ws (WebSocket), wss (WebSocket Secure).'
                                      publishTopic:
                                        type: array
                                        description: MQTT topic(s) the reader publishes control responses to.
                                        items:
                                          type: string
                                      security:
                                        type: object
                                        description: TLS/SSL certificate and key configuration.
                                        properties:
                                          CACertificateFileLocation:
                                            type: string
                                            description: Absolute path to the CA certificate file on the reader.
                                          installedCertificateName:
                                            type: string
                                            description: Name of a pre-installed certificate stored on the reader.
                                          installedCertificateType:
                                            type: string
                                            description: Type of the pre-installed certificate (e.g. "server", "client").
                                          keyAlgorithm:
                                            type: string
                                            description: JWT signing algorithm for GCP connections (e.g. RS256, ES256).
                                          keyFormat:
                                            type: string
                                            description: Key file format (e.g. PEM).
                                          privateKeyFileLocation:
                                            type: string
                                            description: Absolute path to the private key file on the reader.
                                          publicKeyFileLocation:
                                            type: string
                                            description: Absolute path to the public key or client certificate file on the reader.
                                          verifyHostName:
                                            type: boolean
                                            description: When true, the broker's hostname is verified against its TLS certificate CN/SAN.
                                          verifyPeer:
                                            type: boolean
                                            description: When true, the server's TLS certificate is validated against the CA certificate.
                                      subscribeTopic:
                                        type: array
                                        description: MQTT topic(s) the reader subscribes to for incoming control commands.
                                        items:
                                          type: string
                                  type:
                                    type: string
                                    description: 'Connection type. Supported values: mqtt, mqtt-GCP, mqtt-AWS, mqtt-Azure, httpPost, WEBSOCKET, tcpip-server, keyboard-emulation.'
                            enableLocalRest:
                              type: boolean
                              description: When true, local REST API is enabled for sending control commands. Setting this via set_importCloudConfig persists the value to the cloud configuration file.
                    data:
                      type: object
                      description: Data plane endpoint configuration. Replaces the existing data.event configuration when provided.
                      properties:
                        event:
                          type: object
                          description: Data event endpoint. Defines the cloud connections that receive tag read events.
                          properties:
                            connections:
                              type: array
                              description: List of data plane cloud connections for publishing tag read events. Send an empty array ([]) to clear all data connections.
                              items:
                                type: object
                                properties:
                                  additionalOptions:
                                    type: object
                                    description: Per-connection data delivery options (batching, retention, data acknowledgement).
                                    properties:
                                      batching:
                                        description: Per-connection batching configuration. Set to null to use global batching settings. When provided as an object, overrides global batching for this connection only.
                                        oneOf:
                                        - type: 'null'
                                          description: Use global batching settings for this connection.
                                        - type: object
                                          description: Per-connection batching overriding global settings.
                                          properties:
                                            maxPayloadSizePerReport:
                                              type: integer
                                              description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                                              minimum: 0
                                              maximum: 256000
                                            reportingInterval:
                                              type: integer
                                              description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
                                              minimum: 0
                                              maximum: 86400000
                                      retention:
                                        type: object
                                        description: Per-connection event retention configuration when the connection is offline.
                                        properties:
                                          maxEventRetentionTimeInMin:
                                            type: integer
                                            description: Maximum time in minutes to retain events when offline (0 - 10080). 0 or -1 retains events indefinitely until maxNumEvents is reached.
                                            minimum: 0
                                            maximum: 10080
                                          maxNumEvents:
                                            type: integer
                                            description: Maximum number of events to buffer when offline (0 - 150000).
                                            minimum: 0
                                            maximum: 150000
                                          throttle:
                                            type: integer
                                            description: Rate limit in events/sec for replaying retained events after reconnect (0 - 1000). 0 means no throttling.
                                            minimum: 0
                                            maximum: 1000
                                      dataAck:
                                        type: object
                                        description: Data acknowledgement configuration. When enabled, the reader waits for an ACK from the cloud before marking events as delivered. Supported on MQTT-based connections only.
                                        properties:
                                          enable:
                                            type: boolean
                                            description: Enable data acknowledgement for this connection.
                                          responseTopic:
                                            type: string
                                            description: MQTT topic on which the cloud sends acknowledgement messages back to the reader.
                                          correlationFieldName:
                                            type: string
                                            description: Name of the field in the event payload used to correlate ACK responses. Defaults to "correlationId".
                                  description:
                                    type: string
                                    description: Human-readable description of this connection.
                                  name:
                                    type: string
                                    description: Unique name identifier for this connection.
                                  options:
                                    type: object
                                    description: Connection-specific options.
                                    properties:
