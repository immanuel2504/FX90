                          options:
                            additional:
                              cleanSession: true
                              clientId: FX9600FCC017
                              debug: false
                              keepAlive: 60
                              qos: 0
                              reconnectDelay: 1
                              reconnectDelayMax: 5
                            enableSecurity: false
                            endpoint:
                              hostName: broker.emqx.io
                              port: 1883
                              protocol: tcp
                            publishTopic:
                            - FX9600FCC017/rsp
                            security:
                              CACertificateFileLocation: /home/root/broker.emqx.io-ca.crt
                              installedCertificateName: Server
                              installedCertificateType: server
                              keyAlgorithm: RS256
                              keyFormat: PEM
                              verifyHostName: false
                              verifyPeer: false
                            subscribeTopic:
                            - FX9600FCC017/cmd
                          type: mqtt
                        enableLocalRest: true
                    data:
