  /cloud/mode:
    get:
      tags:
      - Control
      summary: Get Operating Mode
      description: '## 1. Description


        The `GET /cloud/mode` REST endpoint retrieves the reader''s current operating mode and all associated configuration settings.


        This endpoint returns:


        - Operating mode type (`SIMPLE`, `INVENTORY`, `PORTAL`, `CONVEYOR`, `CUSTOM`, or `DIRECTIONALITY`)

        - Configured antennas or beams and their transmit power values

        - Environment profile setting

        - Mode-specific settings (portal, conveyor, directionality, etc.)

        - Gen2 query, select, and access settings

        - Report filtering, RSSI filtering, metadata fields, and radio start/stop conditions


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/mode` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/mode` to:


        - Review the full current mode configuration before calling `PUT /cloud/mode`

        - Confirm antenna transmit power settings before starting inventory

        - Audit the environment profile and mode type across a fleet

        - Check tag reporting and RSSI filter settings before a site validation


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `modeType` | Is the mode type correct for this application? | Controls fundamental read behavior - portal, conveyor, or inventory logic. |

        | `antennas` | Are the right ports enabled with expected transmit power? | Misconfigured antennas will result in missed reads or coverage gaps. |

        | `txPower` | Is the power level within regulatory limits? | Transmit power must stay below the regional maximum set in `GET /cloud/region`. |

        | `environmentProfile` | Is the profile matched to the deployment environment? | Profile influences sensitivity and false-read filtering in dense environments. |

        '
      operationId: getMode
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operatingMode.v1'
              example:
                antennaStopCondition:
                - type: DURATION
                  value: 100
                - type: DURATION
                  value: 100
                - type: DURATION
                  value: 100
                antennas:
                - 1
                - 5
                - 6
                delayBetweenAntennaCycles:
                  duration: 0
                  type: DISABLED
                query:
                  tagPopulation: 256
                reportFilter:
                  duration: 0
                  type: PER_ANTENNA
                tagMetaData:
                - ANTENNA
                - RSSI
                - CHANNEL
                - PC
                - XPC
                - CRC
                - SEEN_COUNT
                - PHASE
                transmitPower:
                - 20
                - 20
                - 20
                type: CUSTOM
      security:
      - bearerAuth: []
    put:
      tags:
      - Control
      summary: Set Operating Mode
      description: 'The `PUT /cloud/mode` REST endpoint configures the reader''s operating mode using the same `operatingMode.v1` payload shape supported by the MQTT `set_mode` command.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Operating Mode Configuration |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 Series |

        | REST Endpoint | `PUT /cloud/mode` |

        | Request Schema | `operatingMode.v1` |

        | Related Endpoints | `GET /cloud/mode`, `PUT /cloud/start`, `PUT /cloud/stop`, `GET /cloud/config` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |


        ## 3. Before You Begin


        Changing mode while inventory is active can disrupt reads. Stop inventory first with `PUT /cloud/stop` if the reader is currently running.


        | What You Need | Details |

        |---|---|

        | Mode type | One of `SIMPLE`, `INVENTORY`, `PORTAL`, `CONVEYOR`, `CUSTOM`, or `DIRECTIONALITY`. |

        | Antennas or beams | Antenna ports or ATR beam settings used for inventory. |

        | RF settings | Transmit power, environment profile, query settings, select operations, and optional access operations. |

        | Mode-specific settings | Inventory interval, portal trigger settings, or directionality zone/beam configuration, depending on `type`. |

        | Reporting settings | Metadata, report filter, RSSI filter, and optional radio start/stop conditions. |


        ## 4. Schema Alignment


        The request schema is aligned with MQTT `set_mode`. Any mode configuration supported by MQTT should be accepted by REST with the same field name, nested object shape, enum values, and description.

        '
      operationId: setMode
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/operatingMode.v1'
            examples:
              set_mode:
                value:
                  antennaStopCondition:
                    type: DURATION
                    value: 400
                  antennas:
                  - 1
                  - 2
                  - 3
                  - 4
                  query:
                    sel: ALL
                    session: S2
                    tagPopulation: 2000
                    target: AB
                  radioStopConditions:
                    duration: 60
                  transmitPower: 31.5
                  type: SIMPLE
              set_mode_default_FXR90:
                value:
                  antennaStopCondition:
                    type: DURATION
                    value: 100
                  antennas:
                  - 1
                  delayBetweenAntennaCycles:
                    duration: 0
                    type: DISABLED
                  query:
                    sel: ALL
                    session: S1
                    tagPopulation: 256
                    target: A
                  inventoryProtocol:
                    mode: GEN2X
                  reportFilter:
                    duration: 0
                    type: PER_ANTENNA
                  tagMetaData:
                  - RSSI
                  - PHASE
                  - SEEN_COUNT
                  - ANTENNA
                  - CHANNEL
                  - PC
                  - XPC
                  - CRC
                  transmitPower:
                  - 17
                  type: CUSTOM
              set_mode_TAG_FOCUS:
                value:
                  type: CUSTOM
                  antennaStopCondition:
                    type: DURATION
                    value: 100
                  antennas:
                  - 1
                  query:
                    tagPopulation: 10
                    sel: NOT_SL
                    session: S1
                    target: A
                  modeSpecificSettings:
                    interval:
                      unit: seconds
                      value: 0
                  selects:
                  - target: S1
                    action: INVB_NOTHING
                    membank: TID
                    pointer: 6
                    length: 24
                    mask: '800600'
                  transmitPower:
                  - 30
                  radioStartConditions: {}
                  radioStopConditions: {}
                  reportFilter:
