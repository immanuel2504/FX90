          items:
            type: string
            enum:
            - in
            - out
            - right
            - left
        zonePlan:
          type: integer
          description: 4 or 6 zone zone plan
          default: 4
          enum:
          - 4
          - 6
    directionality.v1:
      type: object
      title: directionalitySettings
