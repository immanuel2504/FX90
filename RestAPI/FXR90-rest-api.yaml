  /cloud/config:
    get:
      tags:
      - System
      summary: Retrieves reader configuration
      description: '## 1. Description


        The `GET /cloud/config` REST endpoint retrieves the reader''s full configuration, including RF and XML settings, GPIO and LED defaults, and reader-gateway endpoint settings.


        This endpoint returns:


        - The current reader XML configuration

        - GPIO and LED default states

        - Reader-gateway settings including tag data retention, batching, and endpoint configuration


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/config` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/config` to:


        - Review the active configuration before calling `PUT /cloud/config`

        - Audit GPIO and LED default states across a fleet

        - Inspect tag-data retention, batching, and endpoint settings

        - Confirm which data and management endpoints are configured


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `xml` | Is the XML configuration as expected? | Defines RF and reader behavior used during inventory operations. |

        | `READER-GATEWAY` | Are endpoint URLs and credentials correct? | Determines where tag data is delivered and how the reader authenticates. |

        | `GPIO-LED` | Are the GPO/LED defaults and event actions as expected? | Ensures GPIO-triggered logic starts from the expected initial state. |

        '
      operationId: getConfig
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  GPIO-LED:
                    description: GPIO and LED trigger mapping configuration. Returns "NOT_CONFIGURED" when no GPIO-LED configuration has been applied.
                    oneOf:
                    - type: string
                      description: Returned as "NOT_CONFIGURED" when GPIO-LED config has not been set.
                  xml:
                    type: string
                    description: RFID reader operational XML profile (the "Cloud Connect" RFID profile). Only returned on supported reader models (e.g. STARFISH/FX series).
                  READER-GATEWAY:
                    type: object
                    description: Reader Gateway cloud connectivity configuration, including endpoint connections, batching, retention, and management event settings.
                    properties:
                      batching:
                        description: Global batching configuration for data events. Returned as an array (one entry per data endpoint connection) or a single object applied to all connections.
                        oneOf:
                        - type: object
                          description: Single batching config applied to all data endpoints.
                          properties:
                            maxPayloadSizePerReport:
                              type: number
                              description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                            reportingInterval:
                              type: number
                              description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
                        - type: array
                          description: Per-endpoint batching config (one entry per data endpoint connection).
                          items:
                            type: object
                            properties:
                              maxPayloadSizePerReport:
                                type: number
                                description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                              reportingInterval:
                                type: number
                                description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
                      endpointConfig:
                        type: object
                        description: Cloud connectivity endpoint configuration for control, data, and management planes.
                        properties:
                          control:
                            type: object
                            description: Control plane endpoint configuration (command/response channel).
                            properties:
                              commandResponse:
                                type: object
                                description: Control plane command and response MQTT connection configuration.
                                properties:
                                  connections:
                                    type: array
                                    description: List of control plane cloud connections.
                                    items:
                                      type: object
                                      properties:
                                        description:
                                          type: string
                                          description: Human-readable description of this connection.
                                        name:
                                          type: string
                                          description: Unique name identifier for this connection.
                                        type:
                                          type: string
                                          description: 'Connection type. Supported values: mqtt, mqtt-GCP, mqtt-AWS, mqtt-Azure, httpPost, WEBSOCKET, tcpip-server, keyboard-emulation.'
                                        options:
                                          type: object
                                          description: Connection-specific options.
                                          properties:
                                            additional:
                                              type: object
                                              description: Additional MQTT connection parameters.
                                              properties:
                                                cleanSession:
                                                  type: boolean
                                                  description: If true, broker discards previous session state on connect (MQTT clean session flag).
                                                clientId:
                                                  type: string
                                                  description: MQTT client identifier used when connecting to the broker.
                                                debug:
                                                  type: boolean
                                                  description: Enable verbose MQTT debug logging.
                                                keepAlive:
                                                  type: number
                                                  description: MQTT keep-alive interval in seconds. The reader sends a PINGREQ if no message is sent within this interval.
                                                qos:
                                                  type: number
                                                  description: MQTT Quality of Service level (0 = at most once, 1 = at least once).
                                                reconnectDelay:
                                                  type: number
                                                  description: Initial delay in seconds before attempting to reconnect after disconnect.
                                                reconnectDelayMax:
                                                  type: number
                                                  description: Maximum delay in seconds between reconnect attempts (exponential backoff cap).
                                            enableSecurity:
                                              type: boolean
                                              description: When true, TLS/SSL is used for the connection.
                                            endpoint:
