  /cloud/localRestLogin:
    get:
      tags:
      - Login
      summary: Reader Login
      description: '## 1. Description


        The `GET /cloud/localRestLogin` REST endpoint authenticates to the reader and returns a bearer token for all other REST API calls.


        On success, the response contains `code` (`0` = success) and `message` (the bearer token). No request body is required.


        ## 2. Authentication


        If a bearer token has already been copied from the dashboard page, use it in **Authorize → bearerAuth**.


        If not, enter Admin login credentials in **Authorize → basicAuth**, execute `GET /cloud/localRestLogin`, and copy the bearer token from the response into **Authorize → bearerAuth**.


        | Scenario | Swagger UI steps |

        |---|---|

        | Already have a token | **Authorize → bearerAuth** → paste token → call other endpoints |

        | Need a token | **Authorize → basicAuth** → run this endpoint → copy `message` → **Authorize → bearerAuth** |


        This endpoint requires **HTTP Basic Auth** (admin credentials). All other `/cloud/*` endpoints require **bearerAuth**.


        ## 3. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/localRestLogin` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | HTTP Basic Auth (admin reader credentials) |

        '
      operationId: localrestlogin
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                  message:
                    type: string
      security:
      - basicAuth: []
  /cloud/app-led:
    get:
      tags:
      - App-led
      summary: Retrieves application LED state
      description: '## 1. Description


        The `GET /cloud/app-led` REST endpoint retrieves the current state of the application LED on the reader.


        This endpoint returns:


        - The application LED status (`DEFAULT` or `NON_DEFAULT`)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/app-led` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/app-led` to:


        - Confirm whether the application LED is showing default reader state or has been overridden

        - Verify the effect of a prior `PUT /cloud/app-led` call

        - Audit LED state as part of a device health or provisioning check


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `status` | Is it `DEFAULT` or `NON_DEFAULT`? | `NON_DEFAULT` indicates the LED has been overridden by the application; `DEFAULT` means it reflects normal reader status. |

        '
      operationId: getAppled
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Current state of the application LED.
                    enum:
                    - DEFAULT
                    - NON_DEFAULT
      security:
      - bearerAuth: []
    put:
      tags:
      - App-led
      summary: Updates application LED state
      description: 'The `PUT /cloud/app-led` REST endpoint updates application LED state.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/app-led` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: setAppled
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                color:
                  type: string
                  description: The color of the LED (red, amber, green, blue, off).
                  enum:
                  - red
                  - amber
                  - green
                  - blue
                  - 'off'
                flash:
                  type: boolean
                  description: Whether the LED should blink.
                seconds:
                  type: number
                  description: Duration in seconds. Use 0 for indefinite.
            examples:
              set_appled:
                value:
                  color: amber
                  flash: true
                  seconds: 60
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
  /cloud/stack-led:
    get:
      tags:
      - Stack-led
      summary: Retrieves stack LED state
      description: '## 1. Description


        The `GET /cloud/stack-led` REST endpoint retrieves the current state of the stack LED on the reader.


        This endpoint returns status, color, brightness, flash state, configured duration, and remaining time.


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/stack-led` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/stack-led` to:


        - Confirm the current stack LED color, brightness, and flash state

        - Verify the effect of a prior `PUT /cloud/stack-led` call

        - Check how many seconds remain on a timed LED override

        '
      operationId: getStackled
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  color:
                    type: string
                  brightness:
                    type: string
                  flash:
                    type: boolean
                  seconds:
                    type: integer
                  seconds_remaining:
                    type: integer
      security:
      - bearerAuth: []
    put:
      tags:
      - Stack-led
      summary: Updates stack LED state
      description: '## 1. Description


        The `PUT /cloud/stack-led` REST endpoint updates the stack LED state on the reader.


        Supported colors: `red`, `amber`, `green`, `blue`, `off`.


        Supported brightness: `low`, `med`, `high` (defaults to `low`).


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/stack-led` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |


        ## 3. Request Body


        | Field | Type | Description |

        |---|---|---|

        | `color` | string | LED color: `red`, `amber`, `green`, `blue`, or `off` |

        | `brightness` | string | `low`, `med`, or `high` |

        | `flash` | boolean | Whether the LED should blink |

        | `seconds` | integer | Duration in seconds; use `0` for indefinite |


        ## 4. When to Use This Endpoint


        Use `PUT /cloud/stack-led` to:


        - Set a visual indicator on the reader stack LED

        - Temporarily override the default LED state with a timed color/flash pattern

        '
      operationId: setStackled
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                color:
                  type: string
                  description: The color of the LED (red, amber, green, blue, off)
                  enum:
                  - red
                  - amber
                  - green
                  - blue
                  - 'off'
                brightness:
                  type: string
                  description: The brightness of the LED (low, med, high). Defaults to low.
                  enum:
                  - low
                  - med
                  - high
                flash:
                  type: boolean
                seconds:
                  type: integer
            examples:
              red_high_alert:
                summary: Color:Red, Brightness:High, Flashing
                description: The LED will blink bright red for 30 seconds.
                value:
                  color: red
                  brightness: high
                  flash: true
                  seconds: 30
              green_solid:
                summary: Color:Green, Brightness:Low(Default), Solid
                description: The LED will stay solid green indefinitely.
                value:
                  color: green
                  flash: false
                  seconds: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
  /cloud/gpo:
    get:
      tags:
      - Gpio
      summary: Retrieves the GPO status
      description: '## 1. Description


        The `GET /cloud/gpo` REST endpoint retrieves the current digital output state of all GPO (General Purpose Output) pins on the reader.


        This endpoint returns:


        - The current HIGH or LOW state of each GPO pin (pins 1–4)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/gpo` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/gpo` to:


        - Verify the current state of GPO outputs before issuing a GPO control command

        - Troubleshoot whether an actuator or signaling device connected to a GPO pin is receiving the correct signal

        - Confirm the effect of a prior GPO set command


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | Pin 1 state | Is the pin HIGH or LOW? | Confirms whether an actuator or signal connected to GPO pin 1 is currently active. |

        | Pin 2–4 states | Are all expected pins in the correct state? | Multi-pin output workflows require all relevant pins to be in the expected state. |

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  '1':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                  '2':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                  '3':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                  '4':
                    type: string
                    enum:
                    - HIGH
                    - LOW
      security:
      - bearerAuth: []
    put:
      tags:
      - Gpio
      summary: Updates GPO port state
      description: 'The `PUT /cloud/gpo` REST endpoint updates GPO port state.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/gpo` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: setGpo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - port
              - state
              properties:
                port:
                  type: number
                  description: GPO port number (1–4 for FXR90; device-specific maximum applies).
                  minimum: 1
                  maximum: 4
                state:
                  type: boolean
                  description: Desired GPO state — true for HIGH, false for LOW.
            examples:
              set_gpo:
                value:
                  port: 3
                  state: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
  /cloud/gpi:
    get:
      tags:
      - Gpio
      summary: Get GPI Status
      description: '## 1. Description


        The `GET /cloud/gpi` REST endpoint retrieves the current digital input state of all GPI (General Purpose Input) pins on the reader.


        This endpoint returns:


        - The current HIGH or LOW state of each GPI pin (pins 1-4)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/gpi` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/gpi` to:


        - Check the current digital state of trigger or sensor inputs connected to GPI pins

        - Verify GPI pin state before applying a GPI-triggered workflow

        - Troubleshoot whether an external trigger signal is being received at the reader


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | Pin 1 state | Is the pin HIGH or LOW? | Confirms whether an external trigger or sensor is actively signaling the reader. |

        | Pin 2-4 states | Are all expected pins reporting the correct state? | Multi-pin triggers require all relevant pins to be in the expected state before initiating action. |

        '
      operationId: getGPIStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - '1'
                - '2'
                - '3'
                - '4'
                properties:
                  '1':
                    type: string
                    description: GPI port 1 state reported by the reader.
                    enum:
                    - HIGH
                    - LOW
                  '2':
                    type: string
                    description: GPI port 2 state reported by the reader.
                    enum:
                    - HIGH
                    - LOW
                  '3':
                    type: string
                    description: GPI port 3 state reported by the reader.
                    enum:
                    - HIGH
                    - LOW
                  '4':
                    type: string
                    description: GPI port 4 state reported by the reader.
                    enum:
                    - HIGH
                    - LOW
      security:
      - bearerAuth: []
  /cloud/region:
    get:
      tags:
      - Region
      summary: Retrieves reader region information
      description: '## 1. Description


        The `GET /cloud/region` REST endpoint retrieves the reader''s currently configured RF region and the regulatory parameters in effect.


        This endpoint returns:


        - The active region code and country name

        - The regulatory standard currently applied

        - Listen Before Talk (LBT) and frequency hopping state

        - Enabled channel list for the active region

        - Minimum and maximum transmit power supported


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/region` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/region` to:


        - Confirm the reader is set to the correct regulatory region before deployment

        - Verify LBT and channel configuration before inventory

        - Audit transmit power limits for the active region


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `country` | Is the correct country configured? | The reader must match the regulatory region of its deployment location. |

        | `regulatoryStandard` | Which standard is applied? | Determines transmission rules - channels, power limits, and LBT behavior. |

        | `lbtEnabled` | Is Listen Before Talk active? | Required in some regions (e.g., ETSI). Affects when the radio may transmit. |

        | `FrequencyHopping` | Is frequency hopping enabled? | Mandatory in most regions; confirms compliant radio operation. |

        | `maxTxPowerSupported` | What is the allowed power ceiling? | Use to validate transmit power settings before starting inventory. |

        '
      operationId: getRegion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  FrequencyHopping:
                    type: boolean
                    description: True when frequency hopping is enabled in the active region configuration.
                  region:
                    type: string
                    description: Active region name configured on the reader (for example, US).
                  regulatoryStandard:
                    type: string
                    description: Active regulatory standard for the region (for example, FCC, ETSI, CANADA_FCC_15).
                  lbtEnabled:
                    type: boolean
                    description: True when Listen-Before-Talk is enabled for the selected regulatory configuration.
                  channelData:
                    type: array
                    description: Active channel list used by the region/standard configuration, represented as frequencies (kHz).
                    items:
                      type: integer
                  country:
                    type: string
                    description: Country name associated with the active region configuration.
                  minTxPowerSupported:
                    type: number
                    description: Minimum transmit power supported for the active regulatory standard.
                  maxTxPowerSupported:
                    type: number
                    description: Maximum transmit power supported for the active regulatory standard.
              examples:
                multiple_values:
                  value:
                    FrequencyHopping: true
                    channelData:
                    - 915250
                    - 915750
                    - 903250
                    - 926750
                    country: Canada
                    lbtEnabled: false
                    maxTxPowerSupported: 300
                    minTxPowerSupported: 100
                    region: US
                    regulatoryStandard: FCC
      security:
      - bearerAuth: []
    put:
      tags:
      - Region
      summary: Update region information
      description: 'The `PUT /cloud/region` REST endpoint is used to update region information.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/region` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` where a request body is required |

        '
      operationId: setRegion
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - country
              - standardname
              properties:
                country:
                  type: string
                  description: Country name. Valid values can be retrieved from GET /cloud/supportedRegionList.
                standardname:
                  type: string
                  description: Regulatory standard name for the chosen country. Valid values can be retrieved from GET /cloud/supportedStandardList?region=<country>.
                isLBT:
                  type: boolean
                  description: Optional. Enables Listen-Before-Talk when supported by the selected standard.
                channeldata:
                  type: array
                  description: Optional channel frequency list (kHz) to apply when channel selection is supported by the selected standard.
                  items:
                    type: integer
            examples:
              set_region:
                value:
                  country: Canada
                  standardname: CANADA_FCC_15
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
      security:
      - bearerAuth: []
  /cloud/supportedRegionList:
    get:
      tags:
      - Region
      summary: Retrieves the supported region list based on the reader type
      description: '## 1. Description


        The `GET /cloud/supportedRegionList` REST endpoint retrieves the list of RF regulatory regions supported by this reader.


        This endpoint returns:


        - The list of supported region codes for this reader model


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/supportedRegionList` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/supportedRegionList` to:


        - Validate that the target deployment region is supported before calling `PUT /cloud/region`

        - Populate a region selection UI with only region codes valid for this reader model

        - Audit region support across different reader hardware variants in the same fleet


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | Region list | Is the deployment region in the list? | Attempting to configure an unsupported region will result in an error or non-compliant behavior. |

        '
      operationId: getSupportedregionlist
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - SupportedRegions
                properties:
                  SupportedRegions:
                    type: array
                    description: List of country/region names supported by the reader.
                    items:
                      type: string
                      description: Supported country/region name.
              example:
