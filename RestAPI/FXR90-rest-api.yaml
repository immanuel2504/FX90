    directionality.v1:
      type: object
      title: directionalitySettings
      description: directionality mode settings
      properties:
        advancedConfig:
          $ref: '#/components/schemas/directionality.v1AdvancedConfig'
        basicConfig:
          $ref: '#/components/schemas/directionality.v1BasicConfig'
      required:
      - advancedConfig
      - basicConfig
    tagidfilter.v1:
      title: tagIdFilter
      type: object
      description: 'Represents filter on the tag id.


        If absent, no filter is used.'
      properties:
        value:
          type: string
          description: "The value to match.\n\n\nFor prefix and suffix filters. Only hex digits are allowed and there must be an even number of hex digits.\n\nWhen prefix filter is used, selects cannot be used. \n\nFor regex filter, C++ STL regex values should be used."
        match:
          type: string
          description: The segment or method of the id to match.
          enum:
          - prefix
          - suffix
          - regex
        operation:
          type: string
          default: include
          enum:
          - include
          - exclude
          description: The filter operation (include/exclude).
      required:
      - value
      - match
      - operation
    gpi.v1:
      title: gpi
      type: object
      properties:
        port:
          type: integer
          minimum: 1
          maximum: 2
          description: GPI Port Number
        signal:
          type: string
          enum:
          - HIGH
          - LOW
          description: Transition to this GPI will trigger event
        debounceTime:
          type: integer
          description: Time (in milliseconds) until GPI must remain at signal level to trigger event
          default: 0
      required:
      - port
      - signal
    antennaStopCondition.v1:
      title: antennaStopCondition
      type: object
      properties:
        type:
          type: string
          enum:
          - DURATION
          - INVENTORY_COUNT
          - GPI
          - SINGLE_INVENTORY_LIMITED_DURATION
          description: Type of Stop Condition
        value:
          oneOf:
          - type: number
          - $ref: '#/components/schemas/gpi.v1'
          description: Value dependent on type
      required:
      - type
      - value
    query.v1:
      title: query
      type: object
      properties:
        tagPopulation:
          type: integer
          minimum: 0
          description: 'Expected number of tags '
        sel:
          type: string
          enum:
          - ALL
          - SL
