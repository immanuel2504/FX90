                                items:
                                  type: object
                                  properties:
                                    address:
                                      type: string
                                      description: Bluetooth device address to match.
                                    addressType:
                                      type: string
                                      description: Bluetooth address type to match.
                                      enum:
                                      - public
                                      - random
                                    name:
                                      type: string
                                      description: Device name to match.
                                    alias:
                                      type: string
                                      description: Device alias to match.
              example:
                ble:
                  enable: true
                  scanIntervalSec: 5
                  protocols:
                    iBeacon:
                      enabled: true
                      filters:
                      - uuid: FDA50693-A4E2-4FB1-AFCF-C6EB07647825
                        major: 10001
                        minor: 20002
                        txPower: -59
                    altBeacon:
                      enabled: true
                      filters:
                      - mfgId: 0118
                        beaconId: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                        major: 4
                        minor: 4
                        refRssi: -100
                    eddystone:
                      enabled: true
                      filters:
                      - frameType: URL
                        txPower: -59
                        url: https://www.zebra.com
                      - frameType: UID
                        txPower: -18
                        namespace: 0102030405060708090A
                        instance: '000000000001'
                      - frameType: EID
                        txPower: -18
                        ephemeralId: 0102030405060708
                    generic:
                      enabled: true
                      filters:
                      - address: 7E:41:25:1E:D5:16
                        addressType: random
                        name: BLEPeripheralApp
                        alias: BLEPeripheralApp
                  additionalFilters:
                    rssi: -80
                    serviceUuids16:
                    - FEAA
                    - FE9B
                    serviceUuids128:
                    - FDA50693-A4E2-4FB1-AFCF-C6EB07647825
      security:
      - bearerAuth: []
tags:
- name: Login
- name: Control
- name: ImpinjGen2X
- name: System
- name: App-led
- name: Gpio
- name: Region
- name: Logs
- name: Date&Time
- name: Certificate
- name: Network
- name: Firmware
- name: userapp
- name: Ble
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    inventorysettings.v1:
      title: inventorySettings
      type: object
      description: Reader settings for inventory mode. If absent, the reader will report each tag on each antenna once per minute.
      properties:
        interval:
          type: object
          description: The time interval (how often) to report each tag
          properties:
            unit:
              type: string
              enum:
              - seconds
              - minutes
              - hours
              - days
            value:
              type: integer
    portalsettings.v1:
      title: portalSettings
      type: object
      description: Reader settings for portal mode.
      properties:
        startTrigger:
          type: object
          description: The GPI trigger to start reads on the portal
          properties:
            port:
              type: integer
              description: The GPI port to signal. If absent, port 1 is used.
            signal:
              type: string
              enum:
              - HIGH
              - LOW
              description: The signal value for the trigger. If absent, signal LOW is used
        stopInterval:
          type: integer
          description: The interval at which to stop reads after the last unique tag is read (seconds). If absent, the reader will stop after not reading a unique tag in 3 seconds
    directionality.v1:
      type: object
      title: directionalitySettings
      description: directionality mode settings
      properties:
        advancedConfig:
          type: object
          description: 'Advanced Directionality Configuration


            NOTE: directionality operating mode is applicable for only ATR7000 reader and Type of operating mode - must be DIRECTIONALITY'
          properties:
            background_processing_interval_seconds:
              type: number
              description: Interval between processing incoming raw messages (in seconds)
              default: 0.5
            debug_level:
              type: string
              description: Set the debug logging level
              default: INFO
              enum:
              - ERROR
              - WARNING
              - INFO
              - DEBUG
            hysteresis_feet:
              type: number
              description: Set the distance (in feet) a tag must travel into a zone to be able to move back into previous zone
              default: 2
              minimum: 0
              maximum: 50
            ma_duration_seconds:
              type: number
              description: Moving Average Window Duration (in seconds). Must be less than tag_timeout_seconds
              default: 3
              minimum: 0
              maximum: 86400
            report_new:
              type: boolean
              description: Report (or do not report) "NEW" events
              default: true
            report_update_duration_seconds:
              type: number
              description: Duration to report tag updates even if no transition (value in seconds) (-1 is never report)
              default: -1
              minimum: -1
              maximum: 86400
            tag_timeout_seconds:
              type: number
              description: Duration until a tag is deemed "gone" (in seconds)
              default: 3
              minimum: 0
              maximum: 86400
            report_transition:
              type: boolean
              description: Report (or do not report) "TRANSITION" events
              default: true
            report_timed_out:
              type: boolean
              description: Report (or do not report) "TIMED_OUT" events
            report_direction:
              type: array
              description: Direction events to report in "TIMED_OUT" event. If "TIMED_OUT" event is enabled only report "TIMED_OUT" if one of the direction events in this list.
              items:
                type: string
                enum:
                - IN
                - OUT
                - NONE
                - UNKNOWN
                - ERROR
            report_zone_history:
              type: boolean
              description: Report (or do not report) zone history in "TIMED_OUT" event
              default: false
            report_raw:
              type: boolean
              description: Report (or do not report) raw bearing/location messages
              default: false
            user_defined:
              description: user defined value (string or object) that will be included in each directionality event
              oneOf:
              - type: string
              - type: object
        basicConfig:
          type: object
          description: 'Basic Directionality Configuration


            NOTE: directionality operating mode is applicable for only ATR7000 reader and Type of operating mode - must be DIRECTIONALITY'
          properties:
            beamConfig:
              oneOf:
              - properties:
                  density:
                    type: object
                    description: Type of density of Beams
                    properties:
                      type:
                        type: string
                        enum:
                        - DENSE
                        - DEFAULT
                        - SPARSE
                        default: DEFAULT
                        description: Type of density of Beams
                      polarization:
                        type: string
                        description: Polarization of beams
                        default: LHCP
                        enum:
                        - TOTAL
                        - THETA
                        - PHI
                        - LHCP
                        - RHCP
                    required:
                    - type
                  beams:
                    type: array
                    description: Array of beams to use
                    items:
                      type: object
                      properties:
                        azimuth:
                          type: integer
                          description: Azimuth of beam (in degrees)
                          minimum: 0
                          exclusiveMaximum: true
                          multipleOf: 5
                          maximum: 360
                        elevation:
                          type: integer
                          description: Elevation of beam (in degrees)
                          minimum: 0
                          maximum: 70
                          multipleOf: 5
                        polarization:
                          type: string
                          description: Polarization of beam
                          default: LHCP
                          enum:
                          - TOTAL
                          - THETA
                          - PHI
                          - RHCP
                          - LHCP
                      required:
                      - azimuth
                      - elevation
              type: object
            innerZoneWidth:
              type: number
              description: The width of the main zones (in feet)
              default: 10
            orientation:
              type: number
              description: Orientation of tag (in degrees)
              default: 0
              minimum: 0
              exclusiveMaximum: true
              maximum: 360
            readerHeight:
              type: number
              description: Height of reader (in feet)
              default: 15
              minimum: 10
              maximum: 20
            tagHeight:
              type: number
              description: Height of tag (in feet)
              default: 3
              minimum: 0
              maximum: 20
            zoneExtension:
              type: number
              description: The extension of the main zone into one another (in feet)
              default: 0
            zoneNames:
              type: array
              description: User defined names to zones. Array must have the same number of zones as specified in the zone plan
              items:
                type: string
                enum:
                - in
                - out
                - right
                - left
            zonePlan:
              type: integer
              description: 4 or 6 zone zone plan
              default: 4
              enum:
              - 4
              - 6
      required:
      - advancedConfig
      - basicConfig
    tagidfilter.v1:
      title: tagIdFilter
      type: object
      description: 'Represents filter on the tag id.


        If absent, no filter is used.'
      properties:
        value:
          type: string
          description: "The value to match.\n\n\nFor prefix and suffix filters. Only hex digits are allowed and there must be an even number of hex digits.\n\nWhen prefix filter is used, selects cannot be used. \n\nFor regex filter, C++ STL regex values should be used."
        match:
          type: string
          description: The segment or method of the id to match.
          enum:
          - prefix
          - suffix
          - regex
        operation:
          type: string
          default: include
          enum:
          - include
          - exclude
          description: The filter operation (include/exclude).
      required:
      - value
      - match
      - operation
    gpi.v1:
      title: gpi
      type: object
      properties:
        port:
          type: integer
          minimum: 1
          maximum: 2
          description: GPI Port Number
        signal:
          type: string
          enum:
          - HIGH
          - LOW
          description: Transition to this GPI will trigger event
        debounceTime:
          type: integer
          description: Time (in milliseconds) until GPI must remain at signal level to trigger event
          default: 0
      required:
      - port
      - signal
    antennaStopCondition.v1:
      title: antennaStopCondition
      type: object
      properties:
        type:
          type: string
          enum:
          - DURATION
          - INVENTORY_COUNT
          - GPI
          - SINGLE_INVENTORY_LIMITED_DURATION
          description: Type of Stop Condition
        value:
          oneOf:
          - type: number
          - $ref: '#/components/schemas/gpi.v1'
          description: Value dependent on type
      required:
      - type
      - value
    query.v1:
      title: query
      type: object
      properties:
        tagPopulation:
          type: integer
          minimum: 0
          description: 'Expected number of tags '
        sel:
          type: string
          enum:
          - ALL
          - SL
          - NOT_SL
          description: Sel field (see EPC Gen2 Spec)
        session:
          type: string
          description: Session Field (see EPC Gen2 Spec)
          enum:
          - S0
          - S1
          - S2
          - S3
        target:
          type: string
          description: Target Field (see EPC Gen2 Spec)
          enum:
          - A
          - B
          - AB
    select.v1:
      title: select
      type: object
      properties:
        target:
          type: string
          enum:
          - SL
          - S0
          - S1
          - S2
          - S3
          description: Target Field (see EPC Gen2 Spec)
        action:
          type: string
          enum:
          - ASSERTSL_DEASSERTSL
          - ASSERTSL_NOTHING
          - NOTHING_DEASSERTSL
          - NEGATESL_NOTHING
          - DEASSERTSL_ASSERTSL
          - DEASSERTSL_NOTHING
          - NOTHING_ASSERTSL
          - NOTHING_NEGATESL
          - INVA_INVB
          - INVA_NOTHING
          - NOTHING_INVB
          - FLIPAB_NOTHING
          - INVB_INVA
          - INVB_NOTHING
          - NOTHING_INVA
          - NOTHING_FLIPAB
          description: Action Field (see EPC Gen2 Spec)
        membank:
          type: string
          enum:
          - EPC
          - TID
          - USER
          - RES
          description: Membank Field (see EPC Gen2 Spec)
        pointer:
          type: integer
          description: Pointer Field (see EPC Gen2 Spec)
        length:
          type: integer
          description: Length Field (see EPC Gen2 Spec)
        mask:
          type: string
          description: 'Mask Field (see EPC Gen2 Spec). The value must be a hex string (only values 0-9 and a-f) and must have an even number of characters. '
        truncate:
          type: integer
          default: 0
          description: Truncate Field (see EPC Gen2 Spec) If absent, truncation is disabled. If non-zero, the value indicates the number of bits to expect in the tag response.
      required:
      - target
      - action
      - membank
      - pointer
      - length
      - mask
    impinjTagQuietingBasic.v1:
      title: impinjTagQuietingBasic
      type: object
      description: Basic TagQuieting configuration for quieting or unquieting specific tags identified by EPC.
      properties:
        action:
          type: string
          description: quiet silences the specified tags for the current inventory round; unquiet restores previously quieted tags.
          enum:
          - quiet
          - unquiet
        tagIDs:
          type: array
          description: Non-empty list of hexadecimal EPC strings identifying the tags to quiet or unquiet.
          minItems: 1
          items:
            type: string
            pattern: ^[0-9A-Fa-f]+$
      required:
      - action
      - tagIDs
    impinjTagQuietingAdvanced.v1:
      title: impinjTagQuietingAdvanced
      type: object
      description: Advanced TagQuieting configuration using Impinj Gen2X proprietary features.
      properties:
        preSelect:
          type: array
          description: Optional array of SELECT operations to position tags into specific session states before applying state-aware SELECT. Maximum 31 items allowed.
          maxItems: 31
          items:
            type: object
            properties:
              target:
                type: string
                description: Session or flag to target.
                enum:
                - S0
                - S1
                - S2
                - S3
                - SL
              action:
                type: string
                description: Action to perform on the target session or flag.
                enum:
                - ASSERTSL_NOTHING
                - DEASSERTSL_NOTHING
                - ASSERTSL_ASSERTSL
                - ASSERTSL_DEASSERTSL
                - DEASSERTSL_ASSERTSL
                - DEASSERTSL_DEASSERTSL
                - NEGSL_NOTHING
                - NOTHING_ASSERTSL
                - NOTHING_DEASSERTSL
                - NOTHING_NEGSL
                - INVA_NOTHING
                - INVB_NOTHING
                - INVA_INVB
                - INVB_INVA
                - INVA_INVA
                - INVB_INVB
                - NOTHING_INVA
                - NOTHING_INVB
              mask:
                type: object
                description: Memory mask for tag selection.
                properties:
                  bank:
                    type: string
                    description: Memory bank to match against.
                    enum:
                    - EPC
                    - TID
                    - USER
                    - RESERVED
                  pointer:
                    type: integer
                    description: Bit offset in memory bank.
                    minimum: 0
                    maximum: 65535
                  length:
                    type: integer
                    description: Number of bits to match.
                    minimum: 1
                    maximum: 255
                  value:
                    type: string
                    description: Hex string value to match (even length, valid hex characters).
                    pattern: ^[0-9A-Fa-f]+$
                required:
                - bank
                - pointer
                - length
                - value
            required:
            - target
            - action
            - mask
        tagQuietMasks:
          type: array
          description: Session-state combinations to check in TID memory. Minimum 1, maximum 3 items. No duplicate session prefixes allowed (e.g., S0A and S0B together).
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum:
            - S0A
            - S0B
            - S2A
            - S2B
            - S3A
            - S3B
            - SL_ASSERT
            - SL_DEASSERT
        target:
          type: string
          description: Which flag to manipulate based on state check.
          enum:
          - SL
          - S0
          - S1
          - S2
          - S3
        stateAwareAction:
          type: string
          description: Action to perform on target flag when tags match the tagQuietMasks pattern.
          enum:
          - ASSERTSL
          - DEASSERTSL
          - ASSERTSL_DEASSERTSL
          - DEASSERTSL_ASSERTSL
          - NEGSL
          - NOT_DEASSERTSL
          - NOT_ASSERTSL
          - NOT_NEGSL
          - INV_A
          - INV_B
          - INV_A_NOT_INV_B
          - INV_B_NOT_INV_A
          - INV_A2BB2A
          - NOT_INV_B
          - NOT_INV_A
          - NOT_INV_A2BB2A
      required:
      - tagQuietMasks
      - target
      - stateAwareAction
    impinjTagQuieting.v1:
      title: impinjTagQuieting
      type: object
      description: Impinj TagQuieting configuration. Exactly one of basic or advanced must be provided.
      oneOf:
      - required:
        - basic
      - required:
        - advanced
      properties:
        basic:
          $ref: '#/components/schemas/impinjTagQuietingBasic.v1'
        advanced:
          $ref: '#/components/schemas/impinjTagQuietingAdvanced.v1'
      additionalProperties: false
    access_cmd_read.v1:
      title: read
      type: object
      properties:
        config:
          type: object
          properties:
            membank:
              type: string
              enum:
              - EPC
              - TID
              - USER
              - RESERVED
              description: Membank Field (see EPC Gen2 Spec)
            wordPointer:
              type: integer
              description: WordPtr Field (see EPC Gen2 Spec)
            wordCounter:
              type: integer
              description: WordPtr Field (see EPC Gen2 Spec)
          required:
          - membank
          - wordPointer
          - wordCounter
        type:
          type: string
          enum:
          - READ
      required:
      - type
    access_cmd_write.v1:
      title: write
      type: object
      properties:
        type:
          type: string
          enum:
          - WRITE
        config:
          type: object
          required:
          - membank
          - wordPointer
          - data
          properties:
            membank:
              type: string
              enum:
              - EPC
              - TID
              - USER
              - RESERVED
              description: Membank Field (see EPC Gen2 Spec)
            wordPointer:
              type: integer
              description: WordPtr Field (see EPC Gen2 Spec)
            data:
              type: string
              description: Data Field (see EPC Gen2 Spec) Hex string indicating the word(s) to be written. Unlike the Gen2 Spec, the length of the data field can be more than a single 16 bit word. However, the length of the string must be a multiple of 16 bit words
            blockSize:
              type: integer
              description: Block size - if set to non-zero value, the reader will use the BlockWrite command set write the data (and not the simple Write command). The value indicates the number of 16-bit words to use for each block
      required:
      - type
      - config
    access_cmd_access.v1:
      title: access
      type: object
      properties:
        type:
          type: string
          enum:
          - ACCESS
        config:
          type: object
          properties:
            password:
              type: string
              description: 'Password Field (see EPC Gen2 Spec)

                Must be a hex string with 8 hex characters. '
          required:
          - password
    access_cmd_lock.v1:
      title: lock
      type: object
      properties:
        type:
          type: string
          enum:
          - LOCK
        config:
          type: object
          required:
          - actions
          properties:
            actions:
              type: array
              description: Payload Field (see EPC Gen2 Spec)
              items:
                type: string
                enum:
                - PERMALOCK_USER_BANK
                - WRITE_LOCK_USER_BANK
                - WRITE_UNLOCK_USER_BANK
                - WRITE_LOCK_TID_BANK
                - WRITE_UNLOCK_TID_BANK
                - PERMALOCK_EPC_BANK
                - WRITE_LOCK_EPC_BANK
                - PERMALOCK_ACCESS_PASSWORD
                - READ_WRITE_LOCK_ACCESS_PASSWORD
                - READ_WRITE_UNLOCK_ACCESS_PASSWORD
                - PERMALOCK_KILL_PASSWORD
                - READ_WRITE_LOCK_KILL_PASSWORD
                - READ_WRITE_UNLOCK_KILL_PASSWORD
      required:
      - config
    access_cmd_kill.v1:
      title: kill
      type: object
      properties:
        type:
          type: string
          enum:
          - KILL
        config:
          type: object
          required:
          - password
          properties:
            password:
              type: string
              description: 'Password Field (see EPC Gen2 Spec)

                Must be a hex string with 8 hex characters. '
      required:
      - type
      - config
    access_cmds.v1:
      title: access_cmds
      type: array
      items:
        anyOf:
        - $ref: '#/components/schemas/access_cmd_read.v1'
        - $ref: '#/components/schemas/access_cmd_write.v1'
        - $ref: '#/components/schemas/access_cmd_access.v1'
        - $ref: '#/components/schemas/access_cmd_lock.v1'
        - $ref: '#/components/schemas/access_cmd_kill.v1'
    delayBetweenAntennaCycles.v1:
      title: delayBetweenAntennaCycles
      type: object
      description: "This introduces a delay between antenna cycles if no tags are read or if no unique tags are read. This allows the reader to share the spectrum if there are no tags to be read. \n\nIf absent, \non the ATR7000 and the FX9600, delayBetweenAntennas cycles is set to wait for 75 mS if no unique tags are read during a antenna cycle.  \non the FX7500, delayBetweenAntennas cycles is set to wait for 75 mS if no tags are read during a antenna cycle. "
      properties:
        type:
          type: string
          enum:
          - DISABLED
          - NO_TAGS
          - NO_UNIQUE_TAGS
          description: Condition under which to delay between antenna cycles
        duration:
          type: integer
          description: Delay between antenna cycles in milliseconds. Will only wait if the type condition (no tags or no unique tags) is met. If the type is DISABLED, duration must be set to 0. If the type is not DISABLED, the value must be set to a non-zero value.
      required:
      - type
      - duration
    tagMetaData.v1:
      title: tagMetaData
      type: array
      description: "Controls the metadata that is sent when a tag is reported\n\n  “ANTENNA” will report the antenna port upon which the tag was inventoried.\n\n  “RSSI” will report the rssi (in dbm) of the inventoried tag. If the tag is only reported occasionally (see reportFilter), this tag will be the peak rssi since the last reported read.\n\n   “PHASE” will report the phase (in degrees) of the inventoried tag. This value will only be reported if each individual tag read is reported (in other words, if reportFilter duration is set to 0). Otherwise, it will not be reported.\n\n  “CHANNEL” will report the channel (in MHz) the reader was using when the tag was inventoried. This value will only be reported if each individual tag read is reported (in other words, if reportFilter duration is set to 0). Otherwise, it will not be reported.\n\n  “SEEN_COUNT” will report the number of times the tag has been inventoried since the previous report. This value will always be 1 if each individual tag read is reported (in other words, if reportFilter duration is set to 0). \n\n  “PC” will report the PC bits of the inventoried tag as a hex string. \n\n  “XPC” will report the XPC bits of the inventoried tag, if present, as a hex string. \n\n  “CRC” will report the CRC bits of the inventoried tag as a hex string.\n\n  “EPC” will report the entire contents of the EPC bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “EPC[1]”. If the first word and the 3-5 word are desired, the value can be set to “EPC[1,3-5]”.\n\n  “TID” will report the entire contents of the TID bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “TID[1]”. If the first word and the 3-5 word are desired, the value can be set to “TID[1,3-5]”.\n\n  “USER” will report the entire contents of the USER bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “TID[1]”. If the first word and the 3-5 word are desired, the value can be set to “TID[1,3-5]”.\n\n  “MAC” will report the MAC Address of the reader reporting the tag.\n\n  “HOSTNAME” will report the hostname of the reader reporting the tag.\n\nThe array may also contain an object or objects. The object must contain a single name value pair with the name being set to “userDefined” or “antennaPortNames”\n\n\nIf absent,\n“SIMPLE” mode does not report any additional meta data, “PORTAL” and “CONVEYOR” modes reports “ANTENNA”, and “INVENTORY” mode reports “ANTENNA”, “RSSI”, and “SEEN_COUNT”.\n"
      items:
        oneOf:
        - type: string
          enum:
          - RSSI
          - PHASE
          - SEEN_COUNT
          - ANTENNA
          - CHANNEL
          - PC
          - XPC
          - CRC
          - EPC
          - TID
          - USER
          - RESERVED
          - MAC
          - HOSTNAME
        - type: object
          properties:
            userDefined:
              type: string
              description: A user defined field to report each time a tag is reported
            antennaPortNames:
              type: array
              description: 'Used to give antenna ports descriptive names

                Length of array must match the number of antenna ports on the device'
              items:
                type: string
    radioStartConditions.v1:
      title: radioStartConditions
      type: object
      description: "Controls when, after a “start” is issued, the radio starts trying to inventory tags. \n\nIf absent, the radio will immediately begin inventorying tags upon a \"start\" command. "
      properties:
        type:
          type: string
          enum:
          - GPI
          - GPI_WITH_RESTART
        gpis:
          type: array
          description: List of GPI pins used to trigger radio start
          items:
            $ref: '#/components/schemas/gpi.v1'
    radioStopConditions.v1:
      title: radioStopConditions
      type: object
      description: "Controls when an ongoing operation completes. \n\nIf absent, the radio will continue trying to inventory tags until a \"stop\" is issued."
      properties:
        duration:
          type: integer
          description: Time to run until radio stops (in seconds)
          format: int32
        antennaCycles:
          type: integer
          description: The number of cycles through all enabled antennas before stopping the radio
          format: int32
        tagCount:
          type: integer
          description: The number of tags to inventory until the radio stops. Cannot be set at the same time as durationAfterNoMoreUniqueTags
          format: int32
        durationAfterNoMoreUniqueTags:
          type: integer
          description: Duration (in seconds) after not inventorying any more unique tags to stop the radio. Cannot be set at the same time as tagCount
          format: int32
        gpis:
          type: array
          items:
            $ref: '#/components/schemas/gpi.v1'
    tagReportFilter.v1:
      title: reportFilter
      type: object
      description: 'Controls when and how often a tag is reported


        NOTE: This cannot be set while in "INVENTORY" mode. Setting the modeSpecificSetting for interval must be used in "INVENTORY" mode.


        If absent, each mode uses a different default.


        "SIMPLE": report tag read once.


        "PORTAL" and "CONVEYOR": report each tag the first time it is read on each antenna.'
      properties:
        duration:
          type: integer
          description: "Duration (in seconds) to wait to report a tag again once it has already been reported\nIt should be noted that the way the filter works is that as long as the tag is being read by the reader, it will not report unless the time since the previous report of this tag on this antenna meets the type and duration. \nDuration is a uint32 value and the max value is bound by the data type. "
          format: int32
          minimum: 0
        type:
          type: string
          enum:
          - RADIO_WIDE
          - PER_ANTENNA
          description: "Configures the timeout (in seconds) by antenna or for entire radio \n"
        addl_keys:
          title: addl_keys
          type: array
          description: 'Filters tag reports based on additional configured keys.


            In order to add additional keys, the tag metadata must be configured to report "TID", "PC" and "CRC".

            However, if the radio type is set to PER_ANTENNA, the "ANTENNA" field must also be added to tag metadata.'
          items:
            type: string
            enum:
            - TID
      required:
      - duration
      - type
    rssiFilter.v1:
      title: rssiFilter
      type: object
      description: 'Tag with RSSI below threshold will not be inventoried by the radio


        If absent, rssi filter is not used.'
      properties:
        threshold:
          type: integer
          description: Threshold (in dbm) below which the radio will ignore a tag response
          format: int32
          minimum: -128
          maximum: -20
    operatingMode.v1:
      title: operatingMode
      type: object
      description: Represents the reader operating mode.
      properties:
        type:
          type: string
          enum:
          - SIMPLE
          - INVENTORY
          - PORTAL
          - CONVEYOR
          - CUSTOM
          - DIRECTIONALITY
          description: 'The type of mode of operation '
          default: SIMPLE
        modeSpecificSettings:
          oneOf:
          - $ref: '#/components/schemas/inventorysettings.v1'
          - $ref: '#/components/schemas/portalsettings.v1'
          - $ref: '#/components/schemas/directionality.v1'
        environment:
          type: string
          enum:
          - LOW_INTERFERENCE
          - HIGH_INTERFERENCE
          - VERY_HIGH_INTERFERENCE
          - AUTO_DETECT
          - DEMO
          description: "\n\n\n\n\n  The type of environment in which the reader operates. Along with the regulatory configuration of the reader, the environment parameter will set the default link profile parameters (i.e., Miller mode, BLF, Tari, etc.) and the receiver dynamic range (interference immunity).\n\n  LOW_INTERFERENCE:  The reader is operating in an environment when the likelihood of interference is very low or only occurs for very brief periods of time (defined as a single interrogator environment in the Gen2 and ISO standards).\n\n  HIGH_INTERFERENCE: The reader is operating in the presence of other readers (defined as a multi-interrogator or dense interrogator environment in the Gen2 and ISO standards).\n\n  VERY_HIGH_INTERFERENCE: The reader is operating in an environment where the number of readers is greater than the number of available channels, or when interfering readers are in very close proximity to each other.\n\n  AUTO_DETECT: This will cause the reader to try and assess the environment and adjust accordingly. \n\n  DEMO: Should be used when demonstrating the maximum performance (fastest read rate) of a reader. This assumes no other readers in the environment.\n\n  If absent, the environment is set to HIGH_INTERFERENCE"
          default: HIGH_INTERFERENCE
        antennas:
          type: array
          description: "\n\n\n\n\n An array of integers representing the antenna ports to use to read tags. For ATR, the integers represent beam numbers. \n\n If absent, all antennas ports are used; for the ATR, a set of 38 beams are used."
          items:
            type: integer
        filter:
          $ref: '#/components/schemas/tagidfilter.v1'
        transmitPower:
          oneOf:
          - type: number
            description: Single value applies to all antennas
          - type: array
            description: 'Each value applies to each antenna in the antennas array

              Array length must match antennas array length'
            items:
              type: number
          description: "\n\n\n\n\n Desired Transmit Power (in dbm).\n\n If absent, the value is set to 27 dbm; for the ATR, the value is set to 36 dbm EIRP."
        antennaStopCondition:
          oneOf:
          - $ref: '#/components/schemas/antennaStopCondition.v1'
          - type: array
            description: 'Each value applies to each antenna in the antennas array

              Array length must match antennas array length'
            items:
              $ref: '#/components/schemas/antennaStopCondition.v1'
          description: "\n\n\n\n\n Stop Condition for antennas. \n\n If absent, the antenna stop condition is set to run a single inventory round for no longer than 1/N seconds. Where N is the number of enabled antennas."
        query:
          oneOf:
          - $ref: '#/components/schemas/query.v1'
          - type: array
            description: 'Each value applies to each antenna in the antennas array

              Array length must match antennas array length'
            items:
              $ref: '#/components/schemas/query.v1'
          description: "\n\n\n\n\n Gen2 query parameters. See Gen2 spec for details.\n\n If absent, \"sel\" is set to ALL, session is set to 1, target is set to A, and tag population set to 1."
        selects:
          description: "\n\n\n\n\n Gen2 select parameters. See Gen2 spec for details.\n\n If absent, no select will be issued. Cannot be set when filter with prefix type is also set. \n\n If there is an array of select objects, all of the selects in the array will be applied to all antennas.\n \n If there is an array of array of select objects, each array of select objects will apply to each antenna. The array of arrays must have the same number of entries as the antennas array."
          oneOf:
          - type: array
            items:
              $ref: '#/components/schemas/select.v1'
          - type: array
            items:
              type: array
              items:
                $ref: '#/components/schemas/select.v1'
        delayAfterSelects:
          type: integer
          minimum: 0
          maximum: 65
          description: 'Duration in milliseconds to wait after issuing the final select before issuing a query. If absent, the minimum time will be used. '
        accesses:
          description: "\n\n\n\n\n Gen2 access parameters. See Gen2 spec for details.\n\n If absent, no access will be issued. \n\n If there is an array of access objects, all of the accesses in the array will be applied to all antennas.\n \n If there is an array of array of access objects, each array of access objects will apply to each antenna. The array of arrays must have the same number of entries as the antennas array."
          oneOf:
          - $ref: '#/components/schemas/access_cmds.v1'
          - type: array
            items:
              $ref: '#/components/schemas/access_cmds.v1'
        delayBetweenAntennaCycles:
          $ref: '#/components/schemas/delayBetweenAntennaCycles.v1'
        tagMetaData:
          $ref: '#/components/schemas/tagMetaData.v1'
        radioStartConditions:
          $ref: '#/components/schemas/radioStartConditions.v1'
        radioStopConditions:
          $ref: '#/components/schemas/radioStopConditions.v1'
        reportFilter:
          $ref: '#/components/schemas/tagReportFilter.v1'
        rssiFilter:
          $ref: '#/components/schemas/rssiFilter.v1'
        beams:
          type: array
          description: Array of beams to use
          items:
            type: object
            properties:
              azimuth:
                type: integer
                description: Azimuth of beam (in degrees)
                multipleOf: 5
                maximum: 360
                minimum: 0
              elevation:
                type: integer
                description: Elevation of beam (in degrees)
                multipleOf: 5
                minimum: 0
                maximum: 70
              polarization:
                type: string
                description: Polarization of beam
                default: LHCP
                enum:
                - TOTAL
                - THETA
                - PHI
                - RHCP
                - LHCP
            required:
            - azimuth
            - elevation
      required:
      - type
    actionBlink.v1:
      title: Action Blink Configuration
      type: object
      description: action blink configuration for GPO or LED
      properties:
        'ON':
          type: number
          minimum: 0
          description: SET GPO or LED to desired state for ON (milliseconds) duration
        'OFF':
          type: number
          minimum: 0
          description: Toggle GPO or LED for OFF(milliseconds) duration
        DURATION:
          type: number
          minimum: 0
          description: Total duration in milliseconds to perform blink. 0 will blink GPO or LED forever
      required:
      - 'ON'
      - 'OFF'
      - DURATION
    conditionsArray.v1:
      type: array
      title: Conditions Array
      description: 'Predefined conditions


        IS_CLOUD_CONNECTED  : Condition will be true when reader is successfully connected to Cloud.


        ~IS_CLOUD_CONNECTED : Condition will be true when reader lost Cloud connectivity.


        IS_RADIO_ONGOING    : Condition will be true when the reader is currently performing or has started an inventory operation.


        ~IS_RADIO_ONGOING   : Condition will be true when the reader is not performing inventory or has stopped an inventory operation.'
      uniqueItems: true
      minItems: 0
      items:
        type: string
        enum:
        - IS_CLOUD_CONNECTED
        - ~IS_CLOUD_CONNECTED
        - IS_RADIO_ONGOING
        - ~IS_RADIO_ONGOING
    actionConditions.v1:
      oneOf:
      - $ref: '#/components/schemas/conditionsArray.v1'
      - type: object
        properties:
          operator:
            type: string
            enum:
            - and
            - or
            description: Operator to be used for conditions validation
          operands:
            $ref: '#/components/schemas/conditionsArray.v1'
      title: Action Conditions
      description: 'Predefined conditions to trigger GPO or LED actions


        Default "and" operator is used when array of conditions is provided.


        operator "and": Action is performed only when all the conditions provided is true.

        operator "or": Action is performed only when one of the conditions provided is true.'
    gpoAction.v1:
      title: GPO Action
      type: object
      description: 'Configuration to define operations on single GPO.


        GPO Action will be skipped if conditions provided is not satisfied.'
      properties:
        type:
          type: string
          enum:
          - GPO
          description: Action type
        pin:
          type: number
          description: GPO pin number
          enum:
          - 1
          - 2
          - 3
          - 4
        state:
          type: string
          enum:
          - HIGH
          - LOW
          description: Desired GPO pin state
        postActionState:
          type: string
          enum:
          - HIGH
          - LOW
          description: Desired GPO pin state after action execution completed
        blink:
          $ref: '#/components/schemas/actionBlink.v1'
        conditions:
          $ref: '#/components/schemas/actionConditions.v1'
      required:
      - type
      - pin
      - state
    ledAction.v1:
      title: LED Action
      type: object
      description: 'Configuration to define operations on single LED.


        LED Action will be skipped if conditions provided is not satisfied.'
      properties:
        type:
          type: string
          description: Action type
          enum:
          - LED
        led:
          type: number
          description: LED number
          enum:
          - 1
          - 2
          - 3
        color:
          type: string
          description: Desired LED color
          enum:
          - RED
          - AMBER
          - GREEN
        postActionColor:
          type: string
          description: Desired LED color after action expired
          enum:
          - GREEN
          - RED
          - AMBER
        blink:
          $ref: '#/components/schemas/actionBlink.v1'
        conditions:
          $ref: '#/components/schemas/actionConditions.v1'
      required:
      - type
      - led
      - color
    gpoledAction.v1:
      title: GPO-LED Action
      type: array
      description: Array of GPO or LED actions. Actions will be performed sequentially.
      items:
        anyOf:
        - $ref: '#/components/schemas/gpoAction.v1'
        - $ref: '#/components/schemas/ledAction.v1'
    GPIOLEDConfig.v1:
      title: GPIO-LED configuration
      type: object
      description: 'GPIO-LED module configuration


        Configure GPO and LED behaviour based on Events generated


        Supported Events:

        1. GPI_1_L: event raised when GPI 1 changed from HIGH to LOW

        2. GPI_1_H: event raised when GPI 1 changed from LOW to HIGH

        3. GPI_2_L: event raised when GPI 2 changed from HIGH to LOW

        4. GPI_2_H: event raised when GPI 2 changed from LOW to HIGH

        5. CLOUD_DISCONNECT: event raised when reader is disconnected from cloud

        6. CLOUD_CONNECT: event raised when reader is connected to cloud

        7. TAG_READ: event raised when a tag is read

        8. RADIO_START: event raised when inventory operation started using START API

        9. RADIO_STOP: event raised when inventory operation stopped using STOP API'
      properties:
        GPODefaults:
          type: object
          description: GPO default configurations
          properties:
            '1':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 1
            '2':
              type: string
              enum:
              - LOW
              - HIGH
              description: set default state for GPO pin 2
            '3':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 3
            '4':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 4
        LEDDefaults:
          type: object
          description: LED default configurations
          properties:
            '1':
              type: string
              enum:
              - GREEN
              - RED
              - AMBER
              description: set default color for LED 2
            '2':
              type: string
              enum:
              - GREEN
              - RED
              - AMBER
              description: set default color for LED 3
            '3':
              type: string
              enum:
              - RED
              - GREEN
              - AMBER
              description: set default color for LED 4
        GPI_1_H:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_1_L:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_2_H:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_2_L:
          $ref: '#/components/schemas/gpoledAction.v1'
        CLOUD_DISCONNECT:
          $ref: '#/components/schemas/gpoledAction.v1'
        CLOUD_CONNECT:
          $ref: '#/components/schemas/gpoledAction.v1'
        TAG_READ:
          $ref: '#/components/schemas/gpoledAction.v1'
        RADIO_START:
          $ref: '#/components/schemas/gpoledAction.v1'
        RADIO_STOP:
          $ref: '#/components/schemas/gpoledAction.v1'
    eventsConfig.v1:
      description: Asynchronous management events configuration
      type: object
      title: Management Events Configuration
      properties:
        errors:
          type: object
          description: Asynchronous Management Errors
          properties:
            cpu:
              type: object
              description: CPU Usage Error Alerts
              properties:
                threshold:
                  type: number
                  description: Error CPU usage limit
                  default: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  default: 1800
                  minimum: 1
                  description: Error Report Interval in seconds.
              required:
              - threshold
            flash:
              type: object
              description: Flash Usage Error Alerts
              properties:
                threshold:
                  type: number
                  description: Error FLASH usage limit
                  default: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  description: Error Report Interval in seconds.
                  default: 1800
                  minimum: 1
              required:
              - threshold
            ram:
              type: object
              description: RAM Usage Error Alerts
              properties:
                threshold:
                  type: number
                  description: Error RAM usage limit
                  default: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  description: Error Report Interval in seconds.
                  default: 1800
                  minimum: 1
              required:
              - threshold
            reader_gateway:
              type: boolean
              default: true
              description: Reader Gateway Errors
            antenna:
              type: boolean
              description: Antenna Connect/Disconnect Alerts
              default: true
            database:
              type: boolean
              default: true
              description: Radio Database Error Alerts
            radio:
              type: boolean
              default: true
              description: Radio Error Alerts
            radio_control:
              type: boolean
              default: true
              description: Radio Control Error Alerts
        warnings:
          type: object
          description: Asynchronous Management Warnings
          properties:
            cpu:
              type: object
              description: CPU Usage Warning Alerts
              properties:
                threshold:
                  type: number
                  description: Warning CPU usage limit
                  default: 80
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  default: 1800
                  minimum: 1
                  description: Warning Report Interval in seconds.
              required:
              - threshold
            flash:
              type: object
              description: Flash Usage Warning Alerts
              properties:
                threshold:
                  type: number
                  description: Warning FLASH usage limit
                  default: 80
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  description: Warning Report Interval in seconds.
                  default: 1800
                  minimum: 1
              required:
              - threshold
            ram:
              type: object
              description: RAM Usage Warning Alerts
              properties:
                threshold:
                  type: number
                  description: Warning RAM usage limit
                  default: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  description: Warning Report Interval in seconds.
                  default: 1800
                  minimum: 1
              required:
              - threshold
            ntp:
              description: NTP Warning Alert
              oneOf:
              - type: object
                description: NTP offset warnings config
                properties:
                  threshold:
                    type: number
                    description: NTP offset threshold
                  reportIntervalInSec:
                    type: number
                    description: Warning Report Interval in seconds.
                required:
                - threshold
              - type: boolean
                description: NTP sync warning alerts
                default: true
            temperature:
              type: object
              description: Reader temperature warning limits
              properties:
                ambient:
                  type: number
                  description: Ambient temperature limit
                  default: 75
                pa:
                  type: number
                  description: PA temperature limit
                  default: 105
              required:
              - ambient
              - pa
            database:
              type: boolean
              default: true
              description: Radio Database warnings
            radio_api:
              type: boolean
              default: true
              description: NGE warnings
            radio_control:
              type: boolean
              default: true
              description: Radio Control warnings
            reader_gateway:
              type: boolean
              default: true
              description: Reader Gateway Errors
        heartbeat:
          type: object
          description: Asynchronous Heartbeat Events
          properties:
            fields:
              type: object
              description: heartbeat fields
              properties:
                radio_control:
                  type: array
                  description: Radio Control related heartbeat events
                  items:
                    type: string
                    enum:
                    - ANTENNAS
                    - RADIO_ACTIVITY
                    - RADIO_CONNECTION
                    - CPU
                    - RAM
                    - UPTIME
                    - NUM_ERRORS
                    - NUM_WARNINGS
                    - NUM_TAG_READS
                    - NUM_TAG_READS_PER_ANTENNA
                    - NUM_DATA_MESSAGES_TXED
                    - NUM_RADIO_PACKETS_RXED
                reader_gateway:
                  type: array
                  items:
                    type: string
                    enum:
                    - NUM_DATA_MESSAGES_RXED
                    - NUM_DATA_MESSAGES_TXED
                    - NUM_DATA_MESSAGES_RETAINED
                    - NUM_DATA_MESSAGES_DROPPED
                    - NUM_MANAGEMENT_EVENTS_TXED
                    - CPU
                    - RAM
                    - UPTIME
                    - NUM_ERRORS
                    - NUM_WARNINGS
                system:
                  type: array
                  items:
                    type: string
                    enum:
                    - CPU
                    - FLASH
                    - NTP
                    - RAM
                    - SYSTEMTIME
                    - TEMPERATURE
                    - UPTIME
                    - HOSTNAME
                    - MACADDRESS
                userapps:
                  type: array
                  items:
                    type: string
                    enum:
                    - STATUS
                    - CPU
                    - RAM
                    - UPTIME
                    - NUM_DATA_MESSAGES_RXED
                    - NUM_DATA_MESSAGES_TXED
                    - INCOMING_DATA_BUFFER_PERCENTAGE_REMAINING
                    - OUTGOING_DATA_BUFFER_PERCENTAGE_REMAINING
                userDefined:
                  type: object
                  description: Custom user defined field
            interval:
              type: number
              description: heartbeat report interval in seconds
              default: 60
          required:
          - fields
          - interval
        gpiEvents:
          type: boolean
          description: GPI Events
          default: true
        userappEvents:
          type: boolean
          default: true
          description: Asynchronous events from user applications
    setModeResponse:
      type: string
    getReaderCapabilitiesResponse:
      title: success
      type: object
      description: Defines the capabilities present on the reader
      properties:
        capabilities:
          type: object
          required:
          - antennas
          - apiSupported
          - appLEDColors
          - asyncManagementEventsSupported
          - beepersSupported
          - clockSupport
          - daAppPackageFormat
          - daAppsSupported
          - daLanguageBindings
          - directionalitySupported
          - endpointTypesSupported
          - externalSerialPort
          - keypadSupport
          - llrpSupported
          - maxAppLEDs
          - maxDataEndpoints
          - maxNumOperationsInAccessSequence
          - maxNumPreFilters
          - messageFormatsSupported
          - networkInterfaces
          - numGPIs
          - numGPOs
          - restAPISupported
          - rssiFilterSupported
          - supportedDisplayType
          - supportedPowerSource
          - supportedTagDataFormat
          - tagLocationingSupported
          - triggers
          properties:
            antennas:
              type: array
              minItems: 1
              maxItems: 8
              items:
                type: object
                description: Port and type of each antenna.
                properties:
                  port:
                    type: integer
                    minimum: 1
                    maximum: 8
                    description: Port Number
                  type:
                    type: string
                    description: Type of antenna port.
                    enum:
                    - external
                    - internal
                required:
                - port
                - type
            apiSupported:
              type: object
              required:
              - versions
              properties:
                versions:
                  type: array
                  description: API version information.
                  minItems: 1
                  items:
                    type: object
                    required:
                    - documentation
                    - version
                    properties:
                      documentation:
                        type: string
                        description: Link to API documentation.
                      version:
                        type: string
                        description: API version.
                        enum:
                        - v1
            appLEDColors:
              type: array
              description: Possible app LED colors.
              minItems: 1
              items:
                type: string
                enum:
                - RED
                - GREEN
                - AMBER
            asyncManagementEventsSupported:
              type: boolean
              description: Denotes if the reader supports asynchronous management events.
            beepersSupported:
              type: boolean
              description: Denotes if the reader supports beepers.
            clockSupport:
              type: boolean
              description: Denotes if the reader supports clock.
            daAppPackageFormat:
              type: array
              minItems: 1
              description: DA application package formats supported by the reader.
              items:
                type: string
                enum:
                - DEBIAN
            daAppsSupported:
              type: boolean
              description: Denotes if the reader supports DA applications.
            daLanguageBindings:
              type: array
              description: DA application languages supported by the reader.
              minItems: 1
              items:
                type: string
                enum:
                - PYTHON
                - NODEJS
            directionalitySupported:
              type: boolean
              description: Denotes if the reader supports directionality.
            endpointTypesSupported:
              type: array
              description: Types of endpoints supported by the reader.
              items:
                type: object
                properties:
                  SSLSupported:
                    type: boolean
                    description: Denotes if the reader supports SSL.
                  authenticationTypesSupported:
                    type: array
                    minItems: 1
                    description: Types of authentication supported by the reader.
                    items:
                      type: string
                      enum:
                      - MTLS
                      - TLS
                      - BASIC
                      - DIGEST
                      - NTLM
                      - ONLY
                      - DIGEST_IE
                      - NTLM_WB
                      - ANY
                      - ANYSAFE
                  batchingSupported:
                    type: boolean
                    description: Denotes if the reader supports batching.
                  dataOnly:
                    type: boolean
                    description: Denotes if the endpoint is configured for data only.
                  retentionSupported:
                    type: boolean
                    description: Denotes if the reader supports retention.
                  type:
                    type: string
                    description: Type of endpoint.
                    enum:
                    - MQTT
                    - MQTT_WS
                    - TCPIP
                    - WEBSOCKET
                    - AWS_IOT_CORE
                    - HTTP
                    - AZURE_IOT_HUB
                required:
                - SSLSupported
                - authenticationTypesSupported
                - batchingSupported
                - dataOnly
                - retentionSupported
                - type
            externalSerialPort:
              type: array
              description: Serial port interfaces supported by the reader.
              items:
                type: string
                enum:
                - NONE
            keypadSupport:
              type: array
              description: Types of keypads supported by the reader.
              items:
                type: string
                enum:
                - NONE
            llrpSupported:
              type: boolean
              description: Denotes if the reader supports LLRP.
            maxAppLEDs:
