                    - hostName: my-laptop
                      IP: 192.168.43.2
                      MAC: AA:BB:CC:DD:EE:FF
      security:
      - bearerAuth: []
    put:
      tags:
      - Network
      summary: Updates reader network configuration
      description: 'MQTT API :-  set_network <br> Updates the reader network configuration settings. Only one interface key (`eth0`, `mlan0`, `bnep0`, `wan0`, or `uap0`) may be present per request.

        '
      operationId: updateNetwork
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Exactly one interface key must be provided.
              properties:
                eth0:
                  type: object
                  description: Ethernet interface configuration.
                  properties:
                    IPV4:
                      type: object
                      description: IPv4 settings.Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
                      properties:
                        dhcp:
                          type: boolean
                          description: Enable/disable DHCP for IPv4 on this interface.
                        ipAddress:
                          type: string
                          description: Static IPv4 address (required if dhcp is false).
                        gatewayAddress:
                          type: string
                          description: IPv4 gateway address (required if dhcp is false).
                        subnetMask:
                          type: string
                          description: IPv4 subnet mask (required if dhcp is false).
                        dnsAddress:
                          type: string
                          description: IPv4 DNS address (required if dhcp is false).
                        domainName:
                          type: string
                          description: IPv4 domain name (required if dhcp is false).
                    IPV6:
                      type: object
                      description: IPv6 settings. Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
                      properties:
                        dhcp:
                          type: boolean
                          description: Enable/disable DHCP for IPv6 on this interface.
                        ipAddress:
                          type: string
                          description: Static IPv6 address (required if dhcp is false).
                        gatewayAddress:
                          type: string
                          description: IPv6 gateway address (required if dhcp is false).
                        prefix:
                          type: string
                          description: IPv6 prefix (required if dhcp is false).
                        dnsAddress:
                          type: string
                          description: IPv6 DNS address (required if dhcp is false).
                        domainName:
                          type: string
                          description: IPv6 domain name (required if dhcp is false).
                    security:
                      type: object
                      description: 'Ethernet security settings. Set `enabled: true` to enable security. When enabled, include the appropriate security object: `802_1xEAP` for 802.1X authentication.

                        '
                      properties:
                        enable:
                          type: boolean
                          description: Enable/disable security on this interface.
                        802_1xEAP:
                          type: object
                          description: 802.1X EAP security configuration (when enabled and securityType is 802_1xEAP).
                          properties:
                            authentication:
                              type: string
                              description: 'EAP authentication method: TLS, TTLS, or PEAP.'
                              enum:
                              - TLS
                              - TTLS
                              - PEAP
                            innerAuthentication:
                              type: string
                              description: 'Inner authentication method (for TTLS/PEAP): TLS or MSCHAPv2.'
                              enum:
                              - TLS
                              - MSCHAPv2
                            username:
                              type: string
                              description: Username (for TTLS/PEAP with MSCHAPv2).
                            password:
                              type: string
                              description: Password (for TTLS/PEAP with MSCHAPv2).
                            certificate:
                              type: string
                              description: Client certificate name (for TLS-based methods).
                    enable:
                      type: boolean
                      description: Enable/disable the ethernet interface.
                mlan0:
                  type: object
                  description: WiFi station interface configuration.
                  properties:
                    IPV4:
                      type: object
                      description: IPv4 settings. Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
                      properties:
                        dhcp:
                          type: boolean
                          description: Enable/disable DHCP for IPv4 on this interface.
                        ipAddress:
                          type: string
                          description: Static IPv4 address (required if dhcp is false).
                        gatewayAddress:
                          type: string
                          description: IPv4 gateway address (required if dhcp is false).
                        subnetMask:
                          type: string
                          description: IPv4 subnet mask (required if dhcp is false).
                        dnsAddress:
                          type: string
                          description: IPv4 DNS address (required if dhcp is false).
                        domainName:
                          type: string
                          description: IPv4 domain name (required if dhcp is false).
                    IPV6:
                      type: object
                      properties:
                        dhcp:
                          type: boolean
                          description: Enable/disable DHCP for IPv6 on this interface.
                        ipAddress:
                          type: string
                          description: Static IPv6 address (required if dhcp is false).
                        gatewayAddress:
                          type: string
                          description: IPv6 gateway address (required if dhcp is false).
                        prefix:
                          type: string
                          description: IPv6 prefix (required if dhcp is false).
                        dnsAddress:
                          type: string
                          description: IPv6 DNS address (required if dhcp is false).
                        domainName:
                          type: string
                          description: IPv6 domain name (required if dhcp is false).
                    accesspoint:
                      type: object
                      required:
                      - essid
                      - connect
                      properties:
                        essid:
                          type: string
                          description: SSID of the WiFi network to connect to.
                        connect:
                          type: boolean
                          description: Whether to immediately connect to this access point.
                        autoConn:
                          type: boolean
                          description: Whether to automatically reconnect on subsequent boots.
                        security:
                          type: object
                          description: 'WiFi security settings. Set `enable: true` to enable security. Include exactly ONE of the following: `WPA2Personal` or `WPA2Enterprise`. Do NOT include both in the same request.

                            '
                          properties:
                            enable:
                              type: boolean
                              description: Enable/disable security on this access point.
                            WPA2Personal:
                              type: object
                              description: WPA2 Personal (PSK) security options.
                              properties:
                                password:
                                  type: string
                                  description: Pre-shared key / passphrase.
                            WPA2Enterprise:
                              type: object
                              description: WPA2 Enterprise (802.1X EAP) security options.
                              properties:
                                authentication:
                                  type: string
                                  description: 'EAP authentication method: TLS, TTLS, or PEAP.'
                                  enum:
                                  - TLS
                                  - TTLS
                                  - PEAP
                                innerAuthentication:
                                  type: string
                                  description: 'Inner authentication method (for TTLS/PEAP): TLS or MSCHAPv2.'
                                  enum:
                                  - TLS
                                  - MSCHAPv2
                                username:
                                  type: string
                                  description: Username (for TTLS/PEAP with MSCHAPv2).
                                password:
                                  type: string
                                  description: Password (for TTLS/PEAP with MSCHAPv2).
                                certificate:
                                  type: string
                                  description: Client certificate name (for TLS-based methods). Certificate validity is verified via certificate manager.
                    enable:
                      type: boolean
                      description: Enable/disable the WiFi station interface.
                bnep0:
                  type: object
                  description: Bluetooth PAN interface configuration.
                  required:
                  - dhcpStartAddress
                  - dhcpEndAddress
                  - discoverable
                  - pairable
                  - passKey
                  - usePassKey
                  - enable
                  properties:
                    dhcpStartAddress:
                      type: string
                      description: Start of the DHCP address range served to connected Bluetooth clients.
                    dhcpEndAddress:
                      type: string
                      description: End of the DHCP address range served to connected Bluetooth clients.
                    discoverable:
                      type: boolean
                      description: Enable/disable Bluetooth discoverable mode.
                    pairable:
                      type: boolean
                      description: Enable/disable Bluetooth pairable mode (accepting new pairing requests).
                    passKey:
                      type: string
                      description: Bluetooth pairing passkey.
                    usePassKey:
                      type: boolean
                      description: Enable/disable the use of a Bluetooth pairing passkey.
                    enable:
                      type: boolean
                      description: Enable/disable the Bluetooth interface.
                wan0:
                  type: object
                  description: WAN / cellular interface configuration.
                  required:
                  - activeSim
                  - enable
                  properties:
                    activeSim:
                      type: string
                      description: Active SIM slot to configure.
                      enum:
                      - psim
                      - esim
                    psim:
                      type: object
                      description: Physical SIM settings. Required when `activeSim` is `psim`.
                      properties:
                        apn:
                          type: string
                          description: Access Point Name.
                        preferredNetworkType:
                          type: string
                          description: Preferred cellular network type.
                        enableIPv6:
                          type: boolean
                          description: Enable/disable IPv6.
                    esim:
                      type: object
                      description: Embedded SIM settings. Required when `activeSim` is `esim`.
                      properties:
                        apn:
                          type: string
                          description: Access Point Name.
                        preferredNetworkType:
                          type: string
                          description: Preferred cellular network type.
                        enableIPv6:
                          type: boolean
                          description: Enable/disable IPv6.
                    enable:
                      type: boolean
                uap0:
                  type: object
                  description: WiFi Hotspot (Access Point) interface configuration.
                  required:
                  - ssid
                  - ssidPassword
                  - isHidden
                  - securityType
                  - enable
                  properties:
                    ssid:
                      type: string
                      description: Hotspot SSID name.
                    ssidPassword:
                      type: string
                      description: Hotspot password.
                    isHidden:
                      type: boolean
                      description: Set to true to hide the SSID from broadcast.
                    securityType:
                      type: string
                      description: Security protocol for the hotspot.
                      enum:
                      - WPA2Personal
                      - WPA3Personal
                    countryCode:
                      type: string
                      description: Two-letter ISO 3166-1 country code for regulatory compliance.
                    enable:
                      type: boolean
            examples:
              set_Network_ethernet_dhcp:
                summary: Ethernet — DHCP
                value:
                  eth0:
                    IPV4:
                      dhcp: true
                    enable: true
              set_Network_ethernet_static:
                summary: Ethernet — static IP
                value:
                  eth0:
                    IPV4:
                      dhcp: false
                      dnsAddress: 10.233.1.200
                      domainName: zlab.com
                      gatewayAddress: 10.233.46.2
                      ipAddress: 10.233.46.47
                      subnetMask: 255.255.255.0
                    enable: true
              set_Network_ethernet_8021x:
                summary: Ethernet — 802.1X (TLS)
                value:
                  eth0:
                    security:
                      enable: true
                      802_1xEAP:
                        authentication: TLS
                        certificate: my-client-cert
                    enable: true
              set_Network_ethernet_8021x_ttls_mschapv2:
                summary: Ethernet — 802.1X (TTLS/MSCHAPv2)
                value:
                  eth0:
                    security:
                      enable: true
                      802_1xEAP:
                        authentication: TTLS
                        innerAuthentication: MSCHAPv2
                        username: john.doe
                        password: secret
                    enable: true
              set_Network_wifi_dhcp:
                summary: WiFi — DHCP
                value:
                  mlan0:
                    IPV4:
                      dhcp: true
                    enable: true
              set_Network_wifi_static:
                summary: WiFi — static IP
                value:
                  mlan0:
                    IPV4:
                      dhcp: false
                      dnsAddress: 10.233.1.200
                      domainName: zlab.com
                      gatewayAddress: 10.233.46.2
                      ipAddress: 10.233.46.47
                      subnetMask: 255.255.255.0
                    enable: true
              set_Network_wifi_security_wpa2personal:
                summary: WiFi — WPA2 Personal
                value:
                  mlan0:
                    accesspoint:
                      autoConn: true
                      connect: true
                      essid: Redmi Note 12 5G
                      security:
                        enable: true
                        WPA2Personal:
                          password: '12345678'
                    enable: true
              set_Network_wifi_open:
                summary: WiFi — Open (No Security)
                value:
                  mlan0:
                    accesspoint:
                      essid: OpenNetwork
                      connect: true
                      autoConn: true
                      security:
                        enable: false
                    enable: true
              set_Network_wifi_enterprise:
                summary: WiFi — WPA2 Enterprise (TLS)
                value:
                  mlan0:
                    accesspoint:
                      essid: CorpNetwork
                      connect: true
                      autoConn: true
                      security:
                        enable: true
                        WPA2Enterprise:
                          authentication: TLS
                          certificate: my-client-cert
                    enable: true
              set_Network_wifi_enterprise_ttls:
                summary: WiFi — WPA2 Enterprise (TTLS/MSCHAPv2)
                value:
                  mlan0:
                    accesspoint:
                      essid: CorpNetwork
                      connect: true
                      autoConn: true
                      security:
                        enable: true
                        WPA2Enterprise:
                          authentication: TTLS
                          innerAuthentication: MSCHAPv2
                          username: john.doe
                          password: secret
                    enable: true
              set_Network_bluetooth:
                summary: Bluetooth PAN
                value:
                  bnep0:
                    dhcpEndAddress: 192.168.0.10
                    dhcpStartAddress: 192.168.0.2
                    discoverable: true
                    pairable: true
                    passKey: '1233'
                    usePassKey: false
                    enable: true
              set_Network_wan:
                summary: WAN — cellular (psim)
                value:
                  wan0:
                    enable: true
                    activeSim: psim
                    psim:
                      apn: internet
                      preferredNetworkType: AUTO
                      enableIPv6: true
              set_Network_hotspot:
                summary: WiFi Hotspot (uap0)
                value:
                  uap0:
                    ssid: FXR90Hotspot
                    ssidPassword: MyP@ssword
                    countryCode: US
                    securityType: WPA3Personal
                    isHidden: false
                    enable: true
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
