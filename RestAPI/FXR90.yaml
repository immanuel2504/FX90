      - bearerAuth: []
  /cloud/apps/{appname}/start:
    put:
      tags:
      - userapp
      summary: Start user application
      description: MQTT API :-  start_user_app <br> Starts a user application. For REST, the application is identified by the `{appname}` path parameter. For MQTT, the application is identified by the `appname` payload field.
      operationId: setStartUserApp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                appname:
                  type: string
                  description: Application name. For REST, the application is identified by the appname path parameter; for MQTT, the application is identified by the appname payload field.
            examples:
              set_startUserapp:
                value:
                  appname: mylogger
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps/{appname}/stop:
    put:
      tags:
      - userapp
      summary: Stop user application
      description: MQTT API :-  stop_user_app <br> Stops a user application. For REST, the application is identified by the `{appname}` path parameter. For MQTT, the application is identified by the `appname` payload field.
      operationId: setStopUserApp
      requestBody:
        content:
          application/json:
