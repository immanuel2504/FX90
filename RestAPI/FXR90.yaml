      summary: Updates reader configuration
      description: 'MQTT API :- set_config <br> Updates reader configuration. Accepts one or more of the following top-level keys: **xml** (string) - raw XML reader config; **GPIO-LED** (object) - GPIO and LED event-action configuration; **READER-GATEWAY** (object) - cloud gateway configuration accepting at least one of: endpointConfig (data endpoint configuration only - control/management endpoints are not configurable here; use /cloud/cloudConfig for that), batching (global batching settings for data events), retention (global retention settings for data events), managementEventConfig (asynchronous management events, heartbeat, warnings, errors configuration).'
      operationId: setConfig
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: At least one of xml, GPIO-LED, or READER-GATEWAY must be provided.
              properties:
                xml:
                  type: string
                  description: Raw XML reader configuration string.
                GPIO-LED:
                  $ref: '#/components/schemas/GPIOLEDConfig.v1'
                READER-GATEWAY:
                  type: object
                  description: 'Cloud gateway configuration. Must contain at least one of: endpointConfig, batching, retention, or managementEventConfig.'
                  properties:
                    endpointConfig:
                      type: object
                      description: Endpoint connections configuration. Only the data endpoint is configurable via this API.
                      properties:
                        data:
                          type: object
                          properties:
                            event:
                              type: object
                              properties:
                                connections:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      additionalOptions:
                                        type: object
                                        properties:
                                          batching:
                                            type: object
                                            nullable: true
                                          retention:
                                            type: object
                                            properties:
