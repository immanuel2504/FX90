                        type: number
                      cableLossPerHundredFt:
                        type: number
                  2:
                    type: object
                    properties:
                      cableLength:
                        type: number
                      cableLossPerHundredFt:
                        type: number
                  3:
                    type: object
                    properties:
                      cableLength:
                        type: number
                      cableLossPerHundredFt:
                        type: number
                  4:
                    type: object
                    properties:
                      cableLength:
                        type: number
                      cableLossPerHundredFt:
                        type: number
              example:
                '1':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '2':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '3':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '4':
                  cableLength: 10
                  cableLossPerHundredFt: 10
      security:
      - bearerAuth: []
    put:
      tags:
      - System
      summary: Sets the cableLossCompensation
      description: MQTT API :-  set_cableLossCompensation <br> Sets the Reader Cable Loss Compensation. Includes Cable Length and Cable Loss per Hundred Feet
      operationId: setCableLossCompensation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                '1':
                  type: object
                  properties:
                    cableLength:
                      type: number
                    cableLossPerHundredFt:
                      type: number
                '2':
                  type: object
                  properties:
                    cableLength:
                      type: number
                    cableLossPerHundredFt:
                      type: number
                '3':
                  type: object
                  properties:
                    cableLength:
                      type: number
                    cableLossPerHundredFt:
                      type: number
                '4':
                  type: object
                  properties:
                    cableLength:
                      type: number
                    cableLossPerHundredFt:
                      type: number
            examples:
              set_cableLossCompensation:
                value:
                  '1':
                    cableLength: 90
                    cableLossPerHundredFt: 18
                  '2':
                    cableLength: 18
