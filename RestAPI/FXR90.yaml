openapi: 3.0.3
info:
  title: FXR90 IoT Connector REST API
  description: "# Overview\n\nFXR90 reader can be controlled using REST API as documented in this page.\nThe definition can be found below\n\n# Authentication\n\nIf a bearer token has already been copied from the dashboard page, use it in `Authorize` > bearerAuth.\nIf not, enter Admin login credentials in `Authorize` > basicAuth, execute `/cloud/localRestLogin`,\nand copy the bearer token from the response into `Authorize` > bearerAuth.\n "
  version: 3.0.0
  termsOfService: https://www.zebra.com/ap/en/terms-conditions.html
  contact:
    name: API Support
    url: https://www.zebra.com/ap/en/support-downloads/rfid.html
externalDocs:
  description: Find out more about IoT
  url: https://zebradevs.github.io/rfid-ziotc-docs/
paths:
  /cloud/localRestLogin:
    get:
      tags:
      - Login
      summary: Reader Login
      description: MQTT API :- localrest_login <br> Logs in to the reader
      operationId: localRestLogin
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                  message:
                    type: string
      security:
      - basicAuth: []
  /cloud/app-led:
    get:
      tags:
      - App-led
      summary: Retrieves application LED state
      description: MQTT API :-  get_appled <br> Retrieves a value indicating the current state of the application LED
      operationId: getAppLed
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Current App LED configuration status reported by the reader.
                    enum:
                    - DEFAULT
                    - NOT_DEFAULT
      security:
      - bearerAuth: []
    put:
      tags:
      - App-led
      summary: Updates application LED state
      description: MQTT API :-  set_appled <br> Updates the application LED state on the reader to the state specified
      operationId: setAppLed
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                color:
                  type: string
                  description: 'LED color to apply. Allowed values: red, amber, green, off.'
                  enum:
                  - red
                  - amber
                  - green
                  - 'off'
                flash:
                  type: boolean
                  description: Whether the LED should flash while the state is active.
                seconds:
                  type: integer
                  description: Duration in seconds for the LED state to remain active.
            examples:
              set_appled:
                value:
                  color: amber
                  flash: true
                  seconds: 60
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
      security:
      - bearerAuth: []
  /cloud/gpo:
    get:
      tags:
      - Gpio
      summary: Retrieves the GPO status
      description: 'MQTT API :-  get_gpoStatus <br> Retrieves the current GPO port states. Maximum number of ports available per device type: FX7500 = 3 GPO pins, FX9600 = 4 GPO pins, ATR7000 = 3 GPO pins.'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  '1':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                    description: 'State of GPO port 1. Allowed values: HIGH, LOW.'
                  '2':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                    description: 'State of GPO port 2. Allowed values: HIGH, LOW.'
                  '3':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                    description: 'State of GPO port 3. Allowed values: HIGH, LOW.'
                  '4':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                    description: 'State of GPO port 4. Allowed values: HIGH, LOW.'
      security:
      - bearerAuth: []
    put:
      tags:
      - Gpio
      summary: Updates GPO port state
      description: 'MQTT API :-  set_gpo <br> Updates the state of the specified GPO port. Maximum number of ports available per device type: FX7500 = 3 GPO pins, FX9600 = 4 GPO pins, ATR7000 = 3 GPO pins.'
      operationId: setGpo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - port
              - state
              properties:
                port:
                  type: integer
                  description: GPO port number to update. Valid values are 1 through 4.
                  minimum: 1
                  maximum: 4
                state:
                  type: boolean
                  description: Desired GPO output state. true sets the output HIGH; false sets the output LOW.
            examples:
              set_gpo:
                value:
                  port: 3
                  state: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
      security:
      - bearerAuth: []
  /cloud/gpi:
    get:
      tags:
      - Gpio
      summary: Get GPI Status
      description: 'MQTT API :-  get_gpiStatus <br> Retrieves the current GPI port states. Maximum number of ports available per device type: FX7500 = 2 GPI pins, FX9600 = 4 GPI pins, ATR7000 = 2 GPI pins.'
      operationId: getGpiStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  '1':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                    description: 'State of GPI port 1. Allowed values: HIGH, LOW.'
                  '2':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                    description: 'State of GPI port 2. Allowed values: HIGH, LOW.'
                  '3':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                    description: 'State of GPI port 3. Allowed values: HIGH, LOW.'
                  '4':
                    type: string
                    enum:
                    - HIGH
                    - LOW
                    description: 'State of GPI port 4. Allowed values: HIGH, LOW.'
      security:
      - bearerAuth: []
  /cloud/region:
    get:
      tags:
      - Region
      summary: Retrieves reader region information
      description: MQTT API :-  get_region <br> Retrieves reader region (country) information
      operationId: getRegion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  FrequencyHopping:
                    type: boolean
                    description: Whether frequency hopping is enabled for the active regulatory standard.
                  region:
                    type: string
                    description: RF region code currently configured on the reader.
                  regulatoryStandard:
                    type: string
                    description: Regulatory standard currently applied for the configured region.
                  lbtEnabled:
                    type: boolean
                    description: Whether Listen Before Talk (LBT) is enabled for the active region configuration.
                  channelData:
                    type: array
                    description: Enabled RF channel list for the active region configuration.
                    items:
                      type: string
                  country:
                    type: string
                    description: Country name associated with the active region configuration.
                  minTxPowerSupported:
                    type: integer
                    description: Minimum transmit power supported by the reader for the active region.
                  maxTxPowerSupported:
                    type: integer
                    description: Maximum transmit power supported by the reader for the active region.
              examples:
                multiple_values:
                  value:
                    FrequencyHopping: true
                    channelData:
                    - 915250
                    - 915750
                    - 903250
                    - 926750
                    country: Canada
                    lbtEnabled: false
                    maxTxPowerSupported: 300
                    minTxPowerSupported: 0
                    region: FCC_Generic
                    regulatoryStandard: CANADA_FCC_15
      security:
      - bearerAuth: []
    put:
      tags:
      - Region
      summary: Update region information
      description: MQTT API :-  set_region <br> Updates the reader region information
      operationId: setRegion
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - country
              - standardname
              properties:
                country:
                  type: string
                standardname:
                  type: string
            examples:
              set_region:
                value:
                  country: Canada
                  standardname: CANADA_FCC_15
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
      security:
      - bearerAuth: []
  /cloud/supportedRegionList:
    get:
      tags:
      - Region
      summary: Retrieves the supported region list based on the reader type
      description: MQTT API :-  get_SupportedRegionList <br> Gets the list of regions supported by the reader based on the reader type
      operationId: getSupportedRegionList
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  SupportedRegions:
                    type: array
                    description: It contains SupportedRegions array with list of countries supported by the reader
                    items:
                      type: string
              example:
                SupportedRegions:
                - Argentina
                - Australia
                - Bangladesh
                - Brazil
                - Cambodia
                - Canada
                - China
                - Colombia
                - Costa Rica
                - European Union
                - Ghana
                - Hong Kong
                - India
                - Indonesia
                - Jordan
                - Korea
                - Laos
                - Malaysia
                - Mexico
                - Morocco
                - New Zealand
                - Peru
                - Philippines
                - Russia
                - Saudi Arabia
                - Singapore
                - South Africa
                - Taiwan
                - UAE
                - Ukraine
                - Venezuela
                - Vietnam
      security:
      - bearerAuth: []
  /cloud/supportedStandardList:
    get:
      tags:
      - Region
      summary: Retrieves the standard channels of the supported regions
      description: MQTT API :-  get_supportedStandardList <br> Based on the region name provided, retrieves the standard channel list
      operationId: getSupportedStandardList
      parameters:
      - name: region
        in: query
        description: The region parameter
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  SupportedStandards:
                    type: array
                    description: Supported regulatory standards and channel settings for the requested region.
                    items:
                      type: object
                      properties:
                        StandardName:
                          type: string
                          description: Regulatory standard name supported for the requested region.
                        isChannelSelectable:
                          type: boolean
                          description: Whether channels can be selected for this regulatory standard.
                        isHoppingConfigurable:
                          type: boolean
                          description: Whether frequency hopping can be configured for this regulatory standard.
                        isLBTConfigurable:
                          type: boolean
                          description: Whether Listen Before Talk (LBT) can be configured for this regulatory standard.
                        channelData:
                          type: array
                          description: Channel list supported by the regulatory standard.
                          items:
                            type: string
              example:
                SupportedStandards:
                - StandardName: ARGENTINA
                  isChannelSelectable: false
                  isHoppingConfigurable: false
                  isLBTConfigurable: false
                  channelData:
                  - '915750'
                  - '915250'
                  - '903250'
                  - '926750'
                  - '926250'
                  - '904250'
                  - '927250'
                  - '920250'
                  - '919250'
                  - '909250'
                  - '918750'
                  - '917750'
                  - '905250'
                  - '904750'
                  - '925250'
                  - '921750'
                  - '914750'
                  - '906750'
                  - '913750'
                  - '922250'
                  - '911250'
                  - '911750'
                  - '903750'
                  - '908750'
                  - '905750'
                  - '912250'
                  - '906250'
                  - '917250'
                  - '914250'
                  - '907250'
                  - '918250'
                  - '916250'
                  - '910250'
                  - '910750'
                  - '907750'
                  - '924750'
                  - '909750'
                  - '919750'
                  - '916750'
                  - '913250'
                  - '923750'
                  - '908250'
                  - '925750'
                  - '912750'
                  - '924250'
                  - '921250'
                  - '920750'
                  - '922750'
                  - '902750'
                  - '923250'
      security:
      - bearerAuth: []
  /cloud/mode:
    get:
      tags:
      - Control
      summary: Retrieves the operating mode
      description: MQTT API :-  get_mode <br> Retrieves the current operating mode
      operationId: getMode
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operatingMode.v1'
              example:
                antennaStopCondition:
                - type: DURATION
                  value: 100
                - type: DURATION
                  value: 100
                - type: DURATION
                  value: 100
                antennas:
                - 1
                - 5
                - 6
                delayBetweenAntennaCycles:
                  duration: 0
                  type: DISABLED
                query:
                  tagPopulation: 256
                reportFilter:
                  duration: 0
                  type: PER_ANTENNA
                tagMetaData:
                - ANTENNA
                - RSSI
                - CHANNEL
                - PC
                - XPC
                - CRC
                - SEEN_COUNT
                - PHASE
                transmitPower:
                - 20
                - 20
                - 20
                type: CUSTOM
      security:
      - bearerAuth: []
    put:
      tags:
      - Control
      summary: Updates the reader's operating mode
      description: MQTT API :-  set_mode <br> Changes the reader's operating mode using the same operatingMode.v1 payload shape supported by MQTT.
      operationId: setMode
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/operatingMode.v1'
            examples:
              set_mode:
                value:
                  antennaStopCondition:
                    type: DURATION
                    value: 400
                  antennas:
                  - 1
                  - 2
                  - 3
                  - 4
                  query:
                    sel: ALL
                    session: S2
                    tagPopulation: 2000
                    target: AB
                  radioStopConditions:
                    duration: 60
                  transmitPower: 31.5
                  type: SIMPLE
              set_mode_default_FXR90:
                value:
                  antennaStopCondition:
                    type: DURATION
                    value: 100
                  antennas:
                  - 1
                  delayBetweenAntennaCycles:
                    duration: 0
                    type: DISABLED
                  query:
                    sel: ALL
                    session: S1
                    tagPopulation: 256
                    target: A
                  inventoryProtocol:
                    mode: GEN2X
                  reportFilter:
                    duration: 0
                    type: PER_ANTENNA
                  tagMetaData:
                  - RSSI
                  - PHASE
                  - SEEN_COUNT
                  - ANTENNA
                  - CHANNEL
                  - PC
                  - XPC
                  - CRC
                  transmitPower:
                  - 17
                  type: CUSTOM
              set_mode_TAG_FOCUS:
                value:
                  type: CUSTOM
                  antennaStopCondition:
                    type: DURATION
                    value: 100
                  antennas:
                  - 1
                  query:
                    tagPopulation: 10
                    sel: NOT_SL
                    session: S1
                    target: A
                  modeSpecificSettings:
                    interval:
                      unit: seconds
                      value: 0
                  selects:
                  - target: S1
                    action: INVB_NOTHING
                    membank: TID
                    pointer: 6
                    length: 24
                    mask: '800600'
                  transmitPower:
                  - 30
                  radioStartConditions: {}
                  radioStopConditions: {}
                  reportFilter:
                    duration: 1
                    type: PER_ANTENNA
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setModeResponse'
      security:
      - bearerAuth: []
  /cloud/start:
    put:
      tags:
      - Control
      summary: Start RFID Inventory or BLE scan
      description: "MQTT API :- start\n\nStart RFID inventory, BLE scanning, or both simultaneously.\nThe optional `scanType` array controls which scan types are activated.\nOmitting the payload (or `scanType`) defaults to RFID-only.\nBLE scanning requires prior BLE configuration via `set_bleConfig`.\n  `scanType` with `\"ble\"` cannot be combined with `applyImpinjGen2X`."
      operationId: startInventory
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scanType:
                  type: array
                  description: Which scan types to start. Omit for RFID-only (default).
                  items:
                    type: string
                    enum:
                    - ble
                    - rfid
                  minItems: 1
                  uniqueItems: true
                doNotPersistState:
                  type: boolean
                  description: Controls whether the started inventory state is persisted across reboot. If `true`, the state is not persisted and auto-start is not enabled after reboot. If `false`, the state is persisted across reboot, enabling auto-start.
                applyImpinjGen2X:
                  type: boolean
                  description: 'When true, applies the previously configured Impinj Gen2X features (FastID, TagProtect, TagFocus, TagQuieting) on start. Cannot be used with `scanType: ["ble"]`.'
            examples:
              start_Inventory:
                value: {}
              start_Inventory with AutoStart:
                value:
                  doNotPersistState: false
              start_Inventory with ImpinjGen2X:
                value:
                  applyImpinjGen2X: true
              start_BLE_only:
                value:
                  scanType:
                  - ble
              start_RFID_only:
                value:
                  scanType:
                  - rfid
              start_BLE_and_RFID:
                value:
                  scanType:
                  - ble
                  - rfid
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/stop:
    put:
      tags:
      - Control
      summary: Stop RFID Inventory or BLE scan
      description: 'MQTT API :- stop


        Stop RFID inventory, BLE scanning, or both.

        The optional `scanType` array controls what is stopped.

        Omitting the payload (or `scanType`) stops RFID only — the original default behaviour.

        Use `["ble"]` to stop only BLE (RFID continues), `["rfid"]` to stop only RFID

        (BLE continues), or `["ble","rfid"]` to stop both.'
      operationId: stopInventory
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scanType:
                  type: array
                  description: Which scan types to stop. Omit for RFID-only (default).
                  items:
                    type: string
                    enum:
                    - ble
                    - rfid
                  minItems: 1
                  uniqueItems: true
            examples:
              stop_RFID_default:
                value: {}
              stop_RFID_explicit:
                value:
                  scanType:
                  - rfid
              stop_BLE_only:
                value:
                  scanType:
                  - ble
              stop_BLE_and_RFID:
                value:
                  scanType:
                  - ble
                  - rfid
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/version:
    get:
      tags:
      - System
      summary: Retrieves reader component version information
      description: MQTT API :-  get_version <br> Retrieves reader component version information including Boot Loader, OS, Reader Application, and Radio Firmware versions
      operationId: getVersion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  availableOsUpgrades:
                    type: object
                    description: Key-value map of OS upgrade packages currently available to the reader.
                  cloudAgentApplication:
                    type: string
                    description: Version of the cloud agent application running on the reader.
                  model:
                    type: string
                    description: Hardware model identifier of the reader.
                    enum:
                    - FXR90
                    - FX7500
                    - FX9600
                    - ATR7000
                  radioControlApplication:
                    type: string
                    description: Version of the radio control application running on the reader.
                  radioFirmware:
                    type: string
                    description: Firmware version running on the RFID radio module.
                  readerApplication:
                    type: string
                    description: Version of the main reader application software.
                  revertBackFirmware:
                    type: object
                    description: Firmware rollback information available on the reader.
                  serialNumber:
                    type: string
                    description: Unique serial number assigned to the reader.
              example:
                availableOsUpgrades: {}
                cloudAgentApplication: 0.6.2.25
                model: FXR90
                radioControlApplication: 0.2.58.6
                radioFirmware: 2.1.57.0
                readerApplication: 2.0.7-5
                revertBackFirmware: {}
                serialNumber: 233575230D0028
      security:
      - bearerAuth: []
  /cloud/status:
    get:
      tags:
      - System
      summary: Retrieves reader operational statistics
      description: MQTT API :-  get_status <br> Retrieves reader operational statistics. <br> This call must be made no less frequently than every 30 seconds.
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  antennas:
                    type: object
                    properties:
                      1:
                        type: string
                        description: Connection state for antenna port 1.
                        enum:
                        - connected
                        - disconnected
                      2:
                        type: string
                        description: Connection state for antenna port 2.
                        enum:
                        - connected
                        - disconnected
                      3:
                        type: string
                        description: Connection state for antenna port 3.
                        enum:
                        - connected
                        - disconnected
                      4:
                        type: string
                        description: Connection state for antenna port 4.
                        enum:
                        - connected
                        - disconnected
                      5:
                        type: string
                        description: Connection state for antenna port 5.
                        enum:
                        - connected
                        - disconnected
                      6:
                        type: string
                        description: Connection state for antenna port 6.
                        enum:
                        - connected
                        - disconnected
                    description: Antenna connection status keyed by antenna port.
                  cpu:
                    type: object
                    properties:
                      system:
                        type: number
                        description: CPU utilization percentage consumed by system processes.
                      user:
                        type: number
                        description: CPU utilization percentage consumed by user processes.
                    description: Current CPU utilization percentages.
                  flash:
                    type: object
                    properties:
                      platform:
                        type: object
                        properties:
                          free:
                            type: number
                            description: Free flash space in the platform partition.
                          total:
                            type: number
                            description: Total flash space in the platform partition.
                          used:
                            type: number
                            description: Used flash space in the platform partition.
                        description: Flash usage for the platform partition.
                      readerConfig:
                        type: object
                        properties:
                          free:
                            type: number
                            description: Free flash space in the reader configuration partition.
                          total:
                            type: number
                            description: Total flash space in the reader configuration partition.
                          used:
                            type: number
                            description: Used flash space in the reader configuration partition.
                        description: Flash usage for the reader configuration partition.
                      readerData:
                        type: object
                        properties:
                          free:
                            type: number
                            description: Free flash space in the reader data partition.
                          total:
                            type: number
                            description: Total flash space in the reader data partition.
                          used:
                            type: number
                            description: Used flash space in the reader data partition.
                        description: Flash usage for the reader data partition.
                      rootFileSystem:
                        type: object
                        properties:
                          free:
                            type: number
                            description: Free flash space in the root file system partition.
                          total:
                            type: number
                            description: Total flash space in the root file system partition.
                          used:
                            type: number
                            description: Used flash space in the root file system partition.
                        description: Flash usage for the root file system partition.
                    description: Flash storage usage statistics by partition.
                  interfaceConnectionStatus:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            connectionError:
                              type: string
                              description: Most recent connection error message, or an empty string when no error is present.
                            connectionStatus:
                              type: string
                              description: Current connection state of the endpoint.
                            description:
                              type: string
                              description: Configured description of the endpoint connection.
                            interface:
                              type: string
                              description: Configured endpoint interface name.
                        description: Connection status entries for data event endpoints.
                    description: Cloud interface connection status grouped by endpoint class.
                  ntp:
                    type: object
                    properties:
                      offset:
                        type: number
                        description: Current NTP clock offset reported by the reader.
                      reach:
                        type: number
                        description: NTP reachability value reported by the reader.
                    description: NTP synchronization status for the reader clock.
                  powerNegotiation:
                    type: string
                    description: Power level negotiated with the reader power source.
                  powerSource:
                    type: string
                    description: Detected power source for the reader.
                  radioActivity:
                    type: string
                    description: Current RFID radio activity state.
                    enum:
                    - active
                    - inactive
                  radioConnection:
                    type: string
                    description: Current connection state of the RFID radio.
                    enum:
                    - connected
                    - disconnected
                  ram:
                    type: object
                    properties:
                      free:
                        type: number
                        description: Free RAM percentage or amount reported by the reader.
                      total:
                        type: number
                        description: Total RAM percentage or amount reported by the reader.
                      used:
                        type: number
                        description: Used RAM percentage or amount reported by the reader.
                    description: RAM usage statistics.
                  systemTime:
                    type: string
                    description: Current reader system time.
                  temperature:
                    type: number
                    description: Current reader internal temperature in degrees Celsius.
                  uptime:
                    type: string
                    description: Elapsed time since the reader last started.
                  impinjGen2X:
                    type: object
                    properties:
                      active:
                        type: boolean
                        description: Whether an Impinj Gen2X feature is currently active.
                      feature:
                        type: string
                        description: Name of the active Impinj Gen2X feature.
                        enum:
                        - fastId
                        - tagFocus
                        - tagProtect
                        - tagQuieting
