  /cloud/ntpServer:
    get:
      tags:
      - Date&Time
      summary: Retrieve the NTP server
      description: MQTT API :-  get_ntpServer <br> Retrieves the configured NTP server on the reader
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    type: string
                    description: NTP server host name or IP address.
      security:
      - bearerAuth: []
    put:
      tags:
      - Date&Time
      summary: Set NTP server
      description: MQTT API :-  set_ntpServer <br> Configures the NTP server on the reader
      operationId: updateNtpServer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                description: Use 'server' as the primary NTP server key (current convention)
                properties:
                  server:
                    type: string
                    description: NTP server host name or IP address.
                  server2:
                    type: string
                    description: Optional secondary NTP server host name or IP address.
                required:
                - server
              - type: object
                description: Use 'server1' as the primary NTP server key (legacy convention)
                properties:
                  server1:
                    type: string
                    description: Primary NTP server host name or IP address.
                  server2:
                    type: string
                    description: Optional secondary NTP server host name or IP address.
                required:
                - server1
            examples:
              set_ntpServer:
                value:
                  server: time1.google.com
                  server2: time2.google.com
              set_ntpServer_legacy:
                value:
                  server1: time1.google.com
                  server2: time2.google.com
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
      security:
      - bearerAuth: []
  /cloud/certificates:
    get:
      tags:
      - Certificate
      summary: Retrieve installed certificate details
      description: MQTT API :-  get_certificates <br> Retrieve installed certificate details
      operationId: getCertificates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    installTime:
                      type: string
                      description: Time when the certificate was installed on the reader.
                    issuerName:
                      type: string
                      description: Issuer name recorded in the certificate.
                    name:
                      type: string
                      description: Certificate name on the reader.
                    publickey:
                      type: string
                      description: Public key content for the certificate.
                    serial:
                      type: string
                      description: Certificate serial number.
                    subjectName:
                      type: string
                      description: Subject name recorded in the certificate.
                    type:
                      type: string
                      description: 'Certificate type. Allowed values: server, client, app.'
                      enum:
                      - server
                      - client
                      - app
                    validityEnd:
                      type: string
                      description: Certificate validity end date.
                    validityStart:
                      type: string
                      description: Certificate validity start date.
      security:
      - bearerAuth: []
    put:
      tags:
      - Certificate
      summary: Install certificate
      description: MQTT API :-  set_updateCertificate <br> Installs a certificate on the device
      operationId: setUpdateCertificate
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                authenticationOptions:
                  type: object
                  description: BASIC authentication credentials used when authenticationType is BASIC.
                  properties:
                    password:
                      type: string
                      description: Password for BASIC authentication.
                    username:
                      type: string
                      description: Username for BASIC authentication.
                authenticationType:
                  type: string
                  description: 'Authentication method used when downloading the certificate. Allowed values: NONE, BASIC.'
                  enum:
                  - NONE
                  - BASIC
                name:
                  type: string
                  minLength: 1
                  description: Certificate name on the reader.
                pfxPassword:
                  type: string
                  description: Password for the PFX certificate file.
                type:
                  type: string
                  minLength: 1
                  description: 'Certificate type. Allowed values: client, server, app.'
                  enum:
                  - client
                  - server
                  - app
                url:
                  type: string
                  minLength: 1
                  description: URL where the certificate PFX file can be downloaded.
              required:
              - name
              - type
              - url
            examples:
              set_updateCertificate:
                value:
                  authenticationOptions:
                    password: zebra
                    username: zebra
                  authenticationType: BASIC
                  name: reader
                  pfxPassword: abcd12345
                  type: client
                  url: https://10.117.229.15/reader.pfx
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/certificates/{certname}:
    parameters:
    - name: certname
      in: path
      required: true
      schema:
        type: string
    put:
      tags:
      - Certificate
      summary: Refresh certificate
      description: MQTT API :-  set_refreshCertificate <br> Refreshes the specified certificate on the device
      operationId: setRefreshCertificate
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Certificate name. For REST, the certificate is identified by the certname path parameter; for MQTT, the certificate is identified by the name payload field.
                type:
                  type: string
                  description: 'Certificate type. Allowed values: client, server, app.'
                  enum:
                  - client
                  - server
                  - app
            examples:
              set_refreshCertificate_server:
                value:
                  name: Server
                  type: server
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
    delete:
      tags:
      - Certificate
      summary: Delete certificate
      description: MQTT API :-  del_certificate <br> Delete the specified certificate from the device
      operationId: delCertificate
      parameters:
      - name: type
        in: query
        required: true
        schema:
          type: string
          enum:
          - client
          - server
          - app
          description: 'Certificate type. Allowed values: client, server, app.'
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/network:
    get:
      tags:
      - Network
      summary: Retrieves reader network configuration
      description: MQTT API :-  get_network <br> Retrieves reader network information including IP address, subnet mask, gateway and DNS
      operationId: getNetwork
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  hostName:
                    type: string
                  networkInterface:
                    type: object
                    description: Map of network interface names to their configuration and status.
                    properties:
                      eth0:
                        type: object
                        description: Ethernet interface.
                        properties:
                          IPV4:
                            type: object
                            properties:
                              dhcp:
                                type: boolean
                              ipAddress:
                                type: string
                              gatewayAddress:
                                type: string
                              subnetMask:
                                type: string
                              dnsAddress:
                                type: string
                              domainName:
                                type: string
                          IPV6:
                            type: object
                            properties:
                              dhcp:
                                type: boolean
                              ipAddress:
                                type: string
                              gatewayAddress:
                                type: string
                              prefix:
                                type: string
                              dnsAddress:
                                type: string
                              domainName:
                                type: string
                          security:
                            type: object
                            description: Ethernet security configuration.
                            properties:
                              enabled:
                                type: boolean
                                description: Whether security is enabled.
                              securityType:
                                type: string
                                description: Security protocol in use.
                                enum:
                                - 802_1xEAP
                              authentication:
                                type: string
                                description: EAP authentication method (TLS, TTLS, PEAP).
                              innerAuthentication:
                                type: string
                                description: Inner EAP authentication method (for TTLS/PEAP with TLS or MSCHAPv2).
                              username:
                                type: string
                                description: Username for TTLS/PEAP with MSCHAPv2.
                              password:
                                type: string
                                description: Password for TTLS/PEAP with MSCHAPv2.
                              certificate:
                                type: string
                                description: Client certificate name used for TLS-based authentication.
                              certificateValidity:
                                type: boolean
                                description: Whether the certificate is valid.
                          Status:
                            type: string
                          isEnabled:
                            type: boolean
                          macAddress:
                            type: string
                      mlan0:
                        type: object
                        description: WiFi station interface.
                        properties:
                          IPV4:
                            type: object
                            properties:
                              dhcp:
                                type: boolean
                              ipAddress:
                                type: string
                              gatewayAddress:
                                type: string
                              subnetMask:
                                type: string
                              dnsAddress:
                                type: string
                              domainName:
                                type: string
                          IPV6:
                            type: object
                            properties:
                              dhcp:
                                type: boolean
                              ipAddress:
                                type: string
                              gatewayAddress:
                                type: string
                              prefix:
                                type: string
                              dnsAddress:
                                type: string
                              domainName:
                                type: string
                          accesspoint:
                            type: object
                            description: Connected WiFi access point details.
                            properties:
                              essid:
                                type: string
                                description: SSID of the connected access point.
                              autoConn:
                                type: boolean
                                description: Whether auto-connect is enabled for this access point.
                              status:
                                type: string
                                description: Connection status.
                              security:
                                type: object
                                description: WiFi security configuration (present only when security is enabled).
                                properties:
                                  enabled:
                                    type: boolean
                                    description: Whether security is enabled.
                                  securityType:
                                    type: string
                                    description: Security protocol in use.
                                    enum:
                                    - open
                                    - WPA2Personal
                                    - WPA2Enterprise
                                  WPA2Personal:
                                    type: object
                                    description: WPA2 Personal (PSK) configuration.
                                    properties:
                                      password:
                                        type: string
                                        description: Pre-shared key / passphrase.
                                  WPA2Enterprise:
                                    type: object
                                    description: WPA2 Enterprise (802.1X EAP) configuration.
                                    properties:
                                      authentication:
                                        type: string
                                        description: EAP authentication method (TLS, TTLS, PEAP).
                                      innerAuthentication:
                                        type: string
                                        description: Inner EAP authentication method (for TTLS/PEAP).
                                      username:
                                        type: string
                                        description: Username for TTLS/PEAP with MSCHAPv2.
                                      password:
                                        type: string
                                        description: Password for TTLS/PEAP with MSCHAPv2.
                                      certificate:
                                        type: string
                                        description: Client certificate name for TLS-based methods.
                                      certificateValidity:
                                        type: boolean
                                        description: Whether the certificate is valid.
                          Status:
                            type: string
                          isEnabled:
                            type: boolean
                          macAddress:
                            type: string
                      bnep0:
                        type: object
                        description: Bluetooth PAN interface.
                        properties:
                          ipAddress:
                            type: string
