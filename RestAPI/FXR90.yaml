              set_os:
                value:
                  url: https://10.117.229.9:9093/BUILDS/FXR90_2.0.10.tar.bz2
                  authenticationType: NONE
                  authenticationOptions:
                    username: test
                    password: test
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
