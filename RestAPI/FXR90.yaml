  /cloud/logs:
    get:
      tags:
      - Logs
      summary: Log Configuration
      description: MQTT API :-  get_logs <br> Retrieves reader log configuration
      operationId: getLogs
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  components:
                    type: array
                    description: Log level configuration per reader subcomponent.
                    items:
                      type: object
                      properties:
                        componentName:
                          type: string
                          description: Name of subcomponent. For radio_control, only the INFO log level is supported. For reader_gateway, supported log levels are INFO, DEBUG, WARNING, and ERROR.
                          enum:
                          - radio_control
                          - reader_gateway
                        level:
                          type: string
                          description: Logging Level
                          enum:
                          - DEBUG
                          - INFO
                          - WARNING
                          - ERROR
                      required:
                      - componentName
                      - level
                  radioPacketLog:
                    type: boolean
                    description: Indicates whether radio packet logging is enabled.
              example:
                components:
                - componentName: radio_control
                  level: INFO
                - componentName: reader_gateway
                  level: INFO
                radioPacketLog: false
      security:
      - bearerAuth: []
    put:
      tags:
      - Logs
      summary: Configures the logs
      description: MQTT API :-  set_logs <br> Changes logging level
      operationId: setLogs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                components:
                  type: array
                  description: Log level configuration per reader subcomponent.
                  items:
                    type: object
                    properties:
                      componentName:
                        type: string
                        description: Name of subcomponent. For radio_control, only the INFO log level is supported. For reader_gateway, supported log levels are INFO, DEBUG, WARNING, and ERROR.
                        enum:
                        - radio_control
                        - reader_gateway
                      level:
                        type: string
                        description: Logging Level
                        enum:
                        - DEBUG
                        - INFO
                        - WARNING
                        - ERROR
                    required:
                    - componentName
                    - level
                radioPacketLog:
                  type: boolean
                  description: Indicates whether radio packet logging is enabled.
            examples:
              set_logs:
                value:
                  components:
                  - componentName: radio_control
                    level: INFO
                  - componentName: reader_gateway
                    level: DEBUG
                  radioPacketLog: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
      security:
      - bearerAuth: []
