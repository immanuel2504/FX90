    impinjTagQuietingBasic.v1:
      title: impinjTagQuietingBasic
      type: object
      description: Basic TagQuieting configuration for quieting or unquieting specific tags identified by EPC.
      properties:
        action:
          type: string
          description: quiet silences the specified tags for the current inventory round; unquiet restores previously quieted tags.
          enum:
          - quiet
          - unquiet
          example: quiet
        tagIDs:
          type: array
          description: Non-empty list of hexadecimal EPC strings identifying the tags to quiet or unquiet.
          minItems: 1
          items:
            type: string
            pattern: ^[0-9A-Fa-f]+$
            example: e2801191a5030069073b426d
      required:
      - action
      - tagIDs
    impinjTagQuietingAdvanced.v1:
      title: impinjTagQuietingAdvanced
      type: object
      description: Advanced TagQuieting configuration using Impinj Gen2X proprietary features.
      properties:
        preSelect:
          type: array
          description: Optional array of SELECT operations to position tags into specific session states before applying state-aware SELECT. Maximum 31 items allowed.
          maxItems: 31
          items:
            type: object
            properties:
              target:
                type: string
                description: Session or flag to target.
                enum:
                - S0
                - S1
                - S2
                - S3
                - SL
                example: S2
              action:
                type: string
                description: Action to perform on the target session or flag.
                enum:
                - ASSERTSL_NOTHING
                - DEASSERTSL_NOTHING
                - ASSERTSL_ASSERTSL
                - ASSERTSL_DEASSERTSL
                - DEASSERTSL_ASSERTSL
                - DEASSERTSL_DEASSERTSL
                - NEGSL_NOTHING
                - NOTHING_ASSERTSL
                - NOTHING_DEASSERTSL
                - NOTHING_NEGSL
                - INVA_NOTHING
                - INVB_NOTHING
                - INVA_INVB
                - INVB_INVA
                - INVA_INVA
                - INVB_INVB
                - NOTHING_INVA
                - NOTHING_INVB
                example: INVB_INVA
              mask:
                type: object
                description: Memory mask for tag selection.
                properties:
                  bank:
                    type: string
                    description: Memory bank to match against.
                    enum:
                    - EPC
                    - TID
                    - USER
                    - RESERVED
                    example: EPC
                  pointer:
                    type: integer
                    description: Bit offset in memory bank.
                    minimum: 0
                    maximum: 65535
                    example: 32
                  length:
                    type: integer
                    description: Number of bits to match.
                    minimum: 1
                    maximum: 255
                    example: 96
                  value:
                    type: string
                    description: Hex string value to match (even length, valid hex characters).
                    pattern: ^[0-9A-Fa-f]+$
                    example: A55E551ABE1C0DE869C7A459
                required:
                - bank
                - pointer
                - length
                - value
            required:
            - target
            - action
            - mask
        tagQuietMasks:
          type: array
          description: Session-state combinations to check in TID memory. Minimum 1, maximum 3 items. No duplicate session prefixes allowed (e.g., S0A and S0B together).
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum:
            - S0A
            - S0B
            - S2A
            - S2B
            - S3A
            - S3B
            - SL_ASSERT
            - SL_DEASSERT
            example: S0A
        target:
          type: string
          description: Which flag to manipulate based on state check.
          enum:
          - SL
          - S0
          - S1
          - S2
          - S3
          example: SL
        stateAwareAction:
          type: string
          description: Action to perform on target flag when tags match the tagQuietMasks pattern.
          enum:
          - ASSERTSL
          - DEASSERTSL
          - ASSERTSL_DEASSERTSL
          - DEASSERTSL_ASSERTSL
          - NEGSL
          - NOT_DEASSERTSL
          - NOT_ASSERTSL
          - NOT_NEGSL
          - INV_A
          - INV_B
          - INV_A_NOT_INV_B
          - INV_B_NOT_INV_A
          - INV_A2BB2A
          - NOT_INV_B
          - NOT_INV_A
          - NOT_INV_A2BB2A
          example: ASSERTSL
      required:
      - tagQuietMasks
      - target
      - stateAwareAction
    impinjTagQuieting.v1:
      title: impinjTagQuieting
      type: object
      description: Impinj TagQuieting configuration. Exactly one of basic or advanced must be provided.
      oneOf:
      - required:
        - basic
      - required:
