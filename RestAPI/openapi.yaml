      title: delayBetweenAntennaCycles
      type: object
      description: "This introduces a delay between antenna cycles if no tags are read or if no unique tags are read. This allows the reader to share the spectrum if there are no tags to be read. \n\nIf absent, \non the ATR7000 and the FX9600, delayBetweenAntennas cycles is set to wait for 75 mS if no unique tags are read during a antenna cycle.  \non the FX7500, delayBetweenAntennas cycles is set to wait for 75 mS if no tags are read during a antenna cycle. "
      properties:
        type:
          type: string
          enum:
          - DISABLED
          - NO_TAGS
          - NO_UNIQUE_TAGS
          description: Condition under which to delay between antenna cycles
        duration:
          type: integer
          description: Delay between antenna cycles in milliseconds. Will only wait if the type condition (no tags or no unique tags) is met. If the type is DISABLED, duration must be set to 0. If the type is not DISABLED, the value must be set to a non-zero value.
      required:
      - type
      - duration
    tagMetaData.v1ItemOneOf1:
      type: object
      properties:
        userDefined:
          type: string
          description: A user defined field to report each time a tag is reported
        antennaPortNames:
          type: array
          description: 'Used to give antenna ports descriptive names

            Length of array must match the number of antenna ports on the device'
          items:
            type: string
    tagMetaData.v1:
      title: tagMetaData
      type: array
      description: "Controls the metadata that is sent when a tag is reported\n\n  “ANTENNA” will report the antenna port upon which the tag was inventoried.\n\n  “RSSI” will report the rssi (in dbm) of the inventoried tag. If the tag is only reported occasionally (see reportFilter), this tag will be the peak rssi since the last reported read.\n\n   “PHASE” will report the phase (in degrees) of the inventoried tag. This value will only be reported if each individual tag read is reported (in other words, if reportFilter duration is set to 0). Otherwise, it will not be reported.\n\n  “CHANNEL” will report the channel (in MHz) the reader was using when the tag was inventoried. This value will only be reported if each individual tag read is reported (in other words, if reportFilter duration is set to 0). Otherwise, it will not be reported.\n\n  “SEEN_COUNT” will report the number of times the tag has been inventoried since the previous report. This value will always be 1 if each individual tag read is reported (in other words, if reportFilter duration is set to 0). \n\n  “PC” will report the PC bits of the inventoried tag as a hex string. \n\n  “XPC” will report the XPC bits of the inventoried tag, if present, as a hex string. \n\n  “CRC” will report the CRC bits of the inventoried tag as a hex string.\n\n  “EPC” will report the entire contents of the EPC bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “EPC[1]”. If the first word and the 3-5 word are desired, the value can be set to “EPC[1,3-5]”.\n\n  “TID” will report the entire contents of the TID bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “TID[1]”. If the first word and the 3-5 word are desired, the value can be set to “TID[1,3-5]”.\n\n  “USER” will report the entire contents of the USER bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “TID[1]”. If the first word and the 3-5 word are desired, the value can be set to “TID[1,3-5]”.\n\n  “MAC” will report the MAC Address of the reader reporting the tag.\n\n  “HOSTNAME” will report the hostname of the reader reporting the tag.\n\nThe array may also contain an object or objects. The object must contain a single name value pair with the name being set to “userDefined” or “antennaPortNames”\n\n\nIf absent,\n“SIMPLE” mode does not report any additional meta data, “PORTAL” and “CONVEYOR” modes reports “ANTENNA”, and “INVENTORY” mode reports “ANTENNA”, “RSSI”, and “SEEN_COUNT”.\n"
      items:
        oneOf:
        - type: string
          enum:
          - RSSI
          - PHASE
          - SEEN_COUNT
          - ANTENNA
          - CHANNEL
          - PC
          - XPC
          - CRC
          - EPC
          - TID
          - USER
          - RESERVED
          - MAC
          - HOSTNAME
        - $ref: '#/components/schemas/tagMetaData.v1ItemOneOf1'
    radioStartConditions.v1:
      title: radioStartConditions
      type: object
      description: "Controls when, after a “start” is issued, the radio starts trying to inventory tags. \n\nIf absent, the radio will immediately begin inventorying tags upon a \"start\" command. "
      properties:
        type:
          type: string
          enum:
          - GPI
          - GPI_WITH_RESTART
        gpis:
          type: array
          description: List of GPI pins used to trigger radio start
          items:
            $ref: '#/components/schemas/gpi.v1'
    radioStopConditions.v1:
      title: radioStopConditions
      type: object
      description: "Controls when an ongoing operation completes. \n\nIf absent, the radio will continue trying to inventory tags until a \"stop\" is issued."
      properties:
        duration:
          type: integer
          description: Time to run until radio stops (in seconds)
          format: int32
        antennaCycles:
          type: integer
          description: The number of cycles through all enabled antennas before stopping the radio
          format: int32
        tagCount:
          type: integer
          description: The number of tags to inventory until the radio stops. Cannot be set at the same time as durationAfterNoMoreUniqueTags
          format: int32
        durationAfterNoMoreUniqueTags:
          type: integer
          description: Duration (in seconds) after not inventorying any more unique tags to stop the radio. Cannot be set at the same time as tagCount
          format: int32
        gpis:
          type: array
          items:
            $ref: '#/components/schemas/gpi.v1'
    tagReportFilter.v1:
      title: reportFilter
      type: object
      description: 'Controls when and how often a tag is reported


        NOTE: This cannot be set while in "INVENTORY" mode. Setting the modeSpecificSetting for interval must be used in "INVENTORY" mode.


        If absent, each mode uses a different default.


        "SIMPLE": report tag read once.


        "PORTAL" and "CONVEYOR": report each tag the first time it is read on each antenna.'
      properties:
        duration:
          type: integer
          description: "Duration (in seconds) to wait to report a tag again once it has already been reported\nIt should be noted that the way the filter works is that as long as the tag is being read by the reader, it will not report unless the time since the previous report of this tag on this antenna meets the type and duration. \nDuration is a uint32 value and the max value is bound by the data type. "
          format: int32
          minimum: 0
        type:
          type: string
          enum:
          - RADIO_WIDE
          - PER_ANTENNA
          description: "Configures the timeout (in seconds) by antenna or for entire radio \n"
        addl_keys:
          title: addl_keys
          type: array
          description: 'Filters tag reports based on additional configured keys.


            In order to add additional keys, the tag metadata must be configured to report "TID", "PC" and "CRC".

            However, if the radio type is set to PER_ANTENNA, the "ANTENNA" field must also be added to tag metadata.'
          items:
            type: string
            enum:
            - TID
      required:
      - duration
      - type
    rssiFilter.v1:
      title: rssiFilter
      type: object
      description: 'Tag with RSSI below threshold will not be inventoried by the radio


        If absent, rssi filter is not used.'
      properties:
        threshold:
          type: integer
          description: Threshold (in dbm) below which the radio will ignore a tag response
          format: int32
          minimum: -128
          maximum: -20
    operatingMode.v1BeamsItem:
      type: object
      required:
      - azimuth
      - elevation
      properties:
        azimuth:
          type: integer
          description: Azimuth of beam (in degrees)
          multipleOf: 5
          maximum: 360
          minimum: 0
        elevation:
          type: integer
          description: Elevation of beam (in degrees)
          multipleOf: 5
          minimum: 0
          maximum: 70
        polarization:
          type: string
          description: Polarization of beam
          default: LHCP
          enum:
          - TOTAL
          - THETA
          - PHI
          - RHCP
          - LHCP
    operatingMode.v1:
      title: operatingMode
      type: object
      description: Represents the reader operating mode.
      properties:
        type:
          type: string
          enum:
          - SIMPLE
          - INVENTORY
          - PORTAL
          - CONVEYOR
          - CUSTOM
          - DIRECTIONALITY
          description: 'The type of mode of operation '
          default: SIMPLE
        modeSpecificSettings:
          oneOf:
          - $ref: '#/components/schemas/inventorysettings.v1'
          - $ref: '#/components/schemas/portalsettings.v1'
          - $ref: '#/components/schemas/directionality.v1'
        environment:
          type: string
          enum:
          - LOW_INTERFERENCE
          - HIGH_INTERFERENCE
          - VERY_HIGH_INTERFERENCE
          - AUTO_DETECT
          - DEMO
          description: "\n\n\n\n\n  The type of environment in which the reader operates. Along with the regulatory configuration of the reader, the environment parameter will set the default link profile parameters (i.e., Miller mode, BLF, Tari, etc.) and the receiver dynamic range (interference immunity).\n\n  LOW_INTERFERENCE:  The reader is operating in an environment when the likelihood of interference is very low or only occurs for very brief periods of time (defined as a single interrogator environment in the Gen2 and ISO standards).\n\n  HIGH_INTERFERENCE: The reader is operating in the presence of other readers (defined as a multi-interrogator or dense interrogator environment in the Gen2 and ISO standards).\n\n  VERY_HIGH_INTERFERENCE: The reader is operating in an environment where the number of readers is greater than the number of available channels, or when interfering readers are in very close proximity to each other.\n\n  AUTO_DETECT: This will cause the reader to try and assess the environment and adjust accordingly. \n\n  DEMO: Should be used when demonstrating the maximum performance (fastest read rate) of a reader. This assumes no other readers in the environment.\n\n  If absent, the environment is set to HIGH_INTERFERENCE"
          default: HIGH_INTERFERENCE
        antennas:
          type: array
          description: "\n\n\n\n\n An array of integers representing the antenna ports to use to read tags. For ATR, the integers represent beam numbers. \n\n If absent, all antennas ports are used; for the ATR, a set of 38 beams are used."
          items:
            type: integer
        filter:
          $ref: '#/components/schemas/tagidfilter.v1'
        transmitPower:
          oneOf:
          - type: number
            description: Single value applies to all antennas
          - type: array
            description: 'Each value applies to each antenna in the antennas array

              Array length must match antennas array length'
            items:
              type: number
          description: "\n\n\n\n\n Desired Transmit Power (in dbm).\n\n If absent, the value is set to 27 dbm; for the ATR, the value is set to 36 dbm EIRP."
        antennaStopCondition:
          oneOf:
          - $ref: '#/components/schemas/antennaStopCondition.v1'
          - type: array
            description: 'Each value applies to each antenna in the antennas array

              Array length must match antennas array length'
            items:
              $ref: '#/components/schemas/antennaStopCondition.v1'
          description: "\n\n\n\n\n Stop Condition for antennas. \n\n If absent, the antenna stop condition is set to run a single inventory round for no longer than 1/N seconds. Where N is the number of enabled antennas."
        query:
          oneOf:
          - $ref: '#/components/schemas/query.v1'
          - type: array
            description: 'Each value applies to each antenna in the antennas array

              Array length must match antennas array length'
            items:
              $ref: '#/components/schemas/query.v1'
          description: "\n\n\n\n\n Gen2 query parameters. See Gen2 spec for details.\n\n If absent, \"sel\" is set to ALL, session is set to 1, target is set to A, and tag population set to 1."
        selects:
          description: "\n\n\n\n\n Gen2 select parameters. See Gen2 spec for details.\n\n If absent, no select will be issued. Cannot be set when filter with prefix type is also set. \n\n If there is an array of select objects, all of the selects in the array will be applied to all antennas.\n \n If there is an array of array of select objects, each array of select objects will apply to each antenna. The array of arrays must have the same number of entries as the antennas array."
          oneOf:
          - type: array
            items:
              $ref: '#/components/schemas/select.v1'
          - type: array
            items:
              type: array
              items:
                $ref: '#/components/schemas/select.v1'
        delayAfterSelects:
          type: integer
          minimum: 0
          maximum: 65
          description: 'Duration in milliseconds to wait after issuing the final select before issuing a query. If absent, the minimum time will be used. '
        accesses:
          description: "\n\n\n\n\n Gen2 access parameters. See Gen2 spec for details.\n\n If absent, no access will be issued. \n\n If there is an array of access objects, all of the accesss in the array will be applied to all antennas.\n \n If there is an array of array of access objects, each array of access objects will apply to each antenna. The array of arrays must have the same number of entries as the antennas array."
          oneOf:
          - $ref: '#/components/schemas/access_cmds.v1'
          - type: array
            items:
              $ref: '#/components/schemas/access_cmds.v1'
        delayBetweenAntennaCycles:
          $ref: '#/components/schemas/delayBetweenAntennaCycles.v1'
        tagMetaData:
          $ref: '#/components/schemas/tagMetaData.v1'
        radioStartConditions:
          $ref: '#/components/schemas/radioStartConditions.v1'
        radioStopConditions:
          $ref: '#/components/schemas/radioStopConditions.v1'
        reportFilter:
          $ref: '#/components/schemas/tagReportFilter.v1'
        rssiFilter:
          $ref: '#/components/schemas/rssiFilter.v1'
        beams:
          type: array
          description: Array of beams to use
          items:
            $ref: '#/components/schemas/operatingMode.v1BeamsItem'
      required:
      - type
    actionBlink.v1:
      title: Action Blink Configuration
      type: object
      description: action blink configuration for GPO or LED
      properties:
        'ON':
          type: number
          minimum: 0
          description: SET GPO or LED to desired state for ON (milliseconds) duration
        'OFF':
          type: number
          minimum: 0
          description: Toggle GPO or LED for OFF(milliseconds) duration
        DURATION:
          type: number
          minimum: 0
          description: Total duration in milliseconds to perform blink. 0 will blink GPO or LED forever
      required:
      - 'ON'
      - 'OFF'
      - DURATION
    conditionsArray.v1:
      type: array
      title: Conditions Array
      description: 'Predefined conditions


        IS_CLOUD_CONNECTED  : Condition will be true when reader is successfully connected to Cloud.


        ~IS_CLOUD_CONNECTED : Condition will be true when reader lost Cloud connectivity.


        IS_RADIO_ONGOING    : Condition will be true when the reader is currently performing or has started an inventory operation.


        ~IS_RADIO_ONGOING   : Condition will be true when the reader is not performing inventory or has stopped an inventory operation.'
      uniqueItems: true
      minItems: 0
      items:
        type: string
        enum:
        - IS_CLOUD_CONNECTED
        - ~IS_CLOUD_CONNECTED
        - IS_RADIO_ONGOING
        - ~IS_RADIO_ONGOING
    actionConditions.v1OneOf1:
      type: object
      properties:
        operator:
          type: string
          enum:
          - and
          - or
          description: Operator to be used for conditions validation
        operands:
          $ref: '#/components/schemas/conditionsArray.v1'
    actionConditions.v1:
      oneOf:
      - $ref: '#/components/schemas/conditionsArray.v1'
      - $ref: '#/components/schemas/actionConditions.v1OneOf1'
      title: Action Conditions
      description: 'Predefined conditions to trigger GPO or LED actions


        Default "and" operator is used when array of conditions is provided.


        operator "and": Action is performed only when all the conditions provided is true.

        operator "or": Action is performed only when one of the conditions provided is true.'
    gpoAction.v1:
      title: GPO Action
      type: object
      description: 'Configuration to define operations on single GPO.


        GPO Action will be skipped if conditions provided is not satisfied.'
      properties:
        type:
          type: string
          enum:
          - GPO
          description: Action type
        pin:
          type: number
          description: GPO pin number
          enum:
          - 1
          - 2
          - 3
          - 4
        state:
          type: string
          enum:
          - HIGH
          - LOW
          description: Desired GPO pin state
        postActionState:
          type: string
          enum:
          - HIGH
          - LOW
          description: Desired GPO pin state after action execution completed
        blink:
          $ref: '#/components/schemas/actionBlink.v1'
        conditions:
          $ref: '#/components/schemas/actionConditions.v1'
      required:
      - type
      - pin
      - state
    ledAction.v1:
      title: LED Action
      type: object
      description: 'Configuration to define operations on single LED.


        LED Action will be skipped if conditions provided is not satisfied.'
      properties:
        type:
          type: string
          description: Action type
          enum:
          - LED
        led:
          type: number
          description: LED number
          enum:
          - 1
          - 2
          - 3
        color:
          type: string
          description: Desired LED color
          enum:
          - RED
          - AMBER
          - GREEN
        postActionColor:
          type: string
          description: Desired LED color after action expired
          enum:
          - GREEN
          - RED
          - AMBER
        blink:
          $ref: '#/components/schemas/actionBlink.v1'
        conditions:
          $ref: '#/components/schemas/actionConditions.v1'
      required:
      - type
      - led
      - color
    gpoledAction.v1:
      title: GPO-LED Action
      type: array
      description: Array of GPO or LED actions. Actions will be performed sequentially.
      items:
        anyOf:
        - $ref: '#/components/schemas/gpoAction.v1'
        - $ref: '#/components/schemas/ledAction.v1'
    GPIOLEDConfig.v1GPODefaults:
      type: object
      description: GPO default configurations
      properties:
        '1':
          type: string
          enum:
          - HIGH
          - LOW
          description: set default state for GPO pin 1
        '2':
          type: string
          enum:
          - LOW
          - HIGH
          description: set default state for GPO pin 2
        '3':
          type: string
          enum:
          - HIGH
          - LOW
          description: set default state for GPO pin 3
        '4':
          type: string
          enum:
          - HIGH
          - LOW
          description: set default state for GPO pin 4
    GPIOLEDConfig.v1LEDDefaults:
      type: object
      description: LED default configurations
      properties:
        '1':
          type: string
          enum:
          - GREEN
          - RED
          - AMBER
          description: set default color for LED 2
        '2':
          type: string
          enum:
          - GREEN
          - RED
          - AMBER
          description: set default color for LED 3
        '3':
          type: string
          enum:
          - RED
          - GREEN
          - AMBER
          description: set default color for LED 4
    GPIOLEDConfig.v1:
      title: GPIO-LED configuration
      type: object
      description: 'GPIO-LED module configuration


        Configure GPO and LED behaviour based on Events generated


        Supported Events:

        1. GPI_1_L: event raised when GPI 1 changed from HIGH to LOW

        2. GPI_1_H: event raised when GPI 1 changed from LOW to HIGH

        3. GPI_2_L: event raised when GPI 2 changed from HIGH to LOW

        4. GPI_2_H: event raised when GPI 2 changed from LOW to HIGH

        5. CLOUD_DISCONNECT: event raised when reader is disconnected from cloud

        6. CLOUD_CONNECT: event raised when reader is connected to cloud

        7. TAG_READ: event raised when a tag is read

        8. RADIO_START: event raised when inventory operation started using START API

        9. RADIO_STOP: event raised when inventory operation stopped using STOP API'
      properties:
        GPODefaults:
          $ref: '#/components/schemas/GPIOLEDConfig.v1GPODefaults'
        LEDDefaults:
          $ref: '#/components/schemas/GPIOLEDConfig.v1LEDDefaults'
        GPI_1_H:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_1_L:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_2_H:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_2_L:
          $ref: '#/components/schemas/gpoledAction.v1'
        CLOUD_DISCONNECT:
          $ref: '#/components/schemas/gpoledAction.v1'
        CLOUD_CONNECT:
          $ref: '#/components/schemas/gpoledAction.v1'
        TAG_READ:
          $ref: '#/components/schemas/gpoledAction.v1'
        RADIO_START:
          $ref: '#/components/schemas/gpoledAction.v1'
        RADIO_STOP:
          $ref: '#/components/schemas/gpoledAction.v1'
    eventsConfig.v1ErrorsCpu:
