    get_ntpServerResponse:
      type: object
      properties:
        server:
          type: string
          description: NTP server host name or IP address.
          example: pool.ntp.org
    updateNtpServerRequestOneOf0:
      type: object
      description: Use 'server' as the primary NTP server key (current convention)
      required:
      - server
      properties:
        server:
          type: string
          description: NTP server host name or IP address.
          example: pool.ntp.org
        server2:
          type: string
          description: Optional secondary NTP server host name or IP address.
          example: time2.google.com
    updateNtpServerRequestOneOf1:
      type: object
      description: Use 'server1' as the primary NTP server key (legacy convention)
      required:
      - server1
      properties:
        server1:
          type: string
          description: Primary NTP server host name or IP address.
          example: time1.google.com
        server2:
          type: string
          description: Optional secondary NTP server host name or IP address.
          example: time2.google.com
    updateNtpServerRequest:
      oneOf:
      - $ref: '#/components/schemas/updateNtpServerRequestOneOf0'
      - $ref: '#/components/schemas/updateNtpServerRequestOneOf1'
    updateNtpServerResponse:
      type: string
      example: ''
    getCertificatesResponseItem:
      type: object
      properties:
        installTime:
          type: string
          description: Time when the certificate was installed on the reader.
        issuerName:
          type: string
          description: Issuer name recorded in the certificate.
        name:
          type: string
          description: Certificate name on the reader.
        publickey:
          type: string
          description: Public key content for the certificate.
        serial:
          type: string
          description: Certificate serial number.
        subjectName:
          type: string
          description: Subject name recorded in the certificate.
        type:
          type: string
          description: 'Certificate type. Allowed values: server, client, app.'
          enum:
          - server
          - client
          - app
        validityEnd:
          type: string
          description: Certificate validity end date.
        validityStart:
          type: string
          description: Certificate validity start date.
    getCertificatesResponse:
      type: array
      items:
        $ref: '#/components/schemas/getCertificatesResponseItem'
    setUpdatecertificateRequestAuthenticationOptions:
      type: object
      description: BASIC authentication credentials used when authenticationType is BASIC.
      properties:
        password:
          type: string
          description: Password for BASIC authentication.
          example: zebra
        username:
          type: string
          description: Username for BASIC authentication.
          example: zebra
    setUpdatecertificateRequest:
      type: object
      properties:
        authenticationOptions:
          $ref: '#/components/schemas/setUpdatecertificateRequestAuthenticationOptions'
        authenticationType:
          type: string
          description: 'Authentication method used when downloading the certificate. Allowed values: NONE, BASIC.'
          enum:
          - NONE
          - BASIC
          example: BASIC
        name:
          type: string
          minLength: 1
          description: Certificate name on the reader.
          example: reader
        pfxPassword:
          type: string
          description: Password for the PFX certificate file.
          example: abcd12345
        type:
          type: string
          minLength: 1
          description: 'Certificate type. Allowed values: client, server, app.'
          enum:
          - client
          - server
          - app
          example: client
        url:
          type: string
          minLength: 1
          description: URL where the certificate PFX file can be downloaded.
          example: https://10.117.229.15/reader.pfx
      required:
      - name
      - type
      - url
    setRefreshcertificateRequest:
      type: object
      properties:
        name:
          type: string
          description: Certificate name. For REST, the certificate is identified by the certname path parameter; for MQTT, the certificate is identified by the name payload field.
          example: Server
        type:
          type: string
          example: server
          description: 'Certificate type. Allowed values: client, server, app.'
          enum:
          - client
          - server
          - app
    delCertificateRequest:
      type: object
      properties:
        name:
          type: string
          description: Certificate name. For REST, the certificate is identified by the certname path parameter; for MQTT, the certificate is identified by the name payload field.
          example: reader
        type:
          type: string
          example: client
          description: 'Certificate type. Allowed values: client, server, app.'
          enum:
          - client
          - server
          - app
    getNetworkResponseNetworkInterfaceEth0IPV4:
      type: object
      properties:
        dhcp:
          type: boolean
        ipAddress:
          type: string
        gatewayAddress:
          type: string
        subnetMask:
          type: string
        dnsAddress:
          type: string
        domainName:
          type: string
    getNetworkResponseNetworkInterfaceEth0IPV6:
      type: object
      properties:
        dhcp:
          type: boolean
        ipAddress:
          type: string
        gatewayAddress:
          type: string
        prefix:
          type: string
        dnsAddress:
          type: string
        domainName:
          type: string
    getNetworkResponseNetworkInterfaceEth0Security:
      type: object
      description: Ethernet security configuration.
      properties:
        enabled:
          type: boolean
          description: Whether security is enabled.
        securityType:
          type: string
          description: Security protocol in use.
          enum:
          - 802_1xEAP
          example: 802_1xEAP
        authentication:
          type: string
          description: EAP authentication method (TLS, TTLS, PEAP).
          example: TLS
        innerAuthentication:
          type: string
          description: Inner EAP authentication method (for TTLS/PEAP with TLS or MSCHAPv2).
          example: MSCHAPv2
        username:
          type: string
          description: Username for TTLS/PEAP with MSCHAPv2.
        password:
          type: string
          description: Password for TTLS/PEAP with MSCHAPv2.
        certificate:
          type: string
          description: Client certificate name used for TLS-based authentication.
        certificateValidity:
          type: boolean
          description: Whether the certificate is valid.
    getNetworkResponseNetworkInterfaceEth0:
      type: object
      description: Ethernet interface.
      properties:
        IPV4:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceEth0IPV4'
        IPV6:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceEth0IPV6'
        security:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceEth0Security'
        Status:
          type: string
          example: connected
        isEnabled:
          type: boolean
        macAddress:
          type: string
          example: C8:1C:FE:C5:F1:AB
    getNetworkResponseNetworkInterfaceMlan0AccesspointSecurityWPA2Personal:
      type: object
      description: WPA2 Personal (PSK) configuration.
      properties:
        password:
          type: string
          description: Pre-shared key / passphrase.
    getNetworkResponseNetworkInterfaceMlan0AccesspointSecurityWPA2Enterprise:
      type: object
      description: WPA2 Enterprise (802.1X EAP) configuration.
      properties:
        authentication:
          type: string
          description: EAP authentication method (TLS, TTLS, PEAP).
          example: TLS
        innerAuthentication:
          type: string
          description: Inner EAP authentication method (for TTLS/PEAP).
          example: MSCHAPv2
        username:
          type: string
          description: Username for TTLS/PEAP with MSCHAPv2.
        password:
          type: string
          description: Password for TTLS/PEAP with MSCHAPv2.
        certificate:
          type: string
          description: Client certificate name for TLS-based methods.
        certificateValidity:
          type: boolean
          description: Whether the certificate is valid.
    getNetworkResponseNetworkInterfaceMlan0AccesspointSecurity:
      type: object
      description: WiFi security configuration (present only when security is enabled).
      properties:
        enabled:
          type: boolean
          description: Whether security is enabled.
        securityType:
          type: string
          description: Security protocol in use.
          enum:
          - open
          - WPA2Personal
          - WPA2Enterprise
          example: WPA2Personal
        WPA2Personal:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceMlan0AccesspointSecurityWPA2Personal'
        WPA2Enterprise:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceMlan0AccesspointSecurityWPA2Enterprise'
    getNetworkResponseNetworkInterfaceMlan0Accesspoint:
      type: object
      description: Connected WiFi access point details.
      properties:
        essid:
          type: string
          description: SSID of the connected access point.
        autoConn:
          type: boolean
          description: Whether auto-connect is enabled for this access point.
        status:
          type: string
          description: Connection status.
          example: connected
        security:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceMlan0AccesspointSecurity'
    getNetworkResponseNetworkInterfaceMlan0:
      type: object
      description: WiFi station interface.
      properties:
        IPV4:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceEth0IPV4'
        IPV6:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceEth0IPV6'
        accesspoint:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceMlan0Accesspoint'
        Status:
          type: string
          example: connected
        isEnabled:
          type: boolean
        macAddress:
          type: string
          example: 48:A4:93:BF:A9:50
    getNetworkResponseNetworkInterfaceBnep0:
      type: object
      description: Bluetooth PAN interface.
      properties:
        ipAddress:
          type: string
          description: IP address assigned to the Bluetooth PAN interface.
        subnetMask:
          type: string
          description: Subnet mask for the Bluetooth PAN interface.
        dhcpStartAddress:
          type: string
          description: Start of the DHCP address range served to connected Bluetooth clients.
        dhcpEndAddress:
          type: string
          description: End of the DHCP address range served to connected Bluetooth clients.
        deviceDiscoverableName:
          type: string
          description: Bluetooth device name broadcast during discovery.
        isDiscoverable:
          type: boolean
          description: Whether the device is visible to other Bluetooth devices.
        isPairable:
          type: boolean
          description: Whether the device accepts new Bluetooth pairing requests.
        passKey:
          type: string
          description: PIN/passkey required for Bluetooth pairing (when usePassKey is true).
        usePassKey:
          type: boolean
          description: Whether a passkey is required for Bluetooth pairing.
        Status:
          type: string
          description: Current status of the Bluetooth PAN interface (e.g. active, inactive).
        isEnabled:
          type: boolean
          description: Whether the Bluetooth PAN interface is enabled.
        macAddress:
          type: string
          description: MAC address of the Bluetooth interface.
    getNetworkResponseNetworkInterfaceWan0Psim:
      type: object
      description: Physical SIM configuration and status.
      properties:
        apn:
          type: string
          description: Access Point Name.
        preferredNetworkType:
          type: string
          example: AUTO
        enableIPv6:
          type: boolean
        enablePin:
          type: boolean
        enableRoaming:
          type: boolean
        currentDataClass:
          type: string
          example: LTE
        highestAvailableDataClass:
          type: string
          example: LTE
        currentServiceProvider:
          type: string
        registerState:
          type: string
          example: Home
        packetServiceState:
          type: string
          example: Attached
        internetAccess:
          type: boolean
        simState:
          type: string
          example: Initialized
        signalBar:
          type: number
        rssi:
          type: string
          example: -82.7dBm
        rsrp:
          type: string
          example: -103.7dBm
        rsrq:
          type: string
          example: -5.5dB
        snr:
          type: string
          example: 0.0dB
    getNetworkResponseNetworkInterfaceWan0:
      type: object
      description: WAN / cellular interface.
      properties:
        activeSim:
          type: string
          description: The active SIM slot.
          enum:
          - psim
          - esim
        psim:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceWan0Psim'
        esim:
          $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceWan0Psim'
        Status:
          type: string
          example: online
        isEnabled:
          type: boolean
        macAddress:
          type: string
    getNetworkResponseNetworkInterfaceUap0ClientsItem:
      type: object
      properties:
        hostName:
          type: string
        IP:
          type: string
        MAC:
          type: string
    getNetworkResponseNetworkInterfaceUap0:
      type: object
      description: WiFi Hotspot (Access Point) interface.
      properties:
        ssid:
          type: string
          description: Hotspot SSID name.
          example: FXR90Hotspot
        ssidPassword:
          type: string
          description: Hotspot password.
        isHidden:
          type: boolean
          description: Whether the SSID is hidden from broadcast.
        securityType:
          type: string
          description: Security protocol used by the hotspot.
          enum:
          - WPA2Personal
          - WPA3Personal
        Clients:
          type: array
          description: List of devices currently connected to the hotspot.
          items:
            $ref: '#/components/schemas/getNetworkResponseNetworkInterfaceUap0ClientsItem'
        Status:
          type: string
          example: active
        isEnabled:
          type: boolean
        macAddress:
          type: string
