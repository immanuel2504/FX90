    setConfigMqttRequest:
      type: object
      description: At least one of xml, GPIO-LED, or READER-GATEWAY must be provided.
      properties:
        xml:
          type: string
          description: Raw XML reader configuration string.
        GPIO-LED:
          $ref: '#/components/schemas/GPIOLEDConfig.v1'
        READER-GATEWAY:
          type: object
          description: 'Cloud gateway configuration. Must contain at least one of: endpointConfig, batching, retention, or managementEventConfig.'
          properties:
            endpointConfig:
              type: object
              description: Endpoint connections configuration. Only the data endpoint is configurable via this API.
              properties:
                data:
                  type: object
                  properties:
                    event:
                      type: object
                      properties:
                        connections:
                          type: array
                          items:
                            type: object
                            properties:
                              additionalOptions:
                                type: object
                                properties:
                                  batching:
                                    type:
                                    - object
                                    - 'null'
                                    example: null
                                  retention:
                                    type: object
                                    properties:
                                      maxEventRetentionTimeInMin:
                                        type: number
                                        example: 500
                                      maxNumEvents:
                                        type: number
                                        example: 150000
                                      throttle:
                                        type: number
                                        example: 500
                              description:
                                type: string
                                example: MQTT_TEST
                              name:
                                type: string
                                example: MQTT_TEST
                              options:
                                type: object
                                properties:
                                  additional:
                                    type: object
                                    properties:
                                      cleanSession:
                                        type: boolean
                                        example: true
                                      clientId:
                                        type: string
                                        example: EV1
                                      debug:
                                        type: boolean
                                        example: false
                                      keepAlive:
                                        type: number
                                        example: 60
                                      qos:
                                        type: number
                                        example: 0
                                      reconnectDelay:
                                        type: number
                                        example: 1
                                      reconnectDelayMax:
                                        type: number
                                        example: 5
                                  enableSecurity:
                                    type: boolean
                                    example: false
                                  endpoint:
                                    type: object
                                    properties:
                                      hostName:
                                        type: string
                                        example: 10.117.229.9
                                      port:
                                        type: number
                                        example: 1883
                                      protocol:
                                        type: string
                                        example: tcp
