put:
  tags:
  - Control
  summary: Start Tag Reads
  description: "MQTT API :- start\n\nStart RFID inventory, BLE scanning, or both simultaneously.\n\
    The optional `scanType` array controls which scan types are activated.\nOmitting\
    \ the payload (or `scanType`) defaults to RFID-only.\nBLE scanning requires prior\
    \ BLE configuration via `set_bleConfig`.\n  `scanType` with `\"ble\"` cannot be\
    \ combined with `applyImpinjGen2X`."
  operationId: startInventory
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/startInventoryRequest
        examples:
          start_Inventory:
            value: {}
          start_Inventory with AutoStart:
            value:
              doNotPersistState: false
          start_Inventory with ImpinjGen2X:
            value:
              applyImpinjGen2X: true
          start_BLE_only:
            value:
              scanType:
              - ble
          start_RFID_only:
            value:
              scanType:
              - rfid
          start_BLE_and_RFID:
            value:
              scanType:
              - ble
              - rfid
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
