get:
  tags:
  - Control
  summary: Returns whether the rxSawFilter is enabled or disabled
  description: MQTT API :-  get_preSelection <br> Returns whether the rxSawFilter is enabled or disabled
  operationId: getPreSelection
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/get_preSelectionResponse
  security:
  - bearerAuth: []
put:
  tags:
  - Control
  summary: Enables or disables the rxSawFilter
  description: MQTT API :-  set_preSelection <br> Enables or disables the rxSawFilter. Set to true to enable, false to disable
  operationId: setPreSelection
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/put_preSelectionRequest
        examples:
          set_preSelection:
            value:
              preSelection: false
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/put_preSelectionResponse
  security:
  - bearerAuth: []
