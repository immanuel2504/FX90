get:
  tags:
  - Control
  summary: Retrieves the operating mode
  description: MQTT API :-  get_mode <br> Retrieves the current operating mode
  operationId: getMode
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/getModeResponse
          example:
            antennaStopCondition:
            - type: DURATION
              value: 100
            - type: DURATION
              value: 100
            - type: DURATION
              value: 100
            antennas:
            - 1
            - 5
            - 6
            delayBetweenAntennaCycles:
              duration: 0
              type: DISABLED
            query:
            - tagPopulation: 256
            - tagPopulation: 256
            - tagPopulation: 256
            inventoryProtocol:
              mode: GEN2X
            reportFilter:
              duration: 0
              type: PER_ANTENNA
            tagMetaData:
            - ANTENNA
            - RSSI
            - CHANNEL
            - PC
            - XPC
            - CRC
            - SEEN_COUNT
            - PHASE
            transmitPower:
            - 20
            - 20
            - 20
            type: CUSTOM
  security:
  - bearerAuth: []
put:
  tags:
  - Control
  summary: Updates the reader's operating mode
  description: MQTT API :-  set_mode <br> Changes the reader's operating mode
  operationId: setMode
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setModeRequest
        examples:
          set_mode:
            value:
              antennaStopCondition:
                type: DURATION
                value: 400
              antennas:
              - 1
              - 2
              - 3
              - 4
              linkprofile: 1519
              query:
                sel: ALL
                session: S2
                tagPopulation: 2000
                target: AB
              inventoryProtocol:
                mode: GEN2X
              radioStopConditions:
                duration: 60
              transmitPower: 31.5
              type: SIMPLE
          set_mode_default_FXR90:
            value:
              antennaStopCondition:
                type: DURATION
                value: 100
              antennas:
              - 1
              component: RC
              delayBetweenAntennaCycles:
                duration: 0
                type: DISABLED
              linkProfile: 3
              payload: status
              query:
                sel: ALL
                session: S1
                tagPopulation: 256
                target: A
              inventoryProtocol:
                mode: GEN2X
              reportFilter:
                duration: 0
                type: PER_ANTENNA
              tagMetaData:
              - RSSI
              - PHASE
              - SEEN_COUNT
              - ANTENNA
              - CHANNEL
              - PC
              - XPC
              - CRC
              transmitPower:
              - 17
              type: CUSTOM
          set_mode_TAG_FOCUS:
            value:
              type: CUSTOM
              antennaStopCondition:
                type: DURATION
                value: 100
              antennas:
              - 1
              query:
                tagpopulation: 10
                sel: NOT_SL
                session: S1
                target: A
              inventoryProtocol:
                mode: GEN2X
              modeSpecificSettings:
                interval:
                  unit: seconds
                  value: 0
              selects:
              - target: S1
                action: INVB_NOTHING
                membank: TID
                pointer: 6
                length: 24
                mask: '800600'
              transmitPower:
              - 30
              radioStartConditions: {}
              radioStopConditions: {}
              reportFilter:
                duration: 1
                type: PER_ANTENNA
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/setModeResponse
  security:
  - bearerAuth: []
