get:
  tags:
  - Date&Time
  summary: Retrieves the reader timezone
  description: MQTT API :-  get_timeZone <br> Gets the active timezone
  operationId: getTimezone
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/getTimezoneResponse
  security:
  - bearerAuth: []
put:
  tags:
  - Date&Time
  summary: Sets the timezone
  description: MQTT API :-  set_timeZone
  operationId: setTimezone
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setTimezoneRequest
        examples:
          set_timeZone:
            value:
              timeZone: Asia/Dubai
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
