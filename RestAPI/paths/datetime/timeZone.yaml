get:
  tags:
  - Date&Time
  summary: Get Reader Time Zone
  description: MQTT API :-  get_timeZone <br> Gets the active timezone
  operationId: getTimeZone
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/getTimezoneResponse
  security:
  - bearerAuth: []
put:
  tags:
  - Date&Time
  summary: Set Reader Time Zone
  description: MQTT API :-  set_timeZone
  operationId: setTimeZone
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setTimezoneRequest
        examples:
          set_timeZone:
            value:
              timeZone: International Date Line West
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
