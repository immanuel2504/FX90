get:
  tags:
  - Gpio
  summary: Get GPO Status
  description: 'MQTT API :-  get_gpoStatus <br> Retrieves the current GPO port states.
    Maximum number of ports available per device type: FX7500 = 3 GPO pins, FX9600
    = 4 GPO pins, ATR7000 = 3 GPO pins.'
  operationId: getGpoStatus
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/get_gpoResponse
  security:
  - bearerAuth: []
put:
  tags:
  - Gpio
  summary: Control GPO
  description: 'MQTT API :-  set_gpo <br> Updates the state of the specified GPO port.
    Maximum number of ports available per device type: FX7500 = 3 GPO pins, FX9600
    = 4 GPO pins, ATR7000 = 3 GPO pins.'
  operationId: setGpo
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setGpoRequest
        examples:
          set_gpo:
            value:
              port: 3
              state: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/setGpoResponse
  security:
  - bearerAuth: []
