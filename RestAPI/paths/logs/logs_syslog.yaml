delete:
  tags:
  - Logs
  summary: Purge Log
  description: MQTT API :-  del_logs_syslog <br> Purges syslog.
  operationId: delLogsSyslog
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
