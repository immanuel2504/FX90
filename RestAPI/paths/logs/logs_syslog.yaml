get:
  tags:
  - Logs
  summary: Retrieve Syslog
  description: MQTT API :-  get_logs_syslog <br> Retrieves the syslog from the reader.
  operationId: getLogsSyslog
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/get_logs_syslogResponse
