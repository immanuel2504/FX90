get:
  tags:
  - Logs
  summary: Log Configuration
  description: MQTT API :-  get_logs <br> Retrieves reader log configuration
  operationId: getLogs
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/getLogsResponse
          example:
            components:
            - componentName: radio_control
              level: INFO
            - componentName: reader_gateway
              level: INFO
            radioPacketLog: false
  security:
  - bearerAuth: []
put:
  tags:
  - Logs
  summary: Configures the logs
  description: MQTT API :-  set_logs <br> Changes logging level
  operationId: setLogs
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setLogsRequest
        examples:
          set_logs:
            value:
              components:
              - componentName: radio_control
                level: INFO
              - componentName: reader_gateway
                level: DEBUG
              radioPacketLog: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/setLogsResponse
  security:
  - bearerAuth: []
