put:
  tags:
  - userapp
  summary: Start User App
  description: MQTT API :-  start_user_app <br> Starts a user application. For REST,
    the application is identified by the `{appname}` path parameter. For MQTT, the
    application is identified by the `appname` payload field.
  operationId: setStartUserApp
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setStartuserappRequest
        examples:
          set_startUserapp:
            value:
              appname: mylogger
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
parameters:
- name: appname
  in: path
  required: true
  schema:
    type: string
