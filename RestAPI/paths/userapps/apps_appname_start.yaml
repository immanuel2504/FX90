put:
  tags:
  - userapp
  summary: Start user application
  description: MQTT API :-  set_startUserapp <br> Starts a user application. For local REST, the app name is specified via the `{appname}` path parameter. For MQTT, `appname` must be provided in the request payload.
  operationId: setStartuserapp
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setStartuserappRequest
        examples:
          set_startUserapp:
            value:
              appname: mylogger
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
parameters:
- name: appname
  in: path
  required: true
  schema:
    type: string
