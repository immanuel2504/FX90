put:
  tags:
  - userapp
  summary: Auto Start User App
  description: MQTT API :-  autostart_user_app <br> Configures autostart for a user
    application. For REST, the application is identified by the `{appname}` path parameter.
    For MQTT, the application is identified by the `appname` payload field.
  operationId: setAutostartUserApp
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setAutostartuserappRequest
        examples:
          set_autostartUserapp:
            value:
              appname: mylogger
              autostart: true
          set_autostartUserapp-false:
            value:
              appname: mylogger
              autostart: false
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
parameters:
- name: appname
  in: path
  required: true
  schema:
    type: string
