get:
  tags:
  - userapp
  summary: List user applications
  description: MQTT API :-  get_user_apps <br> Lists all installed user applications
  operationId: getUserApps
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/getUserappsResponse
          example:
          - appname: mylogger
            runningStatus: true
            autostart: false
            metadata: 'APP_TYPE: DA'
          - appname: sample
            runningStatus: false
            autostart: true
            metadata: 'APP_TYPE: NORMAL'
  security:
  - bearerAuth: []
