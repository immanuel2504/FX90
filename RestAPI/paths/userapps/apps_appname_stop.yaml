put:
  tags:
  - userapp
  summary: Stop user application
  description: MQTT API :-  stop_user_app <br> Stops a user application. For REST,
    the application is identified by the `{appname}` path parameter. For MQTT, the
    application is identified by the `appname` payload field.
  operationId: setStopUserApp
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setStopuserappRequest
        examples:
          set_stopUserapp:
            value:
              appname: mylogger
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
parameters:
- name: appname
  in: path
  required: true
  schema:
    type: string
