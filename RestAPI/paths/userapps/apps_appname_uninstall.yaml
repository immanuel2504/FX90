put:
  tags:
  - userapp
  summary: Uninstall User Application
  description: MQTT API :-  uninstall-user-app <br> Uninstalls a user application.
    For REST, the application is identified by the `{appname}` path parameter. For
    MQTT, the application is identified by the `appname` payload field.
  operationId: setUninstallUserApp
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setUninstalluserappRequest
        examples:
          set_uninstallUserapp:
            value:
              appname: mylogger
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
parameters:
- name: appname
  in: path
  required: true
  schema:
    type: string
