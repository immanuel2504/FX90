put:
  tags:
  - userapp
  summary: Uninstall User Application
  description: MQTT API :-  set_uninstallUserapp <br> Uninstalls a user application. For local REST, the app name is specified via the `{appname}` path parameter. For MQTT, `appname` must be provided in the request payload.
  operationId: setUninstalluserapp
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setUninstalluserappRequest
        examples:
          set_uninstallUserapp:
            value:
              appname: mylogger
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
parameters:
- name: appname
  in: path
  required: true
  schema:
    type: string
