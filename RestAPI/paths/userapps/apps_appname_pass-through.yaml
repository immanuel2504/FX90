put:
  tags:
  - userapp
  summary: Send Commands to User App
  description: MQTT API :-  set_req_usr_app <br> Sends a request to a user application.
    For REST, the application is identified by the `{appname}` path parameter. For
    MQTT, the target application is identified by the `userapp` payload field.
  operationId: setReqToUserApp
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setReqtouserappRequest
        examples:
          set_reqToUserapp:
            value:
              command:
                message: Hello World!!!
              userapp: mylogger
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/setReqtouserappResponse
  security:
  - bearerAuth: []
parameters:
- name: appname
  in: path
  required: true
  schema:
    type: string
