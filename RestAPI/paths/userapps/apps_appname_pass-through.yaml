put:
  tags:
  - userapp
  summary: Send Request to Userapp
  description: MQTT API :-  set_reqToUserapp <br> Sends a request to a user application. The `{appname}` path parameter is required for local REST only; the MQTT API uses the payload instead.
  operationId: setReqtouserapp
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setReqtouserappRequest
        examples:
          set_reqToUserapp:
            value:
              command:
                message: Hello World!!!
              userapp: mylogger
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/setReqtouserappResponse
  security:
  - bearerAuth: []
parameters:
- name: appname
  in: path
  required: true
  schema:
    type: string
