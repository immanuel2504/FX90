put:
  tags:
  - System
  summary: Changes the password on the reader
  description: MQTT API :-  set_password <br> Changes the password on the reader
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/put_updatePasswordRequest
        examples:
          set_password:
            value:
              currentPassword: change
              newPassword: Mypass@123
              userName: admin
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/put_updatePasswordResponse
  security:
  - bearerAuth: []
