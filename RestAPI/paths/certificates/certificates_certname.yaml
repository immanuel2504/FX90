parameters:
- name: certname
  in: path
  required: true
  schema:
    type: string
put:
  tags:
  - Certificate
  summary: Refresh Certificate
  description: MQTT API :-  set_refreshCertificate <br> Refreshes the specified certificate
    on the device
  operationId: setRefreshCertificate
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../openapi.yaml#/components/schemas/setRefreshcertificateRequest
        examples:
          set_refreshCertificate_server:
            value:
              name: Server
              type: server
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
delete:
  tags:
  - Certificate
  summary: Delete Certificate
  description: MQTT API :-  del_certificate <br> Delete the specified certificate
    from the device
  operationId: delCertificate
  parameters:
  - name: type
    in: query
    required: true
    schema:
      type: string
      enum:
      - client
      - server
      - app
      description: 'Certificate type. Allowed values: client, server, app.'
  responses:
    '200':
      description: OK
  security:
  - bearerAuth: []
