get:
  tags:
  - Network
  summary: Retrieves network interfaces
  description: MQTT API :-  get_networkInterfaces <br> Retrieves the network interface
    configuration of the reader
  operationId: getNetworkInterfaces
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../openapi.yaml#/components/schemas/getNetworkinterfacesResponse
          examples:
            application/json:
              value:
                availableNetworkInterfaces:
                - eth0
                - mlan0
                - bnep0
                - wan0
  security:
  - bearerAuth: []
