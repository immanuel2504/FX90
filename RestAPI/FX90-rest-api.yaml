  /cloud/impinjGen2X:
    get:
      tags:
      - ImpinjGen2X
      summary: Get Impinj Gen2X configuration
      description: '## 1. Description


        The `GET /cloud/impinjGen2X` REST endpoint retrieves the Impinj Gen2X configuration currently saved on the reader.


        This endpoint returns:


        - Whether FastID, TagFocus, TagProtect, or TagQuieting is configured

        - The parameters for each enabled Gen2X feature


        No request body is required. If no Gen2X configuration has been saved, the response body will be an empty object.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/impinjGen2X` |

        | Operation ID | `getImpinjGen2X` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | MQTT Command | `get_impinjGen2X` |

        | MQTT Equivalent | `get_impinjGen2X` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Required Request Fields | None |

        | Supported Response Sections | JSON response body |

        | Supported API Versions | V1.0 |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/impinjGen2X` to:


        - Check whether FastID, TagProtect, TagFocus, or TagQuieting has been configured

        - Review Gen2X settings before applying them with a start inventory call

        - Verify the effect of a prior `PUT /cloud/impinjGen2X` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `fastId` | Is FastID enabled? | FastID embeds the TID in the singulation response, enabling faster tag identification without a separate read. |

        | `tagFocus` | Is TagFocus configured? | TagFocus reduces re-reading of already-singulated tags in dense tag populations. |

        | `tagQuieting` | Is TagQuieting set? | TagQuieting suppresses repeated reads of the same tag EPC within a session. |

        | `tagProtect` | Is TagProtect active? | TagProtect applies Impinj proprietary tag locking features for secure deployments. |'
      operationId: getImpinjGen2X
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getImpinjGen2XResponse'
              examples:
                empty:
                  value: {}
                fastID_configured:
                  value:
                    fastID:
                      enabled: true
                      tidSelector: TID[0]
                tagFocus_configured:
                  value:
                    tagFocus:
                      enabled: true
                tagProtect_configured:
                  value:
                    tagProtect:
                      action: enableTagProtection
                      password: '77777777'
                      tagID: e2801191a5030069073b426d
                      enableShortRange: true
                tagQuieting_basic_configured:
                  value:
                    tagQuieting:
                      basic:
                        action: quiet
                        tagIDs:
                        - e2801191a5030069073b426d
                tagQuieting_advanced_configured:
                  value:
                    tagQuieting:
                      advanced:
                        tagQuietMasks:
                        - S0A
                        - S2A
                        target: SL
                        stateAwareAction: ASSERTSL
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getImpinjGen2XResponseschema_500'
      security:
      - bearerAuth: []
    put:
      tags:
      - ImpinjGen2X
      summary: Set Impinj Gen2X configuration
      description: "The `PUT /cloud/impinjGen2X` REST endpoint configures Impinj Gen2X proprietary RFID features on the FXR90 reader, covering FastID acceleration, TagProtect security, TagFocus singulation control, and TagQuieting (basic and advanced) behavior.\n\n**This endpoint allows you to configure:**\n\n- FastID for combined EPC + TID reads in a single inventory operation\n- TagProtect for password-based tag protection and visibility control\n- TagFocus to suppress already-read tags during dense inventory\n- TagQuieting (basic or advanced) to silence specific tags by EPC or by Gen2 select masks\n\n**Use this endpoint to:**\n\n- Improve inventory performance in dense or high-duplicate tag environments\n- Protect sensitive tags from unauthorized reads or writes\n- Reduce duplicate reporting by silencing already-inventoried tags\n- Apply advanced Gen2 select pre-conditions for state-aware tag quieting\n\n### Endpoint Details\n\n| Property | Value |\n|---|---|\n| Pattern Name | Impinj Gen2X Configuration Update |\n| Communication Type | Client to Device (HTTP request/response) |\n| Applies To | FXR90 Series |\n| MQTT Command | `set_impinjGen2X` |\n| REST Endpoint | `PUT /cloud/impinjGen2X` |\n| Related Endpoints | `GET /cloud/impinjGen2X`, `PUT /cloud/start`, `PUT /cloud/stop` |\n| Authentication | Bearer token (`Authorization: Bearer <token>`) |\n| Content-Type | `application/json` |\n| Required Request Fields | At least one of `fastID`, `tagProtect`, `tagFocus`, `tagQuieting` |\n| Success Response | `200 OK` |\n| Error Responses | `422 Unprocessable Entity`, `500 Internal Server Error` |\n| Supported Features | FastID, TagProtect, TagFocus, TagQuieting (basic and advanced) |\n| Supported TagProtect Actions | `enableTagProtection`, `disableTagProtection`, `enableTagVisibility`, `disableTagVisibility` |\n| Supported TagQuieting Basic Actions | `quiet`, `unquiet` |\n| Supported Gen2 Memory Banks | EPC, TID, USER, RESERVED |\n| Supported Select Targets | S0, S1, S2, S3, SL |\n| Supported Tag Quiet Masks | S0A, S0B, S1A, S1B, S2A, S2B, S3A, S3B, SL_ASSERT, SL_DEASSERT |\n| Mutually Exclusive Features | FastID, TagFocus, TagQuieting (only one reader-scoped feature active at a time) |\n\n---\n\n## 2. Before You Begin\n\nDecide which Gen2X feature you need to configure before sending this request. You can send a minimal payload targeting only one feature (for example, only `fastID` or only `tagProtect`), but you cannot combine mutually exclusive reader-scoped features in a single request.\n\n| What You Need | Details |\n|---|---|\n| Authentication | Obtain a valid bearer token and include it in the `Authorization` header of every request. |\n| Network reachability | The reader's HTTPS endpoint must be reachable from your client. Verify connectivity before issuing the request. |\n| Feature decision | Choose exactly one reader-scoped feature (`fastID`, `tagFocus`, or `tagQuieting`) per request. `tagProtect` is tag-scoped and can be configured independently. |\n| TagProtect credentials | For any `tagProtect` action, have the 8-character hex access password ready. For tag-specific actions (`enableTagProtection`, `disableTagProtection`), also have the target EPC (`tagID`). |\n| Tag ID list (Basic Quieting) | For `tagQuieting.basic`, prepare the list of EPCs to quiet or unquiet. A maximum of **31 tag IDs** is supported per request. |\n| Pre-select strategy (Advanced Quieting) | For `tagQuieting.advanced`, decide on the Gen2 select pre-conditions (`preSelect` array), including target session/SL flag, action, and memory mask. |\n| Quiet mask flags | For `tagQuieting.advanced`, know which session flags (`S0A`-`S3B`, `SL_ASSERT`, `SL_DEASSERT`) define the quieted state. |\n| Inventory state | `PUT /cloud/impinjGen2X` should be called **before** starting inventory. Stop any active inventory first by calling `PUT /cloud/stop`. |\n| Activation | The saved configuration is **not active** until you call `PUT /cloud/start` with `applyImpinjGen2X: true` in the request body. |\n\n---\n\n## 3. Choosing a Gen2X Feature\n\nThe Gen2X feature you select\
        \ determines the reader's behavior during inventory. Choose based on your operational goal.\n\n| Feature | Description | Scope |\n|---|---|---|\n| `fastID` | Returns the EPC and TID together in a single read, eliminating the need for a separate TID read. Best for applications that require chip-level identity (anti-counterfeit, authentication). | Reader-scoped |\n| `tagProtect` | Password-protects individual tags or controls reader visibility of protected tags. Use for securing sensitive items or restricting access. | Tag-scoped |\n| `tagFocus` | Silences already-read tags so the reader focuses only on new tags entering the field. Ideal for portal and conveyor applications. | Reader-scoped |\n| `tagQuieting` (basic) | Silences a specific list of tag EPCs from being reported during inventory. Use when you know exactly which tags to suppress. | Reader-scoped |\n| `tagQuieting` (advanced) | Uses Gen2 select pre-conditions (mask + state-aware action) to silence tags based on memory content or session state. Use for complex filtering in dense environments. | Reader-scoped |\n\n> Mutually exclusive: Only one of `fastID`, `tagFocus`, or `tagQuieting` can be active at a time. `tagProtect` can coexist with any one of them because it operates at the tag level.\n\n---\n\n## 4. Choosing TagProtect Actions\n\nTagProtect operations either lock/unlock individual tags or temporarily allow the reader to see already-protected tags. Each action has specific field requirements.\n\n| Action | What It Does | Required Fields | Key Constraints |\n|---|---|---|---|\n| `enableTagProtection` | Permanently protects a tag; the tag becomes invisible to standard reads until unprotected. | `password`, `tagID` | `password` must be exactly 8 hex characters. Optional `enableShortRange` reduces read range during protection. |\n| `disableTagProtection` | Removes protection from a previously protected tag, restoring normal visibility. | `password`, `tagID` | `password` must match the tag's existing access password exactly. |\n| `enableTagVisibility` | Temporarily allows the reader to read protected tags during this session. Does not change the tag's protection state. | `password` | Reader-scoped; affects all protected tags in field. |\n| `disableTagVisibility` | Restores the default behavior where protected tags are hidden from the reader. | `password` | Reverts the effect of `enableTagVisibility`. |\n\n> Important: `enableTagProtection` and `disableTagProtection` are tag-specific (require `tagID`). `enableTagVisibility` and `disableTagVisibility` are reader-wide visibility toggles.\n\n---\n\n## 5. Choosing TagQuieting Strategy\n\nTagQuieting silences tags from being reported during inventory. Choose between **basic** (EPC-list based) and **advanced** (Gen2 select mask based) depending on your filtering complexity.\n\n### Basic TagQuieting\n\n| Field | What It Controls |\n|---|---|\n| `action: quiet` | Silences the listed tags from being reported in future inventories. |\n| `action: unquiet` | Restores reporting for previously quieted tags. |\n| `tagIDs` | Array of EPCs (hex strings) to quiet or unquiet. Maximum **31 EPCs** per request. |\n\n### Advanced TagQuieting\n\nAdvanced quieting uses Gen2 select pre-conditions to silence tags based on memory content and state, instead of explicit EPC lists.\n\n| Field | What It Controls |\n|---|---|\n| `preSelect[]` | Array of Gen2 select operations applied **before** quieting. Each entry contains `target`, `action`, and `mask`. |\n| `preSelect[].target` | The session flag or SL to act upon (`S0`, `S1`, `S2`, `S3`, `SL`). |\n| `preSelect[].action` | The state-aware action to take on match/mismatch (e.g., `ASSERTSL_NOTHING`, `INVB_INVA`, `DEASSERTSL_NOTHING`, `INVA_INVB`). |\n| `preSelect[].mask` | The memory mask: `bank` (EPC/TID/USER/RESERVED), `pointer` (bit offset), `length` (bits), `value` (hex). |\n| `tagQuietMasks` | Array of session-flag combinations defining the quieted state (`S0A`, `S2B`, `SL_ASSERT`, `SL_DEASSERT`, etc.). |\n| `target` | The target session/flag used for the actual quieting operation.\
        \ |\n| `stateAwareAction` | The compound state action (e.g., `ASSERTSL_DEASSERTSL`, `DEASSERTSL_ASSERTSL`) applied during quieting. |\n\n> Important: Use `basic` when you have a discrete list of EPCs. Use `advanced` when filtering by memory content, session state, or complex multi-step Gen2 select conditions.\n\n---\n\n## 6. Choosing FastID and TagFocus\n\nThese two reader-scoped features improve inventory performance but cannot be combined.\n\n### `fastID`\n\n| Field | What It Controls |\n|---|---|\n| `enabled: true` | Reader returns EPC + TID together in a single read, reducing total operations. |\n| `enabled: false` | Reverts to standard EPC-only reads. |\n\n**Use FastID when:** Your application needs TID for every tag (e.g., authentication, chip-level traceability) and you want to avoid the extra round-trip of a separate TID read.\n\n### `tagFocus`\n\n| Field | What It Controls |\n|---|---|\n| `enabled: true` | Once a tag is read, it is silenced for the rest of the inventory cycle. The reader focuses only on new tags entering the field. |\n| `enabled: false` | Standard inventory behavior; tags can be reported multiple times. |\n\n**Use TagFocus when:** You operate portals, conveyors, or other scenarios with many duplicate reads of the same tag set and want unique-tag reporting.\n\n---\n\n## 7. Applying the Configuration\n\nCalling this endpoint only **saves** the configuration on the reader; it is not active until inventory is started with the activation flag.\n\n### REST Workflow\n\n```text\nPUT  /cloud/stop                 -> stop any active inventory\nPUT  /cloud/impinjGen2X          -> save the configuration\nGET  /cloud/impinjGen2X          -> verify the saved configuration\nPUT  /cloud/start                -> body: { \"applyImpinjGen2X\": true }\n```\n\n### Request Format\n\nEvery request to this endpoint follows this structure:\n\n```http\nPUT /cloud/impinjGen2X HTTP/1.1\nHost: <reader-address>\nAuthorization: Bearer <token>\nContent-Type: application/json\n\n{\n  // one or more Gen2X feature objects\n}\n```\n\n### Success Response (`200 OK`)\n\n```http\nHTTP/1.1 200 OK\nContent-Type: application/json\n\n{\n  \"message\": \"Configuration saved successfully\"\n}\n```\n\n### Error Responses\n\n| Status Code | Meaning | When It Occurs |\n|---|---|---|\n| `422 Unprocessable Entity` | Validation error | Empty body, mutually exclusive features sent together, invalid enum value, or constraint violation. |\n| `500 Internal Server Error` | Reader-side failure | Internal reader error while persisting the configuration. |\n\n> Persistence: The reader stores the last saved configuration and restores it across reboots and reconnects. The configuration is only applied during inventory when `applyImpinjGen2X: true` is sent in the `PUT /cloud/start` request body.\n\n---\n\n## 8. Rules and Constraints\n\n### Inventory State\n\n- `PUT /cloud/impinjGen2X` cannot modify configuration while an active inventory is running. Stop inventory first by calling `PUT /cloud/stop`.\n- Configuration changes only take effect on the next `PUT /cloud/start` call that includes `applyImpinjGen2X: true` in the request body.\n\n### Request Format\n\n- HTTP method must be `PUT`.\n- `Content-Type` header must be `application/json`.\n- `Authorization` header must contain a valid bearer token.\n- Request body must contain at least one of: `fastID`, `tagProtect`, `tagFocus`, `tagQuieting`. An empty body returns `422 Unprocessable Entity`.\n\n### Mutual Exclusivity\n\n- Only **one** of `fastID`, `tagFocus`, or `tagQuieting` may be active at a time. Sending more than one reader-scoped feature in a single request returns `422 Unprocessable Entity`.\n- `tagProtect` is tag-scoped and may be configured alongside any one reader-scoped feature.\n\n### TagProtect\n\n- `password` must be exactly **8 hex characters (32 bits)** for all TagProtect actions.\n- `tagID` is required for `enableTagProtection` and `disableTagProtection`. It must be a valid EPC hex string.\n- `enableShortRange` is optional and only applies to `enableTagProtection`.\n\n### TagQuieting\
        \ (Basic)\n\n- `tagIDs` array supports a **maximum of 31 EPCs** per request.\n- Each EPC must be a valid hex string matching the tag's EPC memory bank content.\n- `basic` and `advanced` sub-objects are mutually exclusive within `tagQuieting`.\n\n### TagQuieting (Advanced)\n\n- `preSelect[].mask.value` must be a valid hex string matching `length` (bits).\n- `mask.bank` must be one of `EPC`, `TID`, `USER`, or `RESERVED`.\n- `mask.pointer` is a **bit position** (not a word offset).\n- `tagQuietMasks` values must come from the supported session-flag enum list.\n\n### Response Handling\n\n- A `200 OK` response indicates the configuration was saved successfully on the reader.\n- A `422 Unprocessable Entity` response indicates the request body failed validation. Inspect the response body for the specific error reason.\n- A `500 Internal Server Error` response indicates a reader-side failure. Retry after verifying reader health."
      operationId: setImpinjGen2X
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setImpinjGen2XRequest'
            examples:
              enable_fastID:
                value:
                  fastID:
                    enabled: true
              disable_fastID:
                value:
                  fastID:
                    enabled: false
              protect_tag:
                value:
                  tagProtect:
                    action: enableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
                    enableShortRange: true
              unprotect_tag:
                value:
                  tagProtect:
                    action: disableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
              enable_protect_read:
                value:
                  tagProtect:
                    action: enableTagVisibility
                    password: '77777777'
              disable_protect_read:
                value:
                  tagProtect:
                    action: disableTagVisibility
                    password: '77777777'
              enable_tagFocus:
                value:
                  tagFocus:
                    enabled: true
              disable_tagFocus:
                value:
                  tagFocus:
                    enabled: false
              quiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: quiet
                      tagIDs:
                      - e2801191a5030069073b426d
                      - e2801191a5030069073b426e
              unquiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: unquiet
                      tagIDs:
                      - e2801191a5030069073b426d
              advanced_quiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                      - target: SL
                        action: ASSERTSL_NOTHING
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280123456789012345678AB
                      - target: S2
                        action: INVB_INVA
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                      - SL_ASSERT
                      - S2B
                      target: SL
                      stateAwareAction: ASSERTSL_DEASSERTSL
              advanced_unquiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                      - target: SL
                        action: DEASSERTSL_NOTHING
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280123456789012345678AB
                      - target: S2
                        action: INVA_INVB
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                      - SL_DEASSERT
                      - S2A
                      target: SL
                      stateAwareAction: DEASSERTSL_ASSERTSL
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setImpinjGen2XResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setImpinjGen2XResponseschema_422'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setImpinjGen2XResponseschema_500'
      security:
      - bearerAuth: []
  /cloud/ble-config:
    put:
      tags:
      - Ble
      summary: Set BLE configuration
      description: 'The `PUT /cloud/ble-config` REST endpoint and the `set_bleConfig` MQTT command configure BLE scanning on the reader.


        Use this operation to:

        - Enable or disable BLE scanning

        - Set the scan interval

        - Filter beacons by RSSI, service UUID, address, or beacon protocol fields

        - Configure iBeacon, AltBeacon, Eddystone, and generic BLE filters


        ## 1. Operation Details


        | Property | Value |

        |---|---|

        | Pattern Name | BLE Configuration Update |

        | Supported Protocols | REST (HTTP/HTTPS), MQTT |

        | Applies To | FXR90 |

        | Related Operations | `getBleConfig`, `startInventory`, `stopInventory` |

        | REST Endpoint | `PUT /cloud/ble-config` |

        | MQTT Command | `set_bleConfig` |


        ## 2. Before You Begin


        BLE configuration must be applied before starting a BLE scan. After saving configuration, use `PUT /cloud/start` with `scanType: ["ble"]` or `scanType: ["ble", "rfid"]`.


        | Field | Notes |

        |---|---|

        | `ble.enable` | Required. Set to `true` to enable BLE scanning or `false` to disable it. |

        | `ble.scanIntervalSec` | Optional scan interval in seconds. |

        | `ble.additionalFilters.rssi` | Optional minimum RSSI filter. |

        | `ble.protocols` | Optional protocol-specific filters for iBeacon, AltBeacon, Eddystone, or generic BLE advertisements. |'
      operationId: setBleConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setBleConfigRequest'
            examples:
              enable_ble:
                value:
                  ble:
                    enable: true
              enable_with_interval:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
              enable_with_rssi_filter:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 10
                    additionalFilters:
                      rssi: -70
              enable_with_protocols:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
                    protocols:
                      iBeacon:
                        enabled: true
                        filters:
                        - uuid: FDA50693-A4E2-4FB1-AFCF-C6EB07647825
                          major: 10001
                          minor: 20002
                          txPower: -59
                      altBeacon:
                        enabled: true
                        filters:
                        - mfgId: 0118
                          beaconId: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                          major: 4
                          minor: 4
                          refRssi: -100
                      eddystone:
                        enabled: true
                        filters:
                        - frameType: URL
                          txPower: -59
                          url: https://www.zebra.com
                        - frameType: UID
                          txPower: -18
                          namespace: 0102030405060708090A
                          instance: '000000000001'
                        - frameType: EID
                          txPower: -18
                          ephemeralId: 0102030405060708
                      generic:
                        enabled: true
                        filters:
                        - address: 7E:41:25:1E:D5:16
                          addressType: random
                          name: BLEPeripheralApp
                          alias: BLEPeripheralApp
                    additionalFilters:
                      rssi: -80
                      serviceUuids16:
                      - FEAA
                      - FE9B
                      serviceUuids128:
                      - FDA50693-A4E2-4FB1-AFCF-C6EB07647825
              disable_ble:
                value:
                  ble:
                    enable: false
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
    get:
      tags:
      - Ble
      summary: Get BLE configuration
      description: '## 1. Description


        The `GET /cloud/ble-config` REST endpoint retrieves the current Bluetooth Low Energy (BLE) scanner configuration from the reader.


        This endpoint returns:


        - Whether BLE scanning is enabled

        - Scan interval and window settings

        - RSSI filtering threshold

        - iBeacon, AltBeacon, Eddystone, and generic BLE advertisement filter settings


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/ble-config` |

        | Operation ID | `getBleConfig` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | MQTT Command | `get_bleConfig` |

        | MQTT Equivalent | `get_bleConfig` |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Required Request Fields | None |

        | Supported Response Sections | JSON response body |

        | Supported API Versions | V1.0 |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/ble-config` to:


        - Verify BLE scanning is enabled before starting a BLE inventory scan

        - Review scan interval and RSSI filter settings before modifying them

        - Confirm iBeacon, AltBeacon, Eddystone, or generic BLE filter configuration

        - Verify the effect of a prior `PUT /cloud/ble-config` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `enabled` | Is BLE scanning enabled? | BLE inventory will not start if scanning is disabled. |

        | `scanInterval` | What is the configured scan interval? | Determines how frequently the reader actively listens for BLE advertisements. |

        | `rssiFilter` | What is the RSSI threshold? | Tags or beacons below this threshold are filtered out of scan results. |

        | Beacon type filters | Which beacon types are included? | Only enabled beacon types will appear in BLE tag data events. |'
      operationId: getBleConfig
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getBleConfigResponse'
              example:
                ble:
                  enable: true
                  scanIntervalSec: 5
                  protocols:
                    iBeacon:
                      enabled: true
                      filters:
                      - uuid: FDA50693-A4E2-4FB1-AFCF-C6EB07647825
                        major: 10001
                        minor: 20002
                        txPower: -59
                    altBeacon:
                      enabled: true
                      filters:
                      - mfgId: 0118
                        beaconId: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                        major: 4
                        minor: 4
                        refRssi: -100
                    eddystone:
                      enabled: true
                      filters:
                      - frameType: URL
                        txPower: -59
                        url: https://www.zebra.com
                      - frameType: UID
                        txPower: -18
                        namespace: 0102030405060708090A
                        instance: '000000000001'
                      - frameType: EID
                        txPower: -18
                        ephemeralId: 0102030405060708
                    generic:
                      enabled: true
                      filters:
                      - address: 7E:41:25:1E:D5:16
                        addressType: random
                        name: BLEPeripheralApp
                        alias: BLEPeripheralApp
                  additionalFilters:
                    rssi: -80
                    serviceUuids16:
                    - FEAA
                    - FE9B
                    serviceUuids128:
                    - FDA50693-A4E2-4FB1-AFCF-C6EB07647825
      security:
      - bearerAuth: []
