    gpoledAction.v1:
      title: GPO-LED Action
      type: array
      description: Array of GPO or LED actions. Actions will be performed sequentially.
      x-internal: true
      items:
        anyOf:
        - $ref: '#/components/schemas/gpoAction.v1'
        - $ref: '#/components/schemas/ledAction.v1'
    GPIOLEDConfig.v1:
      title: GPIO-LED configuration
      type: object
      description: 'GPIO-LED module configuration


        Configure GPO and LED behaviour based on Events generated


        Supported Events:

        1. GPI_1_L: event raised when GPI 1 changed from HIGH to LOW

        2. GPI_1_H: event raised when GPI 1 changed from LOW to HIGH

        3. GPI_2_L: event raised when GPI 2 changed from HIGH to LOW

        4. GPI_2_H: event raised when GPI 2 changed from LOW to HIGH

        5. CLOUD_DISCONNECT: event raised when reader is disconnected from cloud

        6. CLOUD_CONNECT: event raised when reader is connected to cloud

        7. TAG_READ: event raised when a tag is read

        8. RADIO_START: event raised when inventory operation started using START API

        9. RADIO_STOP: event raised when inventory operation stopped using STOP API'
      properties:
        GPODefaults:
          type: object
          description: GPO default configurations
          properties:
            '1':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 1
            '2':
              type: string
              enum:
              - LOW
              - HIGH
              description: set default state for GPO pin 2
            '3':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 3
            '4':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 4
        LEDDefaults:
          type: object
          description: LED default configurations
          properties:
            '1':
              type: string
              enum:
              - GREEN
              - RED
              - AMBER
              description: set default color for LED 2
            '2':
              type: string
              enum:
              - GREEN
              - RED
              - AMBER
              description: set default color for LED 3
            '3':
              type: string
              enum:
              - RED
              - GREEN
              - AMBER
              description: set default color for LED 4
        GPI_1_H:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_1_L:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_2_H:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_2_L:
          $ref: '#/components/schemas/gpoledAction.v1'
        CLOUD_DISCONNECT:
          $ref: '#/components/schemas/gpoledAction.v1'
        CLOUD_CONNECT:
          $ref: '#/components/schemas/gpoledAction.v1'
        TAG_READ:
          $ref: '#/components/schemas/gpoledAction.v1'
        RADIO_START:
          $ref: '#/components/schemas/gpoledAction.v1'
        RADIO_STOP:
          $ref: '#/components/schemas/gpoledAction.v1'
    retention:
      title: Tag Data Events Retention Configuration
      type: object
      description: Tag Data Events Retention Configuration on connection lost
      properties:
        throttle:
          type: integer
          default: 500
          description: Rate (in events per second) to report data events when network is reconnected
          maximum: 500
          example: 200
          minimum: 1
        maxNumEvents:
          type: integer
          default: 150000
          description: Maximum number of events to retain
          maximum: 150000
          example: 150000
          minimum: 0
        maxEventRetentionTimeInMin:
          type: number
          default: 0
          description: 'Maximum event retention time (in minutes)


            0 or -1 indicate Events will be retained Forever.

            -1 is the default


            Example:

            10 indicate Events generated in last 10 minutes will be retained'
          example: 10
    batching:
      title: Tag Data Events batching configuration
      type: object
      description: Tag Data Events batching configuration
      properties:
        reportingInterval:
          type: number
          description: Event Report interval in milliseconds. -1 disables this option
          example: 1000
          minimum: -1
        maxPayloadSizePerReport:
          type: number
          description: Maximum payload size in bytes. -1 disables
          default: 256000
          maximum: 256000
          minimum: -1
