    delayBetweenAntennaCycles.v1:
      title: delayBetweenAntennaCycles
      x-stoplight:
        id: 991y6rfkb67lh
      type: object
      description: "This introduces a delay between antenna cycles if no tags are read or if no unique tags are read. This allows the reader to share the spectrum if there are no tags to be read. \n\nIf absent, \non the ATR7000 and the FX9600, delayBetweenAntennas cycles is set to wait for 75 mS if no unique tags are read during a antenna cycle.  \non the FX7500, delayBetweenAntennas cycles is set to wait for 75 mS if no tags are read during a antenna cycle. "
      properties:
        type:
          type: string
          enum:
          - DISABLED
          - NO_TAGS
          - NO_UNIQUE_TAGS
          description: Condition under which to delay between antenna cycles
        duration:
          type: integer
          description: Delay between antenna cycles in milliseconds. Will only wait if the type condition (no tags or no unique tags) is met. If the type is DISABLED, duration must be set to 0. If the type is not DISABLED, the value must be set to a non-zero value.
      required:
      - type
      - duration
    tagMetaData.v1:
      title: tagMetaData
      type: array
      description: "Controls the metadata that is sent when a tag is reported\n\n  “ANTENNA” will report the antenna port upon which the tag was inventoried.\n\n  “RSSI” will report the rssi (in dbm) of the inventoried tag. If the tag is only reported occasionally (see reportFilter), this tag will be the peak rssi since the last reported read.\n\n   “PHASE” will report the phase (in degrees) of the inventoried tag. This value will only be reported if each individual tag read is reported (in other words, if reportFilter duration is set to 0). Otherwise, it will not be reported.\n\n  “CHANNEL” will report the channel (in MHz) the reader was using when the tag was inventoried. This value will only be reported if each individual tag read is reported (in other words, if reportFilter duration is set to 0). Otherwise, it will not be reported.\n\n  “SEEN_COUNT” will report the number of times the tag has been inventoried since the previous report. This value will always be 1 if each individual tag read is reported (in other words, if reportFilter duration is set to 0). \n\n  “PC” will report the PC bits of the inventoried tag as a hex string. \n\n  “XPC” will report the XPC bits of the inventoried tag, if present, as a hex string. \n\n  “CRC” will report the CRC bits of the inventoried tag as a hex string.\n\n  “EPC” will report the entire contents of the EPC bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “EPC[1]”. If the first word and the 3-5 word are desired, the value can be set to “EPC[1,3-5]”.\n\n  “TID” will report the entire contents of the TID bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “TID[1]”. If the first word and the 3-5 word are desired, the value can be set to “TID[1,3-5]”.\n\n  “USER” will report the entire contents of the USER bank as a hex string. If only a portion of the memory bank is desired, this can be requested by appending a [] to the string and placing the words requested. For instance, if only the first word is desired, the value can be set as “TID[1]”. If the first word and the 3-5 word are desired, the value can be set to “TID[1,3-5]”.\n\n  “MAC” will report the MAC Address of the reader reporting the tag.\n\n  “HOSTNAME” will report the hostname of the reader reporting the tag.\n\nThe array may also contain an object or objects. The object must contain a single name value pair with the name being set to “userDefined” or “antennaNames”\n\n\nIf absent,\n“SIMPLE” mode does not report any additional meta data, “PORTAL” and “CONVEYOR” modes reports “ANTENNA”, and “INVENTORY” mode reports “ANTENNA”, “RSSI”, and “SEEN_COUNT”.\n"
      x-examples:
        example-1:
        - PC
        - ANTENNA
        - RSSI
      items:
        type:
        - string
        - object
        enum:
        - RSSI
        - PHASE
        - SEEN_COUNT
        - ANTENNA
        - CHANNEL
        - PC
        - XPC
        - CRC
        - EPC
        - TID
        - USER
        - MAC
        - HOSTNAME
        properties:
          userDefined:
            type: string
            description: A user defined field to report each time a tag is reported
          antennaNames:
            type: array
            description: 'Used to give antenna ports descriptive names

              Length of array must match the number of antenna ports on the device'
            items:
              type: string
    radioStartConditions.v1:
      title: radioStartConditions
      type: object
      description: "Controls when, after a “start” is issued, the radio starts trying to inventory tags. \n\nIf absent, the radio will immediately begin inventorying tags upon a \"start\" command. "
      properties:
        type:
          type: string
          enum:
          - GPI
          - GPI_WITH_RESTART
        gpis:
          type: array
          description: List of GPI pins used to trigger radio start
