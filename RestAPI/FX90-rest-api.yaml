  /cloud/impinjGen2X:
    get:
      tags:
      - ImpinjGen2X
      summary: Get Impinj Gen2X configuration
      description: MQTT API :- get_impinjGen2X <br> Retrieves the current Impinj Gen2X feature configuration as last saved via set_impinjGen2X. Returns an empty object if no Gen2X configuration has been set yet. Only feature objects that were previously configured are included in the response.
      operationId: getImpinjGen2X
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getImpinjGen2XResponse'
              examples:
                empty:
                  value: {}
                fastID_configured:
                  value:
                    fastID:
                      enabled: true
                      tidSelector: TID[0]
                tagFocus_configured:
                  value:
                    tagFocus:
                      enabled: true
                tagProtect_configured:
                  value:
                    tagProtect:
                      action: enableTagProtection
                      password: '77777777'
                      tagID: e2801191a5030069073b426d
                      enableShortRange: true
                tagQuieting_basic_configured:
                  value:
                    tagQuieting:
                      basic:
                        action: quiet
                        tagIDs:
                        - e2801191a5030069073b426d
                tagQuieting_advanced_configured:
                  value:
                    tagQuieting:
                      advanced:
                        tagQuietMasks:
                        - S0A
                        - S2A
                        target: SL
                        stateAwareAction: ASSERTSL
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getImpinjGen2XResponseschema_500'
      security:
      - bearerAuth: []
    put:
      tags:
      - ImpinjGen2X
      summary: Set Impinj Gen2X configuration
      description: MQTT API :- set_impinjGen2X <br> Configures Impinj Gen2X proprietary features (FastID, TagProtect, TagFocus, TagQuieting). At least one feature object must be provided. Note - start command with applyImpinjGen2X flag should be used to start the Gen2X operations.
      operationId: setImpinjGen2X
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setImpinjGen2XRequest'
            examples:
              enable_fastID:
                value:
                  fastID:
                    enabled: true
              disable_fastID:
                value:
                  fastID:
                    enabled: false
              protect_tag:
                value:
                  tagProtect:
                    action: enableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
                    enableShortRange: true
              unprotect_tag:
                value:
                  tagProtect:
                    action: disableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
              enable_protect_read:
                value:
                  tagProtect:
                    action: enableTagVisibility
                    password: '77777777'
              disable_protect_read:
                value:
                  tagProtect:
                    action: disableTagVisibility
                    password: '77777777'
              enable_tagFocus:
                value:
                  tagFocus:
                    enabled: true
              disable_tagFocus:
                value:
                  tagFocus:
                    enabled: false
              quiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: quiet
                      tagIDs:
                      - e2801191a5030069073b426d
                      - e2801191a5030069073b426e
              unquiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: unquiet
                      tagIDs:
                      - e2801191a5030069073b426d
              advanced_quiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                      - target: SL
                        action: ASSERTSL_NOTHING
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280123456789012345678AB
                      - target: S2
                        action: INVB_INVA
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                      - SL_ASSERT
                      - S2B
                      target: SL
                      stateAwareAction: ASSERTSL_DEASSERTSL
              advanced_unquiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                      - target: SL
                        action: DEASSERTSL_NOTHING
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280123456789012345678AB
                      - target: S2
                        action: INVA_INVB
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                      - SL_DEASSERT
                      - S2A
                      target: SL
                      stateAwareAction: DEASSERTSL_ASSERTSL
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setImpinjGen2XResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setImpinjGen2XResponseschema_422'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/setImpinjGen2XResponseschema_500'
      security:
      - bearerAuth: []
  /cloud/ble-config:
    put:
      tags:
      - Ble
      summary: Set BLE configuration
      description: 'MQTT API :- set_bleConfig


        Configure the BLE scanner. The `ble.enable` field is required.

        Optional fields control scan interval, RSSI filter, service UUID filters,

        and protocol-specific settings.

        BLE configuration must be applied before starting a BLE scan via `start`.'
      operationId: setBleConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setBleConfigRequest'
            examples:
              enable_ble:
                value:
                  ble:
                    enable: true
              enable_with_interval:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
              enable_with_rssi_filter:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 10
                    additionalFilters:
                      rssi: -70
              enable_with_protocols:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
                    protocols:
                      iBeacon:
                        enabled: true
                        filters:
                        - uuid: FDA50693-A4E2-4FB1-AFCF-C6EB07647825
                          major: 10001
                          minor: 20002
                          txPower: -59
                      altBeacon:
                        enabled: true
                        filters:
                        - mfgId: 0118
                          beaconId: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                          major: 4
                          minor: 4
                          refRssi: -100
                      eddystone:
                        enabled: true
                        filters:
                        - frameType: URL
                          txPower: -59
                          url: https://www.zebra.com
                        - frameType: UID
                          txPower: -18
                          namespace: 0102030405060708090A
                          instance: '000000000001'
                        - frameType: EID
                          txPower: -18
                          ephemeralId: 0102030405060708
                      generic:
                        enabled: true
                        filters:
                        - address: 7E:41:25:1E:D5:16
                          addressType: random
                          name: BLEPeripheralApp
                          alias: BLEPeripheralApp
                    additionalFilters:
                      rssi: -80
                      serviceUuids16:
                      - FEAA
                      - FE9B
                      serviceUuids128:
                      - FDA50693-A4E2-4FB1-AFCF-C6EB07647825
              disable_ble:
                value:
                  ble:
                    enable: false
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
    get:
      tags:
      - Ble
      summary: Get BLE configuration
      description: MQTT API :- get_bleConfig
      operationId: getBleConfig
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getBleConfigResponse'
              example:
                ble:
                  enable: true
                  scanIntervalSec: 5
                  protocols:
                    iBeacon:
                      enabled: true
                      filters:
                      - uuid: FDA50693-A4E2-4FB1-AFCF-C6EB07647825
                        major: 10001
                        minor: 20002
                        txPower: -59
                    altBeacon:
                      enabled: true
                      filters:
                      - mfgId: 0118
                        beaconId: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                        major: 4
                        minor: 4
                        refRssi: -100
                    eddystone:
                      enabled: true
                      filters:
                      - frameType: URL
                        txPower: -59
                        url: https://www.zebra.com
                      - frameType: UID
                        txPower: -18
                        namespace: 0102030405060708090A
                        instance: '000000000001'
                      - frameType: EID
                        txPower: -18
                        ephemeralId: 0102030405060708
                    generic:
                      enabled: true
                      filters:
                      - address: 7E:41:25:1E:D5:16
                        addressType: random
                        name: BLEPeripheralApp
                        alias: BLEPeripheralApp
                  additionalFilters:
                    rssi: -80
                    serviceUuids16:
                    - FEAA
                    - FE9B
                    serviceUuids128:
                    - FDA50693-A4E2-4FB1-AFCF-C6EB07647825
      security:
      - bearerAuth: []
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    operatingModes:
      $ref: '#/components/schemas/operatingMode.v1'
    gpioLedConfig:
      $ref: '#/components/schemas/GPIOLEDConfig.v1'
    mgmtEventConfig:
      $ref: '#/components/schemas/eventsConfig.v1'
    osversions.v1:
      title: osVersions
      type: object
      properties:
        version:
          type: string
          example: 3.1.12
        releaseDate:
          type: string
          format: date
          example: '2020-04-23'
        releaseNotesUrl:
          type: string
          format: uri
          example: https://www.zebra.com/content/dam/zebra_new_ia/en-us/software/operating-system/fx7500-series-operating-system/FXSeries_3_1_12_Release_Notes.pdf
    readerversion.v1:
      title: readerVersion
      type: object
      description: Reader version information
      properties:
        readerApplication:
          type: string
          description: Reader software version
          example: 2.7.19.0
        radioApi:
          type: string
          description: API to the radio engine
          example: 2.2.8.2
        radioFirmware:
          type: string
          description: Firmware running on the radio
          example: 2.1.14.0
        radioControlApplication:
          type: string
          description: Reader radio control version
          example: 1.0.0
        readerOS:
          type: string
          description: Reader operating system version
          example: 2.2.15.0
        readerHardware:
          type: string
          description: Hardware version of the reader
          example: 0.0.5.0
        readerBootLoader:
          type: string
          description: Reader boot loader version
          example: 2.1.2.0
        readerFileSystem:
          type: string
          description: Reader root file system version
          example: 2.1.2.0
        cloudAgentApplication:
          type: string
          description: Reader cloud agent version
          example: 1.0.0
        availableOsUpgrades:
          type: array
          description: A List of available OS upgrades, (upgrade path only, no downgrade versions)
          example: '[ 3.1.12, 3.0.35 ]'
          items:
            $ref: '#/components/schemas/osversions.v1'
        fpga:
          type: string
          example: 1.8.0.0
          description: FPGA running on radio (only applicable to ATR7000)
        model:
          type: string
          enum:
          - FX7500
          - FX9600
          - ATR7000
          description: device model
        serialNumber:
          type: string
          example: 84248dee5721
          description: Device serial number
      required:
      - readerApplication
      - radioApi
      - radioFirmware
      - radioControlApplication
      - readerOS
      - readerHardware
      - readerBootLoader
      - readerFileSystem
      - cloudAgentApplication
      - availableOsUpgrades
      - model
      - serialNumber
    error.v1:
      title: error
      type: object
      properties:
        code:
          type: integer
          description: The error code
          example: 123
        message:
          type: string
          description: A brief description of the error
          example: internal system error.
        parameters:
          type: array
          description: A list of error parameters, if applicable
          items:
            type: string
      required:
      - code
      - message
      description: Represents an API error.
    readernetwork.v1:
      title: readerNetwork
      type: object
      description: Reader network information
      properties:
        hostName:
          type: string
          description: Host name of the reader
          example: FX9600F0F4B5
        ipAddress:
          type: string
          description: IP address of the reader
          example: 192.168.1.10
        gatewayAddress:
          type: string
          description: IP address of the gateway
          example: 192.168.1.1
        subnetMask:
          type: string
          description: Subnet mask for the network adapter
          example: 255.255.255.0
        dnsAddress:
          type: string
          description: IP address of the DNS server
          example: 8.8.8.8
        dhcp:
          type: boolean
          description: A value indicating DHCP configuration
          example: 'true'
        macAddress:
          type: string
          description: MAC address of the reader
          example: 84:24:8D:F0:F4:B5
      required:
      - hostName
      - ipAddress
      - gatewayAddress
      - subnetMask
      - dnsAddress
      - dhcp
      - macAddress
    networkconfig.v1:
      title: networkConfig
      type: object
      description: Represents reader communication configuration parameters.
      properties:
        macAddress:
          type: string
          description: MAC address of the reader (read only)
          example: 84:24:8D:F0:F4:B5
          readOnly: true
        dhcp:
          type: boolean
          description: A value indicating DHCP configuration
          example: 'true'
        dnsAddress:
          type: string
          description: IP address of the DNS server
          example: 8.8.8.8
        subnetMask:
          type: string
          description: Subnet mask for the network adapter
          example: 255.255.255.0
        gatewayAddress:
          type: string
          description: IP address of the gateway
          example: 192.168.1.1
        ipAddress:
          type: string
          description: IP address of the reader (read only if dhcp = true)
          example: 192.168.1.10
        hostName:
          type: string
          description: Host name of the reader
          example: FX9600F0F4B5
          readOnly: true
      required:
      - macAddress
      - dhcp
      - dnsAddress
      - subnetMask
      - gatewayAddress
      - ipAddress
      - hostName
    memorystats.v1:
      title: memoryStats
      type: object
      properties:
        total:
          type: integer
          description: Total RAM in bytes
          example: '26098076'
        free:
          type: integer
          description: Free RAM in bytes
          example: '195612672'
        used:
          type: integer
          description: Used RAM in bytes
          example: '65368064'
      description: System memory statistics
    readerflashmemory.v1:
      title: readerFlashMemory
      type: object
      description: Non-volatile reader flash partitions and their usage information
      properties:
        rootFileSystem:
          $ref: '#/components/schemas/memorystats.v1'
        platform:
          $ref: '#/components/schemas/memorystats.v1'
        readerConfig:
          $ref: '#/components/schemas/memorystats.v1'
        readerData:
          $ref: '#/components/schemas/memorystats.v1'
      required:
      - rootFileSystem
      - platform
      - readerConfig
      - readerData
    cpustats.v1:
      title: cpuStats
      type: object
      properties:
        user:
          type: integer
          description: User processes CPU utilization percentage
          example: '42'
        system:
          type: integer
          description: System processes CPU utilization percentage
          example: '32'
      description: System CPU Statistics
    ntpstats.v1:
      title: ntpstats
      type: object
      description: Represents NTP statistics.
      properties:
        offset:
          type: number
          description: Local clock offset from NTP server clock in milliseconds.
          example: 120
          format: float
        reach:
          type: integer
          description: Status of successful synchronization attempts; a value of 377 indicates eight consecutive successful attempts.
          example: 377
      required:
      - offset
      - reach
    readerstats.v1:
      title: readerStats
      type: object
      description: Reader statistics information
      properties:
        uptime:
          type: string
          description: Duration the reader has been powered on
          format: time
          example: 26 days 01:11:17
        systemTime:
          type: string
          description: ISO 8601 formatted time on the reader
          format: date-time
          example: '2020-01-08T15:36:53+00:00'
        ram:
          $ref: '#/components/schemas/memorystats.v1'
        flash:
          $ref: '#/components/schemas/readerflashmemory.v1'
        cpu:
          $ref: '#/components/schemas/cpustats.v1'
        radioConnection:
          type: string
          enum:
          - connected
          - disconnected
          description: The status of the radio connection
          example: connected
        antennas:
          type: object
          description: Status of the antennas connection
          properties:
            '0':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 0 connection state (only applicable to ATR7000)
            '1':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 1 connection state
            '2':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 2 connection state
            '3':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 3 connection state
            '4':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 4 connection state
            '5':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 5 connection state
            '6':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 6 connection state
            '7':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 7 connection state
            '8':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 8 connection state
            '9':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 9 connection state (only applicable to ATR7000)
            '10':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 10 connection state (only applicable to ATR7000)
            '11':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 11 connection state (only applicable to ATR7000)
            '12':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 12 connection state (only applicable to ATR7000)
            '13':
              type: string
              enum:
              - connected
              - disconnected
              description: Antenna 13 connection state (only applicable to ATR7000)
          required:
          - '1'
          - '2'
        temperature:
          type: integer
          description: Current Reader Temperature (in degrees centigrade)
          format: int32
          example: 31
        radioActivity:
          type: string
          description: Status of the radio activity
          enum:
          - active
          - inactive
        powerSource:
          type: string
          enum:
          - DC
          - POE
          - POE+
          description: The source of power for the reader
        powerNegotiation:
          type: string
          description: 'How the power supplied to the reader is negotiated

            Only present if powerSource is POE or POE+'
          enum:
          - DISABLED
          - IN_PROGRESS
          - SUCCESS
          - FAILURE
          - NOT_APPLICABLE
        ntp:
          oneOf:
          - $ref: '#/components/schemas/ntpstats.v1'
          - type: string
            enum:
            - NOT_CONFIGURED
            description: NTP server is not configured
          description: NTP Configuration
      required:
      - uptime
      - systemTime
      - ram
      - flash
      - cpu
      - radioConnection
      - temperature
      - radioActivity
      - powerSource
      - powerNegotiation
      - ntp
    readerupgradestatus.v1:
