                            description: Minor value
                          refRssi:
                            type: integer
                            description: Reference RSSI (TX power at 1m)
                eddystone:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    filters:
                      type: array
                      description: Filter by Eddystone frame fields. Use `frameType` to target a specific frame type (URL, UID, EID).
                      items:
                        type: object
                        properties:
                          frameType:
                            type: string
                            description: Eddystone frame type
                            enum:
                            - URL
                            - UID
                            - EID
                            - TLM
                          txPower:
                            type: integer
                            description: TX power at 0m
                          url:
                            type: string
                            description: Advertised URL (Eddystone-URL only)
                          namespace:
                            type: string
                            description: 10-byte namespace hex string (Eddystone-UID only)
                          instance:
                            type: string
                            description: 6-byte instance ID hex string (Eddystone-UID only)
                          ephemeralId:
                            type: string
                            description: 8-byte ephemeral ID hex string (Eddystone-EID only)
                generic:
                  type: object
                  description: Configuration for GENERIC_BLE beacons. Filters match on device-level advertisement fields.
                  properties:
                    enabled:
                      type: boolean
                    filters:
                      type: array
                      description: List of filter objects for GENERIC_BLE beacons.
                      items:
                        type: object
                        properties:
                          address:
                            type: string
                            description: Bluetooth device address to match.
                          addressType:
                            type: string
                            description: Bluetooth address type to match.
                            enum:
                            - public
                            - random
                          name:
                            type: string
                            description: Device name to match.
                          alias:
                            type: string
                            description: Device alias to match.
