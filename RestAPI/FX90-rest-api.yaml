          enum:
          - ASSERTSL
          - DEASSERTSL
          - ASSERTSL_DEASSERTSL
          - DEASSERTSL_ASSERTSL
          - NEGSL
          - NOT_DEASSERTSL
          - NOT_ASSERTSL
          - NOT_NEGSL
          - INV_A
          - INV_B
          - INV_A_NOT_INV_B
          - INV_B_NOT_INV_A
          - INV_A2BB2A
          - NOT_INV_B
          - NOT_INV_A
          - NOT_INV_A2BB2A
          example: ASSERTSL
      required:
