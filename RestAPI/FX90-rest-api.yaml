                used:
                  type: number
                  description: Used flash space in the root file system partition.
              description: Flash usage for the root file system partition.
          description: Flash storage usage statistics by partition.
        interfaceConnectionStatus:
          type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  connectionError:
                    type: string
                    description: Most recent connection error message, or an empty string when no error is present.
                  connectionStatus:
                    type: string
                    description: Current connection state of the endpoint.
                  description:
                    type: string
                    description: Configured description of the endpoint connection.
                  interface:
                    type: string
                    description: Configured endpoint interface name.
              description: Connection status entries for data event endpoints.
          description: Cloud interface connection status grouped by endpoint class.
        ntp:
          type: object
          properties:
            offset:
              type: number
              description: Current NTP clock offset reported by the reader.
            reach:
              type: number
              description: NTP reachability value reported by the reader.
          description: NTP synchronization status for the reader clock.
        powerNegotiation:
          type: string
          description: Power level negotiated with the reader power source.
        powerSource:
          type: string
          description: Detected power source for the reader.
        radioActivity:
          type: string
          description: Current RFID radio activity state.
          enum:
          - active
          - inactive
        radioConnection:
          type: string
          description: Current connection state of the RFID radio.
          enum:
          - connected
          - disconnected
        ram:
          type: object
          properties:
            free:
              type: number
              description: Free RAM percentage or amount reported by the reader.
            total:
              type: number
              description: Total RAM percentage or amount reported by the reader.
            used:
              type: number
              description: Used RAM percentage or amount reported by the reader.
          description: RAM usage statistics.
        systemTime:
          type: string
          description: Current reader system time.
        temperature:
          type: number
          description: Current reader internal temperature in degrees Celsius.
        uptime:
          type: string
          description: Elapsed time since the reader last started.
        impinjGen2X:
          type: object
          properties:
            active:
              type: boolean
              description: Whether an Impinj Gen2X feature is currently active.
            feature:
              type: string
              description: Name of the active Impinj Gen2X feature.
              enum:
              - fastId
              - tagFocus
              - tagProtect
              - tagQuieting
          description: Runtime status of active Impinj Gen2X features.
        ble:
          type: object
          description: BLE scanner runtime status. Present only when BLE is supported and status is available.
          properties:
            scanState:
              type: string
              description: Current BLE scanner state.
              enum:
              - running
              - stopped
            scanStartTime:
              type: string
              format: date-time
              description: ISO 8601 timestamp when the BLE scan was last started.
              example: '2026-05-21T13:46:16.955Z'
            beaconCounts:
              type: object
              description: BLE advertisement counts by beacon format.
              properties:
                total:
                  type: integer
                  description: Total number of BLE advertisements observed in the current scan window.
                iBeacon:
                  type: integer
                  description: Number of iBeacon advertisements observed in the current scan window.
                altBeacon:
                  type: integer
                  description: Number of AltBeacon advertisements observed in the current scan window.
                eddystone:
                  type: integer
                  description: Number of Eddystone advertisements observed in the current scan window.
                generic:
                  type: integer
                  description: Number of generic BLE advertisements observed in the current scan window.
