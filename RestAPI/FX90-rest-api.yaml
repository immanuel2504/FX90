    setConfigMqttRequest:
      type: object
      description: At least one of xml, GPIO-LED, or READER-GATEWAY must be provided.
      properties:
        xml:
          type: string
          description: Raw XML reader configuration string.
        GPIO-LED:
          $ref: '#/components/schemas/GPIOLEDConfig.v1'
        READER-GATEWAY:
          type: object
          description: 'Cloud gateway configuration. Must contain at least one of: endpointConfig, batching, retention, or managementEventConfig.'
          properties:
            endpointConfig:
              type: object
              description: Endpoint connections configuration. Only the data endpoint is configurable via this API.
              properties:
                data:
                  type: object
                  properties:
                    event:
                      type: object
                      properties:
                        connections:
                          type: array
                          items:
                            type: object
                            properties:
                              additionalOptions:
                                type: object
                                properties:
                                  batching:
                                    type:
                                    - object
                                    - 'null'
                                    example: null
                                  retention:
                                    type: object
                                    properties:
                                      maxEventRetentionTimeInMin:
                                        type: number
                                        example: 500
                                      maxNumEvents:
                                        type: number
                                        example: 150000
                                      throttle:
                                        type: number
                                        example: 500
                              description:
                                type: string
                                example: MQTT_TEST
                              name:
                                type: string
                                example: MQTT_TEST
                              options:
                                type: object
                                properties:
                                  additional:
                                    type: object
                                    properties:
                                      cleanSession:
                                        type: boolean
                                        example: true
                                      clientId:
                                        type: string
                                        example: EV1
                                      debug:
                                        type: boolean
                                        example: false
                                      keepAlive:
                                        type: number
                                        example: 60
                                      qos:
                                        type: number
                                        example: 0
                                      reconnectDelay:
                                        type: number
                                        example: 1
                                      reconnectDelayMax:
                                        type: number
                                        example: 5
                                  enableSecurity:
                                    type: boolean
                                    example: false
                                  endpoint:
                                    type: object
                                    properties:
                                      hostName:
                                        type: string
                                        example: 10.117.229.9
                                      port:
                                        type: number
                                        example: 1883
                                      protocol:
                                        type: string
                                        example: tcp
                                  publishTopic:
                                    type: array
                                    items:
                                      type: string
                                      example: tagevents_r2c_longrun
                                    example:
                                    - tagevents_r2c_longrun
                                  security:
                                    type: object
                                    properties:
                                      CACertificateFileLocation:
                                        type: string
                                        example: /home/root/broker.emqx.io-ca.crt
                                      installedCertificateName:
                                        type: string
                                        example: Server
                                      installedCertificateType:
                                        type: string
                                        example: server
                                      keyAlgorithm:
                                        type: string
                                        example: RS256
                                      keyFormat:
                                        type: string
                                        example: PEM
                                      verifyHostName:
                                        type: boolean
                                        example: false
                                      verifyPeer:
                                        type: boolean
                                        example: false
                                  subscribeTopic:
                                    type: array
                                    items: {}
                                    example: []
                              type:
                                type: string
                                example: mqtt
                          example:
                          - additionalOptions:
                              batching: null
                              retention:
                                maxEventRetentionTimeInMin: 500
                                maxNumEvents: 150000
                                throttle: 500
                            description: MQTT_TEST
                            name: MQTT_TEST
                            options:
                              additional:
                                cleanSession: true
                                clientId: EV1
                                debug: false
                                keepAlive: 60
                                qos: 0
                                reconnectDelay: 1
                                reconnectDelayMax: 5
                              enableSecurity: false
                              endpoint:
                                hostName: 10.117.229.9
                                port: 1883
                                protocol: tcp
                              publishTopic:
                              - tagevents_r2c_longrun
                              security:
                                CACertificateFileLocation: /home/root/broker.emqx.io-ca.crt
                                installedCertificateName: Server
                                installedCertificateType: server
                                keyAlgorithm: RS256
                                keyFormat: PEM
                                verifyHostName: false
                                verifyPeer: false
                              subscribeTopic: []
                            type: mqtt
            batching:
              description: Global batching configuration applied across all data endpoints. Can be a single object (applied to all endpoints) or an array of objects (one per endpoint, array length must match number of data endpoint connections).
              oneOf:
              - type: object
                description: Single batching config applied to all data endpoints
                properties:
                  maxPayloadSizePerReport:
                    type: integer
                    description: Maximum payload size in bytes (0 - 256000). -1 to disable.
                    minimum: 0
                    maximum: 256000
                    example: 65536
                  reportingInterval:
                    type: integer
                    description: Report interval in milliseconds (0 - 86400000). -1 to disable.
                    minimum: 0
                    maximum: 86400000
                    example: 1000
              - type: array
                description: Per-endpoint batching config (one entry per data endpoint connection)
                items:
                  type: object
                  properties:
                    maxPayloadSizePerReport:
                      type: integer
                      minimum: 0
                      maximum: 256000
                      example: 65536
                    reportingInterval:
                      type: integer
                      minimum: 0
                      maximum: 86400000
                      example: 1000
            retention:
              description: Global retention configuration for data events on connection loss. Can be a single object (applied to all endpoints) or an array of objects (one per endpoint, array length must match number of data endpoint connections).
              oneOf:
              - type: object
                description: Single retention config applied to all data endpoints
                properties:
                  maxEventRetentionTimeInMin:
                    type: integer
                    description: Maximum event retention time in minutes (0 - 10080). 0 or -1 retains forever.
                    minimum: 0
                    maximum: 10080
                    example: 1440
                  maxNumEvents:
                    type: integer
                    description: Maximum number of events to retain (0 - 150000).
                    minimum: 0
                    maximum: 150000
                    example: 150000
                  throttle:
                    type: integer
                    description: Rate in events/sec to replay retained events on reconnect (0 - 1000).
                    minimum: 0
                    maximum: 1000
                    example: 500
              - type: array
                description: Per-endpoint retention config (one entry per data endpoint connection)
                items:
                  type: object
                  properties:
                    maxEventRetentionTimeInMin:
                      type: integer
                      minimum: 0
                      maximum: 10080
                      example: 1440
                    maxNumEvents:
                      type: integer
                      minimum: 0
                      maximum: 150000
                      example: 150000
                    throttle:
                      type: integer
                      minimum: 0
                      maximum: 1000
                      example: 500
            managementEventConfig:
              $ref: '#/components/schemas/eventsConfig.v1'
