title: readerNetworkAll
type: object
description: Reader network information - All interfaces (interface=all parameter)
properties:
  hostName:
    type: string
    description: Device hostname for network identification
    example: FX9600F0F4B5
  networkInterface:
    type: object
    description: Container for all network interface details
    required:
    - eth0
    - mlan0
    properties:
      eth0:
        type: object
        description: Ethernet interface configuration
        required:
        - IPV4
        - IPV6
        - Status
        - isEnabled
        - macAddress
        - security
        properties:
          IPV4:
            type: object
            description: IPv4 configuration object
            required:
            - dhcp
            - ipAddress
            - subnetMask
            - gatewayAddress
            - dnsAddress
            - domainName
            properties:
              dhcp:
                type: boolean
                description: Enable/disable DHCP for automatic IP assignment
                example: true
              ipAddress:
                type: string
                description: Static IP address assigned to the interface
                example: 192.168.1.10
              subnetMask:
                type: string
                description: Netmask defining the local network range
                example: 255.255.255.0
              gatewayAddress:
                type: string
                description: Default router gateway IP for network traffic
                example: 192.168.1.1
              dnsAddress:
                type: string
                description: IP address of DNS server for domain name resolution
                example: 8.8.8.8
              domainName:
                type: string
                description: Domain suffix appended to hostnames
                example: example.com
          IPV6:
            type: object
            description: IPv6 configuration object
            required:
            - dhcp
            - ipAddress
            - gatewayAddress
            - dnsAddress
            - domainName
            properties:
              dhcp:
                type: boolean
                description: DHCP enabled flag for IPv6
                example: true
              ipAddress:
                type: string
                description: IPv6 address
                example: fe80::8624:8dff:fefb:6dd0
              gatewayAddress:
                type: string
                description: IPv6 default gateway
                example: fe80::10
              dnsAddress:
                type: string
                description: IPv6 DNS server address
                example: fe80::20
              domainName:
                type: string
                description: Domain name for IPv6
                example: example.com
          Status:
            type: string
            description: Interface connectivity status
            enum:
            - connected
            - unavailable
            example: connected
          isEnabled:
            type: boolean
            description: Indicates if interface is operational
            example: true
          macAddress:
            type: string
            description: Hardware MAC address of network interface card
            example: 84:24:8D:FB:6D:D0
          security:
            type: object
            description: 802.1x EAP security settings (optional, only if enabled)
            required:
            - securityType
            - authentication
            - innerAuthentication
            - certificates
            properties:
              securityType:
                type: string
                description: Type of security protocol
                example: 802_1xEAP
              authentication:
                type: string
                description: EAP authentication method used (e.g., PEAP, TLS)
                example: PEAP
              innerAuthentication:
                type: string
                description: Inner protocol for tunneled EAP methods (e.g., MSCHAPv2)
                example: MSCHAPv2
              certificates:
                type: string
                description: Certificate file information for 802.1x authentication
                example: /etc/certificates/client.pem
      mlan0:
        type: object
        description: WiFi interface configuration
        required:
        - IPV4
        - IPV6
        - Status
        - isEnabled
        - macAddress
        - accesspoint
        properties:
          IPV4:
            type: object
            description: IPv4 configuration object
            required:
            - dhcp
            - ipAddress
            - subnetMask
            - gatewayAddress
            - dnsAddress
            - domainName
            properties:
              dhcp:
                type: boolean
                description: Enable/disable DHCP for automatic IP assignment
                example: true
              ipAddress:
                type: string
                description: Static IP address assigned to the interface
                example: 192.168.1.11
              subnetMask:
                type: string
                description: Netmask defining the local network range
                example: 255.255.255.0
              gatewayAddress:
                type: string
                description: Default router gateway IP for network traffic
                example: 192.168.1.1
              dnsAddress:
                type: string
                description: IP address of DNS server for domain name resolution
                example: 8.8.8.8
              domainName:
                type: string
                description: Domain suffix appended to hostnames
                example: example.com
          IPV6:
            type: object
            description: IPv6 configuration object
            required:
            - dhcp
            - ipAddress
            - gatewayAddress
            - dnsAddress
            - domainName
            properties:
              dhcp:
                type: boolean
                description: DHCP enabled flag for IPv6
                example: true
              ipAddress:
                type: string
                description: IPv6 address
                example: fe80::8624:8dff:fefb:6dd1
              gatewayAddress:
                type: string
                description: IPv6 default gateway
                example: fe80::10
              dnsAddress:
                type: string
                description: IPv6 DNS server address
                example: fe80::20
              domainName:
                type: string
                description: Domain name for IPv6
                example: example.com
          Status:
            type: string
            description: Interface connectivity status
            enum:
            - connected
            - disconnected
            example: connected
          isEnabled:
            type: boolean
            description: Indicates if interface is operational
            example: true
          macAddress:
            type: string
            description: WiFi device MAC address
            example: 84:24:8D:FB:6D:D1
          accesspoint:
            type: object
            description: Connected WiFi AP details
            required:
            - essid
            - status
            - signalstrength
            - autoConn
            - ipaddress
            properties:
              essid:
                type: string
                description: WiFi network SSID/name to connect to
                example: ZebraWiFi
              status:
                type: string
                description: Connection status
                enum:
                - connected
                - disconnected
                example: connected
              signalstrength:
                type: string
                description: WiFi signal strength indicator
                example: -45dBm
              autoConn:
                type: boolean
                description: Automatically reconnect to this WiFi network
                example: true
              ipaddress:
                type: string
                description: Connected WiFi IP address
                example: 192.168.1.11
required:
- hostName
- networkInterface
