type: object
properties:
  GPIO-LED:
    description: GPIO and LED trigger mapping configuration. Returns "NOT_CONFIGURED" when no GPIO-LED configuration has been applied.
    oneOf:
    - type: string
      description: Returned as "NOT_CONFIGURED" when GPIO-LED config has not been set.
  READER-GATEWAY:
    type: object
    properties:
      batching:
        description: Global batching configuration for data events. Returned as an array (one entry per data endpoint connection) or a single object applied to all connections.
        oneOf:
        - type: object
          description: Single batching config applied to all data endpoints.
          properties:
            maxPayloadSizePerReport:
              type: number
              description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
            reportingInterval:
              type: number
              description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
        - type: array
          description: Per-endpoint batching config (one entry per data endpoint connection).
          items:
            type: object
            properties:
              maxPayloadSizePerReport:
                type: number
                description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
              reportingInterval:
                type: number
                description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
      endpointConfig:
        type: object
        properties:
          control:
            type: object
            properties:
              commandResponse:
                type: object
                properties:
                  connections:
                    type: array
                    description: List of control plane cloud connections.
                    items:
                      type: object
                      properties:
                        description:
                          type: string
                          description: Human-readable description of this connection.
                        name:
                          type: string
                          description: Unique name identifier for this connection.
                        type:
                          type: string
                          description: 'Connection type. Supported values: mqtt, mqtt-GCP, mqtt-AWS, mqtt-Azure, httpPost, WEBSOCKET, tcpip-server, keyboard-emulation.'
                        options:
                          type: object
                          properties:
                            additional:
                              type: object
                              properties:
                                cleanSession:
                                  type: boolean
                                  description: If true, broker discards previous session state on connect (MQTT clean session flag).
                                clientId:
                                  type: string
                                  description: MQTT client identifier used when connecting to the broker.
                                debug:
                                  type: boolean
                                  description: Enable verbose MQTT debug logging.
                                keepAlive:
                                  type: number
                                  description: MQTT keep-alive interval in seconds. The reader sends a PINGREQ if no message is sent within this interval.
                                qos:
                                  type: number
                                  description: MQTT Quality of Service level (0 = at most once, 1 = at least once).
                                reconnectDelay:
                                  type: number
                                  description: Initial delay in seconds before attempting to reconnect after disconnect.
                                reconnectDelayMax:
                                  type: number
                                  description: Maximum delay in seconds between reconnect attempts (exponential backoff cap).
                              description: Additional MQTT connection parameters.
                            enableSecurity:
                              type: boolean
                              description: When true, TLS/SSL is used for the connection.
                            endpoint:
                              type: object
                              properties:
                                hostName:
                                  type: string
                                  description: Hostname or IP address of the MQTT broker or cloud endpoint.
                                port:
                                  type: number
                                  description: TCP port number of the MQTT broker or cloud endpoint.
                                protocol:
                                  type: string
                                  description: 'Transport protocol. Common values: tcp, ssl, ws (WebSocket), wss (WebSocket Secure).'
                              description: Remote broker or server endpoint details.
                            publishTopic:
                              type: array
                              description: MQTT topic(s) the reader publishes responses to.
                              items:
                                type: string
                            security:
                              type: object
                              properties:
                                CACertificateFileLocation:
                                  type: string
                                  description: Absolute path to the CA (Certificate Authority) certificate file on the reader.
                                installedCertificateName:
                                  type: string
                                  description: Name of a pre-installed certificate stored on the reader.
                                installedCertificateType:
                                  type: string
                                  description: Type of the pre-installed certificate (e.g. "server", "client").
                                keyAlgorithm:
                                  type: string
                                  description: JWT signing algorithm for GCP connections (e.g. RS256, ES256).
                                keyFormat:
                                  type: string
                                  description: Key file format (e.g. PEM).
                                privateKeyFileLocation:
                                  type: string
                                  description: Absolute path to the private key file on the reader.
                                publicKeyFileLocation:
                                  type: string
                                  description: Absolute path to the public key or client certificate file on the reader.
                                verifyHostName:
                                  type: boolean
                                  description: When true, the broker's hostname is verified against its TLS certificate CN/SAN.
                                verifyPeer:
                                  type: boolean
                                  description: When true, the server's TLS certificate is validated against the CA certificate.
                              description: TLS/SSL certificate and key configuration.
                            subscribeTopic:
                              type: array
                              description: MQTT topic(s) the reader subscribes to for incoming commands.
                              items:
                                type: string
                          description: Connection-specific options.
                description: Control plane command and response MQTT connection configuration.
            description: Control plane endpoint configuration (command/response channel).
          data:
            type: object
            properties:
              batching:
                type: object
                properties:
                  maxPayloadSizePerReport:
                    type: number
                    description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                  reportingInterval:
                    type: number
                    description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
                description: Global batching settings applied across all data endpoint connections.
              event:
                type: object
                properties:
                  connections:
                    type: array
                    description: List of data plane cloud connections for publishing tag read events.
                    items:
                      type: object
                      properties:
                        additionalOptions:
                          type: object
                          properties:
                            batching:
                              type: object
                              properties:
                                maxPayloadSizePerReport:
                                  type: number
                                  description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                                reportingInterval:
                                  type: number
                                  description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
                              description: Per-connection batching configuration overriding global batching for this connection.
                            retention:
                              type: object
                              properties:
                                maxEventRetentionTimeInMin:
                                  type: number
                                  description: Maximum time in minutes to retain events when offline (0 - 10080). 0 or -1 retains events indefinitely until maxNumEvents is reached.
                                maxNumEvents:
                                  type: number
                                  description: Maximum number of events to buffer when offline (0 - 150000).
                                throttle:
                                  type: number
                                  description: Rate limit in events/sec for replaying retained events after reconnect (0 - 1000). 0 means no throttling.
                              description: Per-connection event retention configuration when the connection is offline.
                            dataAck:
                              type: object
                              description: Data acknowledgement configuration. When enabled, the reader waits for an ACK from the cloud before marking events as delivered.
                              properties:
                                enable:
                                  type: boolean
                                  description: Enable data acknowledgement for this connection.
                                responseTopic:
                                  type: string
                                  description: MQTT topic on which the cloud sends acknowledgement messages back to the reader.
                                correlationFieldName:
                                  type: string
                                  description: Name of the field in the event payload used to correlate ACK responses. Defaults to "correlationId".
                          description: Per-connection data delivery options (batching, retention, data acknowledgement).
                        description:
                          type: string
                          description: Human-readable description of this connection.
                        name:
                          type: string
                          description: Unique name identifier for this connection. Must be unique across all data connections.
                        type:
                          type: string
                          description: 'Connection type. Supported values: mqtt, mqtt-GCP, mqtt-AWS, mqtt-Azure, httpPost, WEBSOCKET, tcpip-server, keyboard-emulation.'
                        options:
                          type: object
                          properties:
                            additional:
                              type: object
                              properties:
                                cleanSession:
                                  type: boolean
                                  description: If true, broker discards previous session state on connect (MQTT clean session flag).
                                clientId:
                                  type: string
                                  description: MQTT client identifier used when connecting to the broker.
                                debug:
                                  type: boolean
                                  description: Enable verbose MQTT debug logging.
                                keepAlive:
                                  type: number
                                  description: MQTT keep-alive interval in seconds. The reader sends a PINGREQ if no message is sent within this interval.
                                qos:
                                  type: number
                                  description: MQTT Quality of Service level (0 = at most once, 1 = at least once).
                                reconnectDelay:
                                  type: number
                                  description: Initial delay in seconds before attempting to reconnect after disconnect.
                                reconnectDelayMax:
                                  type: number
                                  description: Maximum delay in seconds between reconnect attempts (exponential backoff cap).
                              description: Additional MQTT connection parameters.
                            enableSecurity:
                              type: boolean
                              description: When true, TLS/SSL is used for the connection.
                            endpoint:
                              type: object
                              properties:
                                hostName:
                                  type: string
                                  description: Hostname or IP address of the MQTT broker or cloud endpoint.
                                port:
                                  type: number
                                  description: TCP port number of the MQTT broker or cloud endpoint.
                                protocol:
                                  type: string
                                  description: 'Transport protocol. Common values: tcp, ssl, ws (WebSocket), wss (WebSocket Secure).'
                              description: Remote broker or server endpoint details.
                            publishTopic:
                              type: array
                              description: MQTT topic(s) the reader publishes tag read events to.
                              items:
                                type: string
                            security:
                              type: object
                              properties:
                                CACertificateFileLocation:
                                  type: string
                                  description: Absolute path to the CA certificate file on the reader.
                                installedCertificateName:
                                  type: string
                                  description: Name of a pre-installed certificate stored on the reader.
                                installedCertificateType:
                                  type: string
                                  description: Type of the pre-installed certificate (e.g. "server", "client").
                                keyAlgorithm:
                                  type: string
                                  description: JWT signing algorithm for GCP connections (e.g. RS256, ES256).
                                keyFormat:
                                  type: string
                                  description: Key file format (e.g. PEM).
                                privateKeyFileLocation:
                                  type: string
                                  description: Absolute path to the private key file on the reader.
                                publicKeyFileLocation:
                                  type: string
                                  description: Absolute path to the public key or client certificate file on the reader.
                                verifyHostName:
                                  type: boolean
                                  description: When true, the broker's hostname is verified against its TLS certificate CN/SAN.
                                verifyPeer:
                                  type: boolean
                                  description: When true, the server's TLS certificate is validated against the CA certificate.
                              description: TLS/SSL certificate and key configuration.
                            subscribeTopic:
                              type: array
                              description: MQTT topic(s) the reader subscribes to (typically unused for data connections).
                              items:
                                type: string
                          description: Connection-specific options.
                description: Data event endpoint (publishes tag read events to cloud connections).
              retention:
                type: object
                properties:
                  maxEventRetentionTimeInMin:
                    type: number
                    description: Maximum time in minutes to retain events when offline (0 - 10080). 0 or -1 retains events indefinitely until maxNumEvents is reached.
                  maxNumEvents:
                    type: number
                    description: Maximum number of events to buffer when offline (0 - 150000).
                  throttle:
                    type: number
                    description: Rate limit in events/sec for replaying retained events after reconnect (0 - 1000).
                description: Global event retention settings applied across all data endpoint connections when offline.
            description: Data plane endpoint configuration (tag read event publishing channel).
