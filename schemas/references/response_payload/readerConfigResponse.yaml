                              properties:
                                maxEventRetentionTimeInMin:
                                  type: number
                                  description: Maximum time in minutes to retain management events when offline (0 - 10080). 0 or -1 retains events indefinitely until maxNumEvents is reached.
                                maxNumEvents:
                                  type: number
                                  description: Maximum number of management events to buffer when offline (0 - 150000).
                                throttle:
                                  type: number
                                  description: Rate limit in events/sec for replaying retained management events after reconnect (0 - 1000).
                              description: Per-connection event retention configuration when the connection is offline.
                            dataAck:
                              type: object
                              description: Data acknowledgement configuration for management events. When enabled, the reader waits for an ACK before marking management events as delivered.
                              properties:
                                enable:
                                  type: boolean
                                  description: Enable data acknowledgement for this management event connection.
                                responseTopic:
                                  type: string
                                  description: MQTT topic on which the cloud sends acknowledgement messages back to the reader.
                                correlationFieldName:
                                  type: string
