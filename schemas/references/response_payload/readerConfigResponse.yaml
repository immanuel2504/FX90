            description: Management plane endpoint configuration (async management events and command/response channel).
        description: Cloud connectivity endpoint configuration for control, data, and management planes.
      managementEventConfig:
        type: object
        properties:
          errors:
            type: object
            properties:
              antenna:
                type: boolean
                description: Enable antenna error reporting (e.g. antenna disconnected).
              cpu:
                type: object
                properties:
                  reportIntervalInSec:
                    type: number
                    description: Minimum interval in seconds between CPU error reports.
                  threshold:
                    type: number
                    description: CPU usage percentage (0-100) above which an error is reported.
                description: CPU error threshold reporting configuration.
              database:
                type: boolean
                description: Enable database error reporting.
              flash:
                type: object
                properties:
                  reportIntervalInSec:
                    type: number
                    description: Minimum interval in seconds between flash error reports.
                  threshold:
                    type: number
                    description: Flash usage percentage (0-100) above which an error is reported.
                description: Flash storage error threshold reporting configuration.
              ntp:
                type: boolean
                description: Enable NTP synchronization error reporting.
              radio:
                type: boolean
                description: Enable radio (RFID engine) error reporting.
              radio_control:
                type: boolean
                description: Enable radio control module error reporting.
              ram:
                type: object
                properties:
                  reportIntervalInSec:
                    type: number
                    description: Minimum interval in seconds between RAM error reports.
                  threshold:
                    type: number
                    description: RAM usage percentage (0-100) above which an error is reported.
                description: RAM error threshold reporting configuration.
              reader_gateway:
                type: boolean
                description: Enable reader gateway (cloud agent) error reporting.
              userApp:
                type: object
                properties:
                  reportIntervalInSec:
                    type: number
                    description: Minimum interval in seconds between user app error reports.
                  threshold:
                    type: number
                    description: Resource usage percentage (0-100) above which a user app error is reported.
                description: User application error threshold reporting configuration.
            description: Error event reporting configuration per subsystem.
          gpiEvents:
            type: boolean
            description: Enable publishing of GPI (General Purpose Input) state change events to the management channel.
          gpoEvents:
            type: boolean
            description: Enable publishing of GPO (General Purpose Output) state change events to the management channel.
          heartbeat:
            type: object
            properties:
              fields:
                type: object
                properties:
                  radio_control:
                    type: array
                    description: 'Radio control telemetry fields to include in the heartbeat. Example values: ANTENNAS, RADIO_ACTIVITY, RADIO_CONNECTION, CPU, RAM, UPTIME, NUM_ERRORS, NUM_WARNINGS, NUM_TAG_READS, NUM_TAG_READS_PER_ANTENNA, NUM_DATA_MESSAGES_TXED, NUM_RADIO_PACKETS_RXED.'
                    items:
                      type: string
                  reader_gateway:
                    type: array
                    description: 'Reader gateway (cloud agent) telemetry fields to include in the heartbeat. Example values: NUM_DATA_MESSAGES_RXED, NUM_MANAGEMENT_EVENTS_TXED, NUM_DATA_MESSAGES_TXED, NUM_DATA_MESSAGES_RETAINED, NUM_DATA_MESSAGES_DROPPED, CPU, RAM, UPTIME, NUM_ERRORS, NUM_WARNINGS, INTERFACE_CONNECTION_STATUS, NOLOCKQ_DEPTH.'
                    items:
                      type: string
                  system:
                    type: array
                    description: 'System-level telemetry fields to include in the heartbeat. Example values: CPU, FLASH, NTP, RAM, SYSTEMTIME, TEMPERATURE, UPTIME, GPO, GPI, POWER_NEGOTIATION, POWER_SOURCE, MAC_ADDRESS, HOSTNAME.'
                    items:
                      type: string
                  userDefined:
                    type: object
                    properties: {}
                    description: User-defined key-value pairs to include in every heartbeat event. Arbitrary JSON object; use to attach static metadata such as site name, location, or asset tag.
                  userapps:
                    type: array
                    description: 'User application telemetry fields to include in the heartbeat. Example values: STATUS, CPU, RAM, UPTIME, NUM_DATA_MESSAGES_RXED, NUM_DATA_MESSAGES_TXED, INCOMING_DATA_BUFFER_PERCENTAGE_REMAINING, OUTGOING_DATA_BUFFER_PERCENTAGE_REMAINING.'
                    items:
                      type: string
                description: Selects which telemetry fields to include in each heartbeat event, grouped by subsystem.
              interval:
                type: number
                description: Heartbeat publish interval in seconds. Set to 0 to disable heartbeat.
            description: Heartbeat event configuration. The reader publishes periodic status heartbeats to the management channel.
          userappEvents:
            type: boolean
            description: Enable publishing of user application lifecycle events (start, stop, crash) to the management channel.
          warnings:
            type: object
            properties:
              cpu:
                type: object
                properties:
                  reportIntervalInSec:
                    type: number
                    description: Minimum interval in seconds between CPU warning reports.
                  threshold:
                    type: number
                    description: CPU usage percentage (0-100) above which a warning is reported.
                description: CPU warning threshold reporting configuration.
              database:
                type: boolean
                description: Enable database warning reporting.
              flash:
                type: object
                properties:
                  reportIntervalInSec:
                    type: number
                    description: Minimum interval in seconds between flash warning reports.
                  threshold:
                    type: number
                    description: Flash usage percentage (0-100) above which a warning is reported.
                description: Flash storage warning threshold reporting configuration.
              ntp:
                type: boolean
                description: Enable NTP synchronization warning reporting.
              radio_api:
                type: boolean
                description: Enable radio API warning reporting.
              radio_control:
                type: boolean
                description: Enable radio control module warning reporting.
              ram:
                type: object
                properties:
                  reportIntervalInSec:
                    type: number
                    description: Minimum interval in seconds between RAM warning reports.
                  threshold:
                    type: number
                    description: RAM usage percentage (0-100) above which a warning is reported.
                description: RAM warning threshold reporting configuration.
              reader_gateway:
                type: boolean
                description: Enable reader gateway (cloud agent) warning reporting.
              temperature:
                type: object
                properties:
                  ambient:
                    type: number
                    description: Ambient temperature threshold in degrees Celsius above which a warning is reported.
                  pa:
                    type: number
                    description: Power amplifier temperature threshold in degrees Celsius above which a warning is reported.
                description: Temperature warning thresholds. A warning is reported when either threshold is exceeded.
              userApp:
                type: object
                properties:
                  reportIntervalInSec:
                    type: number
                    description: Minimum interval in seconds between user app warning reports.
                  threshold:
                    type: number
                    description: Resource usage percentage (0-100) above which a user app warning is reported.
                description: User application warning threshold reporting configuration.
            description: Warning event reporting configuration per subsystem.
        description: Asynchronous management event configuration, including heartbeat, error reporting, warning reporting, GPI events, and user app events.
      retention:
        description: Global retention configuration for data events on connection loss. Returned as an array (one entry per data endpoint connection) or a single object applied to all connections.
        oneOf:
        - type: object
          description: Single retention config applied to all data endpoints.
          properties:
            maxEventRetentionTimeInMin:
              type: number
              description: Maximum time in minutes to retain events when offline (0 - 10080). 0 or -1 retains events indefinitely until maxNumEvents is reached.
            maxNumEvents:
              type: number
              description: Maximum number of events to buffer when offline (0 - 150000).
            throttle:
              type: number
              description: Rate limit in events/sec for replaying retained events after reconnect (0 - 1000).
        - type: array
          description: Per-endpoint retention config (one entry per data endpoint connection).
          items:
            type: object
            properties:
              maxEventRetentionTimeInMin:
                type: number
                description: Maximum time in minutes to retain events when offline (0 - 10080). 0 or -1 retains events indefinitely until maxNumEvents is reached.
              maxNumEvents:
                type: number
                description: Maximum number of events to buffer when offline (0 - 150000).
              throttle:
                type: number
                description: Rate limit in events/sec for replaying retained events after reconnect (0 - 1000).
    description: Reader Gateway cloud connectivity configuration, including endpoint connections, batching, retention, and management event settings.
