title: success
description: Gets the Reader Cable Loss Compensation. Includes Cable Length and Cable Loss per Hundred Feet. (Not applicable to ATR7000 readers)
type: object
minProperties: 1
maxProperties: 8
additionalProperties: false
patternProperties:
  ^[1-8]$:
    type: object
    description: Cable loss compensation settings for a single antenna port.
    required:
    - cableLength
    - cableLossPerHundredFt
    properties:
      cableLength:
        type: number
        description: Length of the cable connected to this antenna port, in feet.
        minimum: 0
        example: 10
      cableLossPerHundredFt:
        type: number
        description: Cable signal loss per 100 feet for this antenna port, in dB.
        minimum: 0
        example: 10
examples:
- '1':
    cableLength: 10
    cableLossPerHundredFt: 10
  '2':
    cableLength: 10
    cableLossPerHundredFt: 10
  '3':
    cableLength: 10
    cableLossPerHundredFt: 10
  '4':
    cableLength: 10
    cableLossPerHundredFt: 10
