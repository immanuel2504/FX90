title: success
type: object
description: Defines the capabilities present on the reader
properties:
  capabilities:
    type: object
    properties:
      antennas:
        type: array
        description: Antenna inventory reported by the reader. Each item includes the antenna port number and whether it is external or internal.
        items:
          type: object
          description: Port and type of each antenna.
          properties:
            port:
              type: integer
              description: Antenna port number.
            type:
              type: string
              description: Antenna mounting type.
              enum:
              - external
              - internal
          required:
          - port
          - type
      apiSupported:
        type: object
        properties:
          versions:
            type: array
            items:
              type: object
              properties:
                documentation:
                  type: string
                version:
                  type: string
      appLEDColors:
        type: array
        items:
          type: string
          enum:
          - RED
          - GREEN
          - AMBER
      asyncManagementEventsSupported:
        type: boolean
      beepersSupported:
        type: boolean
      clockSupport:
        type: boolean
      daAppPackageFormat:
        type: array
        items:
          type: string
          enum:
          - DEBIAN
      daAppsSupported:
        type: boolean
      daLanguageBindings:
        type: array
        items:
          type: string
          enum:
          - PYTHON
          - NODEJS
      directionalitySupported:
        type: boolean
      endpointTypesSupported:
        type: array
        items:
          type: object
          properties:
            SSLSupported:
              type: boolean
            authenticationTypesSupported:
              type: array
              items:
                type: string
                enum:
                - MTLS
                - TLS
                - BASIC
                - DIGEST
                - NTLM
                - ONLY
                - DIGEST_IE
                - NTLM_WB
                - ANY
                - ANYSAFE
            batchingSupported:
              type: boolean
            dataOnly:
              type: boolean
            retentionSupported:
              type: boolean
            type:
              type: string
      externalSerialPort:
        type: array
        items:
          type: string
          enum:
          - USER
          - DEBUG
          - NONE
        description: External serial port modes supported by the reader.
      keypadSupport:
        type: array
        items:
          type: string
          enum:
          - NONE
      llrpSupported:
        type: boolean
      maxAppLEDs:
        type: number
      maxDataEndpoints:
        type: number
      maxNumOperationsInAccessSequence:
        type: number
      maxNumPreFilters:
        type: number
      messageFormatsSupported:
        type: array
        items:
          type: string
          enum:
          - JSON
      networkInterfaces:
        type: array
        description: Network interfaces supported by the reader.
        items:
          type: object
          properties:
            type:
              type: string
              description: Interface type.
              enum:
              - ETHERNET
              - WIFI
              - BLUETOOTH
              - WAN
            internal:
              type: boolean
              description: Indicates whether the interface is internal to the reader.
            ipStack:
              type: array
              description: IP stacks supported by the interface.
              items:
                type: string
                enum:
                - IPv4
                - IPv6
            ipAssignment:
              type: array
              description: IP assignment modes supported by the interface.
              items:
                type: string
                enum:
                - STATIC
                - DHCP
            802.1x:
              type: boolean
              description: Indicates whether IEEE 802.1x authentication is supported.
            supportedSim:
              type: array
              description: SIM types supported by WAN interfaces.
              items:
                type: string
                enum:
                - Physical SIM
                - Embedded SIM
            NetworkType:
              type: array
              description: WAN radio types supported by WAN interfaces.
              items:
                type: string
                enum:
                - AUTO
                - LTE
                - NR5G
          required:
          - type
          - internal
          - ipStack
          - ipAssignment
          - 802.1x
      numGPIs:
        type: number
      numGPOs:
        type: number
      restAPISupported:
        type: boolean
      rssiFilterSupported:
        type: boolean
      supportedDisplayType:
        type: array
        items:
          type: string
          enum:
          - NONE
          - LCD
          - HDMI
      supportedPowerSource:
        type: array
        items:
          type: string
          enum:
          - DC
          - POE
          - POE+
          - POWERBRICK
          - BATTERY
        description: Power sources supported by the reader model.
      supportedTagDataFormat:
        type: array
        items:
          type: string
          enum:
          - GS1
          - HEX
      tagLocationingSupported:
        type: boolean
      triggers:
        type: array
        items:
          type: string
          enum:
          - GPI
x-stoplight:
  id: 08e33f1zqpbgm
examples:
- capabilities:
    antennas:
    - port: 1
      type: external
    - port: 2
      type: external
    - port: 3
      type: external
    - port: 4
      type: external
    - port: 5
      type: internal
    - port: 6
      type: internal
    apiSupported:
      versions:
      - documentation: https://zebradevs.github.io/rfid-ziotc-docs/index.html
        version: v1
    appLEDColors:
    - RED
    - GREEN
    - AMBER
    asyncManagementEventsSupported: true
    beepersSupported: false
    clockSupport: true
    daAppPackageFormat:
    - DEBIAN
    daAppsSupported: true
    daLanguageBindings:
    - PYTHON
    - NODEJS
    directionalitySupported: false
    endpointTypesSupported:
    - SSLSupported: true
      authenticationTypesSupported:
      - MTLS
      batchingSupported: true
      dataOnly: false
      retentionSupported: true
      type: MQTT
    - SSLSupported: true
      authenticationTypesSupported:
      - MTLS
      batchingSupported: true
      dataOnly: false
      retentionSupported: true
      type: MQTT_WS
    - SSLSupported: true
      authenticationTypesSupported:
      - TLS
      batchingSupported: true
      dataOnly: true
      retentionSupported: true
      type: TCPIP
    - SSLSupported: true
      authenticationTypesSupported:
      - TLS
      batchingSupported: true
      dataOnly: true
      retentionSupported: true
      type: WEBSOCKET
    - SSLSupported: true
      authenticationTypesSupported:
      - MTLS
      batchingSupported: true
      dataOnly: false
      retentionSupported: true
      type: AWS_IOT_CORE
    - SSLSupported: true
      authenticationTypesSupported:
      - BASIC
      - DIGEST
      - NTLM
      - TLS
      - ONLY
      - DIGEST_IE
      - NTLM_WB
      - ANY
      - ANYSAFE
      batchingSupported: true
      dataOnly: true
      retentionSupported: true
      type: HTTP
    - SSLSupported: true
      authenticationTypesSupported:
      - TLS
      batchingSupported: true
      dataOnly: false
      retentionSupported: true
      type: AZURE_IOT_HUB
    externalSerialPort:
    - NONE
    keypadSupport:
    - NONE
    llrpSupported: true
    maxAppLEDs: 1
    maxDataEndpoints: 2
    maxNumOperationsInAccessSequence: 32
    maxNumPreFilters: 32
    messageFormatsSupported:
    - JSON
    networkInterfaces:
    - 802.1x: true
      internal: true
      ipAssignment:
      - STATIC
      - DHCP
      ipStack:
      - IPv4
      - IPv6
      type: ETHERNET
    - 802.1x: true
      internal: true
      ipAssignment:
      - STATIC
      - DHCP
      ipStack:
      - IPv4
      - IPv6
      type: WIFI
    - 802.1x: false
      internal: true
      ipAssignment:
      - DHCP
      ipStack:
      - IPv4
      type: BLUETOOTH
    numGPIs: 4
    numGPOs: 4
    restAPISupported: true
    rssiFilterSupported: true
    supportedDisplayType:
    - NONE
    supportedPowerSource:
    - POWERBRICK
    - POE
    - POE+
    supportedTagDataFormat:
    - GS1
    - HEX
    tagLocationingSupported: false
    triggers:
    - GPI
