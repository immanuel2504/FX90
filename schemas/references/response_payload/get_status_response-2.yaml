type: object
properties:
  antennas:
    type: object
    properties:
      1:
        type: string
        description: Antenna 1 connection state.
        enum:
        - connected
        - disconnected
      2:
        type: string
        description: Antenna 2 connection state.
        enum:
        - connected
        - disconnected
      3:
        type: string
        description: Antenna 3 connection state.
        enum:
        - connected
        - disconnected
      4:
        type: string
        description: Antenna 4 connection state.
        enum:
        - connected
        - disconnected
      5:
        type: string
        description: Antenna 5 connection state.
        enum:
        - connected
        - disconnected
      6:
        type: string
        description: Antenna 6 connection state.
        enum:
        - connected
        - disconnected
      7:
        type: string
        description: Antenna 7 connection state.
        enum:
        - connected
        - disconnected
      8:
        type: string
        description: Antenna 8 connection state.
        enum:
        - connected
        - disconnected
    description: Per-antenna connection status reported by the reader.
  cpu:
    type: object
    properties:
      system:
        type: number
        description: Percentage of CPU time spent in kernel/system mode.
      user:
        type: number
        description: Percentage of CPU time spent in user mode.
    description: CPU utilization statistics reported by the reader.
  flash:
    type: object
    properties:
      platform:
        type: object
        properties:
          free:
            type: number
          total:
            type: number
          used:
            type: number
        description: Usage metrics for the platform partition.
      readerConfig:
        type: object
        properties:
          free:
            type: number
          total:
            type: number
          used:
            type: number
        description: Usage metrics for the reader configuration partition.
      readerData:
        type: object
        properties:
          free:
            type: number
          total:
            type: number
          used:
            type: number
        description: Usage metrics for the reader data partition.
      rootFileSystem:
        type: object
        properties:
          free:
            type: number
          total:
            type: number
          used:
            type: number
        description: Usage metrics for the root filesystem partition.
    description: Flash storage utilization by partition.
  interfaceConnectionStatus:
    type: object
    properties:
      data:
        type: array
        description: Per-interface connection status entries.
        items:
          type: object
          properties:
            connectionError:
              type: string
              description: Last connection error message, if any.
            connectionStatus:
              type: string
              description: Current connection state for the interface.
            description:
              type: string
              description: Human-readable interface description.
            interface:
              type: string
              description: Interface name.
    description: Connectivity status for configured cloud/network interfaces.
  ntp:
    type: object
    properties:
      offset:
        type: number
        description: Current NTP clock offset.
      reach:
        type: number
        description: NTP reachability register value.
    description: NTP synchronization status information.
  powerNegotiation:
    type: string
    description: Power negotiation mode reported by the reader.
  powerSource:
    type: string
    description: Current power source for the reader.
  radioActivity:
    type: string
    description: Current radio activity state.
    enum:
    - active
    - inactive
  radioConnection:
    type: string
    description: Current radio connection state.
    enum:
    - connected
    - disconnected
  ram:
    type: object
    properties:
      free:
        type: number
        description: Free RAM amount.
      total:
        type: number
        description: Total RAM amount.
      used:
        type: number
        description: Used RAM amount.
    description: RAM utilization statistics.
  systemTime:
    type: string
  temperature:
    type: number
  uptime:
    type: string
  impinjGen2X:
    type: object
    properties:
      active:
        type: boolean
        description: Indicates whether an Impinj Gen2X feature is currently active
      feature:
        type: string
        description: The name of the active Impinj Gen2X feature
        enum:
        - fastId
        - tagFocus
        - tagProtect
        - tagQuieting
    description: Active Impinj Gen2X runtime status.
  ble:
    type: object
    description: BLE scanner runtime status. Present only when BLE is supported and status is available.
    properties:
      scanState:
        type: string
        description: Current state of the BLE scanner.
        enum:
        - running
        - stopped
      scanStartTime:
        type: string
        format: date-time
        description: ISO 8601 timestamp when the BLE scan was last started.
      beaconCounts:
        type: object
        description: Counts of BLE beacons detected since the last scan start.
        properties:
          total:
            type: integer
            description: Total number of beacons detected.
          iBeacon:
            type: integer
            description: Number of iBeacon advertisements detected.
          altBeacon:
            type: integer
            description: Number of AltBeacon advertisements detected.
          eddystone:
            type: integer
            description: Number of Eddystone advertisements detected.
          generic:
            type: integer
            description: Number of generic (unclassified) BLE advertisements detected.
title: Get Status Response Payload
description: Reader operational status and runtime statistics.
