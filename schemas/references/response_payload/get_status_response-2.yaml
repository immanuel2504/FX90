title: Get Status Response Payload
type: object
description: Retrieves reader operational statistics.
properties:
  antennas:
    type: object
    description: Antenna connection status by antenna port.
    properties:
      '1':
        type: string
        enum:
        - connected
        - disconnected
      '2':
        type: string
        enum:
        - connected
        - disconnected
      '3':
        type: string
        enum:
        - connected
        - disconnected
      '4':
        type: string
        enum:
        - connected
        - disconnected
      '5':
        type: string
        enum:
        - connected
        - disconnected
      '6':
        type: string
        enum:
        - connected
        - disconnected
  cpu:
    type: object
    description: System CPU utilization percentages.
    properties:
      system:
        type: number
      user:
        type: number
  flash:
    type: object
    description: Flash partition usage statistics.
    properties:
      platform:
        type: object
        properties:
          free:
            type: number
          total:
            type: number
          used:
            type: number
      readerConfig:
        type: object
        properties:
          free:
            type: number
          total:
            type: number
          used:
            type: number
      readerData:
        type: object
        properties:
          free:
            type: number
          total:
            type: number
          used:
            type: number
      rootFileSystem:
        type: object
        properties:
          free:
            type: number
          total:
            type: number
          used:
            type: number
  interfaceConnectionStatus:
    type: object
    description: Data endpoint connection status.
    properties:
      data:
        type: array
        items:
          type: object
          properties:
            connectionError:
              type: string
            connectionStatus:
              type: string
            description:
              type: string
            interface:
              type: string
  ntp:
    type: object
    description: NTP synchronization statistics.
    properties:
      offset:
        type: number
      reach:
        type: number
  powerNegotiation:
    type: string
  powerSource:
    type: string
  radioActivity:
    type: string
    enum:
    - active
    - inactive
  radioConnection:
    type: string
    enum:
    - connected
    - disconnected
  ram:
    type: object
    properties:
      free:
        type: number
      total:
        type: number
      used:
        type: number
  systemTime:
    type: string
  temperature:
    type: number
  uptime:
    type: string
  impinjGen2X:
    type: object
    description: Active Impinj Gen2X feature status.
    properties:
      active:
        type: boolean
        description: Indicates whether an Impinj Gen2X feature is currently active.
      feature:
        type: string
        description: The active Impinj Gen2X feature.
        enum:
        - fastId
        - tagFocus
        - tagProtect
        - tagQuieting
  ble:
    type: object
    description: BLE scanner runtime status. Present only when BLE is supported and status is available.
    properties:
      scanState:
        type: string
        enum:
        - running
        - stopped
      scanStartTime:
        type: string
        format: date-time
      beaconCounts:
        type: object
        properties:
          altBeacon:
            type: integer
          eddystone:
            type: integer
          generic:
            type: integer
          iBeacon:
            type: integer
          total:
            type: integer
required:
- antennas
- cpu
- flash
- ntp
- powerNegotiation
- powerSource
- radioActivity
- radioConnection
- ram
- systemTime
- temperature
- uptime
