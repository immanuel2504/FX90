title: logLevel
type: object
description: Reader logging configuration.
properties:
  radioPacketLog:
    type: boolean
    description: Enables or disables the radio packet log.
  components:
    type: array
    description: Logging configuration for individual reader or cloud-agent components.
    items:
      type: object
      properties:
        componentName:
          type: string
          description: Component identifier. Supported canonical names are radio_control and cloud_agent. Supported aliases are RC for radio_control and RG for reader_gateway.
          enum:
          - radio_control
          - RC
          - cloud_agent
          - reader_gateway
          - RG
        level:
          type: string
          description: Log level to apply to the selected component.
          enum:
          - 'OFF'
          - FATAL
          - ERROR
          - WARNING
          - DEBUG
          - INFO
          - TRACE
          - EXTRA
      required:
      - componentName
      - level
