title: Get Network Interfaces Response Payload
type: object
description: Contains the network interfaces configuration
properties:
  availableNetworkInterfaces:
    type: array
    description: List of physical and virtual network interfaces currently available on the device
    items:
      type: string
      description: The network interface identifier
      enum:
      - eth0
      - mlan0
      - bnep0
      - uap0
      - wan0
required:
- availableNetworkInterfaces