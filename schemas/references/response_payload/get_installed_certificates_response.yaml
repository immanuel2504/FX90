type: array
description: Installed certificate details returned by the reader.
minItems: 1
uniqueItems: true
x-examples:
  example-1:
  - installTime: Mon Jun 21 12:38:03 2021
    issuerName: FXR90C5F1AB
    name: Reader Main Certificates
    publickey: ''
    serial: '410835777'
    subjectName: FXR90C5F1AB
    type: server
    validityEnd: 16/06/2041
    validityStart: 21/06/2021
title: success
items:
  type: object
  description: single certificate details
  properties:
    installTime:
      type: string
      description: Certificate installation timestamp on the reader.
    issuerName:
      type: string
      description: Certificate issuer distinguished name.
    name:
      type: string
      description: Certificate name as stored on the reader.
    publickey:
      type: string
      description: PEM-formatted public key for the certificate.
    serial:
      type: string
      description: Certificate serial number.
    subjectName:
      type: string
      description: Certificate subject distinguished name.
    type:
      type: string
      description: Certificate type.
      enum:
      - server
      - client
      - app
    validityEnd:
      type: string
      description: Certificate validity end date/time.
    validityStart:
      type: string
      description: Certificate validity start date/time.
  required:
  - installTime
  - issuerName
  - name
  - publickey
  - serial
  - subjectName
  - type
  - validityEnd
  - validityStart
