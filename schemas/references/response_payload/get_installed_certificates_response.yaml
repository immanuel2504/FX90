type: array
description: Retrive installed certificates details
minItems: 1
uniqueItems: true
x-examples:
  example-1:
  - installTime: 'Mon Jun 21 12:38:03 2021'
    issuerName: FXR90C5F1AB
    name: Reader Main Certificates
    publickey: ''
    serial: '410835777'
    subjectName: FXR90C5F1AB
    type: server
    validityEnd: 16/06/2041
    validityStart: 21/06/2021
title: success
items:
  type: object
  description: single certificate details
  properties:
    name:
      type: string
      minLength: 1
      description: Certificate name on the reader.
      example: Reader Main Certificates
    type:
      type: string
      minLength: 1
      description: 'Certificate type. Allowed values: server, client, app.'
      example: server
      enum:
      - server
      - client
      - app
    installTime:
      type: string
      minLength: 1
      description: Time when the certificate was installed on the reader.
      example: Mon Jun 21 12:38:03 2021
    issuerName:
      type: string
      minLength: 1
      description: Issuer name recorded in the certificate.
      example: FXR90C5F1AB
    publickey:
      type: string
      description: Public key content for the certificate.
    serial:
      type: string
      minLength: 1
      description: Certificate serial number.
      example: '410835777'
    subjectName:
      type: string
      minLength: 1
      description: Subject name recorded in the certificate.
      example: FXR90C5F1AB
    validityStart:
      type: string
      minLength: 1
      description: Certificate validity start date.
      example: 21/06/2021
    validityEnd:
      type: string
      minLength: 1
      description: Certificate validity end date.
      example: 16/06/2041
  required:
  - name
  - type
  - installTime
  - issuerName
  - publickey
  - serial
  - subjectName
  - validityStart
  - validityEnd
