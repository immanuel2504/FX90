type: object
description: Basic TagQuieting configuration for quieting or unquieting specific tags identified by EPC.
properties:
  action:
    type: string
    enum:
    - quiet
    - unquiet
    example: quiet
  tagIDs:
    type: array
    minItems: 1
    items:
      type: string
      pattern: ^[0-9A-Fa-f]+$
      example: e2801191a5030069073b426d
required:
- action
- tagIDs
