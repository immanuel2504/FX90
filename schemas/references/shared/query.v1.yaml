title: query
type: object
properties:
  tagPopulation:
    type: number
    minimum: 0
    description: 'Expected number of tags.'
  sel:
    type: string
    enum:
    - ALL
    - SL
    - NOT_SL
    description: Sel field (EPC Gen2).
  session:
    type: string
    description: Session field (EPC Gen2).
    enum:
    - S0
    - S1
    - S2
    - S3
  target:
    type: string
    description: Target field (EPC Gen2).
    enum:
    - A
    - B
    - AB
