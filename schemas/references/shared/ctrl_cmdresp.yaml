examples:
- connections:
  - type: mqtt
    options:
      endpoint:
        hostName: 10.17.231.77
        port: 8883
        protocol: tcp
      enableSecurity: true
      security:
        keyFormat: PEM
        keyAlgorithm: RSA256
        CACertificateFileLocation: string
        publicKeyFileLocation: string
        privateKeyFileLocation: string
        verifyHostName: true
        verifyPeer: true
        installedCertificateName: string
        installedCertificateType: server
      basicAuthentication:
        username: string
        password: string
      additional:
        keepAlive: 0
        cleanSession: true
        debug: true
        reconnectDelay: 0
        reconnectDelayMax: 0
        clientId: string
        qos: 0
        retain: false
      publishTopic:
      - string
      subscribeTopic:
      - string
    name: string
    description: string
    additionalOptions:
      batching:
        reportingInterval: 1000
        maxPayloadSizePerReport: 256000
      retention:
        throttle: 200
        maxNumEvents: 150000
        maxEventRetentionTimeInMin: 10
