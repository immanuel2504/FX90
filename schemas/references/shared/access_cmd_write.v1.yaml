title: write
x-stoplight:
  id: 91z911vfjeequ
type: object
properties:
  type:
    type: string
    enum:
    - WRITE
  config:
    type: object
    required:
    - membank
    - wordPointer
    - data
    properties:
      membank:
        type: string
        enum:
        - EPC
        - TID
        - USER
        - RESERVED
        description: Membank Field (see EPC Gen2 Spec)
      wordPointer:
        type: integer
        description: WordPtr Field (see EPC Gen2 Spec)
      data:
        type: string
        description: Data Field (see EPC Gen2 Spec) Hex string indicating the word(s)
          to be written. Unlike the Gen2 Spec, the length of the data field can be
          more than a single 16 bit word. However, the length of the string must be
          a multiple of 16 bit words
        example: '11112222'
      blockSize:
        type: integer
        description: Block size - if set to non-zero value, the reader will use the
          BlockWrite command set write the data (and not the simple Write command).
          The value indicates the number of 16-bit words to use for each block
required:
- type
- config
