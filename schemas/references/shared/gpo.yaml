title: GPO Event
type: object
description: GPO Event
examples:
- pin: 1
  state: LOW
properties:
  pin:
    type: number
    description: GPO pin number
    minimum: 1
    maximum: 4
    enum:
    - 1
    - 2
    - 3
    - 4
    example: 4
  state:
    type: string
    enum:
    - HIGH
    - LOW
    example: LOW
    description: GPO pin state
required:
- pin
- state
