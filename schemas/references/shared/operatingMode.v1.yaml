title: success
type: object
description: Current reader operating mode configuration.
properties:
  type:
    type: string
    description: Operating mode type.
    enum:
    - SIMPLE
    - INVENTORY
    - PORTAL
    - CONVEYOR
    - CUSTOM
  environment:
    type: string
    description: Reader RF environment profile.
    enum:
    - LOW_INTERFERENCE
    - HIGH_INTERFERENCE
    - VERY_HIGH_INTERFERENCE
    - AUTO_DETECT
    - DEMO
  antennaStopCondition:
    type: array
    description: Per-antenna or shared antenna stop conditions.
    items:
      type: object
      required:
      - type
      - value
      properties:
        type:
          type: string
          description: Type of stop condition.
          enum:
          - DURATION
          - INVENTORY_COUNT
          - GPI
          - SINGLE_INVENTORY_LIMITED_DURATION
        value:
          type: number
          description: Value for the selected stop condition type.
  antennas:
    type: array
    description: Antenna ports to be used for inventory.
    items:
      type: number
  delayBetweenAntennaCycles:
    $ref: delayBetweenAntennaCycles.v1.yaml
    type: object
    properties:
      duration:
        type: number
        description: Delay in milliseconds.
      type:
        type: string
        description: Condition under which delay is applied.
        enum:
        - DISABLED
        - NO_TAGS
        - NO_UNIQUE_TAGS
  query:
    type: array
    items:
      type: object
      properties:
        tagPopulation:
          type: number
          description: Expected number of tags.
        sel:
          type: string
          description: Sel field (EPC Gen2).
          enum:
          - ALL
          - SL
          - NOT_SL
        session:
          type: string
          description: Session field (EPC Gen2).
          enum:
          - S0
          - S1
          - S2
          - S3
        target:
          type: string
          description: Target field (EPC Gen2).
          enum:
          - A
          - B
          - AB
  inventoryProtocol:
    type: object
    properties:
      mode:
        type: string
        description: Inventory protocol mode.
        enum:
        - GEN2X
        - GEN2
        - HYBRID
  reportFilter:
    $ref: tagReportFilter.v1.yaml
    type: object
    properties:
      duration:
        type: number
        description: Report filter duration in seconds.
      type:
        type: string
        description: Report filter scope.
        enum:
        - RADIO_WIDE
        - PER_ANTENNA
  tagMetaData:
    type: array
    description: Tag metadata fields included in reports.
    items:
      type: string
      enum:
      - RSSI
      - PHASE
      - SEEN_COUNT
      - ANTENNA
      - CHANNEL
      - PC
      - XPC
      - CRC
      - EPC
      - TID
      - USER
      - MAC
      - HOSTNAME
  transmitPower:
    type: array
    description: Desired transmit power values in dBm.
    items:
      type: number
required:
- type
example:
  type: INVENTORY
  antennas:
  - 1
  - 2
  - 3
  transmitPower: 30.1
  antennaStopCondition:
  - type: DURATION
    value: 500
  - type: INVENTORY_COUNT
    value: 1
  - type: GPI
    value:
      port: 2
      signal: HIGH
  tagMetaData:
  - PC
  - CRC
  - userDefined: readerABC
  rssiFilter:
    threshold: -72
