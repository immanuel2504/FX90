title: set_refreshCertificate
type: object
properties:
  name:
    type: string
    description: Certificate name. For REST, the certificate is identified by the
      certname path parameter; for MQTT, the certificate is identified by the name
      payload field.
  type:
    type: string
    example: client
    enum:
    - client
    - server
    - app
    description: 'Certificate type. Allowed values: client, server, app.'
required:
- name
- type
description: Refresh installed certificate
