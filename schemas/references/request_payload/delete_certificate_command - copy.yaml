title: del_certificate
type: object
description: Delete the specified certificate from the device.
properties:
  name:
    type: string
    description: Certificate name. For REST, the certificate is identified by the certname path parameter; for MQTT, the certificate is identified by the name payload field.
  type:
    type: string
    description: 'Certificate type. Valid values: server, client, app.'
    enum:
    - server
    - client
    - app
required:
- name
- type
examples:
- name: reader
  type: client
