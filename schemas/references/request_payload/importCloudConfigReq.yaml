        description: 'Management plane endpoint configuration. Replaces the existing management.commandResponse and/or management.event configuration when provided. Only keys present in the payload are updated. Valid keys: commandResponse, event.'
    description: Cloud endpoint configuration to import. Selectively merges the provided sub-sections (control.commandResponse, management.commandResponse, management.event, data.event) into the reader's existing configuration. Only the sections provided are updated; omitted sections are left unchanged.
title: Import Cloud Config Request
description: Imports cloud endpoint configuration for command responses, tag data events, and management events.
