title: set_os
type: object
description: 'Update the OS software on the device


  The HTTP Server should return json array of files available in the folder when query
  HTTP GET to url provided


  HTTP1.1 GET http://10.17.231.77:8080/3.9.17 -> ["response.txt", "response_ext.txt"
  ...]'
properties:
  authenticationType:
    type: string
    description: 'Authentication method used by the file server. Allowed values: NONE,
      BASIC.'
    enum:
    - NONE
    - BASIC
    example: NONE
  url:
    type: string
    description: URL of the file server location that hosts the firmware files.
    example: http://10.17.231.168:8003/3_20_4
  options:
    type: object
    description: BASIC authentication credentials for the file server.
    properties:
      username:
        type: string
        description: Username for BASIC authentication.
        example: XXXX
      password:
        type: string
        description: Password for BASIC authentication.
        example: XXXX
required:
- url
- authenticationType
examples:
- authenticationType: NONE
  url: http://10.17.231.168:8003/3_20_4
  options:
    username: XXXX
    password: XXXX
