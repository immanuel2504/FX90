title: set_appled
type: object
description: Sets the reader App LED to the specified color and behavior.
properties:
  color:
    type: string
    description: The color of the LED (red, amber, green, off).
    enum:
    - red
    - amber
    - green
    - 'off'
  flash:
    type: boolean
    description: Whether the LED should blink.
  seconds:
    type: number
    description: Duration in seconds. Use 0 for indefinite.
