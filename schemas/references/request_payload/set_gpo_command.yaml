title: set_gpo
type: object
description: Updates the state of the specified GPO port.
properties:
  port:
    type: integer
    description: GPO port number to update. Valid values are 1 through 4.
    minimum: 1
    maximum: 4
    example: 1
  state:
    type: boolean
    description: Desired GPO output state. true sets the output HIGH; false sets the
      output LOW.
    default: false
required:
- port
- state
