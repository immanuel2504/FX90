title: set_gpo
type: object
description: Updates the state of the specified GPO port.
properties:
  port:
    type: number
    description: GPO port number (1–4 for FXR90; device-specific maximum applies).
    minimum: 1
    maximum: 4
  state:
    type: boolean
    description: Desired GPO state — true for HIGH, false for LOW.
required:
- port
- state
