title: set_autostartUserapp
type: object
description: configure auto start settings for userapp
properties:
  appname:
    type: string
    description: Application name. For REST, the application is identified by the appname path parameter; for MQTT, the application is identified by the appname payload field.
  autostart:
    type: boolean
    description: Set to true to enable automatic startup of the user application on boot, or false to disable autostart.
required:
- autostart
