  READER-GATEWAY:
    type: object
    description: Gateway specific configuration
    properties:
      retention:
        title: Tag Data Events Retention Configuration
        type: object
        description: 'Tag Data Events Retention Configuration on connection lost'
        properties:
          throttle:
            type: integer
            default: 100
            description: Rate (in events per second) to report data events when network is reconnected
            minimum: 1
            example: 200
            maximum: 1000
          maxNumEvents:
            type: integer
            default: 150000
            description: Maximum number of events to retain
            maximum: 150000
            minimum: 1
            example: 150000
          maxEventRetentionTimeInMin:
            type: integer
            description: 'Maximum event retention time (in minutes)


              0 indicate Events will be retained Forever


              Example:

              10 indicate Events generated in last 10 minutes will be retained'
            example: 10
            default: 500
            minimum: 0
            maximum: 10080
      batching:
        title: Tag Data Events batching configuration
        type: object
        description: 'Tag Data Events batching configuration


          NOTE : Batching can be disabled by configuring maxPayloadSizePerReport and reportingInterval to 0.'
        properties:
          reportingInterval:
            type: number
            description: 'Event Report interval in milliseconds.(default: 2000 milliseconds for HTTP POST Endpoint).'
            minimum: 0
            example: 1000
            maximum: 86400000
          maxPayloadSizePerReport:
            type: number
            description: 'Maximum payload size in bytes.(default: 256000 bytes for HTTP POST Endpoint).'
            minimum: 0
            maximum: 256000
      managementEventConfig:
        description: Asynchronous management events configuration
        type: object
        x-examples:
          example-1:
            errors:
              cpu:
                threshold: 90
                reportIntervalInSec: 1800
              flash:
                threshold: 90
                reportIntervalInSec: 1800
              ram:
                threshold: 90
                reportIntervalInSec: 1800
              reader_gateway: true
              antenna: false
              database: true
              radio: true
              radio_control: true
            warnings:
              cpu:
                threshold: 80
                reportIntervalInSec: 1800
              flash:
                threshold: 80
                reportIntervalInSec: 1800
              ram:
                threshold: 80
                reportIntervalInSec: 1800
              ntp:
                threshold: 0
                reportIntervalInSec: 1800
              database: true
              radio_api: true
              radio_control: true
              temperature:
                ambient: 75
                pa: 105
            gpiEvents: true
            userappEvents: true
            heartbeat:
              fields:
                radio_control:
                - ANTENNAS
                - RADIO_ACTIVITY
                - RADIO_CONNECTION
                - CPU
                - RAM
                - UPTIME
                - NUM_ERRORS
                - NUM_WARNINGS
                - NUM_TAG_READS
                - NUM_TAG_READS_PER_ANTENNA
                - NUM_DATA_MESSAGES_TXED
                - NUM_RADIO_PACKETS_RXED
                reader_gateway:
                - NUM_DATA_MESSAGES_RXED
                - NUM_DATA_MESSAGES_TXED
                - NUM_DATA_MESSAGES_RETAINED
                - NUM_DATA_MESSAGES_DROPPED
                - NUM_MANAGEMENT_EVENTS_TXED
                - CPU
                - RAM
                - UPTIME
                - NUM_ERRORS
                - NUM_WARNINGS
                system:
                - CPU
                - FLASH
                - NTP
                - RAM
                - SYSTEMTIME
                - TEMPERATURE
                - UPTIME
                userapps:
                - STATUS
                - CPU
                - RAM
                - UPTIME
                - NUM_DATA_MESSAGES_RXED
                - NUM_DATA_MESSAGES_TXED
                - INCOMING_DATA_BUFFER_PERCENTAGE_REMAINING
                - OUTGOING_DATA_BUFFER_PERCENTAGE_REMAINING
              interval: 60
        title: Management Events Configuration
        properties:
          errors:
            type: object
            description: Asynchronous Management Errors
            properties:
              cpu:
                type: object
                description: CPU Usage Error Alerts
                properties:
                  threshold:
                    type: number
                    description: Error CPU usage limit
                    default: 90
                    example: 90
                    minimum: 1
                    maximum: 100
                  reportIntervalInSec:
                    type: number
                    default: 1800
                    example: 1800
                    minimum: 1
                    description: Error Report Interval in seconds.
                required:
                - threshold
              flash:
                type: object
                description: Flash Usage Error Alerts
                properties:
                  threshold:
                    type: number
                    description: Error FLASH usage limit
                    default: 90
                    example: 90
                    minimum: 1
                    maximum: 100
                  reportIntervalInSec:
                    type: number
                    description: Error Report Interval in seconds.
                    default: 1800
                    example: 1800
                    minimum: 1
                required:
                - threshold
              ram:
                type: object
                description: RAM Usage Error Alerts
                properties:
                  threshold:
                    type: number
                    description: Error RAM usage limit
                    default: 90
                    example: 90
                    minimum: 1
                    maximum: 100
                  reportIntervalInSec:
                    type: number
                    description: Error Report Interval in seconds.
                    default: 1800
