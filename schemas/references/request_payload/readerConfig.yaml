examples:
- xml: string
  GPIO-LED:
    GPODefaults:
      '1': HIGH
      '2': LOW
      '3': HIGH
      '4': HIGH
    LEDDefaults:
      '3': GREEN
    GPI_1_H:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
    GPI_1_L:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
    GPI_2_H:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
    GPI_2_L:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
    CLOUD_DISCONNECT:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
    CLOUD_CONNECT:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
    TAG_READ:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
    RADIO_START:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
    RADIO_STOP:
    - type: GPO
      pin: 1
      state: HIGH
      postActionState: HIGH
      blink:
        'ON': 0
        'OFF': 0
        DURATION: 0
      conditions:
      - IS_CLOUD_CONNECTED
  READER-GATEWAY:
    retention:
      throttle: 200
      maxNumEvents: 150000
      maxEventRetentionTimeInMin: 10
    batching:
      reportingInterval: 1000
      maxPayloadSizePerReport: 256KB
    managementEventConfig:
      errors:
        cpu:
          threshold: 90
          reportIntervalInSec: 1800
        flash:
          threshold: 90
          reportIntervalInSec: 1800
        ram:
          threshold: 90
          reportIntervalInSec: 1800
        reader_gateway: true
        antenna: true
        database: true
        radio: true
        radio_control: true
      warnings:
        cpu:
          threshold: 80
          reportIntervalInSec: 1800
        flash:
          threshold: 90
          reportIntervalInSec: 1800
        ram:
          threshold: 90
          reportIntervalInSec: 1800
        ntp:
          threshold: 0
          reportIntervalInSec: 0
        temperature:
          ambient: 75
          pa: 105
        database: true
        radio_api: true
        radio_control: true
        reader_gateway: true
      heartbeat:
        fields:
          radio_control:
          - ANTENNAS
          reader_gateway:
          - NUM_DATA_MESSAGES_RXED
          system:
          - CPU
          userapps:
          - STATUS
          userDefined: string
        interval: 60
      gpiEvents: true
      userappEvents: true
    endpointConfig:
      data:
        event:
          connections:
          - type: mqtt
            options:
              endpoint:
                hostName: 10.17.231.77
                port: 8883
                protocol: tcp
              enableSecurity: true
              security:
                keyFormat: PEM
                keyAlgorithm: RSA256
                CACertificateFileLocation: string
                publicKeyFileLocation: string
                privateKeyFileLocation: string
                verifyHostName: true
              basicAuthentication:
                username: string
                password: string
              additional:
                keepAlive: 0
                cleanSession: true
                debug: true
                reconnectDelay: 0
                reconnectDelayMax: 0
                clientId: string
                qos: 0
              publishTopic:
              - string
              subscribeTopic:
              - string
            name: string
            description: string
            additionalOptions:
              batching:
                reportingInterval: 1000
                maxPayloadSizePerReport: 256000
              retention:
                throttle: 200
                maxNumEvents: 150000
                maxEventRetentionTimeInMin: 10
properties:
  xml:
    type: string
    description: Current reader XML configuration
  GPIO-LED:
    title: GPIO-LED configuration
    type: object
    description: 'GPIO-LED module configuration


      Configure GPO and LED behaviour based on Events generated


      Supported Events:

      1. GPI_1_L: event raised when GPI 1 changed from HIGH to LOW

      2. GPI_1_H: event raised when GPI 1 changed from LOW to HIGH

      3. GPI_2_L: event raised when GPI 2 changed from HIGH to LOW

      4. GPI_2_H: event raised when GPI 2 changed from LOW to HIGH

      5. CLOUD_DISCONNECT: event raised when reader is disconnected from cloud

      6. CLOUD_CONNECT: event raised when reader is connected to cloud

      7. TAG_READ: event raised when a tag is read

      8. RADIO_START: event raised when inventory operation started using START API

      9. RADIO_STOP: event raised when inventory operation stopped using STOP API'
    properties:
      GPIDebounce:
        type: object
        description: GPI Debounce Configuration
        properties:
          '1':
            type: number
            description: GPI Debounce for pin 1 in milliseconds
            minimum: 0
            default: 50
          '2':
            description: GPI Debounce for pin 2 in milliseconds
            minimum: 0
            default: 50
            type: number
          '3':
            description: GPI Debounce for pin 3 in milliseconds (only applicable to FX9600 readers)
            minimum: 0
            default: 50
            type: number
          '4':
            description: GPI Debounce for pin 4 in milliseconds (only applicable to FX9600 readers)
            minimum: 0
            default: 50
            type: number
      GPODefaults:
        type: object
        description: GPO default configurations
        properties:
          '1':
            type: string
            enum:
            - HIGH
            - LOW
            description: set default state for GPO pin 1
          '2':
            type: string
            enum:
            - LOW
            - HIGH
            description: set default state for GPO pin 2
          '3':
            type: string
            enum:
            - HIGH
            - LOW
            description: set default state for GPO pin 3
          '4':
            type: string
            enum:
            - HIGH
            - LOW
            description: set default state for GPO pin 4
      LEDDefaults:
        type: object
        description: LED default configurations
        properties:
          '3':
            type: string
            enum:
            - GREEN
            - RED
            - AMBER
            description: set default color for LED 3
      GPI_1_H:
        title: GPO-LED Action
        type: array
        description: Array of GPO or LED actions. Actions will be performed sequentially.
        x-internal: true
        items:
          anyOf:
          - title: GPO Action
            description: 'Configuration to define operations on single GPO.


              GPO Action will be skipped if conditions provided is not satisfied.'
            properties:
              type:
                type: string
                enum:
                - GPO
                description: Action type
              pin:
                type: number
                example: 1
                description: GPO pin number
                enum:
                - 1
                - 2
                - 3
                - 4
              state:
                type: string
                enum:
                - HIGH
                - LOW
                description: Desired GPO pin state
              postActionState:
                type: string
                enum:
                - HIGH
                - LOW
                description: Desired GPO pin state after action execution completed
              blink:
                title: Action Blink Configuration
                type: object
                description: action blink configuration for GPO or LED
                x-internal: true
                properties:
                  'ON':
                    type: number
                    minimum: 0
                    description: SET GPO or LED to desired state for ON (milliseconds) duration
                  'OFF':
                    type: number
                    minimum: 0
                    description: Toggle GPO or LED for OFF(milliseconds) duration
                  DURATION:
                    type: number
                    minimum: 0
                    description: Total duration in milliseconds to perform blink. 0 will blink GPO or LED forever
                required:
                - 'ON'
                - 'OFF'
                - DURATION
              conditions:
                oneOf:
                - type: array
                  title: Conditions Array
                  description: 'Predefined conditions


                    IS_CLOUD_CONNECTED  : Condition will be true when reader is successfully connected to Cloud.


                    ~IS_CLOUD_CONNECTED : Condition will be true when reader lost Cloud connectivity.


                    IS_RADIO_ONGOING    : Condition will be true when reader is currenty performing inventory or started inventory operation.


                    ~IS_RADIO_ONGOING   : Condition will be true when reader is not performing inventory or stoped inventory operation.'
                  uniqueItems: true
                  minItems: 0
                  x-internal: true
                  items:
                    type: string
                    enum:
                    - IS_CLOUD_CONNECTED
                    - ~IS_CLOUD_CONNECTED
                    - IS_RADIO_ONGOING
                    - ~IS_RADIO_ONGOING
                - type: object
                  properties:
                    operator:
                      type: string
                      enum:
                      - and
                      - or
                      description: operator tobe used for conditions validation
                    operands:
                      type: array
                      title: Conditions Array
                      description: 'Predefined conditions


                        IS_CLOUD_CONNECTED  : Condition will be true when reader is successfully connected to Cloud.


                        ~IS_CLOUD_CONNECTED : Condition will be true when reader lost Cloud connectivity.


                        IS_RADIO_ONGOING    : Condition will be true when reader is currenty performing inventory or started inventory operation.


                        ~IS_RADIO_ONGOING   : Condition will be true when reader is not performing inventory or stoped inventory operation.'
                      uniqueItems: true
                      minItems: 0
                      x-internal: true
                      items:
                        type: string
                        enum:
                        - IS_CLOUD_CONNECTED
                        - ~IS_CLOUD_CONNECTED
                        - IS_RADIO_ONGOING
                        - ~IS_RADIO_ONGOING
                title: Action Conditions
                description: 'Predefined conditions to trigger GPO or LED actions


                  Default "and" operator is used when array of conditions is provided.


                  operator "and": Action is performed only when all the conditions provided is true.

                  operator "or": Action is performed only when one of the conditions provided is true.'
                x-internal: true
            required:
            - type
            - pin
            - state
          - title: LED Action
