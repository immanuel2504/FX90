title: set_cableLossCompensation_command
x-stoplight:
  id: n5amlaauzed2u
description: Sets the Reader Cable Loss Compensation. Includes Cable Length and Cable Loss per Hundred Feet. (Not applicable to ATR7000 readers)
type: object
additionalProperties: false
examples:
- '1':
    cableLength: 90
    cableLossPerHundredFt: 18
  '2':
    cableLength: 18
    cableLossPerHundredFt: 19
  '3':
    cableLength: 10
    cableLossPerHundredFt: 11
  '4':
    cableLength: 10
    cableLossPerHundredFt: 70
properties:
  '1':
    type: object
    description: Cable loss compensation values for read point 1.
    required:
    - cableLength
    - cableLossPerHundredFt
    properties:
      cableLength:
        type: number
        description: Cable length for read point 1.
        example: 90
        minimum: 0
      cableLossPerHundredFt:
        type: number
        description: Cable loss per hundred feet for read point 1.
        example: 18
        minimum: 0
  '2':
    type: object
    description: Cable loss compensation values for read point 2.
    required:
    - cableLength
    - cableLossPerHundredFt
    properties:
      cableLength:
        type: number
        description: Cable length for read point 2.
        example: 18
        minimum: 0
      cableLossPerHundredFt:
        type: number
        description: Cable loss per hundred feet for read point 2.
        example: 19
        minimum: 0
  '3':
    type: object
    description: Cable loss compensation values for read point 3.
    required:
    - cableLength
    - cableLossPerHundredFt
    properties:
      cableLength:
        type: number
        description: Cable length for read point 3.
        example: 10
        minimum: 0
      cableLossPerHundredFt:
        type: number
        description: Cable loss per hundred feet for read point 3.
        example: 11
        minimum: 0
  '4':
    type: object
    description: Cable loss compensation values for read point 4.
    required:
    - cableLength
    - cableLossPerHundredFt
    properties:
      cableLength:
        type: number
        description: Cable length for read point 4.
        example: 10
        minimum: 0
      cableLossPerHundredFt:
        type: number
        description: Cable loss per hundred feet for read point 4.
        example: 70
        minimum: 0
required:
- '1'
- '2'
- '3'
- '4'
