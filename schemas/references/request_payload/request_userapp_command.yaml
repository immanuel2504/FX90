description: Send request to userapp
type: object
title: set_reqToUserapp
properties:
  userapp:
    type: string
    minLength: 1
    description: User application name. For REST, the application is identified by
      the appname path parameter; for MQTT, the application is identified by the userapp
      payload field.
    example: sample
  command:
    type: object
    description: Command object to send to the user application.
    properties:
      message:
        type: string
        description: Message value to send to the user application.
        example: hello
required:
- userapp
- command
examples:
- userapp: sample
  command:
    message: hello
