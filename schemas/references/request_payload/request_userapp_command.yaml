description: Send request to userapp
type: object
title: set_reqToUserapp
properties:
  command:
    type: object
    description: Command payload forwarded as-is to the user application. Structure is application-defined.
    properties:
      message:
        type: string
        description: Message to send to the user application.
  userapp:
    type: string
    description: User application name. For REST, the application is identified by the appname path parameter; for MQTT, the application is identified by the userapp payload field.
required:
- userapp
examples:
- userapp: sample
  command:
    message: hello
