            - pattern: '^sftp://.+'
            - pattern: '^ftps://.+'
          example: https://169.254.149.144:8000/firmware
        transfer_protocol:
          type: string
          description: Optional explicit transfer protocol for firmware download. If omitted, protocol is inferred from the `url` scheme.
          enum:
            - SCP
            - HTTPS
            - SFTP
            - FTPS
        authenticationType:
          type: string
