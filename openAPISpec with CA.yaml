      operationId: getNetworkinterfaces
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Network interface names currently available on the reader.
                properties:
                  availableNetworkInterfaces:
                    type: array
                    description: List of network interface identifiers reported by the reader.
                    minItems: 0
                    uniqueItems: true
                    default: []
                    items:
                      type: string
                required:
                  - availableNetworkInterfaces
              examples:
                application/json:
                  value:
                    availableNetworkInterfaces: ["eth0", "mlan0", "bnep0", "wan0"]
      security:
        - bearerAuth: []
  /cloud/readPoints:
    get:
      tags:
