                example: ""
      security:
        - bearerAuth: []
  /cloud/certificates:
    get:
      tags:
        - Certificate
      summary: Retrieve installed certificate details
      description: MQTT API :-  get_certificates <br> Retrieve installed certificate details
      operationId: getCertificates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: Installed certificate details returned by the reader.
                items:
                  type: object
                  properties:
                    installTime:
                      type: string
                      description: Certificate installation timestamp on the reader.
                    issuerName:
                      type: string
                      description: Certificate issuer distinguished name.
                    name:
                      type: string
                      description: Certificate name as stored on the reader.
                    publickey:
                      type: string
                      description: PEM-formatted public key for the certificate.
                    serial:
                      type: string
                      description: Certificate serial number.
                    subjectName:
                      type: string
                      description: Certificate subject distinguished name.
                    type:
                      type: string
                      description: Certificate type.
                      enum: [server, client, app]
                    validityEnd:
                      type: string
                      description: Certificate validity end date/time.
                    validityStart:
                      type: string
                      description: Certificate validity start date/time.
                  required:
                    - installTime
                    - issuerName
                    - name
                    - publickey
                    - serial
                    - subjectName
                    - type
                    - validityEnd
                    - validityStart
                  example:
                      installTime: Thu May 16 23:25:22 2024
                      issuerName: FXR90C5F314
                      name: Server
                      publickey: |
                        -----BEGIN PUBLIC KEY-----
                        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAvTjmW8JfkXmX27aP6i/5
                        bL74kzDjTeaBRaHJgEcJZ8XsqrNr+TLZo01zaNTwZMuTQJIRfNAuw1zb0MKPFlXS
                        Dq0FjAdJia2Pn4zxLMJQbGyApfPwM39OrW0C+swCS0oCw++dE7e4QmHLKHMlenes
                        gzedNBZ+XoW2xJ7qyprTfI8tNYrKUAm3IU9vEextY0WXJ0RWoYhfi4shF8m1Jb4O
                        huAXdfAs2in5DpOBATJQb+myDQ6qrukfQs75bYXaaYM/YgU0KXriwjBFt+g7KLwY
                        pw4HUnPpI25wJnfjQME0K8/Pd2Lzn/qJ8s5tisjZ4hisu1R2CqGr2HJrhS/T2pZs
                        xQIDAQAB
                        -----END PUBLIC KEY-----
                      serial: |
                        0x686E2A53
                      subjectName: FXR90C5F314
                      type: server
                      validityEnd: 11/05/2044
                      validityStart: 16/05/2024
      security:
        - bearerAuth: []
    put:
      tags:
        - Certificate
      summary: Install certificate
      description: "MQTT API :-  set_updateCertificate (set_update_cert) <br> Installs a certificate on the device. Supported certificate download/transfer protocols: HTTPS, FTPS, SFTP."
      operationId: setUpdatecertificate
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - type
                - name
              properties:
                authenticationType:
                  type: string
                  enum: [NONE, BASIC]
                  description: Authentication method for fetching the certificate file.
                options:
                  type: object
                  description: Credentials object used when `authenticationType` is `BASIC`.
                  required:
                    - username
                    - password
                  properties:
                    username:
                      type: string
                    password:
                      type: string
                name:
                  type: string
                  description: Logical name for the certificate to be installed on the device.
                  example: reader
                pfxPassword:
                  type: string
                  description: Password for the PFX file, if applicable.
                  example: abcd12345
                type:
                  type: string
                  description: 'Certificate type. Valid values: server, client, app.'
                  enum: [server, client, app]
                  example: client
                url:
                  type: string
                  format: uri
                  description: URL to download the certificate file from. Supported URL schemes are https://, ftps://, and sftp://.
                  oneOf:
                    - pattern: '^https://.+'
                    - pattern: '^ftps://.+'
                    - pattern: '^sftp://.+'
                  example: https://10.117.229.15/reader.pfx
                transfer_protocol:
                  type: string
                  description: Optional explicit transfer protocol for certificate download. If omitted, protocol is inferred from the `url` scheme.
                  enum:
                    - HTTPS
                    - FTPS
                    - SFTP
                verifyPeer:
                  type: boolean
                  description: Verify the server TLS peer certificate.
                verifyHost:
                  type: boolean
                  description: Verify the server hostname in the TLS certificate.
                CACertificateFileLocation:
                  type: string
                  description: Path to a CA certificate file on the device.
                CACertificateFileContent:
                  type: string
                  description: PEM-encoded CA certificate content.
                publicKeyFileLocation:
                  type: string
                publicKeyFileContent:
                  type: string
                privateKeyFileLocation:
                  type: string
                privateKeyFileContent:
                  type: string
                installedCertificateType:
                  type: string
                installedCertificateName:
                  type: string
                headers:
                  type: object
                  additionalProperties:
                    type: string
                retry:
                  type: object
                  properties:
                    count:
                      type: integer
                    delayInSec:
                      type: integer
            examples:
              set_updateCertificate:
                value:
                  options:
                    password: zebra
                    username: zebra
                  authenticationType: BASIC
                  name: reader
                  pfxPassword: abcd12345
                  type: client
                  url: https://10.117.229.15/reader.pfx
      responses:
        '200':
          description: OK
      security:
        - bearerAuth: []
