openapi: 3.1.0
info:
  title: IoT Connector REST API
  description: |-
    # Overview
    
    FXR90 reader can be controlled using REST API as documented in this page.
    The definition can be found below

    # Authentication
    
    If a bearer token has already been copied from the dashboard page, use it in `Authorize` > bearerAuth.
    If not, enter Admin login credentials in `Authorize` > basicAuth, execute `/cloud/localRestLogin`,
    and copy the bearer token from the response into `Authorize` > bearerAuth.
     
  version: 3.0.0
  termsOfService: https://www.zebra.com/ap/en/terms-conditions.html
  contact:
    name: API Support
    url: https://www.zebra.com/ap/en/support-downloads/rfid.html
externalDocs:
  description: Find out more about IoT
  url: https://zebradevs.github.io/rfid-ziotc-docs/
paths:
  /cloud/localRestLogin:
    get:
      tags:
        - Login
      summary: Reader Login
      description: MQTT API :- localrest_login <br> Logs in to the reader
      operationId: localrestlogin
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                    example: 0
                  message:
                    type: string
                    example: "string"
      security:
        - basicAuth: []
  /cloud/app-led:
    get:
      tags:
        - App-led
      summary: Retrieves application LED state
      description: MQTT API :-  get_appled <br> Retrieves a value indicating the current state of the application LED
      operationId: getAppled
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Current state of the application LED.
                    enum: [DEFAULT, NON_DEFAULT]
                    example: DEFAULT
      security:
        - bearerAuth: []
    put:
      tags:
        - App-led
      summary: Updates application LED state
      description: MQTT API :-  set_appled <br> Updates the application LED state on the reader to the state specified
      operationId: setAppled
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                color:
                  type: string
                  description: 'The color of the LED (red, amber, green, off).'
                  enum: [red, amber, green, "off"]
                  example: amber
                flash:
                  type: boolean
                  description: Whether the LED should blink.
                  example: true
                seconds:
                  type: number
                  description: Duration in seconds. Use 0 for indefinite.
                  example: 60
            examples:
              set_appled:
                value:
                  color: amber
                  flash: true
                  seconds: 60
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
      security:
        - bearerAuth: []
  /cloud/stack-led:
    get:
      tags:
        - Stack-led
      summary: Retrieves stack LED state
      description: MQTT API :-  get_stackled <br> Retrieves the current status, color, brightness, and remaining time of the stack LED
      operationId: getStackled
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: NON_DEFAULT
                  color:
                    type: string
                    example: amber
                  brightness:
                    type: string
                    example: high
                  flash:
                    type: boolean
                    example: true
                  seconds:
                    type: integer
                    example: 0
                  seconds_remaining:
                    type: integer
                    example: 14
      security:
        - bearerAuth: []
    put:
      tags:
        - Stack-led
      summary: Updates stack LED state
      description: "MQTT API :-  set_stackled <br> Updates the stack LED state on the reader to the state specified. <br><br> Supported Colors: red, amber, green, blue, off <br> Supported Brightness: low, med, high (Defaults to low)"
      operationId: setStackled
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                color:
                  type: string
                  description: 'The color of the LED (red, amber, green, blue, off)'
                  enum: [red, amber, green, blue, "off"]
                  example: amber
                brightness:
                  type: string
                  description: 'The brightness of the LED (low, med, high). Defaults to low.'
                  enum: [low, med, high]
                  example: high
                flash:
                  type: boolean
                  example: true
                seconds:
                  type: integer
                  example: 60
            examples:
              red_high_alert:
                summary: "Color:Red, Brightness:High, Flashing"
                description: "The LED will blink bright red for 30 seconds."
                value:
                  color: red
                  brightness: high
                  flash: true
                  seconds: 30
              green_solid:
                summary: "Color:Green, Brightness:Low(Default), Solid"
                description: "The LED will stay solid green indefinitely."
                value:
                  color: green
                  flash: false
                  seconds: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
      security:
        - bearerAuth: []
  /cloud/gpo:
    get:
      tags:
        - Gpio
      summary: Retrieves the GPO status
      description: |-
        MQTT API :-  get_gpoStatus <br> Retrieves the GPO status on the specified port of the reader.
        Maximum number of ports available per device type:
        1. FX7500 = 3 GPO pins
        2. FX9600 = 4 GPO pins
        3. ATR7000 = 3 GPO pins
        4. FXR90 = 4 GPO pins
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  '1':
                    type: string
                    enum:
                      - HIGH
                      - LOW
                  '2':
                    type: string
                    enum:
                      - HIGH
                      - LOW
                  '3':
                    type: string
                    enum:
                      - HIGH
                      - LOW
                  '4':
                    type: string
                    enum:
                      - HIGH
                      - LOW
                example:
                  '1': HIGH
                  '2': LOW
                  '3': HIGH
                  '4': LOW
      security:
        - bearerAuth: []
    put:
      tags:
        - Gpio
      summary: Updates GPO port state
      description: |-
        MQTT API :-  set_gpo <br> Updates the GPO state on the specified port of the reader.
        Maximum number of ports available per device type:
        1. FX7500 = 3 GPO pins
        2. FX9600 = 4 GPO pins
        3. ATR7000 = 3 GPO pins
        4. FXR90 = 4 GPO pins
      operationId: setGpo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - port
                - state
              properties:
                port:
                  type: number
                  description: GPO port number (1–4 for FXR90; device-specific maximum applies).
                  minimum: 1
                  maximum: 4
                  example: 3
                state:
                  type: boolean
                  description: Desired GPO state — true for HIGH, false for LOW.
                  example: true
            examples:
              set_gpo:
                value:
                  port: 3
                  state: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
      security:
        - bearerAuth: []
  /cloud/gpi:
    get:
      tags:
        - Gpio
      summary: Get GPI Status
      description: MQTT API :-  get_gpiStatus <br> Retrieves the GPI status.
      operationId: getGPIStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - '1'
                  - '2'
                  - '3'
                  - '4'
                properties:
                  '1':
                    type: string
                    description: GPI port 1 state reported by the reader.
                    enum:
                      - HIGH
                      - LOW
                  '2':
                    type: string
                    description: GPI port 2 state reported by the reader.
                    enum:
                      - HIGH
                      - LOW
                  '3':
                    type: string
                    description: GPI port 3 state reported by the reader.
                    enum:
                      - HIGH
                      - LOW
                  '4':
                    type: string
                    description: GPI port 4 state reported by the reader.
                    enum:
                      - HIGH
                      - LOW
                example:
                  '1': HIGH
                  '2': LOW
                  '3': HIGH
                  '4': LOW
      security:
        - bearerAuth: []
  /cloud/region:
    get:
      tags:
        - Region
      summary: Retrieves reader region information
      description: MQTT API :-  get_region <br> Retrieves reader region (country) information
      operationId: getRegion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  FrequencyHopping:
                    type: boolean
                    description: True when frequency hopping is enabled in the active region configuration.
                  region:
                    type: string
                    description: Active region name configured on the reader (for example, US).
                  regulatoryStandard:
                    type: string
                    description: Active regulatory standard for the region (for example, FCC, ETSI, CANADA_FCC_15).
                  lbtEnabled:
                    type: boolean
                    description: True when Listen-Before-Talk is enabled for the selected regulatory configuration.
                  channelData:
                    type: array
                    description: Active channel list used by the region/standard configuration, represented as frequencies (kHz).
                    items:
                      type: integer
                  country:
                    type: string
                    description: Country name associated with the active region configuration.
                  minTxPowerSupported:
                    type: number
                    description: Minimum transmit power supported for the active regulatory standard.
                  maxTxPowerSupported:
                    type: number
                    description: Maximum transmit power supported for the active regulatory standard.
              examples:
                multiple_values:
                  value:
                    FrequencyHopping: true
                    channelData: [915250, 915750, 903250, 926750]
                    country: "Canada"
                    lbtEnabled: false
                    maxTxPowerSupported: 300
                    minTxPowerSupported: 100
                    region: "US"
                    regulatoryStandard: "FCC"

      security:
        - bearerAuth: []
    put:
      tags:
        - Region
      summary: Update region information
      description: MQTT API :-  set_region <br> Updates the reader region information
      operationId: setRegion
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - country
                - standardname
              properties:
                country:
                  type: string
                  description: 'Country name. Valid values can be retrieved from GET /cloud/supportedRegionList.'
                  example: Canada
                standardname:
                  type: string
                  description: 'Regulatory standard name for the chosen country. Valid values can be retrieved from GET /cloud/supportedStandardList?region=<country>.'
                  example: CANADA_FCC_15
                isLBT:
                  type: boolean
                  description: Optional. Enables Listen-Before-Talk when supported by the selected standard.
                  example: false
                channeldata:
                  type: array
                  description: Optional channel frequency list (kHz) to apply when channel selection is supported by the selected standard.
                  items:
                    type: integer
                  example: [915250, 915750, 903250, 926750]
            examples:
              set_region:
                value:
                  country: Canada
                  standardname: CANADA_FCC_15
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
      security:
        - bearerAuth: []
  /cloud/supportedRegionList:
    get:
      tags:
        - Region
      summary: Retrieves the supported region list based on the reader type
      description: MQTT API :-  get_SupportedRegionList <br> Gets the list of regions supported by the reader based on the reader type
      operationId: getSupportedregionlist
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - SupportedRegions
                properties:
                  SupportedRegions:
                    type: array
                    description: List of country/region names supported by the reader.
                    items:
                      type: string
                      description: Supported country/region name.
              example:
                SupportedRegions:
                  - Argentina
                  - Australia
                  - Bangladesh
                  - Brazil
                  - Cambodia
                  - Canada
                  - China
                  - Colombia
                  - Costa Rica
                  - European Union
                  - Ghana
                  - Hong Kong
                  - India
                  - Indonesia
                  - Jordan
                  - Korea
                  - Laos
                  - Malaysia
                  - Mexico
                  - Morocco
                  - New Zealand
                  - Peru
                  - Philippines
                  - Russia
                  - Saudi Arabia
                  - Singapore
                  - South Africa
                  - Taiwan
                  - UAE
                  - Ukraine
                  - Venezuela
                  - Vietnam
      security:
        - bearerAuth: []
  /cloud/supportedStandardList:
    get:
      tags:
        - Region
      summary: Retrieves the standard channels of the supported regions
      description: MQTT API :-  get_SupportedStandardList <br> Based on the region name provided, retrieves the standard channel list
      operationId: getSupportedstandardlist
      parameters:
        - name: region
          in: query
          description: 'Country/region name for which to retrieve supported standards. Valid values can be retrieved from GET /cloud/supportedRegionList.'
          schema:
            type: string
            example: Argentina
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  SupportedStandards:
                    type: array
                    items:
                      type: object
                      properties:
                        StandardName:
                          type: string
                          description: Regulatory standard identifier for the region.
                        channeldata:
                          type: array
                          description: List of center frequencies (in kHz) for the standard's channels.
                          items:
                            type: string
                        isChannelSelectable:
                          type: string
                          description: Whether individual channels can be selected. String-encoded boolean.
                          enum: ["true", "false"]
                        isHoppingConfigurable:
                          type: string
                          description: Whether frequency hopping is configurable. String-encoded boolean.
                          enum: ["true", "false"]
                        isLBTConfigurable:
                          type: string
                          description: Whether Listen-Before-Talk (LBT) is configurable. String-encoded boolean.
                          enum: ["true", "false"]
              example:
                SupportedStandards:
                  - StandardName: ARGENTINA
                    channeldata:
                      - '915750'
                      - '915250'
                      - '903250'
                      - '926750'
                      - '926250'
                      - '904250'
                      - '927250'
                      - '920250'
                      - '919250'
                      - '909250'
                      - '918750'
                      - '917750'
                      - '905250'
                      - '904750'
                      - '925250'
                      - '921750'
                      - '914750'
                      - '906750'
                      - '913750'
                      - '922250'
                      - '911250'
                      - '911750'
                      - '903750'
                      - '908750'
                      - '905750'
                      - '912250'
                      - '906250'
                      - '917250'
                      - '914250'
                      - '907250'
                      - '918250'
                      - '916250'
                      - '910250'
                      - '910750'
                      - '907750'
                      - '924750'
                      - '909750'
                      - '919750'
                      - '916750'
                      - '913250'
                      - '923750'
                      - '908250'
                      - '925750'
                      - '912750'
                      - '924250'
                      - '921250'
                      - '920750'
                      - '922750'
                      - '902750'
                      - '923250'
                    isChannelSelectable: 'false'
                    isHoppingConfigurable: 'false'
                    isLBTConfigurable: 'false'

      security:
        - bearerAuth: []
  /cloud/mode:
    get:
      tags:
        - Control
      summary: Retrieves the operating mode
      description: MQTT API :-  get_mode <br> Retrieves the current operating mode
      operationId: getMode
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operatingMode.v1'
              example:
                modeSpecificSettings:
                  interval:
                    unit: seconds
                    value: 1
                antennaStopCondition:
                  - type: DURATION
                    value: 100
                  - type: DURATION
                    value: 100
                  - type: DURATION
                    value: 100
                antennas:
                  - 1
                  - 5
                  - 6
                delayBetweenAntennaCycles:
                  duration: 0
                  type: DISABLED
                query:
                  - tagPopulation: 256
                  - tagPopulation: 256
                  - tagPopulation: 256
                inventoryProtocol:
                  mode: GEN2
                reportFilter:
                  duration: 0
                  type: PER_ANTENNA
                filter:
                  value: '3008.*'
                  match: regex
                  operation: include
                selects:
                  - target: S1
                    action: INVB_NOTHING
                    membank: TID
                    pointer: 6
                    length: 24
                    mask: '800600'
                tagMetaData:
                  - ANTENNA
                  - RSSI
                  - CHANNEL
                  - PC
                  - XPC
                  - CRC
                  - SEEN_COUNT
                  - PHASE
                  - gpsCoordinates:
                      latitude: 12.9703
                      longitude: 77.7101
                transmitPower:
                  - 20
                  - 20
                  - 20
                rssiFilter:
                  threshold: -72
                type: CUSTOM
                environment: HIGH_INTERFERENCE
      security:
        - bearerAuth: []
    put:
      tags:
        - Control
      summary: Updates the reader's operating mode
      description: MQTT API :-  set_mode <br> Changes the reader's operating mode
      operationId: setMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/operatingMode.v1'
                - type: object
                  description: Additional legacy fields accepted by set_mode.
                  properties:
                    component:
                      type: string
                      description: Legacy wrapper field retained for backward compatibility.
                      example: RC
                    linkProfile:
                      type: number
                      description: Link profile identifier.
                      example: 3
                    payload:
                      type: string
                      description: Legacy wrapper field retained for backward compatibility.
                      example: status
            examples:
              set_mode:
                value:
                  antennaStopCondition:
                    type: DURATION
                    value: 400
                  antennas:
                    - 1
                    - 2
                    - 3
                    - 4
                  linkprofile: 1519
                  query:
                    sel: ALL
                    session: S2
                    tagPopulation: 2000
                    target: AB
                  inventoryProtocol:
                    mode: GEN2
                  radioStopConditions:
                    duration: 60
                  transmitPower: 31.5
                  type: SIMPLE
              set_mode_default_FXR90:
                value:
                  antennaStopCondition:
                    type: DURATION
                    value: 100
                  antennas:
                    - 1
                  component: RC
                  delayBetweenAntennaCycles:
                    duration: 0
                    type: DISABLED
                  linkProfile: 3
                  payload: status
                  query:
                    sel: ALL
                    session: S1
                    tagPopulation: 256
                    target: A
                  inventoryProtocol:
                    mode: GEN2
                  reportFilter:
                    duration: 0
                    type: PER_ANTENNA
                  tagMetaData:
                    - RSSI
                    - PHASE
                    - SEEN_COUNT
                    - ANTENNA
                    - CHANNEL
                    - PC
                    - XPC
                    - CRC
                  transmitPower:
                    - 17
                  type: CUSTOM
              set_mode_TAG_FOCUS:
                value:
                  type: CUSTOM
                  antennaStopCondition:
                    type: DURATION
                    value: 100
                  antennas:
                    - 1
                  query:
                    tagpopulation: 10
                    sel: NOT_SL
                    session: S1
                    target: A
                  inventoryProtocol:
                    mode: GEN2
                  modeSpecificSettings:
                    interval:
                      unit: seconds
                      value: 0
                  selects:
                    - target: S1
                      action: INVB_NOTHING
                      membank: TID
                      pointer: 6
                      length: 24
                      mask: '800600'
                  transmitPower:
                    - 30
                  radioStartConditions: {}
                  radioStopConditions: {}
                  reportFilter:
                    duration: 1
                    type: PER_ANTENNA
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
      security:
        - bearerAuth: []
  /cloud/start:
    put:
      tags:
        - Control
      summary: Start RFID Inventory or BLE scan
      description: |-
        MQTT API :- start

        Start RFID inventory, BLE scanning, or both simultaneously.
        The optional `scanType` array controls which scan types are activated.
        Omitting the payload (or `scanType`) defaults to RFID-only.
        BLE scanning requires prior BLE configuration via `set_bleConfig`.
          `scanType` with `"ble"` cannot be combined with `applyImpinjGen2X`.
      operationId: startInventory
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scanType:
                  type: array
                  description: Which scan types to start. Omit for RFID-only (default).
                  items:
                    type: string
                    enum: [ble, rfid]
                  minItems: 1
                  uniqueItems: true
                  example: ["ble", "rfid"]
                doNotPersistState:
                  type: boolean
                  description: "Controls whether the started inventory state is persisted across reboot. If `true`, the state is not persisted and auto-start is not enabled after reboot. If `false`, the state is persisted across reboot, enabling auto-start."
                  example: false
                applyImpinjGen2X:
                  type: boolean
                  description: "When true, applies the previously configured Impinj Gen2X features (FastID, TagProtect, TagFocus, TagQuieting) on start. Cannot be used with `scanType: [\"ble\"]`."
                  example: true
            examples:
              start_Inventory:
                value: {}
              start_Inventory with AutoStart:
                value:
                  doNotPersistState: false
              start_Inventory with ImpinjGen2X:
                value:
                  applyImpinjGen2X: true
              start_BLE_only:
                value:
                  scanType: ["ble"]
              start_RFID_only:
                value:
                  scanType: ["rfid"]
              start_BLE_and_RFID:
                value:
                  scanType: ["ble", "rfid"]
      responses:
        '200':
          description: OK
      security:
        - bearerAuth: []
  /cloud/stop:
    put:
      tags:
        - Control
      summary: Stop RFID Inventory or BLE scan
      description: |-
        MQTT API :- stop

        Stop RFID inventory, BLE scanning, or both.
        The optional `scanType` array controls what is stopped.
        Omitting the payload (or `scanType`) stops RFID only — the original default behaviour.
        Use `["ble"]` to stop only BLE (RFID continues), `["rfid"]` to stop only RFID
        (BLE continues), or `["ble","rfid"]` to stop both.
      operationId: stopInventory
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scanType:
                  type: array
                  description: Which scan types to stop. Omit for RFID-only (default).
                  items:
                    type: string
                    enum: [ble, rfid]
                  minItems: 1
                  uniqueItems: true
                  example: ["ble", "rfid"]
            examples:
              stop_RFID_default:
                value: {}
              stop_RFID_explicit:
                value:
                  scanType: ["rfid"]
              stop_BLE_only:
                value:
                  scanType: ["ble"]
              stop_BLE_and_RFID:
                value:
                  scanType: ["ble", "rfid"]
      responses:
        '200':
          description: OK
      security:
        - bearerAuth: []
  /cloud/version:
    get:
      tags:
        - System
      summary: Retrieves reader component version information
      description: MQTT API :-  get_version <br> Retrieves reader component version information including Boot Loader, OS, Reader Application, and Radio Firmware versions
      operationId: getVersion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  availableOsUpgrades:
                    type: object
                    description: Placeholder object for available OS upgrades on the reader.
                  cloudAgentApplication:
                    type: string
                    description: Version of the cloud agent application.
                  model:
                    type: string
                    description: Reader model identifier returned by the device.
                    enum:
                      - FXR90
                      - FX7500
                      - FX9600
                      - ATR7000
                      - FXR60
                  radioControlApplication:
                    type: string
                    description: Version of the radio control application.
                  radioFirmware:
                    type: string
                    description: Version of the radio firmware.
                  readerApplication:
                    type: string
                    description: Version of the main reader application.
                  revertBackFirmware:
                    type: object
                    description: Versions available for reverting the reader firmware.
                  serialNumber:
                    type: string
                    description: Reader serial number.
              example:
                availableOsUpgrades: {}
                cloudAgentApplication: 0.6.2.25
                model: FXR90
                radioControlApplication: 0.2.58.6
                radioFirmware: 2.1.57.0
                readerApplication: 2.0.7-5
                revertBackFirmware: {}
                serialNumber: 233575230D0028

      security:
        - bearerAuth: []
  /cloud/status:
    get:
      tags:
        - System
      summary: Retrieves reader operational statistics
      description: MQTT API :-  get_status <br> Retrieves reader operational statistics. <br> This call must be made no less frequently than every 30 seconds.
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  antennas:
                    type: object
