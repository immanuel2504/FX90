        - bearerAuth: []
  /cloud/cableLossCompensation:
    get:
      tags:
        - System
      summary: Retrieves the cableLossCompensation
      description: MQTT API :-  get_cableLossCompensation <br> Gets the Reader Cable Loss Compensation. Includes Cable Length and Cable Loss per Hundred Feet
      operationId: getCablelosscompensation
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Cable loss compensation settings keyed by read point number.
                minProperties: 1
                maxProperties: 8
                additionalProperties: false
                patternProperties:
                  '^[1-8]$':
                    type: object
                    description: Cable loss compensation settings for a single antenna port.
                    required:
                      - cableLength
                      - cableLossPerHundredFt
                    properties:
                      cableLength:
                        type: number
                        minimum: 0
                        description: Length of the cable connected to this antenna port, in feet.
                      cableLossPerHundredFt:
                        type: number
                        minimum: 0
                        description: Cable signal loss per 100 feet, in dB.
              example:
                '1':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '2':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '3':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '4':
                  cableLength: 10
                  cableLossPerHundredFt: 10
      security:
        - bearerAuth: []
    put:
      tags:
        - System
      summary: Sets the cableLossCompensation
      description: MQTT API :-  set_cableLossCompensation <br> Sets the Reader Cable Loss Compensation. Includes Cable Length and Cable Loss per Hundred Feet
      operationId: setCablelosscompensation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - description: Adjust cable loss compensation for all available read points.
                  title: All
                  type: object
                  required:
                    - cableLength
                    - cableLossPerHundredFt
                  properties:
                    cableLength:
                      type: number
                      description: Cable length applied to all read points, in feet.
                      minimum: 0
                      example: 90
                    cableLossPerHundredFt:
                      type: number
                      description: Cable loss applied to all read points per 100 feet, in dB.
                      minimum: 0
                      example: 18
                - description: Adjust cable loss compensation per read point using numeric read-point keys.
                  title: Each
                  type: object
                  minProperties: 1
                  maxProperties: 8
                  additionalProperties: false
                  patternProperties:
                    '^[1-8]$':
                      type: object
                      description: Cable loss compensation settings for a single antenna port.
                      required:
                        - cableLength
                        - cableLossPerHundredFt
                      properties:
                        cableLength:
                          type: number
                          description: Length of the cable connected to this antenna port, in feet.
                          minimum: 0
                          example: 90
                        cableLossPerHundredFt:
                          type: number
                          description: Cable signal loss for this antenna port per 100 feet, in dB.
                          minimum: 0
                          example: 18
            examples:
              set_cableLossCompensation:
                value:
                  '1':
                    cableLength: 90
                    cableLossPerHundredFt: 18
                  '2':
                    cableLength: 18
                    cableLossPerHundredFt: 19
                  '3':
                    cableLength: 10
                    cableLossPerHundredFt: 11
                  '4':
                    cableLength: 10
                    cableLossPerHundredFt: 70
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
        '400': 
          description: Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                    example: 123
                  message:
                    type: string
                    example: "internal system error."
        '500': 
          description: Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                    example: 123
                  message:
                    type: string
                    example: "internal system error"
      security:
        - bearerAuth: []
