                  description: Use 'server1' as the primary NTP server key (legacy convention)
                  properties:
                    server1:
                      type: string
                      description: Primary NTP server address
                      example: "time1.google.com"
                    server2:
                      type: string
                      description: Optional secondary NTP server address
                      example: "time2.google.com"
                  required:
                    - server1
            examples:
              set_ntpServer:
                value:
                  server: time1.google.com
                  server2: time2.google.com
              set_ntpServer_legacy:
