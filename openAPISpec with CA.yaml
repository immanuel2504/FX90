            - type: string
              enum:
                - NOT_CONFIGURED
              description: NTP server is not configured
          description: NTP Configuration
      required:
        - uptime
        - systemTime
        - ram
        - flash
        - cpu
        - radioConnection
        - temperature
        - radioActivity
        - powerSource
        - powerNegotiation
        - ntp
