                  description: The file name of the application package to install on the device.
                  example: mylogger_1.0.1.deb
                url:
                  type: string
                  description: The URL where the application package is hosted.
                  example: sftp://10.117.229.15/home/labuser/EV1/
                verifyPeer:
                  type: boolean
                  description: Verify the server TLS peer certificate. Defaults to true when omitted.
                verifyHost:
                  type: boolean
                  description: Verify the server hostname in the TLS certificate. Defaults to true when omitted.
                CACertificateFileLocation:
                  type: string
                  description: Path on the device to a CA certificate file to trust for TLS.
                CACertificateFileContent:
                  type: string
                  description: PEM-encoded CA certificate content.
                publicKeyFileLocation:
