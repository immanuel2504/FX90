      description: MQTT API :- del_CACertificate <br> Deletes the specified CA certificate from the device.
      operationId: delCACertificate
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
      security:
        - bearerAuth: []
  /cloud/network:
    get:
      tags:
        - Network
      summary: Retrieves reader network configuration
      description: MQTT API :-  get_network <br> Retrieves reader network information including IP address, subnet mask, gateway and DNS
      operationId: getNetwork
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  hostName:
                    type: string
                    example: FXR90C5F1AB
                  networkInterface:
                    type: object
                    description: Map of network interface names to their configuration and status.
                    properties:
                      eth0:
                        type: object
                        description: Ethernet interface.
                        properties:
                          IPV4:
                            type: object
                            properties:
                              dhcp:
                                type: boolean
                                description: Whether DHCP is enabled for IPv4 on this interface.
                              ipAddress:
                                type: string
                                description: IPv4 address assigned to this interface.
                              gatewayAddress:
                                type: string
                                description: IPv4 gateway address for this interface.
                              subnetMask:
                                type: string
                                description: Subnet mask for the assigned IPv4 address.
                              dnsAddress:
                                type: string
                                description: IPv4 DNS server address for this interface.
                              domainName:
                                type: string
                                description: Domain name associated with this interface.
                          IPV6:
                            type: object
                            properties:
                              dhcp:
                                type: boolean
                                description: Whether DHCP is enabled for IPv6 on this interface.
                              ipAddress:
                                type: string
                                description: IPv6 address assigned to this interface.
                              gatewayAddress:
                                type: string
                                description: IPv6 gateway address for this interface.
                              prefix:
                                type: string
                                description: IPv6 prefix for the assigned address.
                              dnsAddress:
                                type: string
                                description: IPv6 DNS server address for this interface.
                              domainName:
                                type: string
                                description: Domain name associated with this interface.
                          security:
                            type: object
                            description: Ethernet security configuration.
                            properties:
                              securityType:
                                type: string
                                description: Security protocol in use.
                                enum:
                                  - 802_1xEAP
                                example: 802_1xEAP
                              authentication:
                                type: string
                                description: EAP authentication method (TLS, TTLS, PEAP).
                                example: TLS
                              innerAuthentication:
                                type: string
                                description: Inner EAP authentication method (for TTLS/PEAP with TLS or MSCHAPv2).
                                example: MSCHAPv2
                              username:
                                type: string
                                description: Username for TTLS/PEAP with MSCHAPv2.
                              password:
                                type: string
                                description: Password for TTLS/PEAP with MSCHAPv2.
                              certificate:
                                type: string
                                description: Client certificate name used for TLS-based authentication.
                          Status:
                            type: string
                            description: Connection status.
                            example: connected/disconnected
                          isEnabled:
                            type: boolean
                            description: Whether the interface is enabled.
                            example: true/false
                          macAddress:
                            type: string
                            description: MAC address of the interface.
                            example: C8:1C:FE:C5:F1:AB
                      mlan0:
                        type: object
                        description: WiFi station interface.
                        properties:
                          IPV4:
                            type: object
                            properties:
                              dhcp:
                                type: boolean
                                description: Whether DHCP is enabled for IPv4 on this interface.
                              ipAddress:
                                type: string
                                description: IPv4 address assigned to this interface.
                              gatewayAddress:
                                type: string
                                description: IPv4 gateway address for this interface.
                              subnetMask:
                                type: string
                                description: Subnet mask for the assigned IPv4 address.
                              dnsAddress:
                                type: string
                                description: IPv4 DNS server address for this interface.
                              domainName:
                                type: string
                                description: Domain name associated with this interface.
                          IPV6:
                            type: object
                            properties:
                              dhcp:
                                type: boolean
                                description: Whether DHCP is enabled for IPv6 on this interface.
                              ipAddress:
                                type: string
                                description: IPv6 address assigned to this interface.
                              gatewayAddress:
                                type: string
                                description: IPv6 gateway address for this interface.
                              prefix:
                                type: string
                                description: IPv6 prefix for the assigned address.
                              dnsAddress:
                                type: string
                                description: IPv6 DNS server address for this interface.
                              domainName:
                                type: string
                                description: Domain name associated with this interface.
                          accesspoint:
                            type: object
                            description: Connected WiFi access point details.
                            properties:
                              essid:
                                type: string
                                description: SSID of the connected access point.
                              autoConn:
                                type: boolean
                                description: Whether auto-connect is enabled for this access point.
                              status:
                                type: string
                                description: Connection status.
                                example: connected/disconnected
                              security:
                                type: object
                                description: WiFi security configuration (present only when security is enabled).
                                properties:
                                  securityType:
                                    type: string
                                    description: Security protocol in use.
                                    enum:
                                      - WPA2Personal
                                      - WPA2Enterprise
                                      - WPA3Personal
                                      - WPA3Enterprise
                                    example: WPA2Personal
                                  WPA2Personal:
                                    type: object
                                    description: WPA2 Personal (PSK) configuration.
                                    properties:
                                      password:
                                        type: string
                                        description: Pre-shared key / passphrase.
                                  WPA3Personal:
                                    type: object
                                    description: WPA3 Personal (SAE) configuration.
                                    properties:
                                      password:
                                        type: string
                                        description: Pre-shared key / passphrase.
                                  WPA2Enterprise:
                                    type: object
                                    description: WPA2 Enterprise configuration.
                                    properties:
                                      authentication:
                                        type: string
                                        description: EAP authentication method (TLS, TTLS, PEAP).
                                        example: TLS
                                      innerAuthentication:
                                        type: string
                                        description: Inner EAP authentication method (for TTLS/PEAP with TLS or MSCHAPv2).
                                        example: MSCHAPv2
                                      username:
                                        type: string
                                        description: Username for TTLS/PEAP with MSCHAPv2.
                                      password:
                                        type: string
                                        description: Password for TTLS/PEAP with MSCHAPv2.
                                      certificate:
                                        type: string
                                        description: Client certificate name for TLS-based methods.
                                  WPA3Enterprise:
                                    type: object
                                    description: WPA3 Enterprise configuration.
                                    properties:
                                      authentication:
                                        type: string
                                        description: EAP authentication method (TLS, TTLS, PEAP).
                                        example: TLS
                                      innerAuthentication:
                                        type: string
                                        description: Inner EAP authentication method (for TTLS/PEAP with TLS or MSCHAPv2).
                                        example: MSCHAPv2
                                      username:
                                        type: string
                                        description: Username for TTLS/PEAP with MSCHAPv2.
                                      password:
                                        type: string
                                        description: Password for TTLS/PEAP with MSCHAPv2.
                                      certificate:
                                        type: string
                                        description: Client certificate name for TLS-based methods.
                          Status:
                            type: string
                            description: Connection status of the WiFi station interface.
                            example: connected
                          isEnabled:
                            type: boolean
                            description: Whether the WiFi station interface is enabled.
                          macAddress:
                            type: string
                            description: MAC address of the WiFi interface.
                            example: 48:A4:93:BF:A9:50
                      bnep0:
                        type: object
                        description: Bluetooth PAN interface.
                        properties:
                          ipAddress:
                            type: string
                            description: IP address assigned to the Bluetooth PAN interface.
                          subnetMask:
                            type: string
                            description: Subnet mask for the Bluetooth PAN interface.
                          dhcpStartAddress:
                            type: string
                            description: Start of the DHCP address range served to connected Bluetooth clients.
                          dhcpEndAddress:
                            type: string
                            description: End of the DHCP address range served to connected Bluetooth clients.
                          deviceDiscoverableName:
                            type: string
                            description: Bluetooth device name broadcast during discovery.
                          isDiscoverable:
                            type: boolean
                            description: Whether the device is visible to other Bluetooth devices.
                          isPairable:
                            type: boolean
                            description: Whether the device accepts new Bluetooth pairing requests.
                          passKey:
                            type: string
                            description: PIN/passkey required for Bluetooth pairing (when usePassKey is true).
                          usePassKey:
                            type: boolean
                            description: Whether a passkey is required for Bluetooth pairing.
                          Status:
                            type: string
                            description: Current status of the Bluetooth PAN interface (e.g. active, inactive).
                          isEnabled:
                            type: boolean
                            description: Whether the Bluetooth PAN interface is enabled.
                          macAddress:
                            type: string
                            description: MAC address of the Bluetooth interface.
                      wan0:
                        type: object
                        description: WAN / cellular interface.
                        properties:
                          activeSim:
                            type: string
                            description: The active SIM slot.
                            enum:
                              - psim
                              - esim
                          psim:
                            type: object
                            description: Physical SIM configuration and status.
                            properties:
                              apn:
                                type: string
                                description: Access Point Name.
                              preferredNetworkType:
                                type: string
                                example: AUTO
                              enableIPv6:
                                type: boolean
                              enablePin:
                                type: boolean
                              enableRoaming:
                                type: boolean
                              currentDataClass:
                                type: string
                                example: LTE
                              highestAvailableDataClass:
                                type: string
                                example: LTE
                              currentServiceProvider:
                                type: string
                              registerState:
                                type: string
                                example: Home
                              packetServiceState:
                                type: string
                                example: Attached
                              internetAccess:
                                type: boolean
                              simState:
                                type: string
                                example: Initialized
                              signalBar:
                                type: number
                              rssi:
                                type: string
                                example: '-82.7dBm'
                              rsrp:
                                type: string
                                example: '-103.7dBm'
                              rsrq:
                                type: string
                                example: '-5.5dB'
                              snr:
                                type: string
                                example: 0.0dB
                          esim:
                            type: object
                            description: Embedded SIM configuration and status (same structure as psim).
                            properties:
                              apn:
                                type: string
                              preferredNetworkType:
                                type: string
                              enableIPv6:
                                type: boolean
                              enablePin:
                                type: boolean
                              enableRoaming:
                                type: boolean
                              currentDataClass:
                                type: string
                              highestAvailableDataClass:
                                type: string
                              currentServiceProvider:
                                type: string
                              registerState:
                                type: string
                              packetServiceState:
                                type: string
                              internetAccess:
                                type: boolean
                              simState:
                                type: string
                              signalBar:
                                type: number
                              rssi:
                                type: string
                              rsrp:
                                type: string
                              rsrq:
                                type: string
                              snr:
                                type: string
                          Status:
                            type: string
                            example: online
                          isEnabled:
                            type: boolean
                          macAddress:
                            type: string
                      uap0:
                        type: object
                        description: WiFi Hotspot (Access Point) interface.
                        properties:
                          ssid:
                            type: string
                            description: Hotspot SSID name.
                            example: FXR90Hotspot
                          ssidPassword:
                            type: string
                            description: Hotspot password.
                          isHidden:
                            type: boolean
                            description: Whether the SSID is hidden from broadcast.
                          securityType:
                            type: string
                            description: Security protocol used by the hotspot.
                            enum:
                              - WPA2Personal
                              - WPA3Personal
                          Clients:
                            type: array
                            description: List of devices currently connected to the hotspot.
                            items:
                              type: object
                              properties:
                                hostName:
                                  type: string
                                IP:
                                  type: string
                                MAC:
                                  type: string
                          Status:
                            type: string
                            example: active
                          isEnabled:
                            type: boolean
                          macAddress:
                            type: string
              examples:
                Ethernet:
                  summary: eth0 Interface
                  value:
                    hostName: FXR90C5F1AB
                    networkInterface:
                      eth0:
                        IPV4:
                          dhcp: true
                          dnsAddress: 10.233.1.200
                          domainName: zlab.com
                          gatewayAddress: 10.233.45.2
                          ipAddress: 10.233.45.235
                          subnetMask: 255.255.255.0
                        IPV6:
                          dhcp: true
                          dnsAddress: fd6c:10:233:1::201
                          domainName: zlab.com
                          gatewayAddress: fe80::f6ee:31ff:fe0c:5a1f
                          ipAddress: fd6c:10:233:45:eab:f51f:957e:f729
                          prefix: 64
                        Status: connected
                        isEnabled: true
                        macAddress: C8:1C:FE:C5:F1:AB
                WiFi:
                  summary: mlan0 Interface
                  value:
                    hostName: FXR90C5F1AB
                    networkInterface:
                      mlan0:
                        IPV4:
                          dhcp: true
                          dnsAddress: 1.1.1.1
                          domainName: FXR90C5F1AB
                          gatewayAddress: 192.168.0.1
                          ipAddress: 192.168.0.201
                          subnetMask: 255.255.255.0
                        IPV6:
                          dhcp: true
                          dnsAddress: fd6c:10:233:1::201
                          domainName: FXR90C5F1AB
                          gatewayAddress: fe80::c206:c3ff:febe:ee3c
                          ipAddress: fe80::3626:9125:eda5:36d7
                          prefix: 64
                        Status: connected
                        accesspoint:
                          autoConn: false
                          essid: GLaDOS
                          status: connected
                          security:
                            securityType: WPA2Personal
                        isEnabled: true
                        macAddress: 48:A4:93:BF:A9:50
                Bluetooth:
                  summary: bnep0 Interface
                  value:
                    hostName: FXR90C5F1AB
                    networkInterface:
                      bnep0:
                        Status: active
                        deviceDiscoverableName: FXR90C5F1AB
                        dhcpEndAddress: 192.168.0.10
                        dhcpStartAddress: 192.168.0.2
                        ipAddress: 192.168.241.171
                        isDiscoverable: true
                        isEnabled: true
                        isPairable: true
                        macAddress: 48:A4:93:BF:A9:52
                        passKey: '1234'
                        subnetMask: 255.255.0.0
                        usePassKey: true
                WAN:
                  summary: wan0 Interface
                  value:
                    hostName: FXR90C5F1AB
                    networkInterface:
                      wan0:
                        Status: online
                        activeSim: psim
                        isEnabled: true
                        psim:
                          currentDataClass: LTE
                          currentServiceProvider: Vi India
                          enableIPv6: false
                          enablePin: false
                          enableRoaming: false
                          highestAvailableDataClass: LTE
                          internetAccess: true
                          packetServiceState: Attached
                          preferredNetworkType: AUTO
                          registerState: Home
                          rsrp: '-103.7dBm'
                          rsrq: '-5.5dB'
                          rssi: '-82.7dBm'
                          signalBar: 1
                          simState: Initialized
                          snr: 0.0dB
                Hotspot:
                  summary: uap0 Interface
                  value:
                    hostName: FXR90C5F1AB
                    networkInterface:
                      uap0:
                        ssid: FXR90Hotspot
                        ssidPassword: 'MyP@ssword'
                        isHidden: false
                        securityType: WPA3Personal
                        Status: active
                        isEnabled: true
                        macAddress: 48:A4:93:BF:A9:53
                        Clients:
                          - hostName: my-laptop
                            IP: 192.168.43.2
                            MAC: AA:BB:CC:DD:EE:FF
      security:
        - bearerAuth: []
    put:
      tags:
        - Network
      summary: Updates reader network configuration
      description: >
        MQTT API :-  set_network <br> Updates the reader network configuration settings.
        Only one interface key (`eth0`, `mlan0`, `bnep0`, `wan0`, or `uap0`) may be present per request.
      operationId: updateNetwork
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Exactly one interface key must be provided.
              properties:
                eth0:
                  type: object
                  description: Ethernet interface configuration.
                  properties:
                    IPV4:
                      type: object
                      description: IPv4 settings.Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
                      properties:
                        dhcp:
                          type: boolean
                          description: Enable/disable DHCP for IPv4 on this interface.
                          example: true
                        ipAddress:
                          type: string
                          description: Static IPv4 address (required if dhcp is false).
                          example: 10.233.46.47
                        gatewayAddress:
                          type: string
                          description: IPv4 gateway address (required if dhcp is false).
                          example: 10.233.46.2
                        subnetMask:
                          type: string
                          description: IPv4 subnet mask (required if dhcp is false).
                          example: 255.255.255.0
                        dnsAddress:
                          type: string
                          description: IPv4 DNS address (required if dhcp is false).
                          example: 10.233.1.200
                        domainName:
                          type: string
                          description: IPv4 domain name (required if dhcp is false).
                          example: zlab.com
                    IPV6:
                      type: object
                      description: IPv6 settings. Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
                      properties:
                        dhcp:
                          type: boolean
                          description: Enable/disable DHCP for IPv6 on this interface.
                        ipAddress:
                          type: string
                          description: Static IPv6 address (required if dhcp is false).
                        gatewayAddress:
                          type: string
                          description: IPv6 gateway address (required if dhcp is false).
                        prefix:
                          type: string
                          description: IPv6 prefix (required if dhcp is false).
                        dnsAddress:
                          type: string
                          description: IPv6 DNS address (required if dhcp is false).
                        domainName:
                          type: string
                          description: IPv6 domain name (required if dhcp is false).
                    security:
                      type: object
                      description: >
                        Ethernet security configuration. 
                        Include the appropriate security configuration to enable security: `802_1xEAP` for 802.1X authentication.
                        If the `security` configuration is omitted, security is disabled and all other security-related fields are ignored.
                      properties:
                        802_1xEAP:
                          type: object
                          description: 802.1X EAP security configuration (when securityType is 802_1xEAP).
                          properties:
                            authentication:
                              type: string
                              description: "EAP authentication method: TLS, TTLS, or PEAP."
                              enum:
                                - TLS
                                - TTLS
                                - PEAP
                              example: TLS
                            innerAuthentication:
                              type: string
                              description: "Inner authentication method (for TTLS/PEAP): TLS or MSCHAPv2."
                              enum:
                                - TLS
                                - MSCHAPv2
                              example: MSCHAPv2
                            username:
                              type: string
                              description: Username (for TTLS/PEAP with MSCHAPv2).
                            password:
                              type: string
                              description: Password (for TTLS/PEAP with MSCHAPv2).
                            certificate:
                              type: string
                              description: Client certificate name (for TLS-based methods).
                    enable:
                      type: boolean
                      description: Enable/disable the ethernet interface.
                      example: true
                mlan0:
                  type: object
                  description: WiFi station interface configuration.
                  properties:
                    IPV4:
                      type: object
                      description: IPv4 settings. Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
                      properties:
                        dhcp:
                          type: boolean
                          description: Enable/disable DHCP for IPv4 on this interface.
                        ipAddress:
                          type: string
                          description: Static IPv4 address (required if dhcp is false).
                        gatewayAddress:
                          type: string
                          description: IPv4 gateway address (required if dhcp is false).
                        subnetMask:
                          type: string
                          description: IPv4 subnet mask (required if dhcp is false).
                        dnsAddress:
                          type: string
                          description: IPv4 DNS address (required if dhcp is false).
                        domainName:
                          type: string
                          description: IPv4 domain name (required if dhcp is false).
                    IPV6:
                      type: object
                      properties:
                        dhcp:
                          type: boolean
                          description: Enable/disable DHCP for IPv6 on this interface.
                        ipAddress:
                          type: string
                          description: Static IPv6 address (required if dhcp is false).
                        gatewayAddress:
                          type: string
                          description: IPv6 gateway address (required if dhcp is false).
                        prefix:
                          type: string
                          description: IPv6 prefix (required if dhcp is false).
                        dnsAddress:
                          type: string
                          description: IPv6 DNS address (required if dhcp is false).
                        domainName:
                          type: string
                          description: IPv6 domain name (required if dhcp is false).
                    accesspoint:
                      type: object
                      required:
                        - essid
                        - connect
                      properties:
                        essid:
                          type: string
                          description: SSID of the WiFi network to connect to.
                          example: MyWiFiNetwork
                        connect:
                          type: boolean
                          description: Whether to immediately connect to this access point.
                          example: true
                        autoConn:
                          type: boolean
                          description: Whether to automatically reconnect on subsequent boots.
                          example: true
                        security:
                          type: object
                          description: >
                            WiFi security configuration.Include the appropriate security configuration to enable security.
                            Include exactly ONE of the following: `WPA2Personal` or `WPA2Enterprise`.
                            If the security configuration is omitted, security is disabled and all other security-related fields are ignored.
                          properties:
                            WPA2Personal:
                              type: object
                              description: WPA2 Personal (PSK) security options.
                              properties:
                                password:
                                  type: string
                                  description: Pre-shared key / passphrase.
                                  example: 'MyP@ssword'
                            WPA3Personal:
                              type: object
                              description: WPA3 Personal (SAE) security options.
                              properties:
                                password:
                                  type: string
                                  description: Pre-shared key / passphrase.
                                  example: 'MyP@ssword'
                            WPA2Enterprise:
                              type: object
                              description: WPA2 Enterprise security options.
                              properties:
                                authentication:
                                  type: string
                                  description: "EAP authentication method: TLS, TTLS, or PEAP."
                                  enum:
                                    - TLS
                                    - TTLS
                                    - PEAP
                                  example: TLS
                                innerAuthentication:
                                  type: string
                                  description: "Inner authentication method (for TTLS/PEAP): TLS or MSCHAPv2."
                                  enum:
                                    - TLS
                                    - MSCHAPv2
                                  example: MSCHAPv2
                                username:
                                  type: string
                                  description: Username (for TTLS/PEAP with MSCHAPv2).
                                password:
                                  type: string
                                  description: Password (for TTLS/PEAP with MSCHAPv2).
                                certificate:
                                  type: string
                                  description: Client certificate name (for TLS-based methods).
                            WPA3Enterprise:
                              type: object
                              description: WPA3 Enterprise security options.
                              properties:
                                authentication:
                                  type: string
                                  description: "EAP authentication method: TLS, TTLS, or PEAP."
                                  enum:
                                    - TLS
                                    - TTLS
                                    - PEAP
                                  example: TLS
                                innerAuthentication:
                                  type: string
                                  description: "Inner authentication method (for TTLS/PEAP): TLS or MSCHAPv2."
                                  enum:
                                    - TLS
                                    - MSCHAPv2
                                  example: MSCHAPv2
                                username:
                                  type: string
                                  description: Username (for TTLS/PEAP with MSCHAPv2).
                                password:
                                  type: string
                                  description: Password (for TTLS/PEAP with MSCHAPv2).
                                certificate:
                                  type: string
                                  description: Client certificate name (for TLS-based methods).
                        enable:
                          type: boolean
                          description: Enable/disable the WiFi station interface.
                          example: true
                bnep0:
                  type: object
                  description: Bluetooth PAN interface configuration.
                  required:
                    - dhcpStartAddress
                    - dhcpEndAddress
                    - discoverable
                    - pairable
                    - passKey
                    - usePassKey
                    - enable
                  properties:
                    dhcpStartAddress:
                      type: string
                      description: Start of the DHCP address range served to connected Bluetooth clients.
                      example: 192.168.0.2
                    dhcpEndAddress:
                      type: string
                      description: End of the DHCP address range served to connected Bluetooth clients.
                      example: 192.168.0.10
                    discoverable:
                      type: boolean
                      description: Enable/disable Bluetooth discoverable mode.
                      example: true
                    pairable:
                      type: boolean
                      description: Enable/disable Bluetooth pairable mode (accepting new pairing requests).
                      example: true
                    passKey:
                      type: string
                      description: Bluetooth pairing passkey.
                      example: '1234'
                    usePassKey:
                      type: boolean
                      description: Enable/disable the use of a Bluetooth pairing passkey.
                      example: false
                    enable:
                      type: boolean
                      description: Enable/disable the Bluetooth interface.
                      example: true
                wan0:
                  type: object
                  description: WAN / cellular interface configuration.
                  required:
                    - activeSim
                    - enable
                  properties:
                    activeSim:
                      type: string
                      description: Active SIM slot to configure.
                      enum:
                        - psim
                        - esim
                      example: psim
                    psim:
                      type: object
                      description: Physical SIM settings. Required when `activeSim` is `psim`.
                      properties:
                        apn:
                          type: string
                          description: Access Point Name.
                          example: internet
                        preferredNetworkType:
                          type: string
                          description: Preferred cellular network type.
                          example: AUTO
                        enableIPv6:
                          type: boolean
                          description: Enable/disable IPv6.
                          example: true
                    esim:
                      type: object
                      description: Embedded SIM settings. Required when `activeSim` is `esim`.
                      properties:
                        apn:
                          type: string
                          description: Access Point Name.
                        preferredNetworkType:
                          type: string
                          description: Preferred cellular network type.
                        enableIPv6:
                          type: boolean
                          description: Enable/disable IPv6.
                    enable:
                      type: boolean
                      example: true
                uap0:
                  type: object
                  description: WiFi Hotspot (Access Point) interface configuration.
                  required:
                    - ssid
                    - ssidPassword
                    - isHidden
                    - securityType
                    - enable
                  properties:
                    ssid:
                      type: string
                      description: Hotspot SSID name.
                      example: FXR90Hotspot
                    ssidPassword:
                      type: string
                      description: Hotspot password.
                      example: 'MyP@ssword'
                    isHidden:
                      type: boolean
                      description: Set to true to hide the SSID from broadcast.
                      example: false
                    securityType:
                      type: string
                      description: Security protocol for the hotspot.
                      enum:
                        - WPA2Personal
                        - WPA3Personal
                      example: WPA3Personal
                    countryCode:
                      type: string
                      description: Two-letter ISO 3166-1 country code for regulatory compliance.
                      example: US
                    enable:
                      type: boolean
                      example: true
            examples:
              set_Network_ethernet_dhcp:
                summary: Ethernet — DHCP
                value:
                  eth0:
                    IPV4:
                      dhcp: true
                    IPV6:
                      dhcp: true
                    enable: true
              set_Network_ethernet_static:
                summary: Ethernet — static IP
                value:
                  eth0:
                    IPV4:
                      dhcp: false
                      dnsAddress: 10.233.1.200
                      domainName: zlab.com
                      gatewayAddress: 10.233.46.2
                      ipAddress: 10.233.46.47
                      subnetMask: 255.255.255.0
                    IPV6:
                      dhcp: false
                      dnsAddress: 2001:4860:4860::9999
                      domainName: example.ee.com
                      gatewayAddress: fe80::1643:8376:b32:4a16
                      ipAddress: 2001:db8:1:0:8731:2eb1:cd28:f0cd
                      prefix: 64
                    enable: true
              set_Network_ethernet_static_8021x_tls:
                summary: Ethernet — 802.1X (TLS).Similarly applicable for TTLS/TLS, PEAP/TTLS, TTLS/MSCHAPV2, PEAP/MSCHAPV2.  
                value:
                  eth0:
                    IPV4:
                      dhcp: false
                      dnsAddress: 10.233.1.200
                      domainName: zlab.com
                      gatewayAddress: 10.233.46.2
                      ipAddress: 10.233.46.47
                      subnetMask: 255.255.255.0
                    IPV6:
                      dhcp: false
                      dnsAddress: 2001:4860:4860::9999
                      domainName: example.ee.com
                      gatewayAddress: fe80::1643:8376:b32:4a16
                      ipAddress: 2001:db8:1:0:8731:2eb1:cd28:f0cd
                      prefix: 64
                    enable: true
                    security:
                      802_1xEAP:
                        authentication: TLS
                        certificate: my-client-cert
              set_Network_ethernet_dhcp_8021x_tls:
                summary: Ethernet — 802.1X (TLS)
