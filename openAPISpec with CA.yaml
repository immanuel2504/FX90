  /cloud/readerCapabilities:
    get:
      tags:
        - System
      summary: Retrieves the Reader Capabilities
      description: MQTT API :-  get_readerCapabilities <br> Gets the list of supported capabilities on the current reader.
      operationId: getReadercapabilities
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  capabilities:
                    type: object
                    properties:
                      antennas:
                        type: array
                        description: Antenna inventory reported by the reader. Each item includes the antenna port number and whether it is external or internal.
                        items:
                          type: object
                          properties:
                            port:
                              type: integer
                              description: Antenna port number.
                            type:
                              type: string
                              description: Antenna mounting type.
                              enum:
                                - external
                                - internal
                          required:
                            - port
                            - type
                      apiSupported:
                        type: object
                        properties:
                          versions:
                            type: array
                            items:
                              type: object
                              properties:
                                documentation:
                                  type: string
                                version:
                                  type: string
                      appLEDColors:
                        type: array
                        items:
                          type: string
                      asyncManagementEventsSupported:
                        type: boolean
                      beepersSupported:
                        type: boolean
                      clockSupport:
                        type: boolean
                      daAppPackageFormat:
                        type: array
                        items:
                          type: string
                      daAppsSupported:
                        type: boolean
                      daLanguageBindings:
                        type: array
                        items:
                          type: string
                      directionalitySupported:
                        type: boolean
                      endpointTypesSupported:
                        type: array
                        items:
                          type: object
                          properties:
                            SSLSupported:
                              type: boolean
                            authenticationTypesSupported:
                              type: array
                              items:
                                type: string
                            batchingSupported:
                              type: boolean
                            dataOnly:
                              type: boolean
                            retentionSupported:
                              type: boolean
                            type:
                              type: string
                      externalSerialPort:
                        type: array
                        items:
                          type: string
                          enum:
                            - USER
                            - DEBUG
                            - NONE
                        description: External serial port modes supported by the reader.
                      keypadSupport:
                        type: array
                        items:
                          type: string
                      llrpSupported:
                        type: boolean
                      maxAppLEDs:
                        type: number
                      maxDataEndpoints:
                        type: number
                      maxNumOperationsInAccessSequence:
                        type: number
                      maxNumPreFilters:
                        type: number
                      messageFormatsSupported:
                        type: array
                        items:
                          type: string
                      networkInterfaces:
                        type: array
                        description: Network interfaces supported by the reader.
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              description: Interface type.
                              enum:
                                - ETHERNET
                                - WIFI
                                - BLUETOOTH
                                - WAN
                            internal:
                              type: boolean
                              description: Indicates whether the interface is internal to the reader.
                            ipStack:
                              type: array
                              description: IP stacks supported by the interface.
                              items:
                                type: string
                                enum:
                                  - IPv4
                                  - IPv6
                            ipAssignment:
                              type: array
                              description: IP assignment modes supported by the interface.
                              items:
                                type: string
                                enum:
                                  - STATIC
                                  - DHCP
                            802.1x:
                              type: boolean
                              description: Indicates whether IEEE 802.1x authentication is supported.
                            supportedSim:
                              type: array
                              description: SIM types supported by WAN interfaces.
                              items:
                                type: string
                                enum:
                                  - Physical SIM
                                  - Embedded SIM
                            NetworkType:
                              type: array
                              description: WAN radio types supported by WAN interfaces.
                              items:
                                type: string
                                enum:
                                  - AUTO
                                  - LTE
                                  - NR5G
                          required:
                            - type
                            - internal
                            - ipStack
                            - ipAssignment
                            - 802.1x
                      numGPIs:
                        type: number
                      numGPOs:
                        type: number
                      restAPISupported:
                        type: boolean
                      rssiFilterSupported:
                        type: boolean
                      supportedDisplayType:
                        type: array
                        items:
                          type: string
                          enum:
                            - NONE
                            - LCD
                            - HDMI
                      supportedPowerSource:
                        type: array
                        items:
                          type: string
                          enum:
                            - DC
                            - POE
                            - POE+
                            - POWERBRICK
                            - BATTERY
                        description: Power sources supported by the reader model.
                      supportedTagDataFormat:
                        type: array
                        items:
                          type: string
                      tagLocationingSupported:
                        type: boolean
                      triggers:
                        type: array
                        items:
                          type: string
              example:
                capabilities:
                  antennas:
                    - port: 1
                      type: external
                    - port: 2
                      type: external
                    - port: 3
                      type: external
                    - port: 4
                      type: external
                  apiSupported:
                    versions:
                      - documentation: https://zebradevs.github.io/rfid-ziotc-docs/index.html
