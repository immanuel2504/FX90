  /cloud/eSimConfig:
    get:
      tags:
        - Network
      summary: Gets the eSIM configuration
      description: MQTT API :- get_eSimConfig <br> Gets the eSIM configuration
      operationId: getEsimConfig
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  eid:
                    type: string
                    example: "89049032000001000000177590519095"
                  imei:
                    type: string
                    example: "352087750009095"
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          description: Whether this profile is currently active.
                          example: true
                        iccid:
                          type: string
                          description: Integrated Circuit Card Identifier for the profile.
                          example: "8944500411193057192F"
                        profileNickName:
                          type: string
                          description: Human-readable nickname assigned to this eSIM profile.
                          example: "gnd1"
                        provider:
                          type: string
                          description: Name of the mobile network provider.
                          example: "Global1"
      security:
        - bearerAuth: []
    put:
      tags:
        - Network
      summary: Sets the eSIM configuration
      description: MQTT API :-  set_eSimConfig <br> Sets the eSIM configuration
      operationId: setEsimConfig
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - operation
                - profileNickName
              properties:
                operation:
                  type: string
                  description: eSIM profile operation to perform.
                  enum: [add, delete, enable, disable]
                  example: enable
                profileNickName:
                  type: string
                  description: Nickname of the eSIM profile to apply the operation to.
                  example: gnd1
                activationID:
                  type: string
                  description: Activation code/ID for provisioning a new eSIM profile. Required only when `operation` is `add`. Must be omitted for `enable`, `disable`, and `delete`.
                  example: LPA:1$RSP.GSMA.COM$ABCDEF1234567890
            examples:
              set_eSimConfig_enable:
                value:
                  operation: enable
                  profileNickName: gnd1
              set_eSimConfig_add:
                value:
                  operation: add
                  profileNickName: gnd1
                  activationID: LPA:1$RSP.GSMA.COM$ABCDEF1234567890
              set_eSimConfig_delete:
                value:
                  operation: delete
                  profileNickName: gnd1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
      security:
        - bearerAuth: []
  /cloud/os:
    put:
      tags:
        - Firmware
      summary: Updates OS software on device
      description: "MQTT API :-  set_os <br> Updates the OS software on the device using server-based transfer only. Supported server-based transfer protocols: SCP, HTTPS, SFTP, FTPS. File-based and USB-based update methods are not available in this API at this time."
      operationId: setOs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - authenticationType
              properties:
                authenticationType:
                  type: string
                  description: Authentication method to use when downloading the OS image.
                  enum: [NONE, BASIC]
                  example: NONE
                options:
                  type: object
                  description: Credentials object used when `authenticationType` is `BASIC`.
                  required:
                    - username
                    - password
                  properties:
                    username:
                      type: string
                      description: Username for BASIC authentication.
                      example: test
                    password:
                      type: string
                      description: Password for BASIC authentication.
                      example: XXXX
                url:
                  type: string
                  format: uri
                  description: URL to the OS image or update bundle. Supported URL schemes are scp://, https://, sftp://, and ftps://.
                  oneOf:
                    - pattern: '^scp://.+'
                    - pattern: '^https://.+'
                    - pattern: '^sftp://.+'
                    - pattern: '^ftps://.+'
                  example: https://10.17.231.168:8003/3_20_4
                transfer_protocol:
                  type: string
                  description: Optional explicit transfer protocol for firmware download. If omitted, protocol is inferred from the `url` scheme.
                  enum:
                    - SCP
                    - HTTPS
                    - SFTP
                    - FTPS
                verifyPeer:
                  type: boolean
                  description: Verify the server TLS peer certificate. Defaults to true when omitted.
                verifyHost:
                  type: boolean
                  description: Verify the server hostname in the TLS certificate. Defaults to true when omitted.
                CACertificateFileLocation:
                  type: string
                  description: Path on the device to a CA certificate file to trust for TLS.
                CACertificateFileContent:
                  type: string
                  description: PEM-encoded CA certificate content; written to a temporary file when provided.
                publicKeyFileLocation:
                  type: string
                  description: Path to a public key / certificate file to use for client TLS authentication.
                publicKeyFileContent:
                  type: string
                  description: PEM-encoded public key / certificate content.
                privateKeyFileLocation:
                  type: string
                  description: Path to a private key file to use for client TLS authentication.
                privateKeyFileContent:
                  type: string
                  description: PEM-encoded private key content.
                installedCertificateType:
                  type: string
                  description: Use an installed certificate by specifying its type.
                installedCertificateName:
                  type: string
                  description: Name of an installed certificate to use.
                headers:
                  type: object
                  description: Optional HTTP headers to include in the download request (e.g. Authorization).
                  additionalProperties:
                    type: string
                retry:
                  type: object
                  description: Retry configuration for the download operation.
                  properties:
                    count:
                      type: integer
                    delayInSec:
                      type: integer
            examples:
              set_os:
                value:
                  url: https://10.117.229.9:9093/BUILDS/FXR90_2.0.10.tar.bz2
                  authenticationType: NONE
                  options:
                    username: test
                    password: test
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
      security:
        - bearerAuth: []
  /cloud/revertbackOS:
    put:
      tags:
        - Firmware
      summary: Revert to previous OS version
      description: MQTT API :-  set_revertbackOS <br> Reverts the device to the previously installed OS version
      operationId: setRevertbackos
      requestBody:
        content:
          application/json:
