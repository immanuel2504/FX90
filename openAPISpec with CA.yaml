  /cloud/cloudConfig:
    put:
      tags:
        - System
      summary: Import cloud endpoint configuration
      description: >-
        MQTT API :- set_importCloudConfig <br>
        Imports the cloud endpoint configuration (control/data/management/management event endpoints) into the reader <br>
        **Note:** Only `endpointConfig` can be configured via this API.
        `managementEventConfig` is not supported here — use `PUT /cloud/config` for that.
      operationId: setImportcloudconfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - endpointConfig
              properties:
                endpointConfig:
                  type: object
                  description: >-
                    Cloud endpoint configuration to import. Selectively merges the provided
                    sub-sections (control.commandResponse, management.commandResponse,
                    management.event, data.event) into the reader's existing configuration.
                    Only the sections provided are updated; omitted sections are left unchanged.
