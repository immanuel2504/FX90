      security:
        - bearerAuth: []
    put:
      tags:
        - System
      summary: Updates reader configuration
      description: >-
        MQTT API :- set_config <br> Updates reader configuration. Accepts one or more of the following top-level keys:
        **xml** (string) - raw XML reader config;
        **GPIO-LED** (object) - GPIO and LED event-action configuration;
        **READER-GATEWAY** (object) - cloud gateway configuration accepting at least one of:
        endpointConfig (data endpoint configuration only - control/management endpoints are not configurable here; use /cloud/cloudConfig for that),
        batching (global batching settings for data events),
        retention (global retention settings for data events),
        managementEventConfig (asynchronous management events, heartbeat, warnings, errors configuration).
      operationId: setConfigMqtt
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: At least one of xml, GPIO-LED, or READER-GATEWAY must be provided.
              properties:
                xml:
                  type: string
                  description: Raw XML reader configuration string.
                GPIO-LED:
                  $ref: '#/components/schemas/GPIOLEDConfig.v1'
                READER-GATEWAY:
                  type: object
                  description: >-
                    Cloud gateway configuration. Must contain at least one of:
                    endpointConfig, batching, retention, or managementEventConfig.
                  properties:
                    endpointConfig:
                      type: object
                      description: >-
                        Endpoint connections configuration. Only the data endpoint
                        (endpointConfig.data) is configurable via this API.
                        Use PUT /cloud/cloudConfig (set_importCloudConfig) to configure
                        control and management plane endpoints.
                      properties:
                        data:
                          type: object
                          description: Data plane endpoint configuration (tag read event publishing channel).
                          properties:
                            event:
                              type: object
                              description: Data event endpoint. Defines the cloud connections that receive tag read events.
                              properties:
                                connections:
                                  type: array
                                  description: >-
                                    List of data plane cloud connections for publishing tag read events.
                                    Send an empty array ([]) to clear all data connections.
                                    Connection names must be unique; duplicate names are rejected.
                                  items:
                                    type: object
                                    properties:
                                      additionalOptions:
                                        type: object
                                        description: Per-connection data delivery options (batching, retention, data acknowledgement).
                                        properties:
                                          batching:
                                            description: >-
                                              Per-connection batching configuration. Set to null to use global
                                              batching settings. When provided as an object, overrides global
                                              batching for this connection only.
                                            oneOf:
                                              - type: "null"
                                                description: Use global batching settings for this connection.
                                              - type: object
                                                description: Per-connection batching overriding global settings.
                                                properties:
                                                  maxPayloadSizePerReport:
                                                    type: integer
                                                    description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                                                    minimum: 0
                                                    maximum: 256000
                                                    example: 65536
                                                  reportingInterval:
                                                    type: integer
                                                    description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
                                                    minimum: 0
                                                    maximum: 86400000
                                                    example: 1000
                                            example: null
                                          retention:
                                            type: object
                                            description: Per-connection event retention configuration when the connection is offline.
                                            properties:
                                              maxEventRetentionTimeInMin:
                                                type: integer
                                                description: >-
                                                  Maximum time in minutes to retain events when offline (0 - 10080).
                                                  0 or -1 retains events indefinitely until maxNumEvents is reached.
                                                minimum: 0
                                                maximum: 10080
                                                example: 500
                                              maxNumEvents:
                                                type: integer
                                                description: Maximum number of events to buffer when offline (0 - 150000).
                                                minimum: 0
                                                maximum: 150000
                                                example: 150000
                                              throttle:
                                                type: integer
                                                description: >-
                                                  Rate limit in events/sec for replaying retained events after reconnect (0 - 1000).
                                                  0 means no throttling.
                                                minimum: 0
                                                maximum: 1000
                                                example: 500
                                          dataAck:
                                            type: object
                                            description: >-
                                              Data acknowledgement configuration. When enabled, the reader waits
                                              for an ACK from the cloud before marking events as delivered.
                                              Supported on MQTT-based connections only.
                                            properties:
                                              enable:
                                                type: boolean
                                                description: Enable data acknowledgement for this connection.
                                                example: true
                                              responseTopic:
                                                type: string
                                                description: MQTT topic on which the cloud sends acknowledgement messages back to the reader.
                                                example: /devices/reader1/ack
                                              correlationFieldName:
                                                type: string
                                                description: >-
                                                  Name of the field in the event payload used to correlate ACK responses.
                                                  Defaults to "correlationId".
                                                example: correlationId
                                      description:
                                        type: string
                                        description: Human-readable description of this connection.
                                        example: MQTT_TEST
                                      name:
                                        type: string
                                        description: >-
                                          Unique name identifier for this connection. Must be unique across all
                                          data endpoint connections; duplicate names are rejected.
                                        example: MQTT_TEST
                                      options:
                                        type: object
                                        description: Connection-specific options. Content varies by connection type.
                                        properties:
                                          additional:
                                            type: object
                                            description: Additional MQTT connection parameters (applicable to MQTT-based connections).
                                            properties:
                                              cleanSession:
                                                type: boolean
                                                description: >-
                                                  If true, broker discards previous session state on connect
                                                  (MQTT clean session flag).
                                                example: true
                                              clientId:
                                                type: string
                                                description: MQTT client identifier used when connecting to the broker.
                                                example: EV1
                                              debug:
                                                type: boolean
                                                description: Enable verbose MQTT debug logging.
                                                example: false
                                              keepAlive:
                                                type: number
                                                description: >-
                                                  MQTT keep-alive interval in seconds. The reader sends a PINGREQ
                                                  if no message is sent within this interval.
                                                example: 60
                                              qos:
                                                type: number
                                                description: MQTT Quality of Service level (0 = at most once, 1 = at least once).
                                                example: 0
                                              reconnectDelay:
                                                type: number
                                                description: Initial delay in seconds before attempting to reconnect after disconnect.
                                                example: 1
                                              reconnectDelayMax:
                                                type: number
                                                description: Maximum delay in seconds between reconnect attempts (exponential backoff cap).
                                                example: 5
                                          enableSecurity:
                                            type: boolean
                                            description: When true, TLS/SSL is used for the connection.
                                            example: false
                                          endpoint:
                                            type: object
                                            description: Remote broker or server endpoint details (applicable to MQTT-based connections).
                                            properties:
                                              hostName:
                                                type: string
                                                description: Hostname or IP address of the MQTT broker or cloud endpoint.
                                                example: 10.117.229.9
                                              port:
                                                type: number
                                                description: TCP port number of the MQTT broker or cloud endpoint.
                                                example: 1883
                                              protocol:
                                                type: string
                                                description: >-
                                                  Transport protocol. Common values: tcp, ssl, ws (WebSocket),
                                                  wss (WebSocket Secure).
                                                example: tcp
                                          URL:
                                            type: string
                                            description: >-
                                              HTTP POST endpoint URL. Required for httpPost connection type.
                                              Tag read events are POSTed as JSON to this URL.
                                            example: https://webhook.site/your-uuid
                                          tcpipport:
                                            type: string
                                            description: >-
                                              TCP port on which the reader listens as a TCP server.
                                              Required for tcpip-server connection type. Clients connect
                                              to this port to receive tag read events.
                                            example: "8081"
                                          publishTopic:
                                            type: array
                                            description: MQTT topic(s) the reader publishes tag read events to.
                                            items:
                                              type: string
                                              example: tagevents_r2c_longrun
                                            example:
                                              - tagevents_r2c_longrun
                                          security:
                                            type: object
                                            description: TLS/SSL certificate and key configuration.
                                            properties:
                                              CACertificateFileLocation:
                                                type: string
                                                description: Absolute path to the CA certificate file on the reader.
                                                example: /home/root/broker.emqx.io-ca.crt
                                              installedCertificateName:
                                                type: string
                                                description: Name of a pre-installed certificate stored on the reader.
                                                example: Server
                                              installedCertificateType:
                                                type: string
                                                description: Type of the pre-installed certificate (e.g. "server", "client").
                                                example: server
                                              keyAlgorithm:
                                                type: string
                                                description: JWT signing algorithm for GCP connections (e.g. RS256, ES256).
                                                example: RS256
                                              keyFormat:
                                                type: string
                                                description: Key file format (e.g. PEM).
                                                example: PEM
                                              privateKeyFileLocation:
                                                type: string
                                                description: Absolute path to the private key file on the reader.
                                                example: /data/client-pvt.key
                                              publicKeyFileLocation:
                                                type: string
                                                description: Absolute path to the public key or client certificate file on the reader.
                                                example: /data/client-pub.crt
                                              verifyHostName:
                                                type: boolean
                                                description: When true, the broker's hostname is verified against its TLS certificate CN/SAN.
                                                example: false
                                              verifyPeer:
                                                type: boolean
                                                description: When true, the server's TLS certificate is validated against the CA certificate.
                                                example: false
                                              authenticationType:
                                                type: string
                                                description: >-
                                                  HTTP authentication type for httpPost connections.
                                                  Supported values: NONE, BASIC, BEARER.
                                                example: NONE
                                              verifyHost:
                                                type: boolean
                                                description: >-
                                                  For httpPost connections, when true, the server hostname is verified
                                                  against its TLS certificate. Equivalent to verifyHostName for MQTT.
                                                example: false
                                          subscribeTopic:
                                            type: array
                                            description: MQTT topic(s) the reader subscribes to (typically unused for data connections).
                                            items: {}
                                            example: []
                                      type:
                                        type: string
                                        description: >-
                                          Connection type. Supported values: mqtt, mqtt-GCP, mqtt-AWS,
                                          mqtt-Azure, httpPost, WEBSOCKET, tcpip-server, keyboard-emulation.
                                          Only one WEBSOCKET, tcpip-server, or keyboard-emulation connection
                                          is allowed at a time.
                                        example: mqtt
                                  example:
                                    - additionalOptions:
                                        batching: null
                                        retention:
                                          maxEventRetentionTimeInMin: 500
                                          maxNumEvents: 150000
                                          throttle: 500
                                      description: MQTT_TEST
                                      name: MQTT_TEST
                                      options:
                                        additional:
                                          cleanSession: true
                                          clientId: EV1
                                          debug: false
                                          keepAlive: 60
                                          qos: 0
                                          reconnectDelay: 1
                                          reconnectDelayMax: 5
                                        enableSecurity: false
                                        endpoint:
                                          hostName: 10.117.229.9
                                          port: 1883
