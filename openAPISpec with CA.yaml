          $ref: '#/components/schemas/memorystats.v1'
      required:
        - rootFileSystem
        - platform
        - readerConfig
        - readerData
    cpustats.v1:
      title: cpuStats
      type: object
      properties:
        user:
          type: integer
          description: User processes CPU utilization percentage
          example: '42'
        system:
          type: integer
          description: System processes CPU utilization percentage
          example: '32'
      description: System CPU Statistics
    ntpstats.v1:
      title: ntpstats
      type: object
      description: Represents NTP statistics.
      properties:
        offset:
          type: number
          description: Local clock offset from NTP server clock in milliseconds.
          example: 120
          format: float
        reach:
          type: integer
          description: Status of successful synchronization attempts; a value of 377 indicates eight consecutive successful attempts.
          example: 377
      required:
        - offset
        - reach
    readerstats.v1:
      title: readerStats
      type: object
      description: Reader statistics information
      properties:
        uptime:
          type: string
          description: Duration the reader has been powered on
          format: time
          example: 26 days 01:11:17
        systemTime:
          type: string
          description: ISO 8601 formatted time on the reader
          format: date-time
          example: '2020-01-08T15:36:53+00:00'
        ram:
          $ref: '#/components/schemas/memorystats.v1'
        flash:
          $ref: '#/components/schemas/readerflashmemory.v1'
        cpu:
          $ref: '#/components/schemas/cpustats.v1'
        radioConnection:
          type: string
          enum:
            - connected
            - disconnected
          description: The status of the radio connection
          example: connected
        antennas:
          type: object
          description: Status of the antennas connection
          properties:
            '0':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 0 connection state (only applicable to ATR7000)
            '1':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 1 connection state
            '2':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 2 connection state
            '3':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 3 connection state
            '4':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 4 connection state
            '5':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 5 connection state
            '6':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 6 connection state
            '7':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 7 connection state
            '8':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 8 connection state
            '9':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 9 connection state (only applicable to ATR7000)
            '10':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 10 connection state (only applicable to ATR7000)
            '11':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 11 connection state (only applicable to ATR7000)
            '12':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 12 connection state (only applicable to ATR7000)
            '13':
              type: string
              enum:
                - connected
                - disconnected
              description: Antenna 13 connection state (only applicable to ATR7000)
          required:
            - '1'
            - '2'
        temperature:
          type: integer
          description: Current Reader Temperature (in degrees centigrade)
          format: int32
          example: 31
        radioActivity:
          type: string
          description: Status of the radio activity
          enum:
            - active
            - inactive
        powerSource:
          type: string
          enum:
            - DC
            - POE
            - POE+
          description: The source of power for the reader
        powerNegotiation:
          type: string
