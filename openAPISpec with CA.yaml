  /cloud/impinjGen2X:
    get:
      tags:
        - ImpinjGen2X
      summary: Get Impinj Gen2X configuration
      description: MQTT API :- get_impinjGen2X <br> Retrieves the current Impinj Gen2X feature configuration as last saved via set_impinjGen2X. Returns an empty object if no Gen2X configuration has been set yet. Only feature objects that were previously configured are included in the response.
      operationId: getImpinjGen2X
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Current Impinj Gen2X feature configuration as last saved via set_impinjGen2X.
                  Returns an empty object if no Gen2X configuration has been set yet.
                  Only feature objects that were previously configured are included in the response.
                properties:
                  fastID:
                    type: object
                    description: FastID configuration. Present only if fastID was previously configured.
                    properties:
                      enabled:
                        type: boolean
                        description: Whether FastID is enabled.
                        example: true
                    required:
                      - enabled
                  tagProtect:
                    type: object
                    description: TagProtect configuration. Present only if tagProtect was previously configured.
                    properties:
                      action:
                        type: string
                        description: Last configured protection action.
                        enum:
                          - enableTagProtection
                          - disableTagProtection
                          - enableTagVisibility
                          - disableTagVisibility
                        example: enableTagProtection
                      password:
                        type: string
                        description: 8-character hexadecimal 32-bit password.
                        minLength: 8
                        maxLength: 8
                        pattern: '^[0-9A-Fa-f]{8}$'
                        example: '77777777'
                      tagID:
                        type: string
                        description: >-
                          Hexadecimal tagID (EPC) of the target tag.
                          Only present when action is enableTagProtection or disableTagProtection.
                        pattern: '^[0-9A-Fa-f]+$'
                        example: 'e2801191a5030069073b426d'
                      enableShortRange:
                        type: boolean
                        description: Whether short-range protection mode is enabled.
                        example: true
                    required:
                      - action
                      - password
                  tagFocus:
                    type: object
                    description: TagFocus configuration. Present only if tagFocus was previously configured.
                    properties:
                      enabled:
                        type: boolean
                        description: Whether TagFocus is enabled.
                        example: true
                    required:
                      - enabled
                  tagQuieting:
                    $ref: '#/components/schemas/impinjTagQuieting.v1'
              examples:
                empty:
                  value: {}
                fastID_configured:
                  value:
                    fastID:
                      enabled: true
                tagFocus_configured:
                  value:
                    tagFocus:
                      enabled: true
                tagProtect_configured:
                  value:
                    tagProtect:
                      action: enableTagProtection
                      password: '77777777'
                      tagID: 'e2801191a5030069073b426d'
                      enableShortRange: true
                tagQuieting_basic_configured:
                  value:
                    tagQuieting:
                      basic:
                        action: quiet
                        tagIDs:
                          - 'e2801191a5030069073b426d'
                tagQuieting_advanced_configured:
                  value:
                    tagQuieting:
                      advanced:
                        tagQuietMasks:
                          - S0A
                          - S2A
                        target: SL
                        stateAwareAction: ASSERTSL
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                    example: 1
                  message:
                    type: string
                    example: "problem getting response for get_impinjGen2X"
      security:
        - bearerAuth: []
    put:
      tags:
        - ImpinjGen2X
      summary: Set Impinj Gen2X configuration
      description: MQTT API :- set_impinjGen2X <br> Configures Impinj Gen2X proprietary features (FastID, TagProtect, TagFocus, TagQuieting). At least one feature object must be provided. Note - start command with applyImpinjGen2X flag should be used to start the Gen2X operations.
      operationId: setImpinjGen2X
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >-
                Configures Impinj Gen2X proprietary features. At least one feature object
                (fastID, tagProtect, tagFocus, or tagQuieting) must be provided.
              minProperties: 1
              properties:
                fastID:
                  type: object
                  description: >-
                    Impinj FastID embeds the tag TID along with the EPC in every inventory response, eliminating
                    the need for separate TID read operations and improving throughput.
                  properties:
                    enabled:
                      type: boolean
                      description: Enable or disable the FastID feature.
                      example: true
                  required:
                    - enabled
                tagProtect:
                  description: >-
                    Impinj TagProtect prevents unauthorized cloning and reading of tags using
                    a password-based protection mechanism. It is a feature that renders a tag invisible
                    to an RFID reader. The tag becomes RF silent and does not respond to Gen2 commands
                    unless the reader first provides the correct 32-bit password.
                    The required fields depend on the action:
                    tagID is required for enableTagProtection/disableTagProtection and must be omitted for
                    enableTagVisibility/disableTagVisibility.
                  oneOf:
                    - type: object
                      title: Protect or Unprotect Tag
                      description: Protect or unprotect a specific tag identified by its EPC.
                      properties:
                        action:
                          type: string
                          description: >-
                            enableTagProtection sets a tag to protected mode;
                            disableTagProtection removes protection from a specific tag.
                          enum:
                            - enableTagProtection
                            - disableTagProtection
                          example: enableTagProtection
                        password:
                          type: string
                          description: 8-character hexadecimal 32-bit password used for tag protection.
                          minLength: 8
                          maxLength: 8
                          pattern: '^[0-9A-Fa-f]{8}$'
                          example: '77777777'
                        tagID:
                          type: string
                          description: Hexadecimal tagID (EPC) of the target tag.
                          pattern: '^[0-9A-Fa-f]+$'
                          example: 'e2801191a5030069073b426d'
                        enableShortRange:
                          type: boolean
                          description: Enables short-range protection mode for higher security.
                          example: true
                      required:
                        - action
                        - password
                        - tagID
                    - type: object
                      title: Enable or Disable Protected Tag Reading
                      description: Enable or disable the reader's ability to read protected tags.
                      properties:
                        action:
                          type: string
                          description: >-
                            enableTagVisibility enables the reader to read protected tags;
                            disableTagVisibility disables reading of protected tags.
                          enum:
                            - enableTagVisibility
                            - disableTagVisibility
                          example: enableTagVisibility
                        password:
                          type: string
                          description: 8-character hexadecimal 32-bit password used for tag protection.
                          minLength: 8
                          maxLength: 8
                          pattern: '^[0-9A-Fa-f]{8}$'
                          example: '77777777'
                        enableShortRange:
                          type: boolean
                          description: Enables short-range protection mode for higher security.
                          example: false
                      required:
                        - action
                        - password
                tagFocus:
                  type: object
                  description: >-
                    Impinj TagFocus instructs tags that have already been inventoried to remain
                    unresponsive thus enabling the reader to focus on other tags. By reducing tag
                    chatter, TagFocus improves read rates and accuracy in dense tag environments.
                    TagFocus targets tags inventoried in session S1.
                  properties:
                    enabled:
                      type: boolean
                      description: Enable or disable the TagFocus feature.
                      example: true
                  required:
                    - enabled
                tagQuieting:
                  $ref: '#/components/schemas/impinjTagQuieting.v1'
            examples:
              enable_fastID:
                value:
                  fastID:
                    enabled: true
              disable_fastID:
                value:
                  fastID:
                    enabled: false
              protect_tag:
                value:
                  tagProtect:
                    action: enableTagProtection
                    password: '77777777'
                    tagID: 'e2801191a5030069073b426d'
                    enableShortRange: true
              unprotect_tag:
                value:
                  tagProtect:
                    action: disableTagProtection
                    password: '77777777'
                    tagID: 'e2801191a5030069073b426d'
              enable_protect_read:
                value:
                  tagProtect:
                    action: enableTagVisibility
                    password: '77777777'
              disable_protect_read:
                value:
                  tagProtect:
                    action: disableTagVisibility
                    password: '77777777'
              enable_tagFocus:
                value:
                  tagFocus:
                    enabled: true
              disable_tagFocus:
                value:
                  tagFocus:
                    enabled: false
              quiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: quiet
                      tagIDs:
                        - 'e2801191a5030069073b426d'
                        - 'e2801191a5030069073b426e'
              unquiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: unquiet
                      tagIDs:
                        - 'e2801191a5030069073b426d'
              advanced_quiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                        - target: SL
                          action: ASSERTSL_NOTHING
                          mask:
                            bank: EPC
                            pointer: 32
                            length: 96
                            value: E280123456789012345678AB
                        - target: S2
                          action: INVB_INVA
                          mask:
                            bank: EPC
                            pointer: 32
                            length: 96
                            value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                        - SL_ASSERT
                        - S2B
                      target: SL
                      stateAwareAction: ASSERTSL_DEASSERTSL
              advanced_unquiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                        - target: SL
                          action: DEASSERTSL_NOTHING
                          mask:
                            bank: EPC
                            pointer: 32
                            length: 96
                            value: E280123456789012345678AB
                        - target: S2
                          action: INVA_INVB
                          mask:
                            bank: EPC
                            pointer: 32
                            length: 96
                            value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                        - SL_DEASSERT
                        - S2A
                      target: SL
                      stateAwareAction: DEASSERTSL_ASSERTSL
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                description: Returns an empty string on success.
                example: ""
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Invalid payload for set_impinjGen2X api"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: number
                    example: 1
                  message:
                    type: string
                    example: "problem getting response for set_impinjGen2X"
      security:
        - bearerAuth: []


  /cloud/ble-config:
    put:
      tags:
        - Ble
      summary: Set BLE configuration
      description: |-
        MQTT API :- set_bleConfig

        Configure the BLE scanner. The `ble.enable` field is required.
        Optional fields control scan interval, RSSI filter, service UUID filters,
        and protocol-specific settings.
        BLE configuration must be applied before starting a BLE scan via `start`.
      operationId: setBleConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ble
              properties:
                ble:
                  type: object
                  required:
                    - enable
                  properties:
                    enable:
                      type: boolean
                      example: true
                    scanIntervalSec:
                      type: integer
                      minimum: 1
                      example: 5
                    additionalFilters:
                      type: object
                      properties:
                        rssi:
                          type: integer
                          minimum: -127
                          maximum: 0
                          example: -70
                        serviceUuids16:
                          type: array
                          items:
                            type: string
                          example: ["0x180D"]
                        serviceUuids128:
                          type: array
                          items:
                            type: string
                          example: ["6E400001-B5A3-F393-E0A9-E50E24DCCA9E"]
                    protocols:
                      type: object
                      description: Protocol-specific BLE scanner configurations.
                      properties:
                        iBeacon:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              example: true
                            filters:
                              type: array
                              items:
                                type: object
                                properties:
                                  uuid:
                                    type: string
                                    description: Proximity UUID
                                    example: "FDA50693-A4E2-4FB1-AFCF-C6EB07647825"
                                  major:
                                    type: integer
                                    description: Major value
                                    example: 10001
                                  minor:
                                    type: integer
                                    description: Minor value
                                    example: 20002
                                  txPower:
                                    type: integer
                                    description: TX power / calibrated RSSI at 1m
                                    example: -59
                        altBeacon:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              example: true
                            filters:
                              type: array
                              items:
                                type: object
                                properties:
                                  mfgId:
                                    type: string
                                    description: Manufacturer ID (hex string)
                                    example: "0118"
                                  beaconId:
                                    type: string
                                    description: Beacon ID (UUID string)
                                    example: "2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7"
                                  major:
                                    type: integer
                                    description: Major value
                                    example: 4
                                  minor:
                                    type: integer
                                    description: Minor value
                                    example: 4
                                  refRssi:
                                    type: integer
                                    description: Reference RSSI (TX power at 1m)
                                    example: -100
                        eddystone:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              example: true
                            filters:
                              type: array
                              description: >-
                                Filter by Eddystone frame fields. Use `frameType` to target a
                                specific frame type (URL, UID, EID). All other fields are optional
                                and frame-type-specific.
                              items:
                                type: object
                                properties:
                                  frameType:
                                    type: string
                                    description: Eddystone frame type
                                    enum:
                                      - URL
                                      - UID
                                      - EID
                                      - TLM
                                    example: URL
                                  txPower:
                                    type: integer
                                    description: TX power at 0m (calibrated RSSI)
                                    example: -59
                                  url:
                                    type: string
                                    description: Advertised URL (Eddystone-URL only)
                                    example: "https://www.zebra.com"
                                  namespace:
                                    type: string
                                    description: 10-byte namespace (Eddystone-UID only, hex string)
                                    example: "0102030405060708090A"
                                  instance:
                                    type: string
                                    description: 6-byte instance ID (Eddystone-UID only, hex string)
                                    example: "000000000001"
                                  ephemeralId:
                                    type: string
                                    description: 8-byte ephemeral ID (Eddystone-EID only, hex string)
                                    example: "0102030405060708"
                        generic:
                          type: object
                          description: >-
                            Configuration for GENERIC_BLE beacons. Filters match on
                            device-level advertisement fields.
                          properties:
                            enabled:
                              type: boolean
                              example: true
                            filters:
                              type: array
                              description: >-
                                List of filter objects for GENERIC_BLE beacons. A beacon is
                                forwarded if it matches any one filter entry.
                              items:
                                type: object
                                properties:
                                  address:
                                    type: string
                                    description: Bluetooth device address to match (e.g. "7E:41:25:1E:D5:16").
                                    example: "7E:41:25:1E:D5:16"
                                  addressType:
                                    type: string
                                    description: Bluetooth address type to match.
                                    enum:
                                      - public
                                      - random
                                    example: "random"
                                  name:
                                    type: string
                                    description: Device name to match against the "Name" field in the BLE advertisement.
                                    example: "BLEPeripheralApp"
                                  alias:
                                    type: string
                                    description: Device alias to match against the "Alias" field in the BLE advertisement.
                                    example: "BLEPeripheralApp"
            examples:
              enable_ble:
                value:
                  ble:
                    enable: true
              enable_with_interval:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
              enable_with_rssi_filter:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 10
                    additionalFilters:
                      rssi: -70
              enable_with_protocols:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
                    protocols:
                      iBeacon:
                        enabled: true
                        filters:
                          - uuid: "FDA50693-A4E2-4FB1-AFCF-C6EB07647825"
                            major: 10001
                            minor: 20002
                            txPower: -59
                      altBeacon:
                        enabled: true
                        filters:
                          - mfgId: "0118"
                            beaconId: "2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7"
                            major: 4
                            minor: 4
                            refRssi: -100
                      eddystone:
                        enabled: true
                        filters:
                          - frameType: URL
                            txPower: -59
                            url: "https://www.zebra.com"
                          - frameType: UID
                            txPower: -18
                            namespace: "0102030405060708090A"
                            instance: "000000000001"
                          - frameType: EID
                            txPower: -18
                            ephemeralId: "0102030405060708"
                      generic:
                        enabled: true
                        filters:
                          - address: "7E:41:25:1E:D5:16"
                            addressType: "random"
                            name: "BLEPeripheralApp"
                            alias: "BLEPeripheralApp"
                    additionalFilters:
                      rssi: -80
                      serviceUuids16:
                        - "FEAA"
                        - "FE9B"
                      serviceUuids128:
                        - "FDA50693-A4E2-4FB1-AFCF-C6EB07647825"
              disable_ble:
                value:
                  ble:
                    enable: false
      responses:
        '200':
          description: OK
      security:
        - bearerAuth: []
    get:
      tags:
        - Ble
      summary: Get BLE configuration
      description: MQTT API :- get_bleConfig
      operationId: getBleConfig
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ble:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        example: true
                      scanIntervalSec:
                        type: integer
                        example: 5
                      additionalFilters:
                        type: object
                        properties:
                          rssi:
                            type: integer
                            example: -70
                          serviceUuids16:
                            type: array
                            items:
                              type: string
                          serviceUuids128:
                            type: array
                            items:
                              type: string
                      protocols:
                        type: object
                        description: Protocol-specific BLE scanner configurations.
                        properties:
                          iBeacon:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              filters:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    uuid:
                                      type: string
                                      description: Proximity UUID
                                    major:
                                      type: integer
                                      description: Major value
                                    minor:
                                      type: integer
                                      description: Minor value
                                    txPower:
                                      type: integer
                                      description: TX power / calibrated RSSI at 1m
                          altBeacon:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              filters:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    mfgId:
                                      type: string
                                      description: Manufacturer ID (hex string)
                                    beaconId:
                                      type: string
                                      description: Beacon ID (UUID string)
                                    major:
                                      type: integer
                                      description: Major value
                                    minor:
                                      type: integer
                                      description: Minor value
                                    refRssi:
                                      type: integer
                                      description: Reference RSSI (TX power at 1m)
                          eddystone:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              filters:
                                type: array
                                description: >-
                                  Filter by Eddystone frame fields. Use `frameType` to target a
                                  specific frame type (URL, UID, EID).
                                items:
                                  type: object
                                  properties:
                                    frameType:
                                      type: string
                                      description: Eddystone frame type
                                      enum:
                                        - URL
                                        - UID
                                        - EID
                                        - TLM
                                    txPower:
                                      type: integer
                                      description: TX power at 0m
                                    url:
                                      type: string
                                      description: Advertised URL (Eddystone-URL only)
                                    namespace:
                                      type: string
                                      description: 10-byte namespace hex string (Eddystone-UID only)
                                    instance:
                                      type: string
                                      description: 6-byte instance ID hex string (Eddystone-UID only)
                                    ephemeralId:
                                      type: string
                                      description: 8-byte ephemeral ID hex string (Eddystone-EID only)
                          generic:
                            type: object
                            description: >-
                              Configuration for GENERIC_BLE beacons. Filters match on
                              device-level advertisement fields.
                            properties:
                              enabled:
                                type: boolean
                              filters:
                                type: array
                                description: >-
                                  List of filter objects for GENERIC_BLE beacons.
                                items:
                                  type: object
                                  properties:
                                    address:
                                      type: string
                                      description: Bluetooth device address to match.
                                    addressType:
                                      type: string
                                      description: Bluetooth address type to match.
                                      enum:
                                        - public
                                        - random
                                    name:
                                      type: string
                                      description: Device name to match.
                                    alias:
                                      type: string
                                      description: Device alias to match.
              example:
                ble:
                  enable: true
                  scanIntervalSec: 5
                  protocols:
                    iBeacon:
                      enabled: true
                      filters:
                        - uuid: "FDA50693-A4E2-4FB1-AFCF-C6EB07647825"
                          major: 10001
                          minor: 20002
                          txPower: -59
                    altBeacon:
                      enabled: true
                      filters:
                        - mfgId: "0118"
                          beaconId: "2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7"
                          major: 4
                          minor: 4
                          refRssi: -100
                    eddystone:
                      enabled: true
                      filters:
                        - frameType: URL
                          txPower: -59
                          url: "https://www.zebra.com"
                        - frameType: UID
                          txPower: -18
                          namespace: "0102030405060708090A"
                          instance: "000000000001"
                        - frameType: EID
                          txPower: -18
                          ephemeralId: "0102030405060708"
                    generic:
                      enabled: true
                      filters:
                        - address: "7E:41:25:1E:D5:16"
                          addressType: "random"
                          name: "BLEPeripheralApp"
                          alias: "BLEPeripheralApp"
                  additionalFilters:
                    rssi: -80
                    serviceUuids16:
                      - "FEAA"
                      - "FE9B"
                    serviceUuids128:
                      - "FDA50693-A4E2-4FB1-AFCF-C6EB07647825"
      security:
        - bearerAuth: []

