components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    impinjTagQuietingBasic.v1:
      title: impinjTagQuietingBasic
      type: object
      description: Basic TagQuieting configuration for quieting or unquieting specific tags identified by EPC.
      properties:
        action:
          type: string
          description: quiet silences the specified tags for the current inventory round; unquiet restores previously quieted
            tags.
          enum:
          - quiet
          - unquiet
          example: quiet
        tagIDs:
          type: array
          description: Non-empty list of hexadecimal EPC strings identifying the tags to quiet or unquiet.
          minItems: 1
          items:
            type: string
            pattern: ^[0-9A-Fa-f]+$
            example: e2801191a5030069073b426d
      required:
      - action
      - tagIDs
    impinjTagQuietingAdvanced.v1:
      title: impinjTagQuietingAdvanced
      type: object
      description: Advanced TagQuieting configuration using Impinj Gen2X proprietary features.
      properties:
        preSelect:
          type: array
          description: Optional array of SELECT operations to position tags into specific session states before applying state-aware
            SELECT. Maximum 31 items allowed.
          maxItems: 31
          items:
            type: object
            properties:
              target:
                type: string
                description: Session or flag to target.
                enum:
                - S0
                - S1
                - S2
                - S3
                - SL
                example: S2
              action:
                type: string
                description: Action to perform on the target session or flag.
                enum:
                - ASSERTSL_NOTHING
                - DEASSERTSL_NOTHING
                - ASSERTSL_ASSERTSL
                - ASSERTSL_DEASSERTSL
                - DEASSERTSL_ASSERTSL
                - DEASSERTSL_DEASSERTSL
                - NEGSL_NOTHING
                - NOTHING_ASSERTSL
                - NOTHING_DEASSERTSL
                - NOTHING_NEGSL
                - INVA_NOTHING
                - INVB_NOTHING
                - INVA_INVB
                - INVB_INVA
                - INVA_INVA
                - INVB_INVB
                - NOTHING_INVA
                - NOTHING_INVB
                example: INVB_INVA
              mask:
                type: object
                description: Memory mask for tag selection.
                properties:
                  bank:
                    type: string
                    description: Memory bank to match against.
                    enum:
                    - EPC
                    - TID
                    - USER
                    - RESERVED
                    example: EPC
                  pointer:
                    type: integer
                    description: Bit offset in memory bank.
                    minimum: 0
                    maximum: 65535
                    example: 32
                  length:
                    type: integer
                    description: Number of bits to match.
                    minimum: 1
                    maximum: 255
                    example: 96
                  value:
                    type: string
                    description: Hex string value to match (even length, valid hex characters).
                    pattern: ^[0-9A-Fa-f]+$
                    example: A55E551ABE1C0DE869C7A459
                required:
                - bank
                - pointer
                - length
                - value
            required:
            - target
            - action
            - mask
        tagQuietMasks:
          type: array
          description: Session-state combinations to check in TID memory. Minimum 1, maximum 3 items. No duplicate session
            prefixes allowed (e.g., S0A and S0B together).
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum:
            - S0A
            - S0B
            - S2A
            - S2B
            - S3A
            - S3B
            - SL_ASSERT
            - SL_DEASSERT
            example: S0A
          allOf:
          - not:
              allOf:
              - contains:
                  const: S0A
              - contains:
                  const: S0B
          - not:
              allOf:
              - contains:
                  const: S2A
              - contains:
                  const: S2B
          - not:
              allOf:
              - contains:
                  const: S3A
              - contains:
                  const: S3B
          - not:
              allOf:
              - contains:
                  const: SL_ASSERT
              - contains:
                  const: SL_DEASSERT
        target:
          type: string
          description: Which flag to manipulate based on state check.
          enum:
          - SL
          - S0
          - S1
          - S2
          - S3
          example: SL
        stateAwareAction:
          type: string
          description: Action to perform on target flag when tags match the tagQuietMasks pattern.
          enum:
          - ASSERTSL
          - DEASSERTSL
          - ASSERTSL_DEASSERTSL
          - DEASSERTSL_ASSERTSL
          - NEGSL
          - NOT_DEASSERTSL
          - NOT_ASSERTSL
          - NOT_NEGSL
          - INV_A
          - INV_B
          - INV_A_NOT_INV_B
          - INV_B_NOT_INV_A
          - INV_A2BB2A
          - NOT_INV_B
          - NOT_INV_A
          - NOT_INV_A2BB2A
          example: ASSERTSL
      required:
      - tagQuietMasks
      - target
      - stateAwareAction
    impinjTagQuieting.v1:
      title: impinjTagQuieting
      type: object
      description: Impinj TagQuieting configuration. Exactly one of basic or advanced must be provided.
      oneOf:
      - required:
        - basic
      - required:
        - advanced
      properties:
        basic:
          $ref: '#/components/schemas/impinjTagQuietingBasic.v1'
        advanced:
          $ref: '#/components/schemas/impinjTagQuietingAdvanced.v1'
      additionalProperties: false
    actionBlink.v1:
      title: Action Blink Configuration
      type: object
      description: action blink configuration for GPO or LED
      properties:
        'ON':
          type: number
          minimum: 0
          description: SET GPO or LED to desired state for ON (milliseconds) duration
        'OFF':
          type: number
          minimum: 0
          description: Toggle GPO or LED for OFF(milliseconds) duration
        DURATION:
          type: number
          minimum: 0
          description: Total duration in milliseconds to perform blink. 0 will blink GPO or LED forever
      required:
      - 'ON'
      - 'OFF'
      - DURATION
      x-internal: true
    conditionsArray.v1:
      type: array
      title: Conditions Array
      description: |-
        Predefined conditions

        IS_CLOUD_CONNECTED  : Condition will be true when reader is successfully connected to Cloud.

        ~IS_CLOUD_CONNECTED : Condition will be true when reader lost Cloud connectivity.

        IS_RADIO_ONGOING    : Condition will be true when the reader is currently performing or has started an inventory operation.

        ~IS_RADIO_ONGOING   : Condition will be true when the reader is not performing inventory or has stopped an inventory operation.
      uniqueItems: true
      minItems: 0
      items:
        type: string
        enum:
        - IS_CLOUD_CONNECTED
        - ~IS_CLOUD_CONNECTED
        - IS_RADIO_ONGOING
        - ~IS_RADIO_ONGOING
      x-internal: true
    actionConditions.v1:
      oneOf:
      - $ref: '#/components/schemas/conditionsArray.v1'
      - type: object
        properties:
          operator:
            type: string
            enum:
            - and
            - or
            description: Operator to be used for conditions validation
          operands:
            $ref: '#/components/schemas/conditionsArray.v1'
      title: Action Conditions
      description: |-
        Predefined conditions to trigger GPO or LED actions

        Default "and" operator is used when array of conditions is provided.

        operator "and": Action is performed only when all the conditions provided is true.
        operator "or": Action is performed only when one of the conditions provided is true.
      x-internal: true
    gpoAction.v1:
      title: GPO Action
      type: object
      description: |-
        Configuration to define operations on single GPO.

        GPO Action will be skipped if conditions provided is not satisfied.
      properties:
        type:
          type: string
          enum:
          - GPO
          description: Action type
        pin:
          type: number
          example: 1
          description: GPO pin number
          enum:
          - 1
          - 2
          - 3
          - 4
        state:
          type: string
          enum:
          - HIGH
          - LOW
          description: Desired GPO pin state
        postActionState:
          type: string
          enum:
          - HIGH
          - LOW
          description: Desired GPO pin state after action execution completed
        blink:
          $ref: '#/components/schemas/actionBlink.v1'
        conditions:
          $ref: '#/components/schemas/actionConditions.v1'
      required:
      - type
      - pin
      - state
    ledAction.v1:
      title: LED Action
      type: object
      description: |-
        Configuration to define operations on single LED.

        LED Action will be skipped if conditions provided is not satisfied.
      properties:
        type:
          type: string
          description: Action type
          enum:
          - LED
        led:
          type: number
          description: LED number
          enum:
          - 1
          - 2
          - 3
        color:
          type: string
          description: Desired LED color
          enum:
          - RED
          - AMBER
          - GREEN
        postActionColor:
          type: string
          description: Desired LED color after action expired
          enum:
          - GREEN
          - RED
          - AMBER
        blink:
          $ref: '#/components/schemas/actionBlink.v1'
        conditions:
          $ref: '#/components/schemas/actionConditions.v1'
      required:
      - type
      - led
      - color
    gpoledAction.v1:
      title: GPO-LED Action
      type: array
      description: Array of GPO or LED actions. Actions will be performed sequentially.
      x-internal: true
      items:
        anyOf:
        - $ref: '#/components/schemas/gpoAction.v1'
        - $ref: '#/components/schemas/ledAction.v1'
    GPIOLEDConfig.v1:
      title: GPIO-LED configuration
      type: object
      description: |-
        GPIO-LED module configuration

        Configure GPO and LED behaviour based on Events generated

        Supported Events:
        1. GPI_1_L: event raised when GPI 1 changed from HIGH to LOW
        2. GPI_1_H: event raised when GPI 1 changed from LOW to HIGH
        3. GPI_2_L: event raised when GPI 2 changed from HIGH to LOW
        4. GPI_2_H: event raised when GPI 2 changed from LOW to HIGH
        5. CLOUD_DISCONNECT: event raised when reader is disconnected from cloud
        6. CLOUD_CONNECT: event raised when reader is connected to cloud
        7. TAG_READ: event raised when a tag is read
        8. RADIO_START: event raised when inventory operation started using START API
        9. RADIO_STOP: event raised when inventory operation stopped using STOP API
      properties:
        GPODefaults:
          type: object
          description: GPO default configurations
          properties:
            '1':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 1
            '2':
              type: string
              enum:
              - LOW
              - HIGH
              description: set default state for GPO pin 2
            '3':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 3
            '4':
              type: string
              enum:
              - HIGH
              - LOW
              description: set default state for GPO pin 4
        LEDDefaults:
          type: object
          description: LED default configurations
          properties:
            '1':
              type: string
              enum:
              - GREEN
              - RED
              - AMBER
              description: set default color for LED 2
            '2':
              type: string
              enum:
              - GREEN
              - RED
              - AMBER
              description: set default color for LED 3
            '3':
              type: string
              enum:
              - RED
              - GREEN
              - AMBER
              description: set default color for LED 4
        GPI_1_H:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_1_L:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_2_H:
          $ref: '#/components/schemas/gpoledAction.v1'
        GPI_2_L:
          $ref: '#/components/schemas/gpoledAction.v1'
        CLOUD_DISCONNECT:
          $ref: '#/components/schemas/gpoledAction.v1'
        CLOUD_CONNECT:
          $ref: '#/components/schemas/gpoledAction.v1'
        TAG_READ:
          $ref: '#/components/schemas/gpoledAction.v1'
        RADIO_START:
          $ref: '#/components/schemas/gpoledAction.v1'
        RADIO_STOP:
          $ref: '#/components/schemas/gpoledAction.v1'
    eventsConfig.v1:
      description: Asynchronous management events configuration
      type: object
      x-examples:
        example-1:
          errors:
            cpu:
              threshold: 90
              reportIntervalInSec: 1800
            flash:
              threshold: 90
              reportIntervalInSec: 1800
            ram:
              threshold: 90
              reportIntervalInSec: 1800
            reader_gateway: true
            antenna: false
            database: true
            radio: true
            radio_control: true
          warnings:
            cpu:
              threshold: 80
              reportIntervalInSec: 1800
            flash:
              threshold: 80
              reportIntervalInSec: 1800
            ram:
              threshold: 80
              reportIntervalInSec: 1800
            ntp:
              threshold: 0
              reportIntervalInSec: 1800
            database: true
            radio_api: true
            radio_control: true
            temperature:
              ambient: 75
              pa: 105
          gpiEvents: true
          userappEvents: true
          heartbeat:
            fields:
              radio_control:
              - ANTENNAS
              - RADIO_ACTIVITY
              - RADIO_CONNECTION
              - CPU
              - RAM
              - UPTIME
              - NUM_ERRORS
              - NUM_WARNINGS
              - NUM_TAG_READS
              - NUM_TAG_READS_PER_ANTENNA
              - NUM_DATA_MESSAGES_TXED
              - NUM_RADIO_PACKETS_RXED
              reader_gateway:
              - NUM_DATA_MESSAGES_RXED
              - NUM_DATA_MESSAGES_TXED
              - NUM_DATA_MESSAGES_RETAINED
              - NUM_DATA_MESSAGES_DROPPED
              - NUM_MANAGEMENT_EVENTS_TXED
              - CPU
              - RAM
              - UPTIME
              - NUM_ERRORS
              - NUM_WARNINGS
              system:
              - CPU
              - FLASH
              - NTP
              - RAM
              - SYSTEMTIME
              - TEMPERATURE
              - UPTIME
              userapps:
              - STATUS
              - CPU
              - RAM
              - UPTIME
              - NUM_DATA_MESSAGES_RXED
              - NUM_DATA_MESSAGES_TXED
              - INCOMING_DATA_BUFFER_PERCENTAGE_REMAINING
              - OUTGOING_DATA_BUFFER_PERCENTAGE_REMAINING
            interval: 60
      title: Management Events Configuration
      properties:
        errors:
          type: object
          description: Asynchronous Management Errors
          properties:
            cpu:
              type: object
              description: CPU Usage Error Alerts
              properties:
                threshold:
                  type: number
                  description: Error CPU usage limit
                  default: 90
                  example: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  default: 1800
                  example: 1800
                  minimum: 1
                  description: Error Report Interval in seconds.
              required:
              - threshold
            flash:
              type: object
              description: Flash Usage Error Alerts
              properties:
                threshold:
                  type: number
                  description: Error FLASH usage limit
                  default: 90
                  example: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  description: Error Report Interval in seconds.
                  default: 1800
                  example: 1800
                  minimum: 1
              required:
              - threshold
            ram:
              type: object
              description: RAM Usage Error Alerts
              properties:
                threshold:
                  type: number
                  description: Error RAM usage limit
                  default: 90
                  example: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  description: Error Report Interval in seconds.
                  default: 1800
                  minimum: 1
                  example: 1800
              required:
              - threshold
            reader_gateway:
              type: boolean
              default: true
              description: Reader Gateway Errors
            antenna:
              type: boolean
              description: Antenna Connect/Disconnect Alerts
              default: true
            database:
              type: boolean
              default: true
              description: Radio Database Error Alerts
            radio:
              type: boolean
              default: true
              description: Radio Error Alerts
            radio_control:
              type: boolean
              default: true
              description: Radio Control Error Alerts
        warnings:
          type: object
          description: Asynchronous Management Warnings
          properties:
            cpu:
              type: object
              description: CPU Usage Warning Alerts
              properties:
                threshold:
                  type: number
                  description: Warning CPU usage limit
                  default: 80
                  example: 80
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  default: 1800
                  example: 1800
                  minimum: 1
                  description: Warning Report Interval in seconds.
              required:
              - threshold
            flash:
              type: object
              description: Flash Usage Warning Alerts
              properties:
                threshold:
                  type: number
                  description: Warning FLASH usage limit
                  default: 80
                  example: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  description: Warning Report Interval in seconds.
                  default: 1800
                  example: 1800
                  minimum: 1
              required:
              - threshold
            ram:
              type: object
              description: RAM Usage Warning Alerts
              properties:
                threshold:
                  type: number
                  description: Warning RAM usage limit
                  default: 90
                  example: 90
                  minimum: 1
                  maximum: 99
                reportIntervalInSec:
                  type: number
                  description: Warning Report Interval in seconds.
                  default: 1800
                  minimum: 1
                  example: 1800
              required:
              - threshold
            ntp:
              description: NTP Warning Alert
              oneOf:
              - type: object
                description: NTP offset warnings config
                properties:
                  threshold:
                    type: number
                    description: NTP offset threshold
                  reportIntervalInSec:
                    type: number
                    description: Warning Report Interval in seconds.
                required:
                - threshold
              - type: boolean
                description: NTP sync warning alerts
                default: true
            temperature:
              type: object
              description: Reader temperature warning limits
              properties:
                ambient:
                  type: number
                  description: Ambient temperature limit
                  default: 75
                pa:
                  type: number
                  description: PA temperature limit
                  default: 105
              required:
              - ambient
              - pa
            database:
              type: boolean
              default: true
              description: Radio Database warnings
            radio_api:
              type: boolean
              default: true
              description: NGE warnings
            radio_control:
              type: boolean
              default: true
              description: Radio Control warnings
            reader_gateway:
              type: boolean
              default: true
              description: Reader Gateway Errors
        heartbeat:
          type: object
          description: Asynchronous Heartbeat Events
          properties:
            fields:
              type: object
              description: heartbeat fields
              properties:
                radio_control:
                  type: array
                  description: Radio Control related heartbeat events
                  items:
                    type: string
                    enum:
                    - ANTENNAS
                    - RADIO_ACTIVITY
                    - RADIO_CONNECTION
                    - CPU
                    - RAM
                    - UPTIME
                    - NUM_ERRORS
                    - NUM_WARNINGS
                    - NUM_TAG_READS
                    - NUM_TAG_READS_PER_ANTENNA
                    - NUM_DATA_MESSAGES_TXED
                    - NUM_RADIO_PACKETS_RXED
                reader_gateway:
                  type: array
                  items:
                    type: string
                    enum:
                    - NUM_DATA_MESSAGES_RXED
                    - NUM_DATA_MESSAGES_TXED
                    - NUM_DATA_MESSAGES_RETAINED
                    - NUM_DATA_MESSAGES_DROPPED
                    - NUM_MANAGEMENT_EVENTS_TXED
                    - CPU
                    - RAM
                    - UPTIME
                    - NUM_ERRORS
                    - NUM_WARNINGS
                system:
                  type: array
                  items:
                    type: string
                    enum:
                    - CPU
                    - FLASH
                    - NTP
                    - RAM
                    - SYSTEMTIME
                    - TEMPERATURE
                    - UPTIME
                    - HOSTNAME
                    - MACADDRESS
                userapps:
                  type: array
                  items:
                    type: string
                    enum:
                    - STATUS
                    - CPU
                    - RAM
                    - UPTIME
                    - NUM_DATA_MESSAGES_RXED
                    - NUM_DATA_MESSAGES_TXED
                    - INCOMING_DATA_BUFFER_PERCENTAGE_REMAINING
                    - OUTGOING_DATA_BUFFER_PERCENTAGE_REMAINING
                userDefined:
                  type: object
                  description: Custom user defined field
            interval:
              type: number
              description: heartbeat report interval in seconds
              default: 60
          required:
          - fields
          - interval
        gpiEvents:
          type: boolean
          description: GPI Events
          default: true
        userappEvents:
          type: boolean
          default: true
          description: Asynchronous events from user applications
