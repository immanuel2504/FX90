      - Logs
      summary: Purge Log
      description: |-
        ## 1. Description

        The `DELETE /cloud/logs/radioPacketLog` REST endpoint purges radio packet log files stored on the reader. When you call this endpoint, all accumulated radio packet log data is permanently deleted from the reader's storage.

        Use this endpoint to:

        - Clear radio packet log archives after downloading them with `GET /cloud/logs/radioPacketLog`
        - Free flash storage consumed by high-volume RF packet trace data
        - Reset the packet log before starting a new diagnostic capture session

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Radio Packet Log Purge |
        | REST Endpoint | `DELETE /cloud/logs/radioPacketLog` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Request Body | None |

        ## 3. Before You Begin

        Download the log files with `GET /cloud/logs/radioPacketLog` before sending this request if you need to retain the data for RF analysis or support cases.

        | What You Need | Details |
        |---|---|
        | Log retrieval | Confirm you have downloaded the radio packet logs using `GET /cloud/logs/radioPacketLog` before purging. Deletion is permanent and cannot be undone. |
        | Logging state | If radio packet logging (`radioPacketLog`) is currently enabled, the reader will start writing new log data immediately after purge. Disable logging first (via `PUT /cloud/logs`) if you want to start a clean session with no logging active. |
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
      operationId: delRadioPacketLog
  /cloud/timeZone:
    get:
      tags:
      - Date&Time
      summary: Retrieves the reader timezone
      description: |-
        ## 1. Description

        The `GET /cloud/timeZone` REST endpoint retrieves the time zone currently configured on the reader.

        This endpoint returns:

        - The configured time zone value (a reader-supported time zone name in `(GMT±hh:mm) Region` format)

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Time Zone Query |
        | REST Endpoint | `GET /cloud/timeZone` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve the configured time zone |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/timeZone` to:

        - Confirm the reader's time zone before relying on event timestamps
        - Verify the result of a prior `PUT /cloud/timeZone` call
        - Audit time zone consistency across a fleet of readers

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `timeZone` | Is this the correct time zone for the deployment location? | An incorrect time zone causes local event timestamps to be offset from actual local time. |
      operationId: getTimezone
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getTimeZone'
      security:
      - bearerAuth: []
    put:
      tags:
      - Date&Time
      summary: Sets the timezone
      description: |-
        ## 1. Description

        The `PUT /cloud/timeZone` REST endpoint sets the time zone on the reader.

        This endpoint allows you to configure:

        - The reader's local time zone through `timeZone`

        Use this endpoint to:

        - Align the reader's clock with the deployment site's local time zone
        - Correct event timestamps and log timestamps for local time reporting
        - Standardize time zone configuration across a fleet of readers
        - Update the time zone after a reader is relocated to a different region

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Time Zone Configuration |
        | REST Endpoint | `PUT /cloud/timeZone` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Required Request Fields | `timeZone` |

        ## 3. Before You Begin

        Have the exact time zone string ready before sending this request. An unrecognized time zone string will be rejected.

        | What You Need | Details |
        |---|---|
        | Time zone string | A reader-supported time zone name (e.g., `"International Date Line West"`, `"Pacific Time (US & Canada)"`). Use `GET /cloud/timeZone` to check the currently configured value. |
        | Site location | Confirm the physical deployment location of the reader to select the correct time zone. |
      operationId: setTimezone
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setTimeZone'
            examples:
              set_timeZone:
                value:
                  timeZone: UTC
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetTimezoneResponse'
      security:
      - bearerAuth: []
  /cloud/ntpServer:
    get:
      tags:
      - Date&Time
      summary: Retrieve the NTP server
      description: |-
        ## 1. Description

        The `GET /cloud/ntpServer` REST endpoint retrieves the NTP server currently configured for time synchronization on the reader.

        This endpoint returns:

        - The NTP server hostname or IP address

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | NTP Server Query |
        | REST Endpoint | `GET /cloud/ntpServer` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve the configured NTP server |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/ntpServer` to:

        - Confirm the reader is pointed at the correct time source for the deployment
        - Verify the result of a prior `PUT /cloud/ntpServer` call
        - Troubleshoot clock drift that is affecting event timestamps

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `server` | Is this the correct NTP server address? | An incorrect or unreachable NTP server causes clock drift, making event timestamps unreliable. |
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNtpServerResponse'
      security:
      - bearerAuth: []
      operationId: getNtpServer
    put:
      tags:
      - Date&Time
      summary: Set NTP server
      description: |-
        ## 1. Description

        The `PUT /cloud/ntpServer` REST endpoint sets one or more NTP servers used by the reader for time synchronization.

        This endpoint allows you to configure:

        - The primary NTP server through `server` (current convention) or `server1` (legacy convention)
        - An optional secondary NTP server through `server2`

        Use this endpoint to:

        - Point the reader to your organization's NTP server for accurate timekeeping
        - Configure fallback NTP servers for resilience when the primary is unreachable
        - Correct clock drift that is affecting event timestamps and log correlation
        - Standardize NTP configuration across a fleet of readers

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | NTP Server Configuration |
        | REST Endpoint | `PUT /cloud/ntpServer` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Required Request Fields | `server` (or `server1` for the legacy convention) |

        ## 3. Before You Begin

        Confirm that the NTP server is reachable from the reader's network before sending this request. An unreachable NTP server will leave the reader clock unsynchronized.

        | What You Need | Details |
        |---|---|
        | Primary NTP server | Hostname or IP address of the primary NTP server. Provide it as `server` (current convention) or `server1` (legacy convention). The reader must be able to reach this address on UDP port 123. |
        | Secondary NTP server | Optional - provide `server2` as a backup time source. |
        | Network access | NTP uses UDP port 123. Ensure this port is open between the reader and the NTP server on all network paths. |
      operationId: updateNtpServer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNtpServerRequest'
            examples:
              set_ntpServer:
                value:
                  server: time1.google.com
                  server2: time2.google.com
              set_ntpServer_legacy:
                value:
                  server1: time1.google.com
                  server2: time2.google.com
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateNtpServerResponse'
      security:
      - bearerAuth: []
  /cloud/certificates:
    get:
      tags:
      - Certificate
      summary: Retrieve installed certificate details
      description: |-
        ## 1. Description

        The `GET /cloud/certificates` REST endpoint retrieves the list of certificates installed on the reader.

        This endpoint returns:

        - An array of installed certificates, each with name, type, serial number, and validity dates

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Certificate Inventory Query |
        | REST Endpoint | `GET /cloud/certificates` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve the list of installed certificates |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/certificates` to:

        - Audit which certificates are installed and their current validity windows
        - Confirm a certificate was successfully installed or removed
        - Retrieve serial numbers for certificate rotation audits
        - Check expiry dates before a scheduled certificate renewal

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `name` | Is the expected certificate present? | Confirms the correct certificate is installed for TLS or authentication. |
        | `type` | What type of certificate is it (`server`, `client`, or `app`)? | Differentiates server, client, and app certificates used for different purposes. |
        | `validityEnd` | When does it expire? | Expired certificates will cause TLS handshake failures and connectivity loss. |
        | `serial` | Does the serial match the expected certificate? | Verifies the exact certificate instance, useful for rotation audits. |
      operationId: getCertificates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCertificatesResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Certificate
      summary: Install certificate
      description: |-
        ## 1. Description

        The `PUT /cloud/certificates` REST endpoint installs or updates a certificate on the reader by downloading a PFX file from a URL.

        This endpoint allows you to configure:

        - The certificate name assigned on the reader through `name`
        - The certificate type through `type`
        - The download source URL through `url`
        - The authentication method for the download server through `authenticationType`
        - The PFX file password through `pfxPassword`

        Use this endpoint to:

        - Install a new TLS client or server certificate for MQTT or HTTPS endpoints
        - Rotate an existing certificate before expiry
        - Provision application certificates as part of initial reader setup

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Certificate Installation |
        | REST Endpoint | `PUT /cloud/certificates` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Required Request Fields | `name`, `type`, `url` |
        | Supported Certificate Types | `client`, `server`, `app` |
        | Supported Authentication Types | `NONE`, `BASIC` |

        ## 3. Before You Begin

        Gather all certificate source details before sending this request. An invalid URL, wrong certificate type, missing download credentials, or an incorrect PFX password will cause installation to fail.

        | What You Need | Details |
        |---|---|
        | Certificate name | A unique name to assign to this certificate on the reader. If a certificate with this name already exists, it will be replaced. |
        | Certificate type | `client` for mutual TLS authentication, `server` for CA/server trust, or `app` for application-specific certificates. |
        | Source URL | An HTTPS URL where the reader can download the PFX certificate file. The reader must have network connectivity to reach this URL. |
        | Authentication type | `NONE` if the download server requires no credentials, or `BASIC` if username and password authentication is required. |
        | Download credentials | Required only when `authenticationType` is `BASIC`. Provide `options.username` and `options.password`. |
        | PFX password | The password protecting the PFX file (`pfxPassword`). Required if the PFX was exported with password protection. |
      operationId: setUpdatecertificate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUpdatecertificateRequest'
            examples:
              set_updateCertificate:
                value:
                  options:
                    password: zebra
                    username: zebra
                  authenticationType: BASIC
                  name: reader
                  pfxPassword: abcd12345
                  type: client
                  url: https://10.117.229.15/reader.pfx
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/certificates/{certname}:
    parameters:
    - name: certname
      in: path
      required: true
      description: Certificate name. This path value is used as the certificate name for refresh and delete operations.
      schema:
        type: string
    put:
      tags:
      - Certificate
      summary: Refresh certificate
      description: |-
        ## 1. Description

        The `PUT /cloud/certificates/{certname}` REST endpoint refreshes an already-installed certificate on the reader by re-fetching or re-applying it from its configured source.

        Use this endpoint to:

        - Renew a certificate before expiry without a full reinstall
        - Re-apply a certificate after upstream CA rotation
        - Trigger certificate refresh as part of a credential rotation workflow

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Certificate Refresh |
        | REST Endpoint | `PUT /cloud/certificates/{certname}` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Path Parameter | `certname` (the installed certificate name to refresh) |
        | Required Request Fields | `type` |
        | Supported Certificate Types | `client`, `server`, `app` |

        ## 3. Before You Begin

        The certificate must already be installed. Use `GET /cloud/certificates` to confirm the certificate name and `type`.

        | What You Need | Details |
        |---|---|
        | Certificate name | The exact name of the installed certificate, supplied as the `{certname}` path parameter. |
        | Certificate type | The `type` of the certificate: `client`, `server`, or `app`, sent in the request body. |
      operationId: setRefreshcertificate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRefreshcertificateRequest'
            examples:
              set_refreshCertificate_server:
                value:
                  type: server
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetRefreshcertificateResponse'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Certificate
      summary: Delete certificate
      description: |-
        ## 1. Description

        The `DELETE /cloud/certificates/{certname}` REST endpoint removes an installed certificate from the reader. When you call this endpoint, the certificate identified by the `{certname}` path parameter and its `type` is deleted from the reader's certificate store.

        Use this endpoint to:

        - Remove expired or revoked TLS certificates before installing a replacement
        - Clean up the certificate store after a certificate rotation
        - Delete client or server certificates that are no longer needed for MQTT or HTTPS authentication

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Certificate Deletion |
        | REST Endpoint | `DELETE /cloud/certificates/{certname}` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Path Parameter | `certname` (the certificate name to delete) |
        | Required Request Fields | `type` |
        | Supported Certificate Types | `client`, `server`, `app` |

        ## 3. Before You Begin

        Confirm the certificate is no longer in use before sending this request. Cross-reference the certificate name and type with your active endpoint configuration and the list returned by `GET /cloud/certificates`.

        | What You Need | Details |
        |---|---|
        | Certificate name | The exact name of the certificate to delete, supplied as the `{certname}` path parameter, as returned by `GET /cloud/certificates`. The name is case-sensitive. |
        | Certificate type | The `type` of the certificate: `client`, `server`, or `app`, sent in the request body. The type must match the installed certificate. |
        | Active use check | Confirm the certificate is not currently used for an active MQTT TLS or HTTPS endpoint connection. Deleting an in-use certificate will cause TLS handshake failures on the next reconnect. |
      operationId: delCertificate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelCertificateRequest'
            examples:
              del_certificate:
                value:
                  type: client
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelCertificateResponse'
      security:
      - bearerAuth: []
  /cloud/network:
    get:
      tags:
      - Network
      summary: Retrieves reader network configuration
      description: |-
        ## 1. Description

        The `GET /cloud/network` REST endpoint retrieves the reader's complete network configuration across all interfaces.

        This endpoint returns:

        - The device hostname
        - Ethernet (`eth0`) interface configuration and connection status
        - Wi-Fi station (`mlan0`) interface configuration and access point details
        - Bluetooth PAN (`bnep0`) configuration and status
        - Cellular (`wan0`) configuration and status
        - Wi-Fi hotspot (`uap0`) configuration, connected clients, and status

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Network Configuration Query |
        | REST Endpoint | `GET /cloud/network` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve active network configuration for all interfaces |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/network` to:

        - Confirm the reader's IP addressing before changing it
        - Verify which interfaces are connected or enabled
        - Audit network identity and interface status across a fleet
        - Troubleshoot Wi-Fi, Bluetooth, cellular, or hotspot connectivity

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `eth0` | Is the Ethernet interface connected and does it have an IP? | Primary connectivity path; must be up for cloud communication over wired LAN. |
        | `mlan0` | Is Wi-Fi associated and which SSID? | Confirms the correct access point is in use for wireless deployments. |
        | `wan0` | Is cellular connected and does it have a carrier? | Required for deployments relying on cellular backhaul. |
        | `uap0` | Is the hotspot enabled and are clients connected? | Used to confirm hotspot provisioning mode is active. |
        | `hostName` | Does the hostname match expected naming? | Used for device identification on the local network and in management systems. |
      operationId: getNetwork
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNetworkResponse'
              example:
                hostName: FXR90C5F1AB
                networkInterface:
                  eth0:
                    IPV4:
                      dhcp: true
                      dnsAddress: 10.233.1.200
                      domainName: zlab.com
                      gatewayAddress: 10.233.45.2
                      ipAddress: 10.233.45.235
                      subnetMask: 255.255.255.0
                    IPV6:
                      dhcp: true
                      dnsAddress: fd6c:10:233:1::201
                      domainName: zlab.com
                      gatewayAddress: fe80::f6ee:31ff:fe0c:5a1f
                      ipAddress: fd6c:10:233:45:eab:f51f:957e:f729
                      prefix: 64
                    Status: connected
                    isEnabled: true
                    macAddress: C8:1C:FE:C5:F1:AB
                  mlan0:
                    IPV4:
                      dhcp: true
                      dnsAddress: 1.1.1.1
                      domainName: FXR90C5F1AB
                      gatewayAddress: 192.168.0.1
                      ipAddress: 192.168.0.201
                      subnetMask: 255.255.255.0
                    IPV6:
                      dhcp: true
                      dnsAddress: fd6c:10:233:1::201
                      domainName: FXR90C5F1AB
                      gatewayAddress: fe80::c206:c3ff:febe:ee3c
                      ipAddress: fe80::3626:9125:eda5:36d7
                      prefix: 64
                    Status: connected
                    accesspoint:
                      autoConn: false
                      essid: GLaDOS
                      status: connected
                      security:
                        securityType: WPA2Personal
                    isEnabled: true
                    macAddress: 48:A4:93:BF:A9:50
                  bnep0:
                    Status: active
                    deviceDiscoverableName: FXR90C5F1AB
                    dhcpEndAddress: 192.168.0.10
                    dhcpStartAddress: 192.168.0.2
                    ipAddress: 192.168.241.171
                    isDiscoverable: true
                    isEnabled: true
                    isPairable: true
                    macAddress: 48:A4:93:BF:A9:52
                    passKey: '1234'
                    subnetMask: 255.255.0.0
                    usePassKey: true
                  wan0:
                    Status: online
                    activeSim: psim
                    isEnabled: true
                    psim:
                      currentDataClass: LTE
                      currentServiceProvider: Vi India
                      enableIPv6: false
                      enablePin: false
                      enableRoaming: false
                      highestAvailableDataClass: LTE
                      internetAccess: true
                      packetServiceState: Attached
                      preferredNetworkType: AUTO
                      registerState: Home
                      rsrp: -103.7dBm
                      rsrq: -5.5dB
                      rssi: -82.7dBm
                      signalBar: 1
                      simState: Initialized
                      snr: 0.0dB
                  uap0:
                    ssid: FXR90Hotspot
                    ssidPassword: MyP@ssword
                    isHidden: false
                    securityType: WPA3Personal
                    Status: active
                    isEnabled: true
                    macAddress: 48:A4:93:BF:A9:53
                    Clients:
                    - hostName: my-laptop
                      IP: 192.168.43.2
                      MAC: AA:BB:CC:DD:EE:FF
      security:
      - bearerAuth: []
    put:
      tags:
      - Network
      summary: Updates reader network configuration
      description: |-
        ## 1. Description

        The `PUT /cloud/network` REST endpoint updates reader network configuration for a single interface per request.

        This endpoint allows you to configure:

        - Ethernet (`eth0`) - DHCP, static IPv4/IPv6 addressing, and 802.1X security
        - Wi-Fi station (`mlan0`) - DHCP, static addressing, access point connection, and WPA2/WPA3/Enterprise security
        - Bluetooth PAN (`bnep0`) - discoverability, pairing, and DHCP address pool
        - Cellular WAN (`wan0`) - SIM selection, APN, network type preference, and IPv6
        - Wi-Fi hotspot (`uap0`) - SSID, password, country code, and security type

        Use this endpoint to:

        - Connect the reader to a new Wi-Fi access point
        - Switch from DHCP to static IP addressing on Ethernet
        - Enable or disable a network interface
        - Configure cellular APN and SIM settings
        - Provision a Wi-Fi hotspot on the reader

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Network Configuration |
        | REST Endpoint | `PUT /cloud/network` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Supported Interface Keys | `eth0`, `mlan0`, `bnep0`, `wan0`, `uap0` |
        | Supported Wi-Fi Security Types | `WPA2Personal`, `WPA2Enterprise`, `WPA3Personal`, `WPA3Enterprise` |
        | Supported 802.1X Authentication | `TLS`, `TTLS`, `PEAP` |

        ## 3. Before You Begin

        Gather all interface-specific settings before sending this request. A wrong static IP, gateway, Wi-Fi credential, or cellular setting can disconnect the reader from your network.

        | What You Need | Details |
        |---|---|
        | Interface key | Include exactly one top-level interface key: `eth0`, `mlan0`, `bnep0`, `wan0`, or `uap0`. Only one interface can be configured per request. |
        | IP addressing | Use `IPV4.dhcp: true` for dynamic addressing, or supply `ipAddress`, `subnetMask`, `gatewayAddress`, and `dnsAddress` for static. |
        | Wi-Fi access point | For `mlan0`, include the `accesspoint` object with `essid`, `connect`, `autoConn`, and the `security` sub-object. |
        | Wi-Fi security | For WPA2 Personal, provide the `password`. For WPA2 Enterprise, provide `authentication` type and either a certificate name (TLS) or credentials (TTLS/PEAP). |
        | Cellular settings | For `wan0`, set `activeSim` (`psim` or `esim`) and supply the `apn` and `preferredNetworkType` for the chosen SIM. |
        | Hotspot settings | For `uap0`, provide `ssid`, `ssidPassword`, `countryCode`, `securityType` (`WPA2Personal` or `WPA3Personal` only), and `isHidden`. |
        | Interface enablement | Always include `enable: true` or `enable: false` on the interface object to control whether the interface is active after configuration. |
      operationId: updateNetwork
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNetworkRequest'
            examples:
              set_Network_ethernet_dhcp:
                summary: Ethernet — DHCP
                value:
                  eth0:
                    IPV4:
                      dhcp: true
                    IPV6:
                      dhcp: true
                    enable: true
              set_Network_ethernet_static:
                summary: Ethernet — static IP
                value:
                  eth0:
                    IPV4:
                      dhcp: false
                      dnsAddress: 10.233.1.200
                      domainName: zlab.com
                      gatewayAddress: 10.233.46.2
                      ipAddress: 10.233.46.47
                      subnetMask: 255.255.255.0
                    IPV6:
                      dhcp: false
                      dnsAddress: 2001:4860:4860::9999
                      domainName: example.ee.com
                      gatewayAddress: fe80::1643:8376:b32:4a16
                      ipAddress: 2001:db8:1:0:8731:2eb1:cd28:f0cd
                      prefix: 64
                    enable: true
              set_Network_ethernet_static_8021x_tls:
