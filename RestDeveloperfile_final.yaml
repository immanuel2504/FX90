                esim:
                  type: object
                  description: Embedded SIM configuration and status (same structure as psim).
                  properties:
                    apn:
                      type: string
                    preferredNetworkType:
                      type: string
                    enableIPv6:
                      type: boolean
                    enablePin:
                      type: boolean
                    enableRoaming:
                      type: boolean
                    currentDataClass:
                      type: string
                    highestAvailableDataClass:
                      type: string
                    currentServiceProvider:
                      type: string
                    registerState:
                      type: string
                    packetServiceState:
                      type: string
                    internetAccess:
                      type: boolean
                    simState:
                      type: string
                    signalBar:
