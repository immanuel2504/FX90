                        type: string
                Status:
                  type: string
                  example: active
                isEnabled:
                  type: boolean
                macAddress:
                  type: string
    UpdateNetworkRequest:
      type: object
      description: Exactly one interface key must be provided.
      properties:
        eth0:
          type: object
          description: Ethernet interface configuration.
          properties:
            IPV4:
              type: object
              description: IPv4 settings.Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
              properties:
                dhcp:
                  type: boolean
                  description: Enable/disable DHCP for IPv4 on this interface.
                  example: true
                ipAddress:
                  type: string
                  description: Static IPv4 address (required if dhcp is false).
                  example: 10.233.46.47
                gatewayAddress:
                  type: string
                  description: IPv4 gateway address (required if dhcp is false).
                  example: 10.233.46.2
                subnetMask:
                  type: string
                  description: IPv4 subnet mask (required if dhcp is false).
                  example: 255.255.255.0
                dnsAddress:
                  type: string
                  description: IPv4 DNS address (required if dhcp is false).
                  example: 10.233.1.200
                domainName:
                  type: string
                  description: IPv4 domain name (required if dhcp is false).
                  example: zlab.com
            IPV6:
              type: object
              description: IPv6 settings. Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
              properties:
                dhcp:
                  type: boolean
                  description: Enable/disable DHCP for IPv6 on this interface.
                ipAddress:
                  type: string
                  description: Static IPv6 address (required if dhcp is false).
                gatewayAddress:
                  type: string
                  description: IPv6 gateway address (required if dhcp is false).
                prefix:
                  type: string
                  description: IPv6 prefix (required if dhcp is false).
                dnsAddress:
                  type: string
                  description: IPv6 DNS address (required if dhcp is false).
                domainName:
                  type: string
                  description: IPv6 domain name (required if dhcp is false).
            security:
              type: object
              description: |
                Ethernet security configuration.  Include the appropriate security configuration to enable security: `802_1xEAP` for 802.1X authentication. If the `security` configuration is omitted, security is disabled and all other security-related fields are ignored.
              properties:
                802_1xEAP:
                  type: object
                  description: 802.1X EAP security configuration (when securityType is 802_1xEAP).
                  properties:
                    authentication:
                      type: string
                      description: 'EAP authentication method: TLS, TTLS, or PEAP.'
                      enum:
                      - TLS
                      - TTLS
                      - PEAP
                      example: TLS
                    innerAuthentication:
                      type: string
                      description: 'Inner authentication method (for TTLS/PEAP): TLS or MSCHAPv2.'
                      enum:
                      - TLS
                      - MSCHAPv2
                      example: MSCHAPv2
                    username:
                      type: string
                      description: Username (for TTLS/PEAP with MSCHAPv2).
                    password:
                      type: string
                      description: Password (for TTLS/PEAP with MSCHAPv2).
                    certificate:
                      type: string
                      description: Client certificate name (for TLS-based methods).
            enable:
              type: boolean
              description: Enable/disable the ethernet interface.
              example: true
        mlan0:
          type: object
          description: WiFi station interface configuration.
          properties:
            IPV4:
              type: object
              description: IPv4 settings. Use dhcp:true for DHCP, or supply all static fields when dhcp:false.
              properties:
                dhcp:
                  type: boolean
                  description: Enable/disable DHCP for IPv4 on this interface.
                ipAddress:
                  type: string
                  description: Static IPv4 address (required if dhcp is false).
                gatewayAddress:
                  type: string
                  description: IPv4 gateway address (required if dhcp is false).
                subnetMask:
                  type: string
                  description: IPv4 subnet mask (required if dhcp is false).
                dnsAddress:
                  type: string
                  description: IPv4 DNS address (required if dhcp is false).
                domainName:
                  type: string
                  description: IPv4 domain name (required if dhcp is false).
            IPV6:
              type: object
              properties:
                dhcp:
                  type: boolean
                  description: Enable/disable DHCP for IPv6 on this interface.
                ipAddress:
                  type: string
                  description: Static IPv6 address (required if dhcp is false).
                gatewayAddress:
                  type: string
                  description: IPv6 gateway address (required if dhcp is false).
                prefix:
                  type: string
                  description: IPv6 prefix (required if dhcp is false).
                dnsAddress:
                  type: string
                  description: IPv6 DNS address (required if dhcp is false).
                domainName:
                  type: string
                  description: IPv6 domain name (required if dhcp is false).
            accesspoint:
              type: object
              required:
              - essid
              - connect
              properties:
                essid:
                  type: string
                  description: SSID of the WiFi network to connect to.
                  example: MyWiFiNetwork
                connect:
                  type: boolean
                  description: Whether to immediately connect to this access point.
                  example: true
                autoConn:
                  type: boolean
                  description: Whether to automatically reconnect on subsequent boots.
                  example: true
                security:
                  type: object
                  description: |
                    WiFi security configuration.Include the appropriate security configuration to enable security. Include exactly ONE of the following: `WPA2Personal` or `WPA2Enterprise`. If the security configuration is omitted, security is disabled and all other security-related fields are ignored.
                  properties:
                    WPA2Personal:
                      type: object
                      description: WPA2 Personal (PSK) security options.
                      properties:
                        password:
                          type: string
                          description: Pre-shared key / passphrase.
                          example: MyP@ssword
                    WPA3Personal:
                      type: object
                      description: WPA3 Personal (SAE) security options.
                      properties:
                        password:
                          type: string
                          description: Pre-shared key / passphrase.
                          example: MyP@ssword
                    WPA2Enterprise:
                      type: object
                      description: WPA2 Enterprise security options.
                      properties:
                        authentication:
                          type: string
                          description: 'EAP authentication method: TLS, TTLS, or PEAP.'
                          enum:
                          - TLS
                          - TTLS
                          - PEAP
                          example: TLS
                        innerAuthentication:
                          type: string
                          description: 'Inner authentication method (for TTLS/PEAP): TLS or MSCHAPv2.'
                          enum:
                          - TLS
                          - MSCHAPv2
                          example: MSCHAPv2
                        username:
                          type: string
                          description: Username (for TTLS/PEAP with MSCHAPv2).
                        password:
                          type: string
                          description: Password (for TTLS/PEAP with MSCHAPv2).
                        certificate:
                          type: string
                          description: Client certificate name (for TLS-based methods).
                    WPA3Enterprise:
                      type: object
                      description: WPA3 Enterprise security options.
                      properties:
                        authentication:
                          type: string
                          description: 'EAP authentication method: TLS, TTLS, or PEAP.'
                          enum:
                          - TLS
                          - TTLS
                          - PEAP
                          example: TLS
                        innerAuthentication:
                          type: string
                          description: 'Inner authentication method (for TTLS/PEAP): TLS or MSCHAPv2.'
                          enum:
                          - TLS
                          - MSCHAPv2
                          example: MSCHAPv2
                        username:
                          type: string
                          description: Username (for TTLS/PEAP with MSCHAPv2).
                        password:
                          type: string
                          description: Password (for TTLS/PEAP with MSCHAPv2).
                        certificate:
                          type: string
                          description: Client certificate name (for TLS-based methods).
                enable:
                  type: boolean
                  description: Enable/disable the WiFi station interface.
                  example: true
        bnep0:
          type: object
          description: Bluetooth PAN interface configuration.
          required:
          - dhcpStartAddress
          - dhcpEndAddress
          - discoverable
          - pairable
          - passKey
          - usePassKey
          - enable
          properties:
            dhcpStartAddress:
              type: string
              description: Start of the DHCP address range served to connected Bluetooth clients.
              example: 192.168.0.2
            dhcpEndAddress:
              type: string
              description: End of the DHCP address range served to connected Bluetooth clients.
              example: 192.168.0.10
            discoverable:
              type: boolean
              description: Enable/disable Bluetooth discoverable mode.
              example: true
            pairable:
              type: boolean
              description: Enable/disable Bluetooth pairable mode (accepting new pairing requests).
              example: true
            passKey:
              type: string
              description: Bluetooth pairing passkey.
              example: '1234'
            usePassKey:
              type: boolean
              description: Enable/disable the use of a Bluetooth pairing passkey.
              example: false
            enable:
              type: boolean
              description: Enable/disable the Bluetooth interface.
              example: true
        wan0:
          type: object
          description: WAN / cellular interface configuration.
          required:
          - activeSim
          - enable
          properties:
            activeSim:
              type: string
              description: Active SIM slot to configure.
              enum:
              - psim
              - esim
              example: psim
            psim:
              type: object
              description: Physical SIM settings. Required when `activeSim` is `psim`.
              properties:
                apn:
                  type: string
                  description: Access Point Name.
                  example: internet
                preferredNetworkType:
                  type: string
                  description: Preferred cellular network type.
                  example: AUTO
                enableIPv6:
                  type: boolean
                  description: Enable/disable IPv6.
                  example: true
            esim:
              type: object
              description: Embedded SIM settings. Required when `activeSim` is `esim`.
              properties:
                apn:
                  type: string
                  description: Access Point Name.
                preferredNetworkType:
                  type: string
                  description: Preferred cellular network type.
                enableIPv6:
                  type: boolean
                  description: Enable/disable IPv6.
            enable:
              type: boolean
              example: true
        uap0:
          type: object
          description: WiFi Hotspot (Access Point) interface configuration.
          required:
          - ssid
          - ssidPassword
          - isHidden
          - securityType
          - enable
          properties:
            ssid:
              type: string
              description: Hotspot SSID name.
              example: FXR90Hotspot
            ssidPassword:
              type: string
              description: Hotspot password.
              example: MyP@ssword
            isHidden:
              type: boolean
              description: Set to true to hide the SSID from broadcast.
              example: false
            securityType:
              type: string
              description: Security protocol for the hotspot.
              enum:
              - WPA2Personal
              - WPA3Personal
              example: WPA3Personal
            countryCode:
              type: string
              description: Two-letter ISO 3166-1 country code for regulatory compliance.
              example: US
            enable:
              type: boolean
              example: true
    UpdateNetworkResponse:
      type: string
      description: Returns an empty string on success.
      example: ''
    GetAvailablewifinetworksResponse:
      type: object
      description: Available Wi-Fi networks discovered by the reader.
      properties:
        availableWifiNetworks:
          type: array
          description: List of detected Wi-Fi access points.
          items:
            type: object
            properties:
              capabilities:
                type: array
                description: Security capabilities advertised by the access point.
                items:
                  type: string
              configuration:
                type: object
                description: Reader-side connection settings associated with the access point.
                properties:
                  autoConnect:
                    type: boolean
                    description: Whether the reader is configured to auto-connect to this network.
                  security:
                    type: object
                    description: Optional security metadata for the access point.
                    properties:
                      type:
                        type: string
                        description: Security mode name reported for the access point.
                      details:
                        type: object
                        description: Optional security details for enterprise authentication.
                        properties:
                          auth:
                            type: string
                            description: Authentication method.
                          innerAuth:
                            type: string
                            description: Inner authentication method.
                          username:
                            type: string
                            description: Username configured for enterprise authentication.
                          password:
                            type: string
                            description: Password configured for enterprise authentication.
                          cert:
                            type: string
                            description: Certificate configured for enterprise authentication.
                required:
                - autoConnect
              essid:
                type: string
                description: SSID broadcast name of the Wi-Fi network.
              signalStrength:
                type: string
                description: Signal strength reported for the Wi-Fi network.
            required:
            - capabilities
            - configuration
            - essid
            - signalStrength
      required:
      - availableWifiNetworks
    GetNetworkinterfacesResponse:
      type: object
      description: Network interface names currently available on the reader.
      properties:
        availableNetworkInterfaces:
          type: array
          description: List of network interface identifiers reported by the reader.
          minItems: 0
          uniqueItems: true
          default: []
          items:
            type: string
      required:
      - availableNetworkInterfaces
    GetReadpointsResponse:
      type: array
      items:
        type: string
    GetGpsCoordinatesResponse:
      type: object
      properties:
        lastReportedTime:
          type: string
          example: '1712141936'
        latitude:
          type: string
          example: '12.970366417'
        longitude:
          type: string
          example: '77.710113533'
        satellitesUsed:
          type: integer
          example: 0
    GetEsimConfigResponse:
      type: object
      properties:
        eid:
          type: string
          example: '89049032000001000000177590519095'
        imei:
          type: string
          example: '352087750009095'
        profiles:
          type: array
          items:
            type: object
            properties:
              enabled:
                type: boolean
                description: Whether this profile is currently active.
                example: true
              iccid:
                type: string
                description: Integrated Circuit Card Identifier for the profile.
                example: 8944500411193057192F
              profileNickName:
                type: string
                description: Human-readable nickname assigned to this eSIM profile.
                example: gnd1
              provider:
                type: string
                description: Name of the mobile network provider.
                example: Global1
    SetEsimConfigRequest:
      type: object
      properties:
        operation:
          type: string
          description: eSIM profile operation to perform.
          enum:
          - enable
          - disable
          example: enable
        profileNickName:
          type: string
          description: Nickname of the eSIM profile to apply the operation to.
          example: gnd1
    SetEsimConfigResponse:
      type: string
      description: Returns an empty string on success.
      example: ''
    SetOsRequest:
      type: object
      required:
      - url
      - authenticationType
      properties:
        authenticationType:
          type: string
          description: Authentication method to use when downloading the OS image.
          enum:
          - NONE
          - BASIC
          example: NONE
        options:
          type: object
          description: Credentials object used when `authenticationType` is `BASIC`.
          required:
          - username
          - password
          properties:
            username:
              type: string
              description: Username for BASIC authentication.
              example: test
            password:
              type: string
              description: Password for BASIC authentication.
              example: XXXX
        url:
          type: string
          description: URL to the OS image or update bundle.
          example: http://10.17.231.168:8003/3_20_4
        verifyPeer:
          type: boolean
          description: Verify the server TLS peer certificate. Defaults to true when omitted.
        verifyHost:
          type: boolean
          description: Verify the server hostname in the TLS certificate. Defaults to true when omitted.
        CACertificateFileLocation:
          type: string
          description: Path on the device to a CA certificate file to trust for TLS.
        CACertificateFileContent:
          type: string
          description: PEM-encoded CA certificate content; written to a temporary file when provided.
        publicKeyFileLocation:
          type: string
          description: Path to a public key / certificate file to use for client TLS authentication.
        publicKeyFileContent:
          type: string
          description: PEM-encoded public key / certificate content.
        privateKeyFileLocation:
          type: string
          description: Path to a private key file to use for client TLS authentication.
        privateKeyFileContent:
          type: string
          description: PEM-encoded private key content.
        installedCertificateType:
          type: string
          description: Use an installed certificate by specifying its type.
        installedCertificateName:
          type: string
