  /cloud/networkInterfaces:
    get:
      tags:
      - Network
      summary: Retrieves network interfaces
      description: |-
        ## 1. Description

        The `GET /cloud/networkInterfaces` REST endpoint retrieves the list of network interfaces available on the reader.

        This endpoint returns:

        - The list of available network interface names, returned in `availableNetworkInterfaces` (e.g., `eth0`, `mlan0`, `wan0`, `bnep0`, `uap0`)

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Network Interface Query |
        | REST Endpoint | `GET /cloud/networkInterfaces` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve available network interface names |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/networkInterfaces` to:

        - Identify which network interfaces are present before configuring them via `PUT /cloud/network`
        - Confirm Ethernet, Wi-Fi, Bluetooth, or cellular interface availability on this reader model
        - Use returned interface names as valid keys in subsequent network configuration calls

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `availableNetworkInterfaces` | Are all expected interfaces present (`eth0`, `mlan0`, `wan0`)? | Only interfaces returned here can be configured in `PUT /cloud/network`. |
        | `wan0` presence | Is the cellular interface listed? | Confirms whether the reader hardware supports cellular connectivity. |
      operationId: getNetworkinterfaces
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNetworkinterfacesResponse'
              examples:
                application/json:
                  value:
                    availableNetworkInterfaces:
                    - eth0
                    - mlan0
                    - bnep0
                    - wan0
      security:
      - bearerAuth: []
  /cloud/readPoints:
    get:
      tags:
      - Network
      summary: Gets the read points on the reader
      description: |-
        ## 1. Description

        The `GET /cloud/readPoints` REST endpoint retrieves the read points available on the reader.

        This endpoint returns:

        - The list of read-point identifiers available on this reader

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Read Point Query |
        | REST Endpoint | `GET /cloud/readPoints` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve available reader read points |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/readPoints` to:

        - Identify available read-point identifiers before configuring cable loss compensation
        - Map physical read points before configuring inventory behavior in `PUT /cloud/mode`
        - Verify read-point availability before referencing them in antenna configuration

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | Read-point list | How many read points are returned? | Determines how many antenna ports are physically available for use. |
        | Read-point IDs | Do the returned IDs match expected port numbering? | Read-point identifiers must match exactly when used in `PUT /cloud/cableLossCompensation` or `PUT /cloud/mode`. |
      operationId: getReadpoints
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReadpointsResponse'
              example:
              - '1'
              - '2'
              - '3'
              - '4'
              - '5'
              - '6'
      security:
      - bearerAuth: []
  /cloud/readerLocation:
    get:
      tags:
      - Network
      summary: Gets the GPS coordinates (lat/long)
      description: |-
        ## 1. Description

        The `GET /cloud/readerLocation` REST endpoint retrieves the reader's last reported GPS coordinates.

        This endpoint returns:

        - Latitude and longitude values
        - The number of satellites used for the last fix
        - The time the location was last reported (`lastReportedTime`)

        No request body is required. The returned values represent the most recent location data known to the reader.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | GPS Coordinates Query |
        | REST Endpoint | `GET /cloud/readerLocation` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve the reader's last known GPS coordinates |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/readerLocation` to:

        - Record reader location for asset tracking or fleet management
        - Confirm GPS or location availability on a deployed reader
        - Feed location data into site, inventory, or logistics systems

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `latitude` | Is a valid latitude value returned? | A null or zero value may indicate the reader does not have a GPS fix yet. |
        | `longitude` | Is a valid longitude value returned? | Combined with latitude, this identifies the reader's physical position. |
        | `satellitesUsed` | How many satellites produced the fix? | A low satellite count indicates a weak fix and less reliable coordinates. |
        | `lastReportedTime` | When was the location last reported? | Indicates how recent the coordinates are; a stale timestamp means the position may be outdated. |
      operationId: getGpsCoordinates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetGpsCoordinatesResponse'
      security:
      - bearerAuth: []
  /cloud/eSimConfig:
    get:
      tags:
      - Network
      summary: Gets the eSIM configuration
      description: |-
        ## 1. Description

        The `GET /cloud/eSimConfig` REST endpoint retrieves eSIM identity and profile information from the reader.

        This endpoint returns:

        - The reader EID (eSIM identifier) and IMEI
        - Installed eSIM profiles, including nickname (`profileNickName`), provider, ICCID (`iccid`), and activation state (`enabled`)

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | eSIM Configuration Query |
        | REST Endpoint | `GET /cloud/eSimConfig` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve eSIM identity and installed profile details |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/eSimConfig` to:

        - Audit cellular or eSIM provisioning status on the reader
        - Check the EID and IMEI values for SIM registration or support cases
        - Review installed eSIM profiles before enabling or switching a profile with `PUT /cloud/eSimConfig`

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `eid` | Is the EID correct for this SIM profile? | The EID uniquely identifies the eSIM hardware and is required for carrier provisioning. |
        | `imei` | Is the IMEI registered with the carrier? | An unregistered IMEI cannot establish a cellular data connection. |
        | `profiles` | Which profiles are installed and which is active? | Only one profile can be active at a time; use this to confirm the correct carrier profile is enabled. |
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetEsimConfigResponse'
      security:
      - bearerAuth: []
      operationId: getEsimConfig
    put:
      tags:
      - Network
      summary: Sets the eSIM configuration
      description: |-
        ## 1. Description

        The `PUT /cloud/eSimConfig` REST endpoint updates the eSIM profile state on the reader.

        This endpoint allows you to configure:

        - The eSIM operation to perform through `operation`
        - The target profile nickname through `profileNickName`

        Use this endpoint to:

        - Enable a specific eSIM carrier profile on the reader
        - Switch between installed eSIM profiles for different cellular network providers
        - Apply eSIM provisioning changes from your carrier management system

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | eSIM Configuration |
        | REST Endpoint | `PUT /cloud/eSimConfig` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Supported Operations | `enable`, `disable` |

        ## 3. Before You Begin

        Use `GET /cloud/eSimConfig` first to retrieve the exact profile nickname available on the reader before sending this request.

        | What You Need | Details |
        |---|---|
        | Operation | The eSIM operation to perform: `enable` to activate the selected profile, or `disable` to deactivate it. |
        | Profile nickname | The exact nickname of the eSIM profile to enable, as returned by `GET /cloud/eSimConfig`. The nickname must match exactly - case-sensitive. |
        | Active SIM setting | After enabling an eSIM profile, confirm the `wan0.activeSim` is set to `esim` in the network configuration (see `PUT /cloud/network`) for the profile to be used for data. |
      operationId: setEsimConfig
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetEsimConfigRequest'
            examples:
              set_eSimConfig:
                value:
                  operation: enable
                  profileNickName: gnd1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetEsimConfigResponse'
      security:
      - bearerAuth: []
  /cloud/os:
    put:
      tags:
      - Firmware
      summary: Updates OS software on device
      description: |-
        ## 1. Description

        The `PUT /cloud/os` REST endpoint updates the reader's operating system firmware by downloading and installing a build from a URL.

        This endpoint allows you to configure:

        - The firmware download URL through `url`
        - The download authentication method through `authenticationType`
        - Download credentials through `options`
        - Optional custom HTTP headers through `headers`

        Use this endpoint to:

        - Upgrade the reader to a newer OS build
        - Deploy firmware from an internal HTTP(S) artifact repository
        - Perform a scheduled firmware update across a fleet of readers

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | OS Firmware Update |
        | REST Endpoint | `PUT /cloud/os` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Required Request Fields | `url`, `authenticationType` |
        | Supported Authentication Types | `NONE`, `BASIC` |

        ## 3. Before You Begin

        Gather all firmware download details before sending this request. A failed OS update can take the reader offline - plan for maintenance downtime and ensure the firmware URL is reachable from the reader's network before proceeding.

        | What You Need | Details |
        |---|---|
        | Firmware URL | The HTTP(S) URL of the firmware directory. The reader fetches a file list from this URL, then downloads the appropriate build. |
        | Authentication type | `NONE` if no download credentials are required, or `BASIC` for username/password HTTP authentication. |
        | Download credentials | Required when `authenticationType` is `BASIC`. Provide `options.username` and `options.password`. |
        | JWT bearer token | Optional - supply a JWT in `headers.Authorization` for token-based authentication, regardless of `authenticationType`. |
        | Network reachability | The reader must be able to reach the firmware URL on the network. Confirm firewall rules allow HTTP(S) outbound on the port used by the firmware server. |
        | Current firmware version | Use `GET /cloud/version` to confirm the reader's current build before initiating an update. |
        | Rollback plan | If the update fails, use `PUT /cloud/revertbackOS` to return to the previous OS version. |
      operationId: setOs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetOsRequest'
            examples:
              set_os:
                value:
                  url: https://10.117.229.9:9093/BUILDS/FXR90_2.0.10.tar.bz2
                  authenticationType: NONE
                  options:
                    username: test
                    password: test
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetOsResponse'
      security:
      - bearerAuth: []
  /cloud/revertbackOS:
    put:
      tags:
      - Firmware
      summary: Revert to previous OS version
      description: |-
        ## 1. Description

        The `PUT /cloud/revertbackOS` REST endpoint reverts the reader firmware to the previous OS version on the secondary partition.

        Use this endpoint to:

        - Roll back after a failed or unwanted `PUT /cloud/os` upgrade
        - Restore the last known-good firmware
        - Recover from compatibility issues with a new OS build

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Firmware Rollback |
        | REST Endpoint | `PUT /cloud/revertbackOS` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Request Body | None |

        ## 3. Before You Begin

        Plan for downtime — the reader reboots to the secondary partition to activate the previous firmware.

        | What You Need | Details |
        |---|---|
        | Current firmware version | Use `GET /cloud/version` to confirm the current and previous OS builds before rolling back. |
        | Downtime window | The reader reboots to the secondary partition; allow time for the reboot and reconnect. |
      operationId: setRevertbackos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRevertbackosRequest'
            examples:
              set_revertbackOS:
                value: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetRevertbackosResponse'
      security:
      - bearerAuth: []
  /cloud/apps/install:
    put:
      tags:
      - userapp
      summary: Install user application
      description: |-
        ## 1. Description

        The `PUT /cloud/apps/install` REST endpoint installs a user application (`.deb` package) on the reader by downloading it from a file server.

        This endpoint allows you to configure:

        - The download source URL through `url`
        - The package filename through `filename`
        - The authentication method for the download server through `authenticationType`

        Use this endpoint to:

        - Deploy custom on-reader applications
        - Update user-app packages from a central repository
        - Extend reader functionality with Zebra-approved `.deb` packages

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | User Application Installation |
        | REST Endpoint | `PUT /cloud/apps/install` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Required Request Fields | `url`, `filename`, `authenticationType` |
        | Supported Authentication Types | `NONE`, `BASIC` |

        ## 3. Before You Begin

        Gather download server details before sending this request. The reader must be able to reach the URL from its network.

        | What You Need | Details |
        |---|---|
        | File server URL | The base URL hosting the `.deb` package (for example, HTTP, HTTPS, or SFTP), supplied through `url`. |
        | Filename | The exact `.deb` filename on the server, supplied through `filename`. |
        | Authentication type | `NONE` if the download server requires no credentials, or `BASIC` for username/password authentication (`options.username`, `options.password`). |
        | TLS verification | Optional `verifyPeer` and `verifyHost` flags, plus an optional CA certificate path or inline content for HTTPS servers. |
      operationId: setInstalluserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetInstalluserappRequest'
            examples:
              set_installUserapp:
                value:
                  options:
                    password: L@bu$3rs
                    username: labuser
                  authenticationType: BASIC
                  filename: mylogger_1.0.1.deb
                  url: sftp://10.117.229.15/home/labuser/EV1/
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetInstalluserappResponse'
      security:
      - bearerAuth: []
  /cloud/apps/{appname}/start:
    put:
      tags:
      - userapp
      summary: Start user application
      description: |-
        ## 1. Description

        The `PUT /cloud/apps/{appname}/start` REST endpoint starts a user application installed on the reader. The application is identified by the `{appname}` path parameter.

        Use this endpoint to:

        - Launch an installed user app on demand
        - Restart an app after configuration changes
        - Bring application logic online after installing it with `PUT /cloud/apps/install`

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | User Application Control — Start |
        | REST Endpoint | `PUT /cloud/apps/{appname}/start` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Path Parameter | `appname` (the installed application to start) |
        | Request Body | None (the app name is supplied as the `{appname}` path parameter) |

        ## 3. Before You Begin

        Confirm the application is installed before starting it. Use `GET /cloud/apps` to verify the exact `appname` and its current running status.

        | What You Need | Details |
        |---|---|
        | Application name | The exact name of the installed application, supplied as the `{appname}` path parameter, as returned by `GET /cloud/apps`. |
        | Installation check | The application must already be installed via `PUT /cloud/apps/install` before it can be started. |
      operationId: setStartuserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetStartuserappRequest'
            examples:
              set_startUserapp:
                value:
                  appname: mylogger
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetStartuserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps/{appname}/stop:
    put:
      tags:
      - userapp
      summary: Stop user application
      description: |-
        ## 1. Description

        The `PUT /cloud/apps/{appname}/stop` REST endpoint stops a running user application on the reader. The application is identified by the `{appname}` path parameter.

        Use this endpoint to:

        - Halt a user app before uninstalling or updating
        - Free CPU/memory resources on the reader
        - Pause application logic during maintenance

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | User Application Control — Stop |
        | REST Endpoint | `PUT /cloud/apps/{appname}/stop` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Path Parameter | `appname` (the running application to stop) |
        | Request Body | None (the app name is supplied as the `{appname}` path parameter) |

        ## 3. Before You Begin

        Confirm the application is running before stopping it. Use `GET /cloud/apps` to verify the exact `appname` and its current running status.

        | What You Need | Details |
        |---|---|
        | Application name | The exact name of the running application, supplied as the `{appname}` path parameter, as returned by `GET /cloud/apps`. |
      operationId: setStopuserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetStopuserappRequest'
            examples:
              set_stopUserapp:
                value:
                  appname: mylogger
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetStopuserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps/{appname}/autostart:
    put:
      tags:
      - userapp
      summary: Autostart user application
      description: |-
        ## 1. Description

        The `PUT /cloud/apps/{appname}/autostart` REST endpoint configures whether a user application starts automatically when the reader boots. The application is identified by the `{appname}` path parameter.

        This endpoint allows you to configure:

        - Whether the application starts automatically on boot through `autostart`

        Use this endpoint to:

        - Enable autostart for production user apps
        - Disable autostart for test or manual-only apps
        - Standardize boot behavior across a fleet

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | User Application Autostart Configuration |
        | REST Endpoint | `PUT /cloud/apps/{appname}/autostart` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Path Parameter | `appname` (the application to configure) |
        | Required Request Fields | `autostart` |

        ## 3. Before You Begin

        Decide the desired boot behavior before sending this request.

        | What You Need | Details |
        |---|---|
        | Application name | The exact `appname`, supplied as the `{appname}` path parameter, as returned by `GET /cloud/apps`. |
        | Autostart flag | `autostart` (boolean): `true` to start the app automatically on boot, or `false` to disable autostart. |
      operationId: setAutostartuserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAutostartuserappRequest'
            examples:
              set_autostartUserapp:
                value:
                  appname: mylogger
                  autostart: true
              set_autostartUserapp-false:
                value:
                  appname: mylogger
                  autostart: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetAutostartuserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps:
    get:
      tags:
      - userapp
      summary: List user applications
      description: |-
        ## 1. Description

        The `GET /cloud/apps` REST endpoint retrieves the list of user applications installed on the reader.

        This endpoint returns:

        - An array of installed user apps, each with `appname`, `autostart`, `runningStatus`, and `metadata`

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | User Application Inventory Query |
        | REST Endpoint | `GET /cloud/apps` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve the list of installed user applications |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/apps` to:

        - Confirm which user apps are installed before issuing start, stop, or uninstall requests
        - Check whether a user app is currently running
        - Verify autostart configuration per installed app
        - Audit deployed applications across a fleet of readers

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `appname` | Is the expected app present? | Confirms successful installation before attempting to start or configure the app. |
        | `runningStatus` | Is the app currently running? | Required before sending a stop request; also confirms a successful start. |
        | `autostart` | Is autostart enabled? | Determines whether the app will resume automatically after a reboot. |
      operationId: getUserapps
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserappsResponse'
              example:
              - appname: mylogger
                runningStatus: true
                autostart: false
                metadata: 'APP_TYPE: DA'
              - appname: sample
                runningStatus: false
                autostart: true
                metadata: 'APP_TYPE: NORMAL'
      security:
      - bearerAuth: []
  /cloud/setdataToRG:
    put:
      tags:
      - userapp
      summary: Set Data to RG
      description: |-
        ## 1. Description

        The `PUT /cloud/setdataToRG` REST endpoint triggers the reader gateway to process and deliver any buffered tag data.

        This is a **trigger-only** call — you do not upload tag data in the request. The reader flushes data that is already buffered on the device. No request body is required.

        Use this endpoint to:

        - Manually trigger reader gateway data delivery when automatic forwarding is not active
        - Flush buffered tag events through the reader gateway pipeline

        ## 2. Before You Begin

        Confirm that the reader gateway is configured and active before calling this endpoint. If no data is buffered or the gateway is not configured, the call may succeed but have no effect.

        | What You Need | Details |
        |---|---|
        | Reader gateway | Valid endpoint settings (see `GET /cloud/config`) |
        | Buffered data | Tag events waiting for delivery |

        ## 3. Endpoint Details

        | Property | Value |
        |---|---|
        | REST Endpoint | `PUT /cloud/setdataToRG` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Request body | None |
      operationId: setDataToRG
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDataToRGRequest'
            examples:
              set_dataToRG:
                value: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetDataToRGResponse'
      security:
      - bearerAuth: []
  /cloud/apps/{appname}/pass-through:
    put:
      tags:
      - userapp
      summary: Send Request to Userapp
      description: |-
        ## 1. Description

        The `PUT /cloud/apps/{appname}/pass-through` REST endpoint sends a custom request or data payload to a user application running on the reader. The application is identified by the `{appname}` path parameter.

        This endpoint allows you to configure:

        - The command or data payload to deliver through `command`

        Use this endpoint to:

        - Invoke custom logic in an installed user application
        - Pass structured data or control commands to the application layer
        - Integrate third-party processing running directly on the reader

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | User Application Request |
        | REST Endpoint | `PUT /cloud/apps/{appname}/pass-through` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Path Parameter | `appname` (the target application) |
        | Required Request Fields | `command` |

        ## 3. Before You Begin

        Confirm the target user application is installed and running before sending this request. A request to a stopped or missing application will fail.

        | What You Need | Details |
        |---|---|
        | Application name | The exact `appname`, supplied as the `{appname}` path parameter, as returned by `GET /cloud/apps`. |
        | Command or data | The `command` object to pass to the user application (for example, `command.message`). The expected structure is defined by the user application, not by the reader API. |
        | Application state | Use `GET /cloud/apps` to confirm the target application is running (`runningStatus: true`) before sending. A stopped application may not be able to process the request. |
      operationId: setReqtouserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetReqtouserappRequest'
            examples:
              set_reqToUserapp:
                value:
                  command:
                    message: Hello World!!!
                  userapp: mylogger
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetReqtouserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps/{appname}/uninstall:
    put:
      tags:
      - userapp
      summary: Uninstall User Application
      description: |-
        ## 1. Description

        The `PUT /cloud/apps/{appname}/uninstall` REST endpoint removes a user application from the reader. The application is identified by the `{appname}` path parameter.

        Use this endpoint to:

        - Remove a decommissioned user application
        - Free storage before installing a replacement
        - Clean up test or development packages

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | User Application Removal |
        | REST Endpoint | `PUT /cloud/apps/{appname}/uninstall` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Path Parameter | `appname` (the application to uninstall) |
        | Request Body | None (the app name is supplied as the `{appname}` path parameter) |

        ## 3. Before You Begin

        Stop the app with `PUT /cloud/apps/{appname}/stop` before uninstalling if it is currently running.

        | What You Need | Details |
        |---|---|
        | Application name | The exact `appname` from `GET /cloud/apps`, supplied as the `{appname}` path parameter. |
      operationId: setUninstalluserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUninstalluserappRequest'
            examples:
              set_uninstallUserapp:
                value:
                  appname: mylogger
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetUninstalluserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/hostName:
    get:
      tags:
      - Network
      summary: Retrieves reader hostname
      description: |-
        ## 1. Description

        The `GET /cloud/hostName` REST endpoint retrieves the reader's currently configured network hostname.

        This endpoint returns:

        - The hostname string currently assigned to the reader

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Hostname Query |
        | REST Endpoint | `GET /cloud/hostName` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve the configured reader hostname |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/hostName` to:

        - Verify the hostname assigned to a reader during provisioning
        - Confirm the hostname matches the expected naming convention for the deployment
        - Retrieve the current hostname before changing it with `PUT /cloud/hostName`
        - Verify the result of a prior `PUT /cloud/hostName` call

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `hostName` | Does it match the expected naming convention? | The hostname identifies the reader on the local network and in management systems; a mismatch may indicate the wrong reader was configured. |
      operationId: getHostName
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetHostNameResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Network
      summary: Sets reader hostname
      description: |-
        ## 1. Description

        The `PUT /cloud/hostName` REST endpoint sets the network hostname of the reader.

        This endpoint allows you to configure:

        - The reader's network hostname through `hostname`

        Use this endpoint to:

        - Assign a recognizable hostname for network identification during provisioning
        - Standardize hostname naming conventions across a fleet
        - Update the hostname after a reader is relocated or re-provisioned

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Hostname Configuration |
        | REST Endpoint | `PUT /cloud/hostName` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Required Request Fields | `hostname` |

        ## 3. Before You Begin

        Have the desired hostname ready before sending this request. Duplicate hostnames on the same network can cause resolution conflicts.

        | What You Need | Details |
        |---|---|
        | Hostname string | The desired hostname (request body key: `hostname`). Must be a valid RFC 1123 hostname - lowercase alphanumeric characters and hyphens only; no underscores or spaces. |
        | Network uniqueness | Verify the chosen hostname is not already in use on the network segment to avoid DNS or mDNS conflicts. |
      operationId: setHostName
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetHostNameRequest'
            examples:
              set_hostName:
                value:
                  hostname: FXR90C60C001
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetHostNameResponse'
      security:
      - bearerAuth: []
  /cloud/impinjGen2X:
    get:
      tags:
      - ImpinjGen2X
      summary: Get Impinj Gen2X configuration
      description: |-
        ## 1. Description

        The `GET /cloud/impinjGen2X` REST endpoint retrieves the Impinj Gen2X configuration currently saved on the reader.

        This endpoint returns:

        - Whether FastID, TagFocus, TagProtect, or TagQuieting is configured
        - The parameters for each enabled Gen2X feature

        No request body is required. If no Gen2X configuration has been saved, the response payload will be an empty object.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Impinj Gen2X Configuration Query |
        | REST Endpoint | `GET /cloud/impinjGen2X` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Supported Operations | Retrieve saved Impinj Gen2X configuration |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/impinjGen2X` to:

        - Check whether FastID, TagProtect, TagFocus, or TagQuieting has been configured
        - Review Gen2X settings before applying them with a `PUT /cloud/start` call
        - Confirm the effect of a prior `PUT /cloud/impinjGen2X` call

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `fastID` | Is FastID enabled? | FastID embeds the TID in the singulation response, enabling faster tag identification without a separate read. |
        | `tagFocus` | Is TagFocus configured? | TagFocus reduces re-reading of already-singulated tags in dense tag populations. |
        | `tagQuieting` | Is TagQuieting set? | TagQuieting suppresses repeated reads of the same tag EPC within a session. |
        | `tagProtect` | Is TagProtect active? | TagProtect applies Impinj proprietary tag locking features for secure deployments. |
      operationId: getImpinjGen2X
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetImpinjGen2XResponse'
              examples:
                empty:
                  value: {}
                fastID_configured:
                  value:
                    fastID:
                      enabled: true
                tagFocus_configured:
                  value:
                    tagFocus:
                      enabled: true
                tagProtect_configured:
                  value:
                    tagProtect:
                      action: enableTagProtection
                      password: '77777777'
                      tagID: e2801191a5030069073b426d
                      enableShortRange: true
                tagQuieting_basic_configured:
                  value:
                    tagQuieting:
                      basic:
                        action: quiet
                        tagIDs:
                        - e2801191a5030069073b426d
                tagQuieting_advanced_configured:
                  value:
                    tagQuieting:
                      advanced:
                        tagQuietMasks:
                        - S0A
                        - S2A
                        target: SL
                        stateAwareAction: ASSERTSL
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetImpinjGen2XResponse500'
      security:
      - bearerAuth: []
    put:
      tags:
      - ImpinjGen2X
      summary: Set Impinj Gen2X configuration
      description: |-
        ## 1. Description

        The `PUT /cloud/impinjGen2X` REST endpoint configures Impinj Gen2X proprietary RFID features on the reader.

        This endpoint allows you to configure:

        - FastID tag TID embedding through `fastID`
        - Tag protection and visibility control through `tagProtect`
        - TagFocus session suppression through `tagFocus`
        - Tag quieting (basic or advanced) through `tagQuieting`

        Use this endpoint to:

        - Enable FastID to embed the TID in every inventory response without a separate read
        - Protect specific tags with a 32-bit password to prevent unauthorized reads
        - Enable TagFocus to improve read rates in dense tag environments by suppressing already-inventoried tags
        - Quiet specific tags (by EPC) to exclude them from inventory responses

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | Impinj Gen2X Configuration |
        | REST Endpoint | `PUT /cloud/impinjGen2X` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Success Response | `200 OK` |
        | Error Responses | `422 Unprocessable Entity`, `500 Internal Server Error` |
        | Supported Features | `fastID`, `tagProtect`, `tagFocus`, `tagQuieting` |
        | Supported TagProtect Actions | `enableTagProtection`, `disableTagProtection`, `enableTagVisibility`, `disableTagVisibility` |
        | Supported TagQuieting Modes | `basic` (quiet/unquiet by EPC list), `advanced` (pre-select with mask) |
        | Supported TagQuieting Basic Actions | `quiet`, `unquiet` |
        | Supported Gen2 Memory Banks | EPC, TID, USER, RESERVED |
        | Supported Select Targets | S0, S1, S2, S3, SL |
        | Supported Tag Quiet Masks | S0A, S0B, S1A, S1B, S2A, S2B, S3A, S3B, SL_ASSERT, SL_DEASSERT |
        | Mutually Exclusive Features | `fastID`, `tagFocus`, `tagQuieting` (only one reader-scoped feature active at a time) |

        ## 3. Before You Begin

        Decide which Gen2X feature to configure before sending this request. At least one feature object must be included in the request body, but mutually exclusive reader-scoped features cannot be combined in a single request. To apply the saved Gen2X configuration during inventory, send `PUT /cloud/start` with `applyImpinjGen2X: true`.

        | What You Need | Details |
        |---|---|
        | Feature selection | At least one of `fastID`, `tagProtect`, `tagFocus`, or `tagQuieting` must be present - an empty request body will be rejected. Choose only one reader-scoped feature (`fastID`, `tagFocus`, or `tagQuieting`) per request; `tagProtect` is tag-scoped and can be configured independently. |
        | FastID | Decide whether to enable or disable TID embedding. Optionally specify a TID word selector (`TID[0]`-`TID[3]`). |
        | TagProtect action | Choose one of: `enableTagProtection` (protect a specific tag), `disableTagProtection` (remove protection from a tag), `enableTagVisibility` (allow reading protected tags), `disableTagVisibility` (block reading protected tags). |
        | TagProtect password | An 8-character hex string (32-bit) is required for all TagProtect actions. |
        | TagProtect tag EPC | `tagID` (hex EPC) is required for `enableTagProtection` and `disableTagProtection`. It must be omitted for `enableTagVisibility` and `disableTagVisibility`. |
        | TagFocus | Whether to enable or disable the feature. TagFocus targets session S1. |
        | TagQuieting | For basic: provide `action` (`quiet`/`unquiet`) and the `tagIDs` EPC array (maximum 31 tag IDs per request). For advanced: provide the `preSelect` array, `tagQuietMasks`, `target`, and `stateAwareAction`. |
        | Inventory state | Configure Gen2X before starting inventory. Stop any active inventory first with `PUT /cloud/stop`. |
        | Activation | Gen2X settings are saved but not applied until `PUT /cloud/start` is sent with `applyImpinjGen2X: true`. |

        ## 4. Choosing a Gen2X Feature

        The Gen2X feature you select determines the reader's behavior during inventory. Choose based on your operational goal.

        | Feature | Description | Scope |
        |---|---|---|
        | `fastID` | Returns the EPC and TID together in a single read, eliminating the need for a separate TID read. Best for applications that require chip-level identity (anti-counterfeit, authentication). | Reader-scoped |
        | `tagProtect` | Password-protects individual tags or controls reader visibility of protected tags. Use for securing sensitive items or restricting access. | Tag-scoped |
        | `tagFocus` | Silences already-read tags so the reader focuses only on new tags entering the field. Ideal for portal and conveyor applications. | Reader-scoped |
        | `tagQuieting` (basic) | Silences a specific list of tag EPCs from being reported during inventory. Use when you know exactly which tags to suppress. | Reader-scoped |
        | `tagQuieting` (advanced) | Uses Gen2 select pre-conditions (mask + state-aware action) to silence tags based on memory content or session state. Use for complex filtering in dense environments. | Reader-scoped |

        > Mutually exclusive: Only one of `fastID`, `tagFocus`, or `tagQuieting` can be active at a time. `tagProtect` can coexist with any one of them because it operates at the tag level.

        ## 5. Choosing TagProtect Actions

        TagProtect operations either lock/unlock individual tags or temporarily allow the reader to see already-protected tags. Each action has specific field requirements.

        | Action | What It Does | Required Fields | Key Constraints |
        |---|---|---|---|
        | `enableTagProtection` | Permanently protects a tag; the tag becomes invisible to standard reads until unprotected. | `password`, `tagID` | `password` must be exactly 8 hex characters. Optional `enableShortRange` reduces read range during protection. |
        | `disableTagProtection` | Removes protection from a previously protected tag, restoring normal visibility. | `password`, `tagID` | `password` must match the tag's existing access password exactly. |
        | `enableTagVisibility` | Temporarily allows the reader to read protected tags during this session. Does not change the tag's protection state. | `password` | Reader-scoped; affects all protected tags in field. |
        | `disableTagVisibility` | Restores the default behavior where protected tags are hidden from the reader. | `password` | Reverts the effect of `enableTagVisibility`. |

        > Important: `enableTagProtection` and `disableTagProtection` are tag-specific (require `tagID`). `enableTagVisibility` and `disableTagVisibility` are reader-wide visibility toggles.

        ## 6. Choosing TagQuieting Strategy

        TagQuieting silences tags from being reported during inventory. Choose between **basic** (EPC-list based) and **advanced** (Gen2 select mask based) depending on your filtering complexity.

        ### Basic TagQuieting

        | Field | What It Controls |
        |---|---|
        | `action: quiet` | Silences the listed tags from being reported in future inventories. |
        | `action: unquiet` | Restores reporting for previously quieted tags. |
        | `tagIDs` | Array of EPCs (hex strings) to quiet or unquiet. Maximum **31 EPCs** per request. |

        ### Advanced TagQuieting

        Advanced quieting uses Gen2 select pre-conditions to silence tags based on memory content and state, instead of explicit EPC lists.

        | Field | What It Controls |
        |---|---|
        | `preSelect[]` | Array of Gen2 select operations applied **before** quieting. Each entry contains `target`, `action`, and `mask`. |
        | `preSelect[].target` | The session flag or SL to act upon (`S0`, `S1`, `S2`, `S3`, `SL`). |
        | `preSelect[].action` | The state-aware action to take on match/mismatch (e.g., `ASSERTSL_NOTHING`, `INVB_INVA`, `DEASSERTSL_NOTHING`, `INVA_INVB`). |
        | `preSelect[].mask` | The memory mask: `bank` (EPC/TID/USER/RESERVED), `pointer` (bit offset), `length` (bits), `value` (hex). |
        | `tagQuietMasks` | Array of session-flag combinations defining the quieted state (`S0A`, `S2B`, `SL_ASSERT`, `SL_DEASSERT`, etc.). |
        | `target` | The target session/flag used for the actual quieting operation. |
        | `stateAwareAction` | The compound state action (e.g., `ASSERTSL_DEASSERTSL`, `DEASSERTSL_ASSERTSL`) applied during quieting. |

        > Important: Use `basic` when you have a discrete list of EPCs. Use `advanced` when filtering by memory content, session state, or complex multi-step Gen2 select conditions.

        ## 7. Choosing FastID and TagFocus

        These two reader-scoped features improve inventory performance but cannot be combined.

        ### `fastID`

        | Field | What It Controls |
        |---|---|
        | `enabled: true` | Reader returns EPC + TID together in a single read, reducing total operations. |
        | `enabled: false` | Reverts to standard EPC-only reads. |

        **Use FastID when:** Your application needs TID for every tag (e.g., authentication, chip-level traceability) and you want to avoid the extra round-trip of a separate TID read.

        ### `tagFocus`

        | Field | What It Controls |
        |---|---|
        | `enabled: true` | Once a tag is read, it is silenced for the rest of the inventory cycle. The reader focuses only on new tags entering the field. |
        | `enabled: false` | Standard inventory behavior; tags can be reported multiple times. |

        **Use TagFocus when:** You operate portals, conveyors, or other scenarios with many duplicate reads of the same tag set and want unique-tag reporting.

        ## 8. Applying the Configuration

        Calling this endpoint only **saves** the configuration on the reader; it is not active until inventory is started with the activation flag.

        ### REST Workflow

        ```text
        PUT  /cloud/stop                 -> stop any active inventory
        PUT  /cloud/impinjGen2X          -> save the configuration
        GET  /cloud/impinjGen2X          -> verify the saved configuration
        PUT  /cloud/start                -> body: { "applyImpinjGen2X": true }
        ```

        ### Request Format

        Every request to this endpoint follows this structure:

        ```http
        PUT /cloud/impinjGen2X HTTP/1.1
        Host: <reader-address>
        Authorization: Bearer <token>
        Content-Type: application/json

        {
          // one or more Gen2X feature objects
        }
        ```

        ### Success Response (`200 OK`)

        ```http
        HTTP/1.1 200 OK
        Content-Type: application/json

        {
          "message": "Configuration saved successfully"
        }
        ```

        ### Error Responses

        | Status Code | Meaning | When It Occurs |
        |---|---|---|
        | `422 Unprocessable Entity` | Validation error | Empty body, mutually exclusive features sent together, invalid enum value, or constraint violation. |
        | `500 Internal Server Error` | Reader-side failure | Internal reader error while persisting the configuration. |

        > Persistence: The reader stores the last saved configuration and restores it across reboots and reconnects. The configuration is only applied during inventory when `applyImpinjGen2X: true` is sent in the `PUT /cloud/start` request body.
      operationId: setImpinjGen2X
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetImpinjGen2XRequest'
            examples:
              enable_fastID:
                value:
                  fastID:
                    enabled: true
              disable_fastID:
                value:
                  fastID:
                    enabled: false
              protect_tag:
                value:
                  tagProtect:
                    action: enableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
                    enableShortRange: true
              unprotect_tag:
                value:
                  tagProtect:
                    action: disableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
              enable_protect_read:
                value:
                  tagProtect:
                    action: enableTagVisibility
                    password: '77777777'
              disable_protect_read:
                value:
                  tagProtect:
                    action: disableTagVisibility
                    password: '77777777'
              enable_tagFocus:
                value:
                  tagFocus:
                    enabled: true
              disable_tagFocus:
                value:
                  tagFocus:
                    enabled: false
              quiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: quiet
                      tagIDs:
                      - e2801191a5030069073b426d
                      - e2801191a5030069073b426e
              unquiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: unquiet
                      tagIDs:
                      - e2801191a5030069073b426d
              advanced_quiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                      - target: SL
                        action: ASSERTSL_NOTHING
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280123456789012345678AB
                      - target: S2
                        action: INVB_INVA
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                      - SL_ASSERT
                      - S2B
                      target: SL
                      stateAwareAction: ASSERTSL_DEASSERTSL
              advanced_unquiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                      - target: SL
                        action: DEASSERTSL_NOTHING
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280123456789012345678AB
                      - target: S2
                        action: INVA_INVB
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                      - SL_DEASSERT
                      - S2A
                      target: SL
                      stateAwareAction: DEASSERTSL_ASSERTSL
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetImpinjGen2XResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetImpinjGen2XResponse422'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetImpinjGen2XResponse500'
      security:
      - bearerAuth: []
  /cloud/ble-config:
    put:
      tags:
      - Ble
      summary: Set BLE configuration
      description: |-
        ## 1. Description

        The `PUT /cloud/ble-config` REST endpoint configures the Bluetooth Low Energy (BLE) scanner on the reader.

        This endpoint allows you to configure:

        - BLE scanner enable or disable through `ble.enable`
        - Scan interval through `ble.scanIntervalSec`
        - Cross-protocol RSSI and service UUID filters through `ble.additionalFilters`
        - iBeacon filters through `ble.protocols.iBeacon`
        - AltBeacon filters through `ble.protocols.altBeacon`
        - Eddystone filters through `ble.protocols.eddystone`
        - Generic BLE device filters through `ble.protocols.generic`

        Use this endpoint to:

        - Activate or deactivate BLE scanning
        - Tune how frequently the reader collects BLE scan results
        - Filter out weak or irrelevant BLE advertisements using RSSI or service UUID
        - Capture only specific beacon types or devices from the BLE environment
        - Prepare BLE configuration before starting a combined RFID and BLE inventory

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | Pattern Name | BLE Configuration Update |
        | REST Endpoint | `PUT /cloud/ble-config` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |
        | Content-Type | `application/json` |
        | Required Request Fields | `ble.enable` |
        | Supported BLE Protocols | iBeacon, AltBeacon, Eddystone (`URL`, `UID`, `EID`, `TLM`), Generic |
        | Supported Address Types | `public`, `random` |
        | RSSI Filter Range | `-127` to `0` dBm |
        | Scan Interval Minimum | 1 second |

        ## 3. Before You Begin

        Decide which BLE behavior you need to configure before sending this request. A minimal request only needs `ble.enable`; additional fields refine which beacons are captured.

        | What You Need | Details |
        |---|---|
        | Enable decision | `ble.enable` is required in every request. Set to `true` to activate scanning, or `false` to disable it. |
        | Scan interval | How often the reader collects BLE scan results (`scanIntervalSec`). Minimum value is `1` second. Shorter intervals increase responsiveness; longer intervals reduce data volume. |
        | RSSI threshold | Set `additionalFilters.rssi` to drop weak advertisements. Range is `-127` to `0` dBm; values closer to zero indicate stronger signals. |
        | Service UUID filters | Prepare 16-bit (`serviceUuids16`) or 128-bit (`serviceUuids128`) UUID lists to filter by advertised services. |
        | iBeacon details | UUID, major, minor, and txPower values for each iBeacon filter entry. |
        | AltBeacon details | Manufacturer ID, beacon ID, major, minor, and refRssi for each AltBeacon filter entry. |
        | Eddystone frame type | Choose `URL`, `UID`, `EID`, or `TLM` and supply the corresponding fields (`url`, `namespace`/`instance`, `ephemeralId`). |
        | Generic BLE device | Bluetooth MAC address, address type (`public`/`random`), device name, or alias for each generic filter entry. |
        | Activation | Saving this configuration does not start BLE scanning. Send `PUT /cloud/start` with `scanType: ["ble"]` to begin scanning. |
      operationId: setBleConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetBleConfigRequest'
            examples:
              enable_ble:
                value:
                  ble:
                    enable: true
              enable_with_interval:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
              enable_with_rssi_filter:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 10
                    additionalFilters:
                      rssi: -70
              enable_with_protocols:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
                    protocols:
                      iBeacon:
                        enabled: true
                        filters:
                        - uuid: FDA50693-A4E2-4FB1-AFCF-C6EB07647825
                          major: 10001
                          minor: 20002
                          txPower: -59
                      altBeacon:
                        enabled: true
                        filters:
                        - mfgId: 0118
                          beaconId: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                          major: 4
                          minor: 4
                          refRssi: -100
                      eddystone:
                        enabled: true
                        filters:
                        - frameType: URL
                          txPower: -59
                          url: https://www.zebra.com
                        - frameType: UID
                          txPower: -18
                          namespace: 0102030405060708090A
                          instance: '000000000001'
                        - frameType: EID
                          txPower: -18
                          ephemeralId: 0102030405060708
                      generic:
                        enabled: true
                        filters:
                        - address: 7E:41:25:1E:D5:16
                          addressType: random
                          name: BLEPeripheralApp
                          alias: BLEPeripheralApp
                    additionalFilters:
                      rssi: -80
                      serviceUuids16:
                      - FEAA
                      - FE9B
                      serviceUuids128:
                      - FDA50693-A4E2-4FB1-AFCF-C6EB07647825
              disable_ble:
                value:
                  ble:
                    enable: false
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
    get:
      tags:
      - Ble
      summary: Get BLE configuration
      description: |-
        ## 1. Description

        The `GET /cloud/ble-config` REST endpoint retrieves the current Bluetooth Low Energy (BLE) scanner configuration from the reader.

        This endpoint returns:

        - Whether BLE scanning is enabled
        - Scan interval and window settings
        - RSSI filtering threshold
        - iBeacon, AltBeacon, Eddystone, and generic BLE advertisement filter settings

        No request body is required.

        ## 2. Endpoint Details

        | Property | Value |
        |---|---|
        | REST Endpoint | `GET /cloud/ble-config` |
        | Communication Type | Client to Device (HTTP request/response) |
        | Applies To | FXR90 |
        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        ## 3. When to Use This Endpoint

        Use `GET /cloud/ble-config` to:

        - Verify BLE scanning is enabled before starting a BLE inventory scan
        - Review scan interval and RSSI filter settings before modifying them
        - Confirm iBeacon, AltBeacon, Eddystone, or generic BLE filter configuration
        - Verify the effect of a prior `PUT /cloud/ble-config` call

        Key fields to check in the response:

        | Field | What to Check | Why It Matters |
        |---|---|---|
        | `ble.enable` | Is BLE scanning enabled? | BLE inventory will not start if scanning is disabled. |
        | `ble.scanIntervalSec` | What is the configured scan interval? | Determines how frequently the reader actively listens for BLE advertisements. |
        | `ble.additionalFilters.rssi` | What is the RSSI threshold? | Tags or beacons below this threshold are filtered out of scan results. |
        | Beacon type filters | Which beacon types are included? | Only enabled beacon types will appear in BLE tag data events. |
      operationId: getBleConfig
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBleConfigResponse'
              example:
                ble:
                  enable: true
                  scanIntervalSec: 5
                  protocols:
                    iBeacon:
                      enabled: true
                      filters:
                      - uuid: FDA50693-A4E2-4FB1-AFCF-C6EB07647825
                        major: 10001
                        minor: 20002
                        txPower: -59
                    altBeacon:
                      enabled: true
                      filters:
                      - mfgId: 0118
                        beaconId: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                        major: 4
                        minor: 4
                        refRssi: -100
                    eddystone:
                      enabled: true
                      filters:
                      - frameType: URL
                        txPower: -59
                        url: https://www.zebra.com
                      - frameType: UID
                        txPower: -18
                        namespace: 0102030405060708090A
                        instance: '000000000001'
                      - frameType: EID
                        txPower: -18
                        ephemeralId: 0102030405060708
                    generic:
                      enabled: true
                      filters:
                      - address: 7E:41:25:1E:D5:16
                        addressType: random
                        name: BLEPeripheralApp
                        alias: BLEPeripheralApp
                  additionalFilters:
                    rssi: -80
                    serviceUuids16:
                    - FEAA
                    - FE9B
                    serviceUuids128:
                    - FDA50693-A4E2-4FB1-AFCF-C6EB07647825
      security:
      - bearerAuth: []
