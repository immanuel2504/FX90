    ConnectionAdditionalOptions:
      type: object
      description: Per-connection data delivery options (batching, retention, data acknowledgement).
      properties:
        batching:
          description: Per-connection batching configuration. Set to null to use global batching settings. When provided as
            an object, overrides global batching for this connection only.
          oneOf:
          - type: 'null'
            description: Use global batching settings for this connection.
          - type: object
            description: Per-connection batching overriding global settings.
            properties:
              maxPayloadSizePerReport:
                type: integer
                description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                minimum: 0
                maximum: 256000
                example: 65536
              reportingInterval:
                type: integer
                description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
                minimum: 0
                maximum: 86400000
                example: 1000
          example: null
        retention:
          type: object
          description: Per-connection event retention configuration when the connection is offline.
          properties:
            maxEventRetentionTimeInMin:
              type: integer
              description: Maximum time in minutes to retain events when offline (0 - 10080). 0 or -1 retains events indefinitely
                until maxNumEvents is reached.
              minimum: 0
              maximum: 10080
              example: 500
            maxNumEvents:
              type: integer
              description: Maximum number of events to buffer when offline (0 - 150000).
              minimum: 0
              maximum: 150000
              example: 150000
            throttle:
              type: integer
              description: Rate limit in events/sec for replaying retained events after reconnect (0 - 1000). 0 means no throttling.
              minimum: 0
              maximum: 1000
              example: 500
        dataAck:
          type: object
          description: Data acknowledgement configuration. When enabled, the reader waits for an ACK from the cloud before
            marking events as delivered. Supported on MQTT-based connections only.
          properties:
            enable:
              type: boolean
              description: Enable data acknowledgement for this connection.
              example: true
            responseTopic:
              type: string
              description: MQTT topic on which the cloud sends acknowledgement messages back to the reader.
              example: /devices/reader1/ack
            correlationFieldName:
              type: string
              description: Name of the field in the event payload used to correlate ACK responses. Defaults to "correlationId".
              example: correlationId
