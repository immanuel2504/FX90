    GetImpinjGen2XResponse:
      type: object
      description: Current Impinj Gen2X feature configuration as last saved via set_impinjGen2X. Returns an empty object if
        no Gen2X configuration has been set yet. Only feature objects that were previously configured are included in the
        response.
      properties:
        fastID:
          type: object
          description: FastID configuration. Present only if fastID was previously configured.
          properties:
            enabled:
              type: boolean
              description: Whether FastID is enabled.
              example: true
          required:
          - enabled
        tagProtect:
          type: object
          description: TagProtect configuration. Present only if tagProtect was previously configured.
          properties:
            action:
              type: string
              description: Last configured protection action.
              enum:
              - enableTagProtection
              - disableTagProtection
              - enableTagVisibility
              - disableTagVisibility
              example: enableTagProtection
            password:
              type: string
              description: 8-character hexadecimal 32-bit password.
              minLength: 8
              maxLength: 8
              pattern: ^[0-9A-Fa-f]{8}$
              example: '77777777'
            tagID:
              type: string
              description: Hexadecimal tagID (EPC) of the target tag. Only present when action is enableTagProtection or disableTagProtection.
              pattern: ^[0-9A-Fa-f]+$
              example: e2801191a5030069073b426d
            enableShortRange:
              type: boolean
              description: Whether short-range protection mode is enabled.
              example: true
          required:
          - action
          - password
        tagFocus:
          type: object
          description: TagFocus configuration. Present only if tagFocus was previously configured.
          properties:
            enabled:
              type: boolean
              description: Whether TagFocus is enabled.
              example: true
          required:
          - enabled
        tagQuieting:
          $ref: '#/components/schemas/impinjTagQuieting.v1'
    GetImpinjGen2XResponse500:
      type: object
      properties:
        code:
          type: number
          example: 1
        message:
          type: string
          example: problem getting response for get_impinjGen2X
    SetImpinjGen2XRequest:
      type: object
      description: Configures Impinj Gen2X proprietary features. At least one feature object (fastID, tagProtect, tagFocus,
        or tagQuieting) must be provided.
      minProperties: 1
      properties:
        fastID:
          type: object
          description: Impinj FastID embeds the tag TID along with the EPC in every inventory response, eliminating the need
            for separate TID read operations and improving throughput.
          properties:
            enabled:
              type: boolean
              description: Enable or disable the FastID feature.
              example: true
          required:
          - enabled
        tagProtect:
          description: 'Impinj TagProtect prevents unauthorized cloning and reading of tags using a password-based protection
            mechanism. It is a feature that renders a tag invisible to an RFID reader. The tag becomes RF silent and does
            not respond to Gen2 commands unless the reader first provides the correct 32-bit password. The required fields
            depend on the action: tagID is required for enableTagProtection/disableTagProtection and must be omitted for enableTagVisibility/disableTagVisibility.'
          oneOf:
          - type: object
            title: Protect or Unprotect Tag
            description: Protect or unprotect a specific tag identified by its EPC.
            properties:
              action:
                type: string
                description: enableTagProtection sets a tag to protected mode; disableTagProtection removes protection from
                  a specific tag.
                enum:
                - enableTagProtection
                - disableTagProtection
                example: enableTagProtection
              password:
                type: string
                description: 8-character hexadecimal 32-bit password used for tag protection.
                minLength: 8
                maxLength: 8
                pattern: ^[0-9A-Fa-f]{8}$
                example: '77777777'
              tagID:
                type: string
                description: Hexadecimal tagID (EPC) of the target tag.
                pattern: ^[0-9A-Fa-f]+$
                example: e2801191a5030069073b426d
              enableShortRange:
                type: boolean
                description: Enables short-range protection mode for higher security.
                example: true
            required:
            - action
            - password
            - tagID
          - type: object
            title: Enable or Disable Protected Tag Reading
            description: Enable or disable the reader's ability to read protected tags.
            properties:
              action:
                type: string
                description: enableTagVisibility enables the reader to read protected tags; disableTagVisibility disables
                  reading of protected tags.
                enum:
                - enableTagVisibility
                - disableTagVisibility
                example: enableTagVisibility
              password:
                type: string
                description: 8-character hexadecimal 32-bit password used for tag protection.
                minLength: 8
                maxLength: 8
                pattern: ^[0-9A-Fa-f]{8}$
                example: '77777777'
              enableShortRange:
                type: boolean
                description: Enables short-range protection mode for higher security.
                example: false
            required:
            - action
            - password
        tagFocus:
          type: object
          description: Impinj TagFocus instructs tags that have already been inventoried to remain unresponsive thus enabling
            the reader to focus on other tags. By reducing tag chatter, TagFocus improves read rates and accuracy in dense
            tag environments. TagFocus targets tags inventoried in session S1.
          properties:
            enabled:
              type: boolean
              description: Enable or disable the TagFocus feature.
              example: true
          required:
          - enabled
        tagQuieting:
          $ref: '#/components/schemas/impinjTagQuieting.v1'
    SetImpinjGen2XResponse:
      type: string
      description: Returns an empty string on success.
      example: ''
    SetImpinjGen2XResponse422:
      type: object
      properties:
        message:
          type: string
          example: Invalid payload for set_impinjGen2X api
    SetImpinjGen2XResponse500:
      type: object
      properties:
        code:
          type: number
          example: 1
        message:
          type: string
          example: problem getting response for set_impinjGen2X
    SetBleConfigRequest:
      type: object
      required:
      - ble
      properties:
        ble:
          type: object
          required:
          - enable
          properties:
            enable:
              type: boolean
              example: true
            scanIntervalSec:
              type: integer
              minimum: 1
              example: 5
            additionalFilters:
              type: object
              properties:
                rssi:
                  type: integer
                  minimum: -127
                  maximum: 0
                  example: -70
                serviceUuids16:
                  type: array
                  items:
                    type: string
                  example:
                  - '0x180D'
                serviceUuids128:
                  type: array
                  items:
                    type: string
                  example:
                  - 6E400001-B5A3-F393-E0A9-E50E24DCCA9E
            protocols:
              type: object
              description: Protocol-specific BLE scanner configurations.
              properties:
                iBeacon:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      example: true
                    filters:
                      type: array
                      items:
                        type: object
                        properties:
                          uuid:
                            type: string
                            description: Proximity UUID
                            example: FDA50693-A4E2-4FB1-AFCF-C6EB07647825
                          major:
                            type: integer
                            description: Major value
                            example: 10001
                          minor:
                            type: integer
                            description: Minor value
                            example: 20002
                          txPower:
                            type: integer
                            description: TX power / calibrated RSSI at 1m
                            example: -59
                altBeacon:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      example: true
                    filters:
                      type: array
                      items:
                        type: object
                        properties:
                          mfgId:
                            type: string
                            description: Manufacturer ID (hex string)
                            example: 0118
                          beaconId:
                            type: string
                            description: Beacon ID (UUID string)
                            example: 2F234454-CF6D-4A0F-ADF2-F4911BA9FFA7
                          major:
                            type: integer
                            description: Major value
                            example: 4
                          minor:
                            type: integer
                            description: Minor value
                            example: 4
                          refRssi:
                            type: integer
                            description: Reference RSSI (TX power at 1m)
                            example: -100
                eddystone:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      example: true
                    filters:
                      type: array
                      description: Filter by Eddystone frame fields. Use `frameType` to target a specific frame type (URL,
                        UID, EID). All other fields are optional and frame-type-specific.
                      items:
                        type: object
                        properties:
                          frameType:
                            type: string
                            description: Eddystone frame type
                            enum:
                            - URL
                            - UID
                            - EID
                            - TLM
                            example: URL
                          txPower:
                            type: integer
                            description: TX power at 0m (calibrated RSSI)
                            example: -59
                          url:
                            type: string
                            description: Advertised URL (Eddystone-URL only)
                            example: https://www.zebra.com
                          namespace:
                            type: string
                            description: 10-byte namespace (Eddystone-UID only, hex string)
                            example: 0102030405060708090A
                          instance:
                            type: string
                            description: 6-byte instance ID (Eddystone-UID only, hex string)
                            example: '000000000001'
                          ephemeralId:
                            type: string
                            description: 8-byte ephemeral ID (Eddystone-EID only, hex string)
                            example: 0102030405060708
                generic:
                  type: object
                  description: Configuration for GENERIC_BLE beacons. Filters match on device-level advertisement fields.
                  properties:
                    enabled:
                      type: boolean
                      example: true
                    filters:
                      type: array
                      description: List of filter objects for GENERIC_BLE beacons. A beacon is forwarded if it matches any
                        one filter entry.
                      items:
                        type: object
                        properties:
                          address:
                            type: string
                            description: Bluetooth device address to match (e.g. "7E:41:25:1E:D5:16").
                            example: 7E:41:25:1E:D5:16
                          addressType:
                            type: string
                            description: Bluetooth address type to match.
                            enum:
                            - public
                            - random
                            example: random
                          name:
                            type: string
                            description: Device name to match against the "Name" field in the BLE advertisement.
                            example: BLEPeripheralApp
                          alias:
                            type: string
                            description: Device alias to match against the "Alias" field in the BLE advertisement.
                            example: BLEPeripheralApp
