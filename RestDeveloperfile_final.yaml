                                installedCertificateName: Server
                                installedCertificateType: server
                                keyAlgorithm: RS256
                                keyFormat: PEM
                                verifyHostName: false
                                verifyPeer: false
                              subscribeTopic: []
                            type: mqtt
            batching:
              description: Global batching configuration applied across all data endpoints. Can be a single object (applied
                to all endpoints) or an array of objects (one per endpoint, array length must match number of data endpoint
                connections).
              oneOf:
              - type: object
                description: Single batching config applied to all data endpoints
                properties:
                  maxPayloadSizePerReport:
                    type: integer
                    description: Maximum payload size in bytes (0 - 256000). -1 to disable.
                    minimum: 0
                    maximum: 256000
                    example: 65536
                  reportingInterval:
                    type: integer
                    description: Report interval in milliseconds (0 - 86400000). -1 to disable.
                    minimum: 0
                    maximum: 86400000
                    example: 1000
              - type: array
                description: Per-endpoint batching config (one entry per data endpoint connection)
                items:
                  type: object
                  properties:
                    maxPayloadSizePerReport:
                      type: integer
                      minimum: 0
                      maximum: 256000
                      example: 65536
                    reportingInterval:
                      type: integer
                      minimum: 0
                      maximum: 86400000
                      example: 1000
            retention:
              description: Global retention configuration for data events on connection loss. Can be a single object (applied
                to all endpoints) or an array of objects (one per endpoint, array length must match number of data endpoint
                connections).
              oneOf:
              - type: object
                description: Single retention config applied to all data endpoints
                properties:
                  maxEventRetentionTimeInMin:
                    type: integer
                    description: Maximum event retention time in minutes (0 - 10080). 0 or -1 retains forever.
                    minimum: 0
                    maximum: 10080
                    example: 1440
                  maxNumEvents:
                    type: integer
                    description: Maximum number of events to retain (0 - 150000).
                    minimum: 0
                    maximum: 150000
                    example: 150000
                  throttle:
                    type: integer
                    description: Rate in events/sec to replay retained events on reconnect (0 - 1000).
                    minimum: 0
                    maximum: 1000
                    example: 500
              - type: array
                description: Per-endpoint retention config (one entry per data endpoint connection)
                items:
                  type: object
                  properties:
                    maxEventRetentionTimeInMin:
                      type: integer
                      minimum: 0
                      maximum: 10080
                      example: 1440
                    maxNumEvents:
                      type: integer
                      minimum: 0
                      maximum: 150000
                      example: 150000
                    throttle:
                      type: integer
                      minimum: 0
                      maximum: 1000
                      example: 500
